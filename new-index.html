  returnBook(memberId, copyId) {
    const member = this.members.get(memberId);
    const copy = member.booksIssued.find(c => c.id === copyId);
    const fine = this.fineService.calculate(copy.dueDate);
    if (fine > 0) member.fines += fine;
    copy.returnCopy();
    member.booksIssued = member.booksIssued.filter(c => c.id !== copyId);
    // Notify waitlist
    const waiting = this.waitlist.get(copy.book.isbn);
    if (waiting && waiting.length > 0) {
      const nextMember = waiting.shift();
      // Notify nextMember: book available!
    }
    return { fine };
  }
}`,
tip:"Book vs BookCopy distinction is critical — a Book (title) can have multiple physical copies. FineService separate from Library. Waitlist with Observer pattern for notifications."},

{n:6,t:"Vending Machine",
req:"Accept coins/notes, select product, dispense product + change, handle out-of-stock",
classes:"<b>Entity:</b> Product (id, name, price, quantity), Coin/Note (denomination, value)<br><b>Service:</b> Inventory (products map, check/reduce stock), ChangeService (calculate change from available coins)<br><b>Manager:</b> VendingMachine (state, currentBalance, selectedProduct, inventory, dispense flow)",
flow:"<b>PURCHASE:</b> Machine in IDLE → User inserts money → state=MONEY_INSERTED, balance += amount → User selects product → Validate: balance >= price AND inventory.hasStock(product) → Dispense product → Calculate change = balance - price → ChangeService.makeChange(change) → Dispense change → Reset to IDLE<br><br><b>STATE MACHINE:</b> IDLE → MONEY_INSERTED → PRODUCT_SELECTED → DISPENSING → IDLE. Also: MONEY_INSERTED → REFUND (user cancels) → IDLE",
patterns:"<b>State Pattern (CLASSIC!):</b> Each state is a class implementing VendingState interface. IdleState: only accepts insertMoney(). MoneyInsertedState: accepts selectProduct() or refund(). DispensedState: only accepts collectProduct(). Invalid actions in wrong state → error<br><b>Strategy:</b> ChangeStrategy — GreedyChange (largest coins first), ExactChange (require exact amount if low on coins)",
edge:"Insufficient money inserted → show 'Insert ₹X more' | Product out of stock → show error, allow reselect | Cannot make change (no small coins) → show 'Exact change only' before purchase | User cancels → refund all inserted money | Power failure → save state to recover | Machine jammed → maintenance mode | Coin slot full → reject coins",
code:`const VMState = { IDLE:'IDLE', HAS_MONEY:'HAS_MONEY', DISPENSING:'DISPENSING' };

class Product {
  constructor(id, name, price, qty) {
    this.id = id; this.name = name;
    this.price = price; this.quantity = qty;
  }
  isAvailable() { return this.quantity > 0; }
  dispense() {
    if (!this.isAvailable()) throw new Error('Out of stock');
    this.quantity--;
  }
}

class VendingMachine {
  constructor() {
    this.state = VMState.IDLE;
    this.balance = 0;
    this.products = new Map(); // slot → Product
    this.coinStock = new Map([[10,20],[5,20],[2,20],[1,50]]);
  }
  insertMoney(amount) {
    this.balance += amount;
    this.state = VMState.HAS_MONEY;
    return this.balance;
  }
  selectProduct(slotId) {
    if (this.state !== VMState.HAS_MONEY) throw new Error('Insert money first');
    const product = this.products.get(slotId);
    if (!product || !product.isAvailable()) throw new Error('Out of stock');
    if (this.balance < product.price) {
      throw new Error('Insert ₹' + (product.price - this.balance) + ' more');
    }
    // Dispense
    product.dispense();
    const change = this.balance - product.price;
    this.state = VMState.DISPENSING;
    const changeCoins = this.makeChange(change);
    this.balance = 0;
    this.state = VMState.IDLE;
    return { product: product.name, change, changeCoins };
  }
  makeChange(amount) {
    let rem = amount; const result = {};
    for (const d of [10, 5, 2, 1]) {
      const count = Math.min(Math.floor(rem/d), this.coinStock.get(d)||0);
      if (count > 0) {
        result[d] = count;
        this.coinStock.set(d, this.coinStock.get(d) - count);
        rem -= count * d;
      }
    }
    if (rem > 0) throw new Error('Cannot make change');
    return result;
  }
  refund() {
    const refund = this.balance;
    this.balance = 0;
    this.state = VMState.IDLE;
    return refund;
  }
}`,
tip:"Vending Machine is THE classic State Pattern question. Interviewers want to see states as separate classes in a full implementation. Change-making is the same greedy/coin-change problem as ATM."},

{n:7,t:"Snake and Ladder Game",
req:"Multiple players, board with snakes & ladders, dice roll, first to 100 wins",
classes:"<b>Entity:</b> Player (id, name, position), Board (size, snakes Map, ladders Map), Dice (numFaces, roll)<br><b>Manager:</b> Game (board, players[], currentTurn, isGameOver, playTurn)",
flow:"<b>PLAY TURN:</b> Game.playTurn() → get currentPlayer → Dice.roll() → newPos = player.position + roll → if newPos > 100: stay (can't exceed) → check Board.snakes[newPos] → slide DOWN → check Board.ladders[newPos] → climb UP → player.position = finalPos → if position === 100: WINNER! → else: next player's turn<br><br><b>RULES:</b> Roll 6 → extra turn. Three 6s in a row → skip turn. Can't move past 100 (need exact roll)",
patterns:"<b>Strategy:</b> DiceStrategy — SingleDie, DoubleDice, CrookedDice (for testing)<br><b>Observer:</b> Notify all players of moves (for UI updates)<br><b>Template Method:</b> Game flow is fixed but dice/board can vary",
edge:"Need exact number to reach 100 (overshoot = stay) | Multiple snakes/ladders in sequence (slide down to another snake) → apply until stable | Player disconnects → skip their turns or AI takes over | Draw condition? No — someone must win eventually | Configurable board (custom snake/ladder positions)",
code:`class Dice {
  constructor(faces = 6) { this.faces = faces; }
  roll() { return Math.floor(Math.random() * this.faces) + 1; }
}

class Board {
  constructor(size = 100) {
    this.size = size;
    this.snakes = new Map();  // head → tail (e.g., 99→2)
    this.ladders = new Map(); // bottom → top (e.g., 3→51)
  }
  addSnake(head, tail) { this.snakes.set(head, tail); }
  addLadder(bottom, top) { this.ladders.set(bottom, top); }
  getFinalPosition(pos) {
    // Apply snakes/ladders until stable
    while (this.snakes.has(pos) || this.ladders.has(pos)) {
      if (this.snakes.has(pos)) pos = this.snakes.get(pos);
      if (this.ladders.has(pos)) pos = this.ladders.get(pos);
    }
    return pos;
  }
}

class Player {
  constructor(id, name) {
    this.id = id; this.name = name; this.position = 0;
  }
}

class Game {
  constructor(players, board) {
    this.board = board;
    this.players = players;
    this.dice = new Dice();
    this.currentTurnIdx = 0;
    this.winner = null;
  }
  playTurn() {
    if (this.winner) throw new Error('Game over');
    const player = this.players[this.currentTurnIdx];
    const roll = this.dice.roll();
    let newPos = player.position + roll;
    if (newPos > this.board.size) {
      // Can't move past 100
      this.nextTurn(roll);
      return { player: player.name, roll, moved: false };
    }
    newPos = this.board.getFinalPosition(newPos);
    player.position = newPos;
    if (newPos === this.board.size) {
      this.winner = player;
      return { player: player.name, roll, position: newPos, won: true };
    }
    this.nextTurn(roll);
    return { player: player.name, roll, position: newPos };
  }
  nextTurn(roll) {
    if (roll !== 6) { // Extra turn on 6
      this.currentTurnIdx = (this.currentTurnIdx + 1) % this.players.length;
    }
  }
}`,
tip:"Simple but shows clean separation. Board knows positions. Dice is independent (testable). Game orchestrates. getFinalPosition handles cascading snakes/ladders. Good warm-up LLD question."},

{n:8,t:"Chess Game",
req:"Two players, 8x8 board, all piece types with valid moves, check/checkmate detection, turn-based",
classes:"<b>Entity:</b> Piece (abstract: position, color, isAlive, getValidMoves(board)), King/Queen/Rook/Bishop/Knight/Pawn (each with own move logic), Board (8x8 grid, pieces[]), Player (name, color, pieces[])<br><b>Service:</b> MoveValidator (isValidMove, isCheck, isCheckmate)<br><b>Manager:</b> Game (board, players, currentTurn, movePiece, gameStatus)",
flow:"<b>MOVE:</b> Player selects piece → Game.movePiece(from, to) → Validate: piece belongs to current player → piece.getValidMoves(board) includes target? → Simulate move: would it leave own king in check? → Execute: board.move(from, to) → Capture: if enemy piece at target, mark as dead → Check: is opponent's king now in check? → Checkmate: opponent has NO valid moves that escape check? → GAME OVER<br><br><b>SPECIAL:</b> Castling (king+rook swap), En Passant (pawn capture), Pawn Promotion (reach end → choose piece)",
patterns:"<b>Inheritance:</b> Piece (abstract) → King, Queen, Rook, Bishop, Knight, Pawn (each overrides getValidMoves)<br><b>Strategy:</b> Could use for AI move generation (RandomStrategy, MinimaxStrategy)<br><b>Command:</b> Each move is a Command object (supports undo/redo for move history)",
edge:"Stalemate (not in check but no valid moves) → draw | Threefold repetition → draw | 50-move rule (no captures/pawn moves) → draw | Castling conditions (king/rook never moved, no pieces between, not through check) | En Passant (only immediately after opponent's double pawn move) | Pawn promotion choice | Time control (chess clock)",
code:`const Color = { WHITE:'WHITE', BLACK:'BLACK' };

class Piece {
  constructor(color, row, col) {
    this.color = color; this.row = row; this.col = col;
    this.isAlive = true;
  }
  getValidMoves(board) { throw new Error('Override in subclass'); }
}

class Knight extends Piece {
  getValidMoves(board) {
    const moves = [];
    const offsets = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
    for (const [dr, dc] of offsets) {
      const r = this.row + dr, c = this.col + dc;
      if (r >= 0 && r < 8 && c >= 0 && c < 8) {
        const target = board.grid[r][c];
        if (!target || target.color !== this.color) moves.push([r, c]);
      }
    }
    return moves;
  }
}

class King extends Piece {
  constructor(color, row, col) {
    super(color, row, col); this.hasMoved = false;
  }
  getValidMoves(board) {
    const moves = [];
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const r = this.row + dr, c = this.col + dc;
        if (r >= 0 && r < 8 && c >= 0 && c < 8) {
          const target = board.grid[r][c];
          if (!target || target.color !== this.color) moves.push([r, c]);
        }
      }
    }
    return moves;
  }
}

class Board {
  constructor() { this.grid = Array.from({length:8}, () => Array(8).fill(null)); }
  place(piece) { this.grid[piece.row][piece.col] = piece; }
  move(fromR, fromC, toR, toC) {
    const piece = this.grid[fromR][fromC];
    const captured = this.grid[toR][toC];
    if (captured) captured.isAlive = false;
    this.grid[toR][toC] = piece;
    this.grid[fromR][fromC] = null;
    piece.row = toR; piece.col = toC;
    return captured;
  }
}

class Game {
  constructor() {
    this.board = new Board();
    this.currentTurn = Color.WHITE;
    this.moveHistory = [];
    this.status = 'ACTIVE'; // ACTIVE, CHECK, CHECKMATE, STALEMATE
  }
  movePiece(fromR, fromC, toR, toC) {
    const piece = this.board.grid[fromR][fromC];
    if (!piece || piece.color !== this.currentTurn) throw new Error('Invalid');
    const validMoves = piece.getValidMoves(this.board);
    if (!validMoves.some(([r,c]) => r===toR && c===toC))
      throw new Error('Invalid move');
    const captured = this.board.move(fromR, fromC, toR, toC);
    this.moveHistory.push({piece, from:[fromR,fromC], to:[toR,toC], captured});
    this.currentTurn = this.currentTurn === Color.WHITE ? Color.BLACK : Color.WHITE;
    return { captured };
  }
}`,
tip:"Inheritance is key: each Piece subclass implements getValidMoves differently. Board is just a grid. Game orchestrates turns. For interviews: implement Knight + one more piece fully, mention others. Check/checkmate detection = simulate all moves."},

{n:9,t:"Hotel Booking System",
req:"Search rooms by date/type, book rooms, check-in/out, payment, cancellation",
classes:"<b>Entity:</b> Room (id, type, floor, price, status), Reservation (id, guest, room, checkIn, checkOut, status), Guest (id, name, phone, reservations[])<br><b>Service:</b> SearchService (available rooms by date range + type), PricingService (calculate total by nights × rate), PaymentService<br><b>Manager:</b> Hotel (rooms[], reservations[], book, checkIn, checkOut, cancel)",
flow:"<b>BOOK:</b> Guest searches → SearchService.findAvailable(checkIn, checkOut, type) → returns rooms not reserved in that range → Guest selects room → Hotel.book(guest, room, dates) → create Reservation(status=CONFIRMED) → room blocked for those dates<br><br><b>CHECK-IN:</b> Guest arrives → Hotel.checkIn(reservationId) → verify date matches today → reservation.status = CHECKED_IN → room.status = OCCUPIED<br><br><b>CHECK-OUT:</b> Hotel.checkOut(reservationId) → PricingService.calculate(reservation) → PaymentService.charge() → room.status = AVAILABLE → reservation.status = COMPLETED<br><br><b>CANCEL:</b> Hotel.cancel(reservationId) → if > 24hrs before: full refund. 12-24hrs: 50%. <12hrs: no refund",
patterns:"<b>Strategy:</b> CancellationPolicy — FlexiblePolicy, ModeratePolicy, StrictPolicy (different refund rules)<br><b>Factory:</b> RoomFactory creates rooms of different types (Standard, Deluxe, Suite)<br><b>Observer:</b> Notify housekeeping on checkout, notify guest on room ready",
edge:"Overbooking (airlines do this intentionally — sell 105% capacity) | Room not cleaned yet → status CLEANING between checkouts | Early check-in/late checkout → extra charges | No-show → charge first night | Group booking → block multiple rooms atomically | Seasonal pricing (Strategy) | Room upgrade (same price, better room if available)",
code:`const RoomStatus = { AVAILABLE:'AVAILABLE', OCCUPIED:'OCCUPIED', CLEANING:'CLEANING' };
const ReservationStatus = { CONFIRMED:'CONFIRMED', CHECKED_IN:'CHECKED_IN', COMPLETED:'COMPLETED', CANCELLED:'CANCELLED' };

class Room {
  constructor(id, type, floor, pricePerNight) {
    this.id = id; this.type = type; this.floor = floor;
    this.pricePerNight = pricePerNight;
    this.status = RoomStatus.AVAILABLE;
  }
}

class Reservation {
  constructor(guest, room, checkIn, checkOut) {
    this.id = 'RES-' + Date.now();
    this.guest = guest; this.room = room;
    this.checkIn = checkIn; this.checkOut = checkOut;
    this.status = ReservationStatus.CONFIRMED;
  }
  getNights() {
    return Math.ceil((this.checkOut - this.checkIn) / (1000*60*60*24));
  }
}

class Hotel {
  constructor() {
    this.rooms = []; this.reservations = [];
  }
  findAvailable(checkIn, checkOut, type) {
    return this.rooms.filter(room => {
      if (type && room.type !== type) return false;
      // Check no overlapping reservations
      return !this.reservations.some(res =>
        res.room.id === room.id &&
        res.status !== ReservationStatus.CANCELLED &&
        checkIn < res.checkOut && checkOut > res.checkIn
      );
    });
  }
  book(guest, roomId, checkIn, checkOut) {
    const room = this.rooms.find(r => r.id === roomId);
    const available = this.findAvailable(checkIn, checkOut, room.type);
    if (!available.find(r => r.id === roomId))
      throw new Error('Room not available for these dates');
    const reservation = new Reservation(guest, room, checkIn, checkOut);
    this.reservations.push(reservation);
    return reservation;
  }
  checkIn(reservationId) {
    const res = this.reservations.find(r => r.id === reservationId);
    res.status = ReservationStatus.CHECKED_IN;
    res.room.status = RoomStatus.OCCUPIED;
  }
  checkOut(reservationId) {
    const res = this.reservations.find(r => r.id === reservationId);
    const total = res.getNights() * res.room.pricePerNight;
    res.status = ReservationStatus.COMPLETED;
    res.room.status = RoomStatus.CLEANING;
    return { total };
  }
  cancel(reservationId) {
    const res = this.reservations.find(r => r.id === reservationId);
    const hoursUntil = (res.checkIn - Date.now()) / (1000*60*60);
    let refundPercent = 0;
    if (hoursUntil > 24) refundPercent = 100;
    else if (hoursUntil > 12) refundPercent = 50;
    res.status = ReservationStatus.CANCELLED;
    return { refundPercent };
  }
}`,
tip:"Key insight: availability check = no overlapping reservations (dateRange overlap: A.start < B.end AND A.end > B.start). Cancellation policy as Strategy pattern impresses. Room status includes CLEANING state."},

{n:10,t:"Online Shopping (Amazon)",
req:"Browse products, add to cart, place order, payment, order tracking, reviews",
classes:"<b>Entity:</b> Product (id, name, price, stock, category), CartItem (product, quantity), Cart (userId, items[]), Order (id, user, items[], status, total, address, payment), Review (userId, productId, rating, text)<br><b>Service:</b> SearchService (filter by category/price/rating), PaymentService (process), InventoryService (check/deduct stock), NotificationService<br><b>Manager:</b> OrderService (createOrder, updateStatus, cancelOrder)",
flow:"<b>ORDER FLOW:</b> User adds items to Cart → User.checkout() → Validate: all items in stock (InventoryService.check) → Calculate total + tax + shipping → Create Order(status=PENDING) → PaymentService.charge(total) → success? Order.status = CONFIRMED → InventoryService.deductStock() → NotificationService.sendConfirmation()<br><br><b>ORDER STATES:</b> PENDING → CONFIRMED → SHIPPED → DELIVERED → COMPLETED. Or: PENDING → CANCELLED (before shipping). DELIVERED → RETURNED (within 7 days)<br><br><b>PAYMENT FAILURE:</b> Order stays PENDING → retry or cancel → don't deduct stock until payment succeeds",
patterns:"<b>Strategy:</b> ShippingStrategy (StandardShipping, ExpressShipping, SameDayShipping) — different cost + time<br><b>Observer:</b> Order status change → notify user via email/SMS/push<br><b>State:</b> Order state machine with valid transitions<br><b>Factory:</b> PaymentFactory creates CreditCard/UPI/NetBanking/COD processor",
edge:"Item goes out of stock while in cart → show 'Only 2 left' or remove at checkout | Payment timeout → don't deduct stock, retry | Concurrent purchase of last item → optimistic locking on stock | Coupon/discount application → validate at order creation | Price changed since added to cart → show updated price | Partial order cancellation (cancel 1 item of 3) | COD: deduct stock but charge on delivery",
code:`const OrderStatus = { PENDING:'PENDING', CONFIRMED:'CONFIRMED', SHIPPED:'SHIPPED', DELIVERED:'DELIVERED', CANCELLED:'CANCELLED' };

class Product {
  constructor(id, name, price, stock) {
    this.id = id; this.name = name;
    this.price = price; this.stock = stock;
  }
  isAvailable(qty) { return this.stock >= qty; }
  deduct(qty) {
    if (!this.isAvailable(qty)) throw new Error('Out of stock');
    this.stock -= qty;
  }
}

class Cart {
  constructor(userId) {
    this.userId = userId; this.items = new Map(); // productId → qty
  }
  add(product, qty = 1) {
    const current = this.items.get(product.id) || 0;
    this.items.set(product.id, current + qty);
  }
  remove(productId) { this.items.delete(productId); }
  getTotal(products) {
    let total = 0;
    for (const [pid, qty] of this.items) {
      total += products.get(pid).price * qty;
    }
    return total;
  }
  clear() { this.items.clear(); }
}

class Order {
  constructor(userId, items, total, address) {
    this.id = 'ORD-' + Date.now();
    this.userId = userId; this.items = items;
    this.total = total; this.address = address;
    this.status = OrderStatus.PENDING;
    this.createdAt = Date.now();
  }
  updateStatus(newStatus) {
    const validTransitions = {
      PENDING: ['CONFIRMED', 'CANCELLED'],
      CONFIRMED: ['SHIPPED', 'CANCELLED'],
      SHIPPED: ['DELIVERED'],
      DELIVERED: ['COMPLETED']
    };
    if (!validTransitions[this.status]?.includes(newStatus))
      throw new Error('Invalid transition: '+this.status+' → '+newStatus);
    this.status = newStatus;
  }
}

class OrderService {
  constructor(products) {
    this.products = products; // Map of all products
    this.orders = new Map();
  }
  checkout(cart, address) {
    // Validate stock
    for (const [pid, qty] of cart.items) {
      if (!this.products.get(pid).isAvailable(qty))
        throw new Error(pid + ' out of stock');
    }
    const total = cart.getTotal(this.products);
    const order = new Order(cart.userId, [...cart.items], total, address);
    this.orders.set(order.id, order);
    return order;
  }
  confirmPayment(orderId) {
    const order = this.orders.get(orderId);
    // Deduct stock only after payment success
    for (const [pid, qty] of order.items) {
      this.products.get(pid).deduct(qty);
    }
    order.updateStatus(OrderStatus.CONFIRMED);
  }
  cancel(orderId) {
    const order = this.orders.get(orderId);
    if (order.status === OrderStatus.CONFIRMED) {
      // Restore stock
      for (const [pid, qty] of order.items) {
        this.products.get(pid).stock += qty;
      }
    }
    order.updateStatus(OrderStatus.CANCELLED);
  }
}`,
tip:"Key: deduct stock ONLY after payment succeeds (not at cart add). Order state machine prevents invalid transitions. Cart is per-user, ephemeral. Order is permanent record. Separate OrderService from PaymentService."},

{n:11,t:"Splitwise (Expense Sharing)",
req:"Add expenses, split equally/unequally/by percentage, track balances, simplify debts",
classes:"<b>Entity:</b> User (id, name), Expense (id, payer, amount, splits[], description), Split (userId, share)<br><b>Service:</b> SplitStrategy (EqualSplit, ExactSplit, PercentSplit), BalanceService (compute net balances), SimplifyService (minimize transactions)<br><b>Manager:</b> ExpenseManager (users[], expenses[], addExpense, getBalances, simplifyDebts)",
flow:"<b>ADD EXPENSE:</b> User A pays ₹1000 for dinner (split equally among A,B,C,D) → ExpenseManager.addExpense(payer=A, amount=1000, splitType=EQUAL, participants=[A,B,C,D]) → SplitStrategy.calculate() → each owes ₹250 → B owes A ₹250, C owes A ₹250, D owes A ₹250<br><br><b>BALANCE:</b> Track pairwise: balances[A][B] = +250 means B owes A ₹250. balances[B][A] = -250.<br><br><b>SIMPLIFY:</b> A owes B ₹500, B owes C ₹300 → simplified: A owes B ₹200, A owes C ₹300 (minimize total transactions using net balances + greedy matching)",
patterns:"<b>Strategy:</b> SplitStrategy — EqualSplit, ExactSplit (custom amounts), PercentSplit (custom percentages)<br><b>Observer:</b> Notify users when new expense added affecting them",
edge:"Split doesn't add up to total → reject | User not in group → can't be in split | Negative balances (someone overpaid) | Currency conversion for international groups | Recurring expenses (rent monthly) | Settlement: mark debts as paid | Group expenses vs 1-on-1 | Rounding issues with equal splits (₹100/3 = 33.33... → last person gets ₹34)",
code:`const SplitType = { EQUAL:'EQUAL', EXACT:'EXACT', PERCENT:'PERCENT' };

class User {
  constructor(id, name) { this.id = id; this.name = name; }
}

class Expense {
  constructor(payer, amount, description, splits) {
    this.id = 'EXP-' + Date.now();
    this.payer = payer; this.amount = amount;
    this.description = description; this.splits = splits;
    this.createdAt = Date.now();
  }
}

class SplitStrategy {
  static equal(amount, participants) {
    const share = Math.round(amount / participants.length * 100) / 100;
    return participants.map(u => ({ userId: u.id, share }));
  }
  static exact(splits) { return splits; } // [{userId, share}]
  static percent(amount, percentSplits) {
    return percentSplits.map(({userId, percent}) =>
      ({ userId, share: Math.round(amount * percent / 100 * 100) / 100 }));
  }
}

class ExpenseManager {
  constructor() {
    this.users = new Map();
    this.expenses = [];
    this.balances = new Map(); // "userId1:userId2" → amount (positive = u2 owes u1)
  }
  addExpense(payerId, amount, description, splitType, participants, customSplits) {
    let splits;
    if (splitType === SplitType.EQUAL) splits = SplitStrategy.equal(amount, participants);
    else if (splitType === SplitType.EXACT) splits = customSplits;
    else splits = SplitStrategy.percent(amount, customSplits);

    const expense = new Expense(payerId, amount, description, splits);
    this.expenses.push(expense);

    // Update balances
    for (const split of splits) {
      if (split.userId === payerId) continue; // payer doesn't owe themselves
      const key = payerId + ':' + split.userId;
      const reverseKey = split.userId + ':' + payerId;
      const current = this.balances.get(key) || 0;
      this.balances.set(key, current + split.share);
      this.balances.set(reverseKey, -(current + split.share));
    }
    return expense;
  }
  getBalance(userId) {
    const owes = []; const owed = [];
    for (const [key, amount] of this.balances) {
      const [from, to] = key.split(':');
      if (to === userId && amount > 0) owed.push({from, amount});
      if (from === userId && amount > 0) owes.push({to, amount});
    }
    return { owes, owed };
  }
  simplifyDebts() {
    // Net balance per user
    const net = new Map();
    for (const [key, amount] of this.balances) {
      const [from, to] = key.split(':');
      if (amount > 0) {
        net.set(from, (net.get(from)||0) + amount);
        net.set(to, (net.get(to)||0) - amount);
      }
    }
    // Greedy: match largest creditor with largest debtor
    const creditors = [], debtors = [];
    for (const [uid, bal] of net) {
      if (bal > 0) creditors.push({uid, amount: bal});
      else if (bal < 0) debtors.push({uid, amount: -bal});
    }
    creditors.sort((a,b) => b.amount - a.amount);
    debtors.sort((a,b) => b.amount - a.amount);
    const transactions = [];
    let i = 0, j = 0;
    while (i < creditors.length && j < debtors.length) {
      const settle = Math.min(creditors[i].amount, debtors[j].amount);
      transactions.push({from: debtors[j].uid, to: creditors[i].uid, amount: settle});
      creditors[i].amount -= settle;
      debtors[j].amount -= settle;
      if (creditors[i].amount === 0) i++;
      if (debtors[j].amount === 0) j++;
    }
    return transactions;
  }
}`,
tip:"Debt simplification is the hard part — it's a graph problem! Net each person's total, then greedy match creditors with debtors. Strategy pattern for split types. Rounding handling for equal splits shows attention to detail."},

{n:12,t:"Tic Tac Toe",
req:"2 players, NxN board, win by filling row/col/diagonal, O(1) win check",
classes:"<b>Entity:</b> Board (grid[][], size, mark, checkWin), Player (name, symbol)<br><b>Manager:</b> Game (board, players, currentTurn, play, getWinner)",
flow:"<b>PLAY:</b> Game.play(row, col) → validate: cell empty AND game not over → Board.mark(row, col, currentPlayer.symbol) → Board.checkWin(row, col) → if win: game over, return winner → if board full: draw → else: switch turn<br><br><b>O(1) WIN CHECK (the trick!):</b> Track rowCount[row], colCount[col], diagCount, antiDiagCount per player. Each mark: increment relevant counters. If any counter === N → WIN! No need to scan entire row/col.",
patterns:"<b>Strategy:</b> WinStrategy — StandardWin (row/col/diag), ConnectFour (4 in a row), Gomoku (5 in a row)<br><b>Factory:</b> GameFactory.create(type) for different game variants",
edge:"Invalid move (cell occupied) → reject | Board full with no winner → draw | Extensible to NxN (not just 3x3) | Undo last move | AI opponent (minimax algorithm) | Multiple rounds (track wins)",
code:`class Board {
  constructor(size = 3) {
    this.size = size;
    this.grid = Array.from({length: size}, () => Array(size).fill(null));
    this.movesLeft = size * size;
    // O(1) win tracking
    this.rows = Array.from({length: size}, () => ({X:0, O:0}));
    this.cols = Array.from({length: size}, () => ({X:0, O:0}));
    this.diag = {X:0, O:0};
    this.antiDiag = {X:0, O:0};
  }
  mark(row, col, symbol) {
    if (this.grid[row][col]) throw new Error('Cell occupied');
    this.grid[row][col] = symbol;
    this.movesLeft--;
    // Update counters
    this.rows[row][symbol]++;
    this.cols[col][symbol]++;
    if (row === col) this.diag[symbol]++;
    if (row + col === this.size - 1) this.antiDiag[symbol]++;
  }
  checkWin(row, col, symbol) {
    const n = this.size;
    return this.rows[row][symbol] === n ||
           this.cols[col][symbol] === n ||
           this.diag[symbol] === n ||
           this.antiDiag[symbol] === n;
  }
  isFull() { return this.movesLeft === 0; }
}

class Player {
  constructor(name, symbol) { this.name = name; this.symbol = symbol; }
}

class Game {
  constructor(size = 3) {
    this.board = new Board(size);
    this.players = [new Player('Player 1','X'), new Player('Player 2','O')];
    this.currentTurnIdx = 0;
    this.winner = null;
    this.isDraw = false;
  }
  play(row, col) {
    if (this.winner || this.isDraw) throw new Error('Game over');
    const player = this.players[this.currentTurnIdx];
    this.board.mark(row, col, player.symbol);
    if (this.board.checkWin(row, col, player.symbol)) {
      this.winner = player;
      return { status: 'WIN', winner: player.name };
    }
    if (this.board.isFull()) {
      this.isDraw = true;
      return { status: 'DRAW' };
    }
    this.currentTurnIdx = 1 - this.currentTurnIdx;
    return { status: 'CONTINUE', nextPlayer: this.players[this.currentTurnIdx].name };
  }
}`,
tip:"The O(1) win check using row/col/diagonal counters is THE key insight that impresses interviewers. Without it you'd scan O(N) on each move. Works for any NxN size. Simple but elegant."},

{n:13,t:"Car Rental System",
req:"Browse vehicles, reserve by date range, pickup/return, billing by duration, vehicle types",
classes:"<b>Entity:</b> Vehicle (id, type, plate, status, location), Reservation (id, user, vehicle, pickupDate, returnDate, status, pickupLocation, dropLocation), User (id, name, license)<br><b>Service:</b> SearchService (available vehicles by date+location+type), BillingService (daily rate × days + insurance + extras), InsuranceService<br><b>Manager:</b> RentalSystem (vehicles[], reservations[], reserve, pickup, returnVehicle, cancel)",
flow:"<b>RESERVE:</b> User searches available vehicles for date range + location → selects vehicle → RentalSystem.reserve(user, vehicleId, dates) → create Reservation(CONFIRMED) → vehicle blocked for dates<br><br><b>PICKUP:</b> User arrives → RentalSystem.pickup(reservationId) → verify date = today → vehicle.status = RENTED → reservation.status = ACTIVE → record mileage<br><br><b>RETURN:</b> User returns → RentalSystem.return(reservationId) → record final mileage → BillingService.calculate(days, type, insurance, extraMiles) → vehicle.status = AVAILABLE → reservation.status = COMPLETED",
patterns:"<b>Strategy:</b> PricingStrategy — WeekdayRate, WeekendRate, WeeklyRate (7+ days discount)<br><b>Factory:</b> VehicleFactory creates Sedan/SUV/Truck with different base rates<br><b>Observer:</b> Notify maintenance when vehicle returned (inspection needed)",
edge:"Late return → extra day charges + penalty | Vehicle returned damaged → charge damage fee | One-way rental (different pickup/drop) → surcharge | Vehicle breakdown → swap vehicle, no extra charge | Reservation no-show → charge one day + release vehicle | Age restrictions for luxury cars | Mileage limit exceeded → per-km charge | Insurance options: basic, full, none",
code:`const VehicleStatus = { AVAILABLE:'AVAILABLE', RESERVED:'RESERVED', RENTED:'RENTED', MAINTENANCE:'MAINTENANCE' };

class Vehicle {
  constructor(id, type, plate, dailyRate) {
    this.id = id; this.type = type; this.plate = plate;
    this.dailyRate = dailyRate; this.status = VehicleStatus.AVAILABLE;
    this.mileage = 0;
  }
}

class Reservation {
  constructor(user, vehicle, pickupDate, returnDate) {
    this.id = 'RNT-' + Date.now();
    this.user = user; this.vehicle = vehicle;
    this.pickupDate = pickupDate; this.returnDate = returnDate;
    this.status = 'CONFIRMED'; this.startMileage = 0;
  }
}

class BillingService {
  calculate(reservation, actualReturnDate, endMileage) {
    const planned = Math.ceil((reservation.returnDate - reservation.pickupDate)/(1000*60*60*24));
    const actual = Math.ceil((actualReturnDate - reservation.pickupDate)/(1000*60*60*24));
    let total = actual * reservation.vehicle.dailyRate;
    // Late return penalty
    if (actual > planned) {
      const extraDays = actual - planned;
      total += extraDays * reservation.vehicle.dailyRate * 1.5; // 1.5x penalty
    }
    // Extra mileage (over 200km/day free)
    const freeMiles = actual * 200;
    const driven = endMileage - reservation.startMileage;
    if (driven > freeMiles) total += (driven - freeMiles) * 5; // ₹5/extra km
    return total;
  }
}

class RentalSystem {
  constructor() {
    this.vehicles = []; this.reservations = [];
    this.billing = new BillingService();
  }
  findAvailable(pickupDate, returnDate, type) {
    return this.vehicles.filter(v => {
      if (type && v.type !== type) return false;
      if (v.status === VehicleStatus.MAINTENANCE) return false;
      return !this.reservations.some(r =>
        r.vehicle.id === v.id && r.status !== 'CANCELLED' &&
        pickupDate < r.returnDate && returnDate > r.pickupDate
      );
    });
  }
  reserve(user, vehicleId, pickupDate, returnDate) {
    const vehicle = this.vehicles.find(v => v.id === vehicleId);
    const res = new Reservation(user, vehicle, pickupDate, returnDate);
    this.reservations.push(res);
    return res;
  }
  pickup(reservationId) {
    const res = this.reservations.find(r => r.id === reservationId);
    res.status = 'ACTIVE';
    res.vehicle.status = VehicleStatus.RENTED;
    res.startMileage = res.vehicle.mileage;
  }
  returnVehicle(reservationId) {
    const res = this.reservations.find(r => r.id === reservationId);
    const total = this.billing.calculate(res, Date.now(), res.vehicle.mileage);
    res.status = 'COMPLETED';
    res.vehicle.status = VehicleStatus.AVAILABLE;
    return { total };
  }
}`,
tip:"Similar to Hotel but with: mileage tracking, late return penalty, one-way surcharge. Availability check is the same date-overlap logic. BillingService handles complex pricing rules."},

{n:14,t:"Stack Overflow (Q&A Platform)",
req:"Post questions/answers, vote up/down, accept answer, reputation system, tags, search",
classes:"<b>Entity:</b> User (id, name, reputation, badges[]), Question (id, author, title, body, tags[], votes, answers[], status), Answer (id, author, body, votes, isAccepted), Comment (id, author, body, parentId), Vote (userId, targetId, type)<br><b>Service:</b> ReputationService (award/deduct points), SearchService (by tags, keywords), VoteService (upvote/downvote with rules)<br><b>Manager:</b> Platform (users[], questions[], postQuestion, postAnswer, vote, acceptAnswer)",
flow:"<b>POST QUESTION:</b> User.postQuestion(title, body, tags) → validate (min length, not duplicate) → create Question → +5 reputation to author<br><br><b>ANSWER:</b> User.postAnswer(questionId, body) → create Answer → link to question → +10 reputation if later accepted<br><br><b>VOTE:</b> User.vote(targetId, UP/DOWN) → validate: can't vote own, need 15 rep to upvote, 125 to downvote → upvote = +10 to author, downvote = -2 to author + -1 to voter<br><br><b>ACCEPT:</b> Question author only → acceptAnswer(answerId) → answer.isAccepted = true → +15 rep to answer author → +2 to question author",
patterns:"<b>Strategy:</b> SortStrategy — sortByVotes, sortByNewest, sortByActive (for answer ordering)<br><b>Observer:</b> Notify question author when new answer posted, notify on votes<br><b>Decorator:</b> Badge system — add badges to users based on thresholds",
edge:"Self-voting forbidden | User deletes account → keep content but anonymize | Duplicate question → close + redirect | Edit history tracking | Bounty system (spend rep to attract answers) | Spam detection | Rate limiting (max 6 questions/day) | Community wiki (no rep from votes) | Protected questions (need 10 rep to answer)",
code:`class User {
  constructor(id, name) {
    this.id = id; this.name = name;
    this.reputation = 1; // Start at 1
    this.questionsAsked = []; this.answersPosted = [];
  }
  canUpvote() { return this.reputation >= 15; }
  canDownvote() { return this.reputation >= 125; }
  addReputation(points) { this.reputation = Math.max(1, this.reputation + points); }
}

class Question {
  constructor(author, title, body, tags) {
    this.id = 'Q-' + Date.now();
    this.author = author; this.title = title;
    this.body = body; this.tags = tags;
    this.answers = []; this.votes = 0;
    this.status = 'OPEN'; this.createdAt = Date.now();
  }
}

class Answer {
  constructor(author, body) {
    this.id = 'A-' + Date.now();
    this.author = author; this.body = body;
    this.votes = 0; this.isAccepted = false;
  }
}

class Platform {
  constructor() {
    this.users = new Map(); this.questions = new Map();
    this.votes = new Map(); // oderId:targetId → vote type
  }
  postQuestion(userId, title, body, tags) {
    const user = this.users.get(userId);
    const q = new Question(user, title, body, tags);
    this.questions.set(q.id, q);
    user.questionsAsked.push(q);
    return q;
  }
  postAnswer(userId, questionId, body) {
    const user = this.users.get(userId);
    const q = this.questions.get(questionId);
    const answer = new Answer(user, body);
    q.answers.push(answer);
    user.answersPosted.push(answer);
    return answer;
  }
  vote(voterId, targetId, isUpvote) {
    const voter = this.users.get(voterId);
    if (isUpvote && !voter.canUpvote()) throw new Error('Need 15 rep');
    if (!isUpvote && !voter.canDownvote()) throw new Error('Need 125 rep');
    // Find target (question or answer)
    const voteKey = voterId + ':' + targetId;
    if (this.votes.has(voteKey)) throw new Error('Already voted');
    this.votes.set(voteKey, isUpvote);
    // Apply reputation
    // (simplified — find target author and adjust)
  }
  acceptAnswer(questionId, answerId, userId) {
    const q = this.questions.get(questionId);
    if (q.author.id !== userId) throw new Error('Only question author can accept');
    const answer = q.answers.find(a => a.id === answerId);
    answer.isAccepted = true;
    answer.author.addReputation(15); // +15 for accepted answer
    q.author.addReputation(2); // +2 for accepting
  }
  search(query, tags) {
    return [...this.questions.values()].filter(q => {
      const matchQuery = !query || q.title.toLowerCase().includes(query.toLowerCase());
      const matchTags = !tags || tags.some(t => q.tags.includes(t));
      return matchQuery || matchTags;
    }).sort((a, b) => b.votes - a.votes);
  }
}`,
tip:"Reputation system is the unique aspect. Rules: can't vote own posts, need minimum rep for actions, voting costs/rewards rep. Accept answer = only question author. Good question to show Observer pattern for notifications."},

{n:15,t:"Ride Sharing (Uber/Ola)",
req:"Request ride, match with nearby driver, dynamic pricing, trip tracking, payment, rating",
classes:"<b>Entity:</b> Rider (id, name, location, paymentMethod), Driver (id, name, location, vehicle, status, rating), Trip (id, rider, driver, pickup, dropoff, status, fare, distance)<br><b>Service:</b> MatchingService (find nearest available drivers), PricingService (base + distance + time + surge), PaymentService, NotificationService<br><b>Manager:</b> RideService (requestRide, acceptRide, startTrip, endTrip, cancelTrip)",
flow:"<b>REQUEST:</b> Rider.requestRide(pickup, dropoff) → PricingService.estimate(distance, time, surge) → show estimate → Rider confirms → MatchingService.findNearestDrivers(pickup, radius=3km) → send request to nearest driver → Driver has 15 sec to accept<br><br><b>ACCEPT:</b> Driver.accept(tripId) → trip.status = DRIVER_EN_ROUTE → notify rider with ETA<br><br><b>TRIP:</b> Driver arrives → trip.status = ARRIVED → Rider gets in → trip.status = IN_PROGRESS → track route → Arrive at destination → trip.status = COMPLETED → PricingService.calculateFinal(actualDistance, actualTime, surge) → PaymentService.charge(rider) → PaymentService.pay(driver, fare - commission)<br><br><b>STATES:</b> REQUESTED → MATCHED → DRIVER_EN_ROUTE → ARRIVED → IN_PROGRESS → COMPLETED / CANCELLED",
patterns:"<b>Strategy:</b> PricingStrategy — NormalPricing, SurgePricing (demand/supply ratio), PoolPricing (shared rides, split fare)<br><b>Strategy:</b> MatchingStrategy — NearestDriver, HighestRatedDriver, OptimalETADriver<br><b>Observer:</b> Real-time location updates to rider during trip<br><b>State:</b> Trip state machine with valid transitions",
edge:"Driver doesn't accept in 15s → send to next driver | No drivers available → queue + notify when available | Driver cancels mid-trip → reassign new driver | Rider cancels after match → cancellation fee (₹50) | Surge pricing cap (max 3x) | Safety: share trip with contacts | Route deviation alert | Payment fails → block rider until resolved | Driver offline during trip → GPS tracking continues",
code:`const TripStatus = { REQUESTED:'REQUESTED', MATCHED:'MATCHED', EN_ROUTE:'EN_ROUTE', ARRIVED:'ARRIVED', IN_PROGRESS:'IN_PROGRESS', COMPLETED:'COMPLETED', CANCELLED:'CANCELLED' };
const DriverStatus = { AVAILABLE:'AVAILABLE', BUSY:'BUSY', OFFLINE:'OFFLINE' };

class Driver {
  constructor(id, name, vehicle) {
    this.id = id; this.name = name; this.vehicle = vehicle;
    this.location = {lat:0, lng:0};
    this.status = DriverStatus.AVAILABLE;
    this.rating = 5.0; this.totalRides = 0;
  }
  updateLocation(lat, lng) { this.location = {lat, lng}; }
}

class Trip {
  constructor(rider, pickup, dropoff) {
    this.id = 'TRIP-' + Date.now();
    this.rider = rider; this.driver = null;
    this.pickup = pickup; this.dropoff = dropoff;
    this.status = TripStatus.REQUESTED;
    this.fare = 0; this.startTime = null; this.endTime = null;
  }
}

class PricingService {
  constructor() { this.baseFare = 50; this.perKm = 12; this.perMin = 2; this.surgeMultiplier = 1.0; }
  setSurge(multiplier) { this.surgeMultiplier = Math.min(multiplier, 3.0); }
  estimate(distanceKm, estimatedMins) {
    return Math.round((this.baseFare + distanceKm * this.perKm + estimatedMins * this.perMin) * this.surgeMultiplier);
  }
  calculateFinal(distanceKm, actualMins) {
    return this.estimate(distanceKm, actualMins); // Same formula, actual values
  }
}

class MatchingService {
  findNearest(pickup, drivers, radius = 3) {
    return drivers
      .filter(d => d.status === DriverStatus.AVAILABLE)
      .map(d => ({ driver: d, dist: this.getDistance(pickup, d.location) }))
      .filter(d => d.dist <= radius)
      .sort((a, b) => a.dist - b.dist)
      .map(d => d.driver);
  }
  getDistance(a, b) {
    return Math.sqrt((a.lat-b.lat)**2 + (a.lng-b.lng)**2); // Simplified
  }
}

class RideService {
  constructor() {
    this.drivers = []; this.trips = new Map();
    this.matching = new MatchingService();
    this.pricing = new PricingService();
  }
  requestRide(rider, pickup, dropoff) {
    const trip = new Trip(rider, pickup, dropoff);
    const nearby = this.matching.findNearest(pickup, this.drivers);
    if (nearby.length === 0) throw new Error('No drivers available');
    trip.driver = nearby[0]; // Assign nearest
    trip.driver.status = DriverStatus.BUSY;
    trip.status = TripStatus.MATCHED;
    this.trips.set(trip.id, trip);
    return trip;
  }
  startTrip(tripId) {
    const trip = this.trips.get(tripId);
    trip.status = TripStatus.IN_PROGRESS;
    trip.startTime = Date.now();
  }
  endTrip(tripId, distanceKm) {
    const trip = this.trips.get(tripId);
    trip.endTime = Date.now();
    const mins = (trip.endTime - trip.startTime) / (1000*60);
    trip.fare = this.pricing.calculateFinal(distanceKm, mins);
    trip.status = TripStatus.COMPLETED;
    trip.driver.status = DriverStatus.AVAILABLE;
    return { fare: trip.fare };
  }
}`,
tip:"Two Strategy patterns: matching (nearest vs highest-rated) AND pricing (normal vs surge vs pool). Surge = demand/supply ratio per geographic zone. State machine for trip lifecycle. Real-time location = Observer pattern."},

{n:16,t:"Food Ordering System (Swiggy/Zomato)",
req:"Browse restaurants/menus, add to cart, place order, assign delivery, track order status",
classes:"<b>Entity:</b> Restaurant (id, name, menu[], isOpen, location), MenuItem (id, name, price, category, isAvailable), Order (id, user, restaurant, items[], status, deliveryAgent, total), DeliveryAgent (id, name, location, status)<br><b>Service:</b> SearchService (nearby restaurants by location + cuisine), PricingService (items + delivery fee + tax), AssignmentService (assign nearest free agent)<br><b>Manager:</b> OrderService (placeOrder, updateStatus, assignAgent, cancelOrder)",
flow:"<b>ORDER:</b> User browses nearby restaurants → selects restaurant → adds items to cart → OrderService.placeOrder(user, restaurant, items) → validate: restaurant open + items available → create Order(PLACED) → notify restaurant<br><br><b>RESTAURANT:</b> Restaurant confirms → order.status = CONFIRMED → restaurant prepares → order.status = PREPARING → food ready → order.status = READY_FOR_PICKUP<br><br><b>DELIVERY:</b> AssignmentService.assign(order) → find nearest available agent → agent.status = BUSY → order.status = PICKED_UP → agent delivers → order.status = DELIVERED<br><br><b>STATES:</b> PLACED → CONFIRMED → PREPARING → READY → PICKED_UP → DELIVERED / CANCELLED",
patterns:"<b>Strategy:</b> DeliveryAssignment — NearestAgent, LeastBusyAgent, HighestRatedAgent<br><b>Observer:</b> Real-time status updates to user (notify on each state change)<br><b>State:</b> Order state machine with time limits per state (15 min to confirm, 30 min to prepare)",
edge:"Restaurant rejects order → notify user + full refund | Item unavailable after ordering → partial order + adjusted bill | Delivery agent stuck → reassign to another | Long preparation time → notify user of delay | User cancels after preparation started → partial refund only | Multiple orders same restaurant → batch if same agent | Rain/high demand → higher delivery fee (surge) | COD vs online payment",
code:`const OrderStatus = { PLACED:'PLACED', CONFIRMED:'CONFIRMED', PREPARING:'PREPARING', READY:'READY', PICKED_UP:'PICKED_UP', DELIVERED:'DELIVERED', CANCELLED:'CANCELLED' };
const AgentStatus = { AVAILABLE:'AVAILABLE', BUSY:'BUSY', OFFLINE:'OFFLINE' };

class Restaurant {
  constructor(id, name, location) {
    this.id = id; this.name = name; this.location = location;
    this.menu = []; this.isOpen = true;
  }
  addItem(item) { this.menu.push(item); }
}

class MenuItem {
  constructor(id, name, price, category) {
    this.id = id; this.name = name;
    this.price = price; this.category = category;
    this.isAvailable = true;
  }
}

class Order {
  constructor(user, restaurant, items) {
    this.id = 'ORD-' + Date.now();
    this.user = user; this.restaurant = restaurant;
    this.items = items; // [{menuItem, qty}]
    this.status = OrderStatus.PLACED;
    this.agent = null;
    this.total = items.reduce((sum, i) => sum + i.menuItem.price * i.qty, 0);
    this.createdAt = Date.now();
  }
  updateStatus(newStatus) {
    const valid = {
      PLACED: ['CONFIRMED','CANCELLED'],
      CONFIRMED: ['PREPARING','CANCELLED'],
      PREPARING: ['READY'],
      READY: ['PICKED_UP'],
      PICKED_UP: ['DELIVERED']
    };
    if (!valid[this.status]?.includes(newStatus))
      throw new Error('Invalid: ' + this.status + ' → ' + newStatus);
    this.status = newStatus;
  }
}

class DeliveryAgent {
  constructor(id, name) {
    this.id = id; this.name = name;
    this.location = {lat:0, lng:0};
    this.status = AgentStatus.AVAILABLE;
  }
}

class OrderService {
  constructor() {
    this.orders = new Map();
    this.agents = [];
  }
  placeOrder(user, restaurant, items) {
    if (!restaurant.isOpen) throw new Error('Restaurant closed');
    for (const item of items) {
      if (!item.menuItem.isAvailable) throw new Error(item.menuItem.name + ' unavailable');
    }
    const order = new Order(user, restaurant, items);
    this.orders.set(order.id, order);
    return order;
  }
  assignAgent(orderId) {
    const order = this.orders.get(orderId);
    const available = this.agents.filter(a => a.status === AgentStatus.AVAILABLE);
    if (available.length === 0) throw new Error('No agents available');
    // Nearest to restaurant
    const nearest = available[0]; // Simplified
    nearest.status = AgentStatus.BUSY;
    order.agent = nearest;
    return nearest;
  }
  completeDelivery(orderId) {
    const order = this.orders.get(orderId);
    order.updateStatus(OrderStatus.DELIVERED);
    order.agent.status = AgentStatus.AVAILABLE;
  }
}`,
tip:"Three-party system: User, Restaurant, DeliveryAgent. State machine with time constraints per state. Assignment strategy for delivery agents. Observer for real-time tracking. Restaurant confirmation step prevents issues."},

{n:17,t:"Social Media (Twitter/Feed)",
req:"Post tweets, follow/unfollow, news feed (timeline), like, retweet, notifications",
classes:"<b>Entity:</b> User (id, name, followers[], following[], posts[]), Post (id, author, content, timestamp, likes, retweets, comments[]), Comment (id, author, content)<br><b>Service:</b> FeedService (generate timeline from followed users), NotificationService (notify on like/comment/follow), SearchService<br><b>Manager:</b> SocialNetwork (users[], createPost, follow, unfollow, getFeed, like)",
flow:"<b>POST:</b> User.createPost(content) → create Post → add to user.posts[] → FeedService: for each follower, add to their feed (fan-out-on-write for small accounts)<br><br><b>FEED:</b> User.getFeed() → collect posts from all following[] → sort by timestamp (reverse chronological) → paginate (cursor-based)<br><br><b>FOLLOW:</b> UserA.follow(UserB) → A.following.add(B) → B.followers.add(A) → NotificationService.notify(B, 'A followed you')<br><br><b>LIKE:</b> User.like(postId) → post.likes++ → NotificationService.notify(post.author, 'User liked your post')",
patterns:"<b>Observer:</b> Notify users on likes, comments, follows, mentions<br><b>Strategy:</b> FeedStrategy — ChronologicalFeed, RankedFeed (ML-based scoring), TrendingFeed<br><b>Iterator:</b> Paginated feed traversal with cursor",
edge:"User with 10M followers posts → don't fan-out, pull on read (hybrid fan-out) | Deleted post → remove from all feeds | Blocked user → hide from each other's feeds | Spam detection → rate limit posts (10/hour) | Private account → approve followers | Hashtag trending → count within time window | Edit tweet (recent addition) → update in-place with 'edited' flag",
code:`class User {
  constructor(id, name) {
    this.id = id; this.name = name;
    this.followers = new Set(); // userIds who follow me
    this.following = new Set(); // userIds I follow
    this.posts = [];
  }
}

class Post {
  constructor(authorId, content) {
    this.id = 'POST-' + Date.now() + Math.random().toString(36).slice(2,6);
    this.authorId = authorId; this.content = content;
    this.timestamp = Date.now();
    this.likes = new Set(); // userIds
    this.retweets = new Set();
    this.comments = [];
  }
}

class SocialNetwork {
  constructor() {
    this.users = new Map();
    this.posts = new Map();
    this.feeds = new Map(); // userId → [postIds] (pre-computed)
  }
  createPost(userId, content) {
    const post = new Post(userId, content);
    this.posts.set(post.id, post);
    const user = this.users.get(userId);
    user.posts.push(post.id);
    // Fan-out to followers' feeds
    for (const followerId of user.followers) {
      if (!this.feeds.has(followerId)) this.feeds.set(followerId, []);
      this.feeds.get(followerId).unshift(post.id);
    }
    return post;
  }
  follow(userId, targetId) {
    if (userId === targetId) throw new Error('Cannot follow self');
    const user = this.users.get(userId);
    const target = this.users.get(targetId);
    user.following.add(targetId);
    target.followers.add(userId);
  }
  unfollow(userId, targetId) {
    const user = this.users.get(userId);
    const target = this.users.get(targetId);
    user.following.delete(targetId);
    target.followers.delete(userId);
  }
  getFeed(userId, limit = 20, cursor = 0) {
    const feedIds = this.feeds.get(userId) || [];
    const page = feedIds.slice(cursor, cursor + limit);
    return page.map(id => this.posts.get(id));
  }
  like(userId, postId) {
    const post = this.posts.get(postId);
    post.likes.add(userId);
  }
}`,
tip:"Fan-out-on-write for normal users (pre-compute feed). Pull-on-read for celebrities (too many followers). Feed = sorted list of post IDs per user. Pagination with cursor (not offset — offsets break with new posts). Likes/retweets as Sets prevent duplicates."},

{n:18,t:"Logging Framework",
req:"Multiple log levels, multiple output destinations, configurable format, filtering",
classes:"<b>Entity:</b> LogEntry (level, message, timestamp, context/metadata)<br><b>Service:</b> Formatter (format log entry — JSON, Plain, Custom), Filter (filter by level/source)<br><b>Output:</b> LogSink (interface) — ConsoleSink, FileSink, RemoteSink (writes to different destinations)<br><b>Manager:</b> Logger (sinks[], level, log, addSink, setLevel)",
flow:"<b>LOG:</b> Logger.info('User logged in', {userId: 123}) → create LogEntry(INFO, message, now, metadata) → Filter: is INFO >= configured level? → if no: discard → if yes: Formatter.format(entry) → for each sink: sink.write(formatted)<br><br><b>LEVELS:</b> DEBUG < INFO < WARN < ERROR < FATAL. If logger level = WARN, then DEBUG and INFO are filtered out.<br><br><b>CONFIG:</b> Logger.setLevel(WARN) → only WARN+ logged. Logger.addSink(new FileSink('app.log')) → also write to file.",
patterns:"<b>Builder:</b> Logger.builder().level(WARN).sink(consoleSink).sink(fileSink).formatter(jsonFormatter).build()<br><b>Strategy:</b> Formatter is a strategy — JSONFormatter, PlainTextFormatter, PrettyFormatter<br><b>Observer:</b> Sinks are observers of log events<br><b>Singleton:</b> Logger.getInstance() — one logger per app (or named loggers: Logger.get('auth'))",
edge:"File rotation (max 10MB per file, keep 5 files) | Async writing (don't block main thread) | Buffer + flush (batch writes for performance) | Remote sink fails → fallback to console + retry | Sensitive data masking (don't log passwords/tokens) | Structured logging (JSON) for log aggregation tools | Log correlation ID for request tracing | Rate limiting (don't flood with same error 1000x)",
code:`const Level = { DEBUG:0, INFO:1, WARN:2, ERROR:3, FATAL:4 };

class LogEntry {
  constructor(level, message, context = {}) {
    this.level = level; this.message = message;
    this.timestamp = new Date().toISOString();
    this.context = context;
  }
}

// Strategy: different formatters
class JSONFormatter {
  format(entry) {
    return JSON.stringify({
      level: entry.level, msg: entry.message,
      ts: entry.timestamp, ...entry.context
    });
  }
}

class PlainFormatter {
  format(entry) {
    return \`[\${entry.timestamp}] [\${entry.level}] \${entry.message}\`;
  }
}

// Sinks (output destinations)
class ConsoleSink {
  write(formatted) { console.log(formatted); }
}

class FileSink {
  constructor(filename) { this.filename = filename; this.buffer = []; }
  write(formatted) {
    this.buffer.push(formatted);
    if (this.buffer.length >= 10) this.flush(); // Batch writes
  }
  flush() {
    // Write buffer to file (fs.appendFile in real code)
    this.buffer = [];
  }
}

class Logger {
  constructor() {
    this.level = Level.INFO;
    this.sinks = [];
    this.formatter = new PlainFormatter();
  }
  setLevel(level) { this.level = level; }
  addSink(sink) { this.sinks.push(sink); }
  setFormatter(formatter) { this.formatter = formatter; }

  log(level, message, context) {
    if (Level[level] < this.level) return; // Filter by level
    const entry = new LogEntry(level, message, context);
    const formatted = this.formatter.format(entry);
    this.sinks.forEach(sink => sink.write(formatted));
  }
  debug(msg, ctx) { this.log('DEBUG', msg, ctx); }
  info(msg, ctx) { this.log('INFO', msg, ctx); }
  warn(msg, ctx) { this.log('WARN', msg, ctx); }
  error(msg, ctx) { this.log('ERROR', msg, ctx); }
  fatal(msg, ctx) { this.log('FATAL', msg, ctx); }
}

// Usage:
// const logger = new Logger();
// logger.addSink(new ConsoleSink());
// logger.addSink(new FileSink('app.log'));
// logger.setFormatter(new JSONFormatter());
// logger.info('User login', { userId: 123 });`,
tip:"Clean demonstration of Strategy (formatter) + Observer (sinks) + Builder patterns. Level filtering is simple but important. Buffer+flush for file writes shows production awareness. Real-world: Winston, Log4j follow this exact pattern."},

{n:19,t:"Rate Limiter",
req:"Limit API requests per user/IP/endpoint, multiple algorithms, configurable limits",
classes:"<b>Entity:</b> RateLimitConfig (maxRequests, windowSize, algorithm), RequestInfo (userId, endpoint, timestamp)<br><b>Service:</b> RateLimitStrategy (interface) — TokenBucket, SlidingWindow, FixedWindow, LeakyBucket<br><b>Manager:</b> RateLimiter (configs Map, strategies Map, isAllowed, getRemainingQuota)",
flow:"<b>CHECK:</b> Request arrives → RateLimiter.isAllowed(userId, endpoint) → get config for endpoint → get strategy for config → strategy.allow(userId)? → YES: process request → NO: return 429 Too Many Requests + Retry-After header<br><br><b>TOKEN BUCKET:</b> Each user has a bucket with maxTokens. Each request consumes 1 token. Tokens refill at rate R per second. Bucket empty → reject. Allows bursts up to maxTokens.<br><br><b>SLIDING WINDOW:</b> Count requests in last N seconds. If count >= limit → reject. Precise but memory-heavy (store each timestamp).",
patterns:"<b>Strategy:</b> Algorithm selection — TokenBucket (allows bursts), SlidingWindow (precise), FixedWindow (simple), LeakyBucket (smooth rate)<br><b>Singleton:</b> Global RateLimiter instance<br><b>Decorator:</b> Wrap any endpoint with rate limiting middleware",
edge:"Distributed rate limiting (multiple servers) → centralized store (Redis) | Clock skew between servers | What if Redis down → fail-open (allow) or fail-closed (reject)? | Different limits per tier (free=100/min, paid=1000/min) | Endpoint-specific limits (/login = 5/min, /read = 100/min) | Graceful degradation (allow with warning vs hard reject) | Retry-After header value calculation | IP-based + user-based combined",
code:`// Token Bucket Algorithm
class TokenBucket {
  constructor(maxTokens, refillRate) {
    this.maxTokens = maxTokens; // Max burst size
    this.refillRate = refillRate; // Tokens per second
    this.buckets = new Map(); // userId → {tokens, lastRefill}
  }
  allow(userId) {
    if (!this.buckets.has(userId)) {
      this.buckets.set(userId, { tokens: this.maxTokens, lastRefill: Date.now() });
    }
    const bucket = this.buckets.get(userId);
    // Refill tokens based on time elapsed
    const now = Date.now();
    const elapsed = (now - bucket.lastRefill) / 1000;
    bucket.tokens = Math.min(this.maxTokens, bucket.tokens + elapsed * this.refillRate);
    bucket.lastRefill = now;
    // Try to consume
    if (bucket.tokens >= 1) {
      bucket.tokens -= 1;
      return true;
    }
    return false;
  }
}

// Sliding Window Algorithm
class SlidingWindow {
  constructor(maxRequests, windowMs) {
    this.maxRequests = maxRequests;
    this.windowMs = windowMs;
    this.requests = new Map(); // userId → [timestamps]
  }
  allow(userId) {
    const now = Date.now();
    if (!this.requests.has(userId)) this.requests.set(userId, []);
    const timestamps = this.requests.get(userId);
    // Remove expired timestamps
    const windowStart = now - this.windowMs;
    while (timestamps.length && timestamps[0] < windowStart) timestamps.shift();
    // Check limit
    if (timestamps.length >= this.maxRequests) return false;
    timestamps.push(now);
    return true;
  }
}

class RateLimiter {
  constructor() {
    this.limiters = new Map(); // endpoint → strategy instance
  }
  configure(endpoint, strategy) {
    this.limiters.set(endpoint, strategy);
  }
  isAllowed(userId, endpoint) {
    const limiter = this.limiters.get(endpoint);
    if (!limiter) return true; // No limit configured
    return limiter.allow(userId);
  }
  getRetryAfter(userId, endpoint) {
    // Calculate seconds until next allowed request
    return 60; // Simplified
  }
}

// Usage:
// const rl = new RateLimiter();
// rl.configure('/api/login', new SlidingWindow(5, 60000)); // 5 per min
// rl.configure('/api/read', new TokenBucket(100, 2)); // 100 burst, 2/sec refill
// if (!rl.isAllowed(userId, '/api/login')) return { status: 429 };`,
tip:"Token Bucket = best default (allows bursts, smooth refill). Sliding Window = precise but more memory. Strategy pattern lets you pick algorithm per endpoint. In production: use Redis for distributed state. Fail-open if Redis dies."},

{n:20,t:"Pub/Sub Messaging System",
req:"Publishers send messages to topics, subscribers receive messages from subscribed topics",
classes:"<b>Entity:</b> Message (id, topic, payload, timestamp), Topic (name, subscribers[]), Subscription (id, subscriberId, topicName, filter)<br><b>Service:</b> DeliveryService (deliver messages to subscribers — sync/async), FilterService (apply subscriber filters)<br><b>Manager:</b> MessageBroker (topics Map, publish, subscribe, unsubscribe)",
flow:"<b>SUBSCRIBE:</b> Subscriber.subscribe(topicName, callback, filter?) → MessageBroker.subscribe(subscriberId, topicName) → Topic.addSubscriber(subscriber)<br><br><b>PUBLISH:</b> Publisher.publish(topicName, payload) → MessageBroker.publish(topic, message) → for each subscriber in topic.subscribers: → FilterService.matches(message, subscriber.filter)? → DeliveryService.deliver(subscriber, message) → subscriber.callback(message)<br><br><b>UNSUBSCRIBE:</b> Subscriber.unsubscribe(topicName) → Topic.removeSubscriber(subscriber)",
patterns:"<b>Observer:</b> Core pattern — pub/sub IS the Observer pattern at scale<br><b>Strategy:</b> DeliveryStrategy — SyncDelivery (immediate), AsyncDelivery (queue), BatchDelivery (collect + send periodically)<br><b>Filter:</b> Chain of Responsibility for message filtering",
edge:"Subscriber offline → queue messages (max 1000, then drop oldest) | Slow subscriber → don't block others (async delivery) | Topic doesn't exist → auto-create or error? | Message ordering guarantee (within topic) | Duplicate message detection (idempotency) | Dead letter queue (failed deliveries after N retries) | Subscriber acknowledgment (at-least-once delivery) | Wildcard subscriptions (events.* matches events.user.login)",
code:`class Message {
  constructor(topic, payload) {
    this.id = 'MSG-' + Date.now() + Math.random().toString(36).slice(2,6);
    this.topic = topic; this.payload = payload;
    this.timestamp = Date.now();
  }
}

class Topic {
  constructor(name) {
    this.name = name;
    this.subscribers = new Map(); // subscriberId → {callback, filter}
  }
  addSubscriber(id, callback, filter = null) {
    this.subscribers.set(id, { callback, filter });
  }
  removeSubscriber(id) { this.subscribers.delete(id); }
}

class MessageBroker {
  constructor() {
    this.topics = new Map();
    this.deadLetterQueue = [];
    this.messageHistory = new Map(); // topicName → [messages] for replay
  }
  createTopic(name) {
    if (!this.topics.has(name)) this.topics.set(name, new Topic(name));
    return this.topics.get(name);
  }
  subscribe(subscriberId, topicName, callback, filter) {
    const topic = this.createTopic(topicName);
    topic.addSubscriber(subscriberId, callback, filter);
  }
  unsubscribe(subscriberId, topicName) {
    const topic = this.topics.get(topicName);
    if (topic) topic.removeSubscriber(subscriberId);
  }
  publish(topicName, payload) {
    const topic = this.topics.get(topicName);
    if (!topic) throw new Error('Topic not found: ' + topicName);
    const message = new Message(topicName, payload);
    // Store for replay
    if (!this.messageHistory.has(topicName)) this.messageHistory.set(topicName, []);
    this.messageHistory.get(topicName).push(message);
    // Deliver to all subscribers
    for (const [subId, {callback, filter}] of topic.subscribers) {
      try {
        if (filter && !this.matchesFilter(message, filter)) continue;
        callback(message);
      } catch (e) {
        this.deadLetterQueue.push({ message, subscriberId: subId, error: e.message });
      }
    }
    return message;
  }
  matchesFilter(message, filter) {
    // Simple key-value filter on payload
    for (const [key, val] of Object.entries(filter)) {
      if (message.payload[key] !== val) return false;
    }
    return true;
  }
}

// Usage:
// const broker = new MessageBroker();
// broker.subscribe('user1', 'orders', (msg) => console.log('Got:', msg.payload));
// broker.publish('orders', { orderId: 123, status: 'CONFIRMED' });`,
tip:"This IS the Observer pattern implemented as infrastructure. Key additions: message filtering, dead letter queue, message history for replay. In production: Kafka/RabbitMQ. In LLD: show you understand the core mechanics. Async delivery prevents slow subscribers from blocking."},

{n:21,t:"File System (In-Memory)",
req:"Create files/folders, navigate paths, read/write content, delete, move, list directory",
classes:"<b>Entity:</b> FileSystemNode (abstract: name, parent, createdAt, size), File (extends Node: content, extension), Directory (extends Node: children Map)<br><b>Service:</b> PathResolver (resolve '/a/b/c.txt' to node), SearchService (find by name/extension)<br><b>Manager:</b> FileSystem (root Directory, create, read, write, delete, move, ls)",
flow:"<b>CREATE FILE:</b> FileSystem.createFile('/docs/notes.txt', content) → PathResolver.resolve('/docs') → returns Directory 'docs' → create File('notes.txt', content) → add to docs.children<br><br><b>READ:</b> FileSystem.read('/docs/notes.txt') → PathResolver.resolve full path → return file.content<br><br><b>LS:</b> FileSystem.ls('/docs') → resolve to Directory → return children.keys()<br><br><b>DELETE:</b> FileSystem.delete('/docs/notes.txt') → resolve parent directory → remove from children",
patterns:"<b>Composite:</b> Both File and Directory are FileSystemNodes. Directory contains other nodes (files OR directories). Recursive operations (size, delete) work uniformly<br><b>Iterator:</b> Directory traversal (DFS/BFS for search)<br><b>Factory:</b> NodeFactory creates File or Directory based on input",
edge:"Path doesn't exist → throw error | File already exists → overwrite or error? | Delete non-empty directory → recursive delete (rm -rf) or error | Circular references (symlinks) → detect cycles | File name validation (no special chars) | Storage quota exceeded | Concurrent access to same file | Path too long (>255 chars)",
code:`class FileSystemNode {
  constructor(name, parent = null) {
    this.name = name; this.parent = parent;
    this.createdAt = Date.now();
  }
  getPath() {
    if (!this.parent) return '/';
    const parentPath = this.parent.getPath();
    return parentPath === '/' ? '/' + this.name : parentPath + '/' + this.name;
  }
  getSize() { throw new Error('Override'); }
}

class File extends FileSystemNode {
  constructor(name, content = '', parent) {
    super(name, parent);
    this.content = content;
  }
  getSize() { return this.content.length; }
  write(content) { this.content = content; }
  read() { return this.content; }
}

class Directory extends FileSystemNode {
  constructor(name, parent) {
    super(name, parent);
    this.children = new Map(); // name → FileSystemNode
  }
  getSize() {
    let total = 0;
    for (const child of this.children.values()) total += child.getSize();
    return total; // Composite pattern: recursive size
  }
  add(node) {
    if (this.children.has(node.name)) throw new Error('Already exists: ' + node.name);
    node.parent = this;
    this.children.set(node.name, node);
  }
  remove(name) { this.children.delete(name); }
  get(name) { return this.children.get(name); }
  list() { return [...this.children.keys()]; }
}

class FileSystem {
  constructor() { this.root = new Directory('', null); }
  resolve(path) {
    if (path === '/') return this.root;
    const parts = path.split('/').filter(Boolean);
    let current = this.root;
    for (const part of parts) {
      if (!(current instanceof Directory)) throw new Error('Not a directory');
      current = current.get(part);
      if (!current) throw new Error('Path not found: ' + path);
    }
    return current;
  }
  createFile(path, content = '') {
    const parts = path.split('/').filter(Boolean);
    const fileName = parts.pop();
    const dir = this.resolve('/' + parts.join('/'));
    const file = new File(fileName, content);
    dir.add(file);
    return file;
  }
  createDir(path) {
    const parts = path.split('/').filter(Boolean);
    const dirName = parts.pop();
    const parent = this.resolve('/' + parts.join('/'));
    const dir = new Directory(dirName);
    parent.add(dir);
    return dir;
  }
  read(path) {
    const node = this.resolve(path);
    if (!(node instanceof File)) throw new Error('Not a file');
    return node.read();
  }
  write(path, content) {
    const node = this.resolve(path);
    if (!(node instanceof File)) throw new Error('Not a file');
    node.write(content);
  }
  delete(path) {
    const node = this.resolve(path);
    if (node.parent) node.parent.remove(node.name);
  }
  ls(path) {
    const node = this.resolve(path);
    if (!(node instanceof Directory)) throw new Error('Not a directory');
    return node.list();
  }
}`,
tip:"Composite pattern is THE key: File and Directory both extend FileSystemNode. getSize() on Directory recursively sums children — works uniformly. PathResolver is the tricky utility. Inheritance (File vs Directory) is natural here."},

{n:22,t:"LRU Cache",
req:"O(1) get and put, evict least recently used when capacity exceeded, update on access",
classes:"<b>Entity:</b> Node (key, value, prev, next) — doubly linked list node<br><b>Data Structures:</b> HashMap (key → Node) for O(1) lookup + Doubly Linked List (for O(1) move-to-front/remove-from-tail)<br><b>Manager:</b> LRUCache (capacity, map, head, tail, get, put)",
flow:"<b>GET:</b> LRUCache.get(key) → HashMap.get(key) → found? → move node to HEAD (most recently used) → return value. Not found? → return -1<br><br><b>PUT:</b> LRUCache.put(key, value) → key exists? → update value + move to HEAD. Key new? → create Node → add to HEAD → HashMap.set(key, node) → if size > capacity: remove TAIL node (least recently used) → HashMap.delete(tail.key)<br><br><b>KEY INSIGHT:</b> Head = most recent. Tail = least recent. Access = move to head. Eviction = remove tail. Both O(1) with DLL.",
patterns:"<b>This IS a data structure problem disguised as LLD</b><br><b>Strategy:</b> EvictionStrategy — LRU, LFU, FIFO (can swap eviction policy)<br><b>Decorator:</b> Add TTL support on top of basic LRU",
edge:"Capacity = 0 → always evict immediately | Concurrent access → need thread-safe version (lock on get/put) | TTL per key (expire after X seconds regardless of access) | Cache miss callback (auto-fetch from source on miss) | Memory-based capacity (not just count) | Warm-up (pre-populate on startup)",
code:`class Node {
  constructor(key, value) {
    this.key = key; this.value = value;
    this.prev = null; this.next = null;
  }
}

class LRUCache {
  constructor(capacity) {
    this.capacity = capacity;
    this.map = new Map(); // key → Node
    // Dummy head and tail for easy manipulation
    this.head = new Node(0, 0);
    this.tail = new Node(0, 0);
    this.head.next = this.tail;
    this.tail.prev = this.head;
  }

  // Remove node from its current position
  _remove(node) {
    node.prev.next = node.next;
    node.next.prev = node.prev;
  }

  // Add node right after head (most recent)
  _addToHead(node) {
    node.next = this.head.next;
    node.prev = this.head;
    this.head.next.prev = node;
    this.head.next = node;
  }

  get(key) {
    if (!this.map.has(key)) return -1;
    const node = this.map.get(key);
    // Move to head (mark as recently used)
    this._remove(node);
    this._addToHead(node);
    return node.value;
  }

  put(key, value) {
    if (this.map.has(key)) {
      // Update existing
      const node = this.map.get(key);
      node.value = value;
      this._remove(node);
      this._addToHead(node);
    } else {
      // Add new
      const node = new Node(key, value);
      this.map.set(key, node);
      this._addToHead(node);
      // Evict if over capacity
      if (this.map.size > this.capacity) {
        const lru = this.tail.prev; // Least recently used
        this._remove(lru);
        this.map.delete(lru.key);
      }
    }
  }
}

// Usage:
// const cache = new LRUCache(3);
// cache.put(1, 'a'); cache.put(2, 'b'); cache.put(3, 'c');
// cache.get(1); // 'a' — moves 1 to front
// cache.put(4, 'd'); // evicts key 2 (least recent)
// cache.get(2); // -1 (evicted)`,
tip:"LeetCode #146! HashMap gives O(1) lookup. DLL gives O(1) move/remove. Dummy head+tail eliminate edge cases. Key stored in Node so we can delete from Map when evicting tail. This is THE classic data structure interview question."},

{n:23,t:"Notification System",
req:"Send notifications via multiple channels (push, email, SMS), user preferences, priority, templates",
classes:"<b>Entity:</b> Notification (id, userId, type, channel, content, status, priority), NotificationTemplate (type, subject, body with {{vars}}), UserPreference (userId, channels enabled, quietHours, frequency)<br><b>Service:</b> ChannelStrategy (interface) — PushService, EmailService, SMSService; TemplateService (render template with data); PriorityQueue (process high priority first)<br><b>Manager:</b> NotificationManager (send, schedule, checkPreferences, processQueue)",
flow:"<b>SEND:</b> Event triggers notification (order confirmed) → NotificationManager.send(userId, type, data) → check UserPreference: is this type enabled? is user in quiet hours? → TemplateService.render(type, data) → get content → check priority → for each enabled channel: ChannelStrategy.send(channel, userId, content)<br><br><b>PRIORITY:</b> P1=OTP/Security (immediate, all channels) → P2=Transactional (order updates) → P3=Marketing (batched, respect frequency limits)<br><br><b>QUIET HOURS:</b> P3 notifications queued until quiet hours end. P1 always delivered.",
patterns:"<b>Strategy:</b> Channel strategies — PushNotification, Email, SMS, InApp (each implements send() differently)<br><b>Observer:</b> Events trigger notifications (OrderPlaced → notify user + restaurant + agent)<br><b>Template Method:</b> All channels follow: validate → render → deliver → log<br><b>Builder:</b> NotificationBuilder().to(user).type(ORDER_UPDATE).channel(PUSH).data({orderId}).build()",
edge:"User disabled channel → skip that channel | All channels fail → retry 3x then DLQ | Duplicate notification (same event processed twice) → dedup by event_id | Rate limiting per user (max 5 push/hour) | Quiet hours (10pm-8am, no marketing) | Batch notifications (group 10 likes into 1 notification) | Channel fallback (push fails → try SMS) | Unsubscribe link in emails | Device token expired → mark as invalid",
code:`const Channel = { PUSH:'PUSH', EMAIL:'EMAIL', SMS:'SMS', IN_APP:'IN_APP' };
const Priority = { CRITICAL:1, HIGH:2, MEDIUM:3, LOW:4 };

class Notification {
  constructor(userId, type, content, channel, priority) {
    this.id = 'NOTIF-' + Date.now();
    this.userId = userId; this.type = type;
    this.content = content; this.channel = channel;
    this.priority = priority; this.status = 'PENDING';
    this.createdAt = Date.now();
  }
}

// Strategy: different channels
class PushService {
  send(userId, content) {
    console.log('Push to ' + userId + ': ' + content.title);
    return true;
  }
}
class EmailService {
  send(userId, content) {
    console.log('Email to ' + userId + ': ' + content.subject);
    return true;
  }
}
class SMSService {
  send(userId, content) {
    console.log('SMS to ' + userId + ': ' + content.body);
    return true;
  }
}

class TemplateService {
  constructor() {
    this.templates = new Map(); // type → {subject, body}
  }
  render(type, data) {
    const tmpl = this.templates.get(type);
    let body = tmpl.body;
    for (const [key, val] of Object.entries(data)) {
      body = body.replace('{{' + key + '}}', val);
    }
    return { subject: tmpl.subject, title: tmpl.subject, body };
  }
}

class NotificationManager {
  constructor() {
    this.channels = new Map([
      [Channel.PUSH, new PushService()],
      [Channel.EMAIL, new EmailService()],
      [Channel.SMS, new SMSService()]
    ]);
    this.templates = new TemplateService();
    this.preferences = new Map(); // userId → {channels:[], quietStart, quietEnd}
    this.queue = []; // Priority queue
  }
  send(userId, type, data, priority = Priority.MEDIUM) {
    const prefs = this.preferences.get(userId);
    // Check quiet hours for low priority
    if (priority >= Priority.MEDIUM && this.isQuietHours(prefs)) {
      this.queue.push({ userId, type, data, priority, scheduledFor: prefs.quietEnd });
      return;
    }
    const content = this.templates.render(type, data);
    // Send to all enabled channels
    for (const channel of (prefs?.channels || [Channel.PUSH])) {
      const service = this.channels.get(channel);
      try {
        service.send(userId, content);
      } catch (e) {
        console.error('Failed: ' + channel, e);
        // Retry logic / fallback
      }
    }
  }
  isQuietHours(prefs) {
    if (!prefs) return false;
    const hour = new Date().getHours();
    return hour >= prefs.quietStart || hour < prefs.quietEnd;
  }
}`,
tip:"Strategy pattern for channels is the core. Template rendering separates content from delivery. Priority queue ensures OTPs never wait. Quiet hours + user preferences show real-world awareness. Batch notifications for social (10 likes → 1 push) is a nice touch."},

{n:24,t:"Payment System",
req:"Multiple payment methods, process payments, refunds, transaction history, idempotency",
classes:"<b>Entity:</b> Transaction (id, userId, amount, method, status, idempotencyKey, createdAt), PaymentMethod (interface: charge, refund) — CreditCard, UPI, NetBanking, Wallet<br><b>Service:</b> PaymentProcessor (orchestrates charge flow), FraudService (risk scoring), LedgerService (double-entry bookkeeping)<br><b>Manager:</b> PaymentGateway (processPayment, refund, getHistory, validateIdempotency)",
flow:"<b>PAYMENT:</b> PaymentGateway.pay(userId, amount, method, idempotencyKey) → check idempotencyKey (seen before? return existing result) → FraudService.assess(user, amount) → risk too high? reject → create Transaction(PENDING) → PaymentMethod.charge(amount) → success? Transaction.status = SUCCESS → LedgerService.credit(merchant) + LedgerService.debit(user) → fail? Transaction.status = FAILED → return result<br><br><b>REFUND:</b> PaymentGateway.refund(transactionId) → original txn must be SUCCESS → create refund Transaction → PaymentMethod.refund(amount) → LedgerService.reverse(original)<br><br><b>IDEMPOTENCY:</b> Same idempotencyKey sent twice → return first result. Prevents double-charging on network retries.",
patterns:"<b>Strategy:</b> PaymentMethod interface — CreditCard, UPI, Wallet (each has different charge/refund mechanics)<br><b>State:</b> Transaction states: PENDING → SUCCESS/FAILED → REFUND_PENDING → REFUNDED<br><b>Factory:</b> PaymentMethodFactory.create(type) returns appropriate processor<br><b>Command:</b> Each transaction is a Command (reversible via refund)",
