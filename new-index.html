<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Interview Prep — LeetCode + HLD</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:#0d1117}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#484f58}
::selection{background:#1f6feb;color:#fff}
body{font-family:'Segoe UI','Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#0d1117;color:#c9d1d9;display:flex;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
.tab-bar{position:fixed;top:0;left:0;right:0;height:48px;background:linear-gradient(180deg,#161b22 0%,#0d1117 100%);border-bottom:1px solid #21262d;display:flex;z-index:100;padding:0 12px;align-items:center;gap:4px;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.tab-btn{background:none;border:none;color:#8b949e;font-size:14px;font-weight:600;padding:10px 18px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;transition:color 0.15s,border-color 0.15s;border-radius:6px 6px 0 0;letter-spacing:0.01em}
.tab-btn:hover{color:#e6edf3;background:#1c233308}
.tab-btn.active{color:#58a6ff;border-bottom-color:#58a6ff;background:#58a6ff08}
.tab-page{display:none;height:calc(100vh - 48px);margin-top:48px;width:100%}
.tab-page.show{display:flex}
.sidebar{width:270px;min-width:270px;background:#161b22;border-right:1px solid #21262d;overflow-y:auto;display:flex;flex-direction:column}
.sidebar-header{padding:14px 16px;border-bottom:1px solid #21262d;position:sticky;top:0;background:#161b22;z-index:2}
.sidebar-header h2{color:#58a6ff;font-size:17px;margin-bottom:10px;letter-spacing:0.02em}
.sidebar-header input{width:100%;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:8px 12px;border-radius:6px;font-size:14px;transition:border-color 0.2s,box-shadow 0.2s}
.sidebar-header input:focus{outline:none;border-color:#1f6feb;box-shadow:0 0 0 3px #1f6feb30}
.sidebar-list{flex:1;overflow-y:auto;padding:4px 0}
.s-topic{cursor:pointer;padding:9px 16px;font-size:14px;font-weight:700;color:#8b949e;display:flex;justify-content:space-between;align-items:center;user-select:none;transition:background 0.12s,color 0.12s}
.s-topic:hover{background:#1c2333;color:#c9d1d9}
.s-topic.active{color:#58a6ff;background:#1c2333}
.s-topic .cnt{background:#30363d;color:#8b949e;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;min-width:22px;text-align:center}
.s-topic.active .cnt{background:#1f6feb;color:#fff}
.s-patterns{display:none;padding:0 0 4px 0}
.s-topic.active+.s-patterns{display:block}
.s-pat{cursor:pointer;padding:6px 16px 6px 30px;font-size:13px;color:#8b949e;border-left:2px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all 0.12s}
.s-pat:hover{color:#c9d1d9;background:#1c2333}
.s-pat.active{color:#f0883e;border-left-color:#f0883e;background:#1c233380}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:10px 24px;border-bottom:1px solid #21262d;background:#161b22;display:flex;align-items:center;gap:12px;min-height:48px}
.topbar h1{color:#58a6ff;font-size:18px;white-space:nowrap;font-weight:700;letter-spacing:0.01em}
.topbar .breadcrumb{color:#8b949e;font-size:14px}
.topbar .breadcrumb span{color:#f0883e;font-weight:600}
.content-area{flex:1;overflow-y:auto;padding:20px 28px 60px;scroll-behavior:smooth}
.pattern-section{margin-bottom:20px}
.pat-card{background:#161b22;border:1px solid #21262d;border-radius:6px;padding:16px 18px;margin-bottom:12px}
.pat-card h3{color:#f0883e;font-size:16px;margin-bottom:4px}
.pat-card .req{color:#f0c14b;font-size:14px;margin-bottom:6px;padding:5px 10px;background:#f0c14b12;border-left:3px solid #f0c14b;border-radius:0 4px 4px 0}
.pat-card .when{color:#3fb950;font-size:14px;margin-bottom:8px;font-style:italic}
.pat-card ul{padding-left:20px;margin:6px 0}
.pat-card li{font-size:14px;margin:4px 0;color:#c9d1d9;line-height:1.6}
.pat-card li code,.pat-card li b{color:#79c0ff}
pre{background:#0d1117;color:#e6edf3;padding:14px 16px;border-radius:6px;font-size:13px;font-family:'JetBrains Mono','Fira Code','Courier New',monospace;overflow-x:auto;margin:10px 0 6px;border:1px solid #21262d;line-height:1.6;tab-size:2}
.dtable{width:100%;border-collapse:collapse;font-size:13px;margin:12px 0;border-radius:6px;overflow:hidden}
.dtable th{background:#1f6feb;color:#fff;padding:8px 12px;text-align:left;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:0.04em}
.dtable td{padding:7px 12px;border-bottom:1px solid #21262d}
.dtable tr:nth-child(even){background:#161b22}
.dtable tr:hover{background:#1c2333}
.problems-header{color:#58a6ff;font-size:16px;font-weight:700;padding:12px 0 8px;border-top:1px solid #21262d;margin-top:10px;display:flex;justify-content:space-between;align-items:center}
.problems-header .expand-all{font-size:13px;color:#8b949e;cursor:pointer;font-weight:400;padding:4px 10px;border:1px solid #30363d;border-radius:4px;background:none}
.problems-header .expand-all:hover{color:#c9d1d9;border-color:#58a6ff}
.q{border:1px solid #21262d;border-radius:6px;margin:6px 0;overflow:hidden;background:#0d1117;transition:border-color 0.15s}
.q:hover{border-color:#30363d}
.q.open{border-color:#1f6feb30}
.q-btn{width:100%;text-align:left;background:none;border:none;color:#c9d1d9;padding:10px 14px;cursor:pointer;font-size:14px;font-family:inherit;display:flex;align-items:center;gap:10px;transition:background 0.12s}
.q-btn:hover{background:#161b22}
.q-btn .num{color:#484f58;min-width:40px;font-family:'Courier New',monospace;font-size:13px}
.q-btn .title{flex:1}
.q-btn .d{font-size:12px;padding:2px 8px;border-radius:3px;font-weight:600}
.q-btn .d.easy{color:#3fb950;background:#3fb95015}
.q-btn .d.med{color:#f0883e;background:#f0883e15}
.q-btn .d.hard{color:#f85149;background:#f8514915}
.q-btn .arrow{color:#484f58;font-size:10px;transition:transform .15s;min-width:14px}
.q.open .arrow{transform:rotate(90deg)}
.ans{display:none;padding:12px 14px;border-top:1px solid #21262d;font-size:14px;background:#161b22;line-height:1.7}
.q.open .ans{display:block}
.ans b{color:#79c0ff}
.ans .approach{color:#d2a8ff;font-weight:600;font-size:14px;margin-bottom:4px;display:block}
.tag{display:inline-block;background:#1f2937;color:#8b949e;padding:2px 7px;border-radius:3px;font-size:11px;margin:2px 2px 0 0}
/* HLD */
.hld-section{margin-bottom:32px}
.hld-section h2{color:#58a6ff;font-size:20px;border-bottom:2px solid #1f6feb;padding-bottom:8px;margin-bottom:16px;font-weight:700;letter-spacing:0.02em}
.hld-card{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:18px 20px;margin-bottom:14px;transition:border-color 0.2s}
.hld-card:hover{border-color:#30363d}
.hld-card h3{color:#f0883e;font-size:16px;margin-bottom:6px;font-weight:700}
.hld-card .hld-req{color:#f0c14b;font-size:14px;margin-bottom:8px;padding:6px 12px;background:#f0c14b0a;border-left:3px solid #f0c14b;border-radius:0 6px 6px 0}
.hld-card ul{padding-left:20px;margin:8px 0}
.hld-card li{font-size:14px;margin:5px 0;color:#c9d1d9;line-height:1.7}
.hld-card li b{color:#79c0ff}
.hld-card .vs-link{color:#d2a8ff;cursor:pointer;text-decoration:underline;font-size:13px;display:inline-block;margin:3px 8px 3px 0}
.hld-card .vs-link:hover{color:#f0883e}
.hld-q{border:1px solid #21262d;border-radius:8px;margin:10px 0;overflow:hidden;background:#0d1117;transition:border-color 0.2s}
.hld-q:hover{border-color:#30363d}
.hld-q.open{border-color:#1f6feb40}
.hld-q-btn{width:100%;text-align:left;background:none;border:none;color:#c9d1d9;padding:12px 16px;cursor:pointer;font-size:15px;font-weight:600;font-family:inherit;display:flex;align-items:center;gap:10px;transition:background 0.12s}
.hld-q-btn:hover{background:#161b22}
.hld-q-btn .arrow{color:#484f58;font-size:10px;transition:transform .2s ease;min-width:14px}
.hld-q.open .arrow{transform:rotate(90deg);color:#58a6ff}
.hld-q-btn .qnum{color:#1f6feb;min-width:32px;font-weight:700}
.hld-ans{display:none;padding:16px 18px;border-top:1px solid #21262d;font-size:14px;background:#161b22;line-height:1.7}
.hld-q.open .hld-ans{display:block}
.hld-ans h4{color:#f0883e;font-size:14px;margin:12px 0 6px;font-weight:700}
.hld-ans h4:first-child{margin-top:0}
.hld-ans ul{padding-left:20px;margin:6px 0}
.hld-ans li{margin:4px 0;font-size:14px;line-height:1.7}
.hld-ans li b{color:#79c0ff}
.hld-ans .tip{color:#3fb950;font-size:13px;margin-top:10px;padding:8px 12px;background:#3fb95008;border-left:3px solid #3fb950;border-radius:0 6px 6px 0;line-height:1.6}
.hld-ans .scale{color:#d2a8ff;font-size:13px;font-style:italic;margin-bottom:8px;padding:4px 0}
.est-table{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0}
.est-table th{background:#238636;color:#fff;padding:6px 10px;text-align:left}
.est-table td{padding:6px 10px;border-bottom:1px solid #21262d}
.est-table tr:nth-child(even){background:#161b22}
.lld-step{color:#58a6ff;font-size:15px;font-weight:700;margin:16px 0 8px;padding:7px 12px;background:#58a6ff0a;border-left:3px solid #58a6ff;border-radius:0 6px 6px 0;letter-spacing:0.01em}
.lld-classes{background:#f0883e06;border:1px solid #f0883e25;border-radius:6px;padding:12px 16px;margin:8px 0;font-size:13px;line-height:1.8}
.lld-classes b{color:#f0883e}
.lld-flow{background:#3fb95006;border:1px solid #3fb95025;border-radius:6px;padding:12px 16px;margin:8px 0;font-size:13px;line-height:1.8;white-space:pre-line}
.lld-flow b{color:#3fb950}
.lld-edge{background:#f851490a;border:1px solid #f8514925;border-radius:6px;padding:12px 16px;margin:8px 0;font-size:13px;line-height:1.8}
.lld-edge b{color:#f85149}
.lld-patterns{background:#d2a8ff0a;border:1px solid #d2a8ff25;border-radius:6px;padding:12px 16px;margin:8px 0;font-size:13px;line-height:1.8}
.lld-patterns b{color:#d2a8ff}
.lld-walkthrough{margin-bottom:40px;border:1px solid #21262d;border-radius:8px;overflow:hidden;background:#0d1117}
.lld-title-bar{color:#e6edf3;font-size:22px;font-weight:700;padding:18px 20px;background:linear-gradient(135deg,#161b22 0%,#1c2333 100%);border-bottom:2px solid #1f6feb;display:flex;align-items:center;gap:12px}
.lld-title-bar .lld-qnum{color:#1f6feb;font-size:14px;font-weight:700;background:#1f6feb18;padding:4px 10px;border-radius:4px;letter-spacing:0.05em}
.lld-walkthrough-body{padding:20px}
.lld-step-block{margin-bottom:20px}
.lld-step-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:8px 0}
.lld-step-header .step-num{display:inline-flex;align-items:center;justify-content:center;background:#1f6feb;color:#fff;width:30px;height:30px;border-radius:50%;font-size:13px;font-weight:700;flex-shrink:0}
.lld-step-header .step-label{font-size:15px;font-weight:700;color:#58a6ff;letter-spacing:0.02em;text-transform:uppercase}
.lld-step-header .step-sub{font-size:13px;color:#8b949e;font-weight:400;text-transform:none;margin-left:4px}
.lld-problem-box{background:#f0883e08;border:1px solid #f0883e30;border-radius:6px;padding:14px 16px;font-size:15px;color:#f0883e;font-weight:600;line-height:1.6}
.lld-tip-box{background:#3fb95008;border:1px solid #3fb95030;border-radius:6px;padding:14px 16px;font-size:14px;line-height:1.8;color:#3fb950}
.lld-tip-box b{color:#58a6ff}
.lld-extend-box{background:#d2a8ff08;border:1px solid #d2a8ff30;border-radius:6px;padding:14px 16px;font-size:13px;line-height:1.8;color:#d2a8ff}
.lld-extend-box b{color:#f0883e}
.lld-nav{display:flex;gap:10px;padding:16px 0 0;border-top:1px solid #21262d;margin-top:8px}
.lld-nav button{flex:1;padding:10px;background:#161b22;border:1px solid #30363d;color:#8b949e;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.15s}
.lld-nav button:hover:not(:disabled){border-color:#58a6ff;color:#58a6ff;background:#1c2333}
.lld-nav button:disabled{opacity:0.3;cursor:default}
.lld-mini-guide{background:#161b22;border:1px solid #30363d;border-radius:6px;margin-bottom:24px;overflow:hidden}
.lld-mini-guide-btn{width:100%;text-align:left;background:none;border:none;color:#8b949e;padding:10px 14px;cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;transition:color 0.15s}
.lld-mini-guide-btn:hover{color:#58a6ff}
.lld-mini-guide-btn .mg-arrow{font-size:10px;transition:transform 0.15s}
.lld-mini-guide.open .mg-arrow{transform:rotate(90deg)}
.lld-mini-guide-body{display:none;padding:0 14px 12px;font-size:12px;color:#8b949e;line-height:2}
.lld-mini-guide.open .lld-mini-guide-body{display:block}
.lld-mini-guide-body span{color:#58a6ff;font-weight:700}
.lld-mini-guide-body .mg-step{display:flex;gap:8px;align-items:baseline}
.lld-mini-guide-body .mg-num{color:#1f6feb;font-weight:700;min-width:18px}
.lld-mini-guide-body .mg-arrow-r{color:#484f58;margin:0 2px}
.step-desc{font-size:12px;color:#484f58;font-style:italic;margin:-6px 0 8px 40px;line-height:1.5}
.vs-table{width:100%;border-collapse:collapse;font-size:13px;margin:12px 0;border-radius:6px;overflow:hidden}
.vs-table th{background:#8b5cf6;color:#fff;padding:8px 12px;text-align:left;font-weight:600;font-size:12px;letter-spacing:0.03em}
.vs-table td{padding:7px 12px;border-bottom:1px solid #21262d}
.vs-table tr:nth-child(even){background:#161b22}
.vs-table tr:hover{background:#1c2333}
.extra-tips{background:#3fb95008;border:1px solid #3fb95030;border-radius:4px;padding:8px 12px;margin:6px 0;font-size:13px;color:#8be9fd}
.phrase-box{background:#f0c14b08;border:1px solid #f0c14b30;border-radius:4px;padding:8px 12px;margin:6px 0;font-size:13px;color:#f0c14b;font-style:italic}

/* ===== MOBILE SIDEBAR TOGGLE ===== */
.sidebar-toggle{display:none;position:fixed;top:0;left:0;z-index:102;width:44px;height:48px;background:#161b22;border:none;border-right:1px solid #21262d;color:#58a6ff;font-size:22px;cursor:pointer;transition:background 0.15s}
.sidebar-toggle:hover{background:#1c2333}
.sidebar-overlay{display:none;position:fixed;top:48px;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:49;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}

/* ===== TABLET (iPad) — sidebar narrower, content adapts ===== */
@media(max-width:1024px){
  .tab-btn{font-size:13px;padding:6px 12px}
  .sidebar{width:220px;min-width:220px}
  .topbar h1{font-size:16px}
  .content-area{padding:16px 18px 40px}
  .hld-card{padding:14px 16px}
  pre{font-size:12px;padding:10px 12px}
  .dtable,.est-table,.vs-table{font-size:12px}
}

/* ===== MOBILE (<768px) — sidebar becomes overlay drawer ===== */
@media(max-width:768px){
  /* Tab bar: scrollable, smaller */
  .tab-bar{gap:0;padding:0 4px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tab-bar::-webkit-scrollbar{display:none}
  .tab-btn{font-size:12px;padding:6px 10px;white-space:nowrap;flex-shrink:0}

  /* Show hamburger toggle + offset tab bar */
  .sidebar-toggle{display:flex;align-items:center;justify-content:center}
  .tab-bar{padding-left:48px}

  /* Sidebar becomes slide-out drawer */
  .sidebar{position:fixed;top:48px;left:0;bottom:0;z-index:50;width:280px;min-width:unset;transform:translateX(-100%);transition:transform 0.25s ease;box-shadow:4px 0 20px rgba(0,0,0,0.4)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}

  /* Tab pages stack vertically, no flex row */
  .tab-page.show{flex-direction:column}

  /* Main content takes full width */
  .main{width:100%}
  .topbar{padding:8px 12px;gap:8px;min-height:40px}
  .topbar h1{font-size:15px}
  .topbar .breadcrumb{font-size:12px}
  .content-area{padding:12px 12px 40px}

  /* Cards smaller padding */
  .hld-card{padding:12px 14px}
  .hld-card h3{font-size:15px}
  .hld-card li{font-size:13px;line-height:1.5}
  .hld-card .hld-req{font-size:13px;padding:4px 8px}
  .hld-section h2{font-size:17px}

  /* Code blocks scroll horizontally */
  pre{font-size:11px;padding:8px 10px;max-width:calc(100vw - 28px)}

  /* Tables scroll horizontally */
  .dtable,.est-table,.vs-table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;font-size:11px}

  /* LLD specific */
  .lld-step{font-size:14px;padding:5px 8px}
  .lld-classes,.lld-flow,.lld-edge,.lld-patterns{font-size:12px;padding:8px 10px}
  .lld-walkthrough-body{padding:12px}
  .lld-title-bar{font-size:17px;padding:12px 14px}
  .lld-step-header .step-label{font-size:13px}
  .lld-step-header .step-num{width:26px;height:26px;font-size:12px}
  .lld-problem-box{font-size:13px;padding:10px 12px}
  .lld-tip-box{font-size:12px;padding:10px 12px}
  .lld-nav{flex-direction:column}
  .lld-nav button{font-size:12px;padding:8px}

  /* Questions */
  .q-btn{padding:8px 10px;font-size:13px;gap:6px}
  .q-btn .num{min-width:32px;font-size:12px}
  .hld-q-btn{padding:8px 10px;font-size:14px;gap:6px}
  .hld-ans{padding:10px 12px;font-size:13px}
  .hld-ans li{font-size:13px}
  .ans{padding:10px 12px;font-size:13px}

  /* Pat card */
  .pat-card{padding:12px 14px}
  .pat-card li{font-size:13px}
}

/* ===== SMALL PHONE (<400px) ===== */
@media(max-width:400px){
  .tab-btn{font-size:11px;padding:5px 7px}
  .content-area{padding:8px 8px 30px}
  .hld-card{padding:10px 10px}
  pre{font-size:10px;padding:6px 8px}
  .hld-card li{font-size:12px}
}
</style>
</head>
<body>
<button class="sidebar-toggle" onclick="toggleMobileSidebar()" id="sidebarToggle">☰</button>
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('lc')">⚡ LeetCode Patterns</button>
  <button class="tab-btn" onclick="switchTab('hld')">🏗️ HLD System Design</button>
  <button class="tab-btn" onclick="switchTab('lld')">🎯 LLD Object Design</button>
  <button class="tab-btn" onclick="switchTab('ai')">🤖 AI & Agents</button>
  <button class="tab-btn" onclick="switchTab('notes')">📝 My Revision Notes</button>
</div>
<div class="tab-page show" id="page-lc">
<div class="sidebar">
  <div class="sidebar-header"><h2>⚡ LC 200</h2><input type="text" id="search" placeholder="Search problems..."></div>
  <div class="sidebar-list" id="sidebarList"></div>
</div>
<div class="main">
  <div class="topbar"><h1>LeetCode Patterns</h1><div class="breadcrumb" id="breadcrumb"></div></div>
  <div class="content-area" id="contentArea"></div>
</div>
</div>
<div class="tab-page" id="page-hld">
<div class="sidebar">
  <div class="sidebar-header"><h2>🏗️ HLD</h2><input type="text" id="hldSearch" placeholder="Search HLD..."></div>
  <div class="sidebar-list" id="hldSidebarList"></div>
</div>
<div class="main">
  <div class="topbar"><h1>System Design</h1><div class="breadcrumb" id="hldBreadcrumb"></div></div>
  <div class="content-area" id="hldContentArea"></div>
</div>
</div>

<div class="tab-page" id="page-lld">
<div class="sidebar">
  <div class="sidebar-header"><h2>🎯 LLD</h2><input type="text" id="lldSearch" placeholder="Search LLD..."></div>
  <div class="sidebar-list" id="lldSidebarList"></div>
</div>
<div class="main">
  <div class="topbar"><h1>Low-Level Design</h1><div class="breadcrumb" id="lldBreadcrumb"></div></div>
  <div class="content-area" id="lldContentArea"></div>
</div>
</div>

// ===== MOBILE SIDEBAR TOGGLE =====
function toggleMobileSidebar(){
  const page=document.querySelector('.tab-page.show');
  if(!page)return;
  const sidebar=page.querySelector('.sidebar');
  const overlay=document.getElementById('sidebarOverlay');
  if(sidebar.classList.contains('open')){closeMobileSidebar()}
  else{sidebar.classList.add('open');overlay.classList.add('open')}
}
function closeMobileSidebar(){
  document.querySelectorAll('.sidebar.open').forEach(s=>s.classList.remove('open'));
  document.getElementById('sidebarOverlay').classList.remove('open');
}
// Close sidebar when clicking a topic/pattern on mobile
document.addEventListener('click',function(e){
  if(window.innerWidth<=768 && (e.target.classList.contains('s-pat')||e.target.classList.contains('s-topic'))){
    setTimeout(closeMobileSidebar,150);
  }
});

function switchTab(t){document.querySelectorAll('.tab-page').forEach(p=>p.classList.remove('show'));document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.getElementById('page-'+t).classList.add('show');document.querySelector(`.tab-btn[onclick="switchTab('${t}')"]`).classList.add('active');closeMobileSidebar()}

{id:1011,t:"Capacity To Ship Packages",d:"M",tags:["answer-space"],a:"BS on answer [max(w), sum(w)]. Check if can ship in d days with capacity mid.",c:"def shipWithinDays(weights, days):\n    l, r = max(weights), sum(weights)\n    while l < r:\n        m = (l+r)//2\n        d, cur = 1, 0\n        for w in weights:\n            if cur+w > m: d += 1; cur = 0\n            cur += w\n        if d <= days: r = m\n        else: l = m+1\n    return l"},

{id:303,t:"Range Sum Query",d:"E",tags:["basic"],a:"Build prefix. query(l,r) = prefix[r+1]-prefix[l].",c:"class NumArray:\n    def __init__(self, nums):\n        self.p = [0]\n        for n in nums: self.p.append(self.p[-1]+n)\n    def sumRange(self, l, r):\n        return self.p[r+1] - self.p[l]"},
{id:525,t:"Contiguous Array",d:"M",tags:["hashmap"],a:"Replace 0→-1. Longest subarray sum=0. HashMap of first occurrence of each prefix sum.",c:"def findMaxLength(nums):\n    mp = {0: -1}; curr = res = 0\n    for i, n in enumerate(nums):\n        curr += 1 if n else -1\n        if curr in mp: res = max(res, i-mp[curr])\n        else: mp[curr] = i\n    return res"},
{id:238,t:"Product of Array Except Self",d:"M",tags:["prefix-product"],a:"Left product array × right product array.",c:"def productExceptSelf(nums):\n    n = len(nums); res = [1]*n\n    left = 1\n    for i in range(n):\n        res[i] = left; left *= nums[i]\n    right = 1\n    for i in range(n-1,-1,-1):\n        res[i] *= right; right *= nums[i]\n    return res"},
{id:974,t:"Subarrays Divisible by K",d:"M",tags:["hashmap"],a:"Prefix sum mod K. Same remainder = valid pair.",c:"def subarraysDivByK(nums, k):\n    mp = {0:1}; curr = res = 0\n    for n in nums:\n        curr = (curr+n) % k\n        res += mp.get(curr, 0)\n        mp[curr] = mp.get(curr,0)+1\n    return res"},
{id:1094,t:"Car Pooling",d:"M",tags:["difference"],a:"Difference array. +passengers at from, -passengers at to.",c:"def carPooling(trips, capacity):\n    diff = [0]*1001\n    for p, f, t in trips:\n        diff[f] += p; diff[t] -= p\n    curr = 0\n    for d in diff:\n        curr += d\n        if curr > capacity: return False\n    return True"},
]},

{id:49,t:"Group Anagrams",d:"M",tags:["frequency"],a:"Key = tuple(sorted(word)). Group by key.",c:"from collections import defaultdict\ndef groupAnagrams(strs):\n    d = defaultdict(list)\n    for s in strs:\n        d[tuple(sorted(s))].append(s)\n    return list(d.values())"},
{id:128,t:"Longest Consecutive Sequence",d:"M",tags:["set"],a:"Set. For each num where num-1 NOT in set, count forward.",c:"def longestConsecutive(nums):\n    s = set(nums); best = 0\n    for n in s:\n        if n-1 not in s:\n            cur = 1\n            while n+cur in s: cur += 1\n            best = max(best, cur)\n    return best"},
{id:347,t:"Top K Frequent Elements",d:"M",tags:["frequency"],a:"Counter + bucket sort. Bucket[freq] = [nums].",c:"from collections import Counter\ndef topKFrequent(nums, k):\n    c = Counter(nums)\n    bucket = [[] for _ in range(len(nums)+1)]\n    for num, freq in c.items():\n        bucket[freq].append(num)\n    res = []\n    for i in range(len(bucket)-1, -1, -1):\n        res.extend(bucket[i])\n        if len(res) >= k: return res[:k]"},
{id:169,t:"Majority Element",d:"E",tags:["frequency"],a:"Boyer-Moore voting. Count ++ for candidate, -- for others.",c:"def majorityElement(nums):\n    cand = cnt = 0\n    for n in nums:\n        if cnt == 0: cand = n\n        cnt += 1 if n==cand else -1\n    return cand"},
{id:217,t:"Contains Duplicate",d:"E",tags:["set"],a:"return len(nums) != len(set(nums))",c:"def containsDuplicate(nums):\n    return len(nums) != len(set(nums))"},

{topic:"Stack",patterns:[
{t:"Monotonic Stack",w:"Next Greater/Smaller, histogram area, temperatures. O(n)",b:["Decreasing stack → next GREATER element","Increasing stack → next SMALLER element","Stack holds indices. Pop when current beats top","Each element pushed & popped at most once = O(n)"],c:"# Next Greater Element\nstack = []; res = [-1]*n\nfor i in range(n):\n    while stack and nums[i] > nums[stack[-1]]:\n        res[stack.pop()] = nums[i]\n    stack.append(i)"},
{t:"Parentheses / Brackets",w:"Valid brackets, decode string, nested structures",b:["Push openers. On closer: match with top, pop if match","Stack empty after = valid. Non-empty = unmatched"]},
{t:"Calculator",w:"Evaluate expressions with +, -, *, /, (, )",b:["Stack for numbers. Apply prev operator on each new operator/end","Handle precedence: * and / apply immediately","Parentheses: push state on (, pop on )"]},
],questions:[
{id:739,t:"Daily Temperatures",d:"M",tags:["monotonic"],a:"Decreasing stack of indices. Pop when curr > top.",c:"def dailyTemperatures(temps):\n    n = len(temps); res = [0]*n\n    stack = []\n    for i in range(n):\n        while stack and temps[i] > temps[stack[-1]]:\n            j = stack.pop()\n            res[j] = i - j\n        stack.append(i)\n    return res"},
{id:84,t:"Largest Rectangle in Histogram",d:"H",tags:["monotonic"],a:"Increasing stack. On pop: height=popped, width=i-stack[-1]-1.",c:"def largestRectangleArea(heights):\n    stack = []; res = 0\n    heights.append(0)\n    for i, h in enumerate(heights):\n        while stack and h < heights[stack[-1]]:\n            H = heights[stack.pop()]\n            W = i if not stack else i-stack[-1]-1\n            res = max(res, H*W)\n        stack.append(i)\n    return res"},
{id:20,t:"Valid Parentheses",d:"E",tags:["parens"],a:"Push opens. On close: check top matches.",c:"def isValid(s):\n    stack = []; m = {')':'(',']':'[','}':'{'}\n    for c in s:\n        if c in m:\n            if not stack or stack[-1]!=m[c]: return False\n            stack.pop()\n        else: stack.append(c)\n    return not stack"},
{id:155,t:"Min Stack",d:"M",tags:["design"],a:"Two stacks: main + min tracking.",c:"class MinStack:\n    def __init__(self): self.s=[]; self.ms=[]\n    def push(self,v):\n        self.s.append(v)\n        self.ms.append(min(v, self.ms[-1] if self.ms else v))\n    def pop(self): self.s.pop(); self.ms.pop()\n    def top(self): return self.s[-1]\n    def getMin(self): return self.ms[-1]"},
{id:150,t:"Evaluate Reverse Polish",d:"M",tags:["calc"],a:"Stack. Number→push. Operator→pop 2, compute, push.",c:"def evalRPN(tokens):\n    s = []\n    for t in tokens:\n        if t in '+-*/':\n            b, a = s.pop(), s.pop()\n            if t=='+': s.append(a+b)\n            elif t=='-': s.append(a-b)\n            elif t=='*': s.append(a*b)\n            else: s.append(int(a/b))\n        else: s.append(int(t))\n    return s[0]"},
{id:394,t:"Decode String",d:"M",tags:["nested"],a:"Stack of (string, count). Push on [, pop on ].",c:"def decodeString(s):\n    stack = []; cur = ''; num = 0\n    for c in s:\n        if c.isdigit(): num = num*10+int(c)\n        elif c == '[':\n            stack.append((cur, num))\n            cur = ''; num = 0\n        elif c == ']':\n            prev, n = stack.pop()\n            cur = prev + cur*n\n        else: cur += c\n    return cur"},
{id:496,t:"Next Greater Element I",d:"E",tags:["monotonic"],a:"Monotonic stack on nums2. Build {num:nextGreater} map.",c:"def nextGreaterElement(n1, n2):\n    s = []; m = {}\n    for n in n2:\n        while s and n > s[-1]: m[s.pop()] = n\n        s.append(n)\n    return [m.get(n,-1) for n in n1]"},
]},

{id:21,t:"Merge Two Sorted Lists",d:"E",tags:["merge"],a:"Dummy head. Compare, attach smaller.",c:"def mergeTwoLists(l1, l2):\n    d = ListNode(); c = d\n    while l1 and l2:\n        if l1.val < l2.val:\n            c.next = l1; l1 = l1.next\n        else:\n            c.next = l2; l2 = l2.next\n        c = c.next\n    c.next = l1 or l2\n    return d.next"},
{id:141,t:"Linked List Cycle",d:"E",tags:["fast-slow"],a:"fast-slow. Meet = cycle.",c:"def hasCycle(head):\n    s = f = head\n    while f and f.next:\n        s = s.next; f = f.next.next\n        if s == f: return True\n    return False"},
{id:143,t:"Reorder List",d:"M",tags:["fast-slow","reverse"],a:"Find middle → reverse second half → merge alternating.",c:"def reorderList(head):\n    s = f = head\n    while f.next and f.next.next:\n        s = s.next; f = f.next.next\n    # reverse second half\n    prev = None; curr = s.next; s.next = None\n    while curr:\n        nxt = curr.next; curr.next = prev\n        prev = curr; curr = nxt\n    # merge\n    h1, h2 = head, prev\n    while h2:\n        n1, n2 = h1.next, h2.next\n        h1.next = h2; h2.next = n1\n        h1 = n1; h2 = n2"},
{id:19,t:"Remove Nth From End",d:"M",tags:["gap"],a:"Gap of N between two pointers. Dummy head for edge.",c:"def removeNthFromEnd(head, n):\n    d = ListNode(0, head)\n    s = f = d\n    for _ in range(n+1): f = f.next\n    while f: s = s.next; f = f.next\n    s.next = s.next.next\n    return d.next"},
{id:23,t:"Merge K Sorted Lists",d:"H",tags:["heap"],a:"Min-heap of (val, idx, node). Pop, push next.",c:"import heapq\ndef mergeKLists(lists):\n    h = []; d = c = ListNode()\n    for i,l in enumerate(lists):\n        if l: heapq.heappush(h, (l.val, i, l))\n    while h:\n        v, i, node = heapq.heappop(h)\n        c.next = node; c = c.next\n        if node.next:\n            heapq.heappush(h, (node.next.val, i, node.next))\n    return d.next"},
{id:2,t:"Add Two Numbers",d:"M",tags:["dummy"],a:"Digit by digit with carry. Dummy head.",c:"def addTwoNumbers(l1, l2):\n    d = c = ListNode(); carry = 0\n    while l1 or l2 or carry:\n        v = carry\n        if l1: v += l1.val; l1 = l1.next\n        if l2: v += l2.val; l2 = l2.next\n        carry = v // 10\n        c.next = ListNode(v % 10); c = c.next\n    return d.next"},
]},

{id:104,t:"Maximum Depth",d:"E",tags:["dfs"],a:"1 + max(left, right). Base: 0.",c:"def maxDepth(root):\n    if not root: return 0\n    return 1 + max(maxDepth(root.left), maxDepth(root.right))"},
{id:226,t:"Invert Binary Tree",d:"E",tags:["dfs"],a:"Swap left/right, recurse both.",c:"def invertTree(root):\n    if not root: return None\n    root.left, root.right = invertTree(root.right), invertTree(root.left)\n    return root"},
{id:543,t:"Diameter of Binary Tree",d:"E",tags:["tree-dp"],a:"Return height. Update global with L+R.",c:"def diameterOfBinaryTree(root):\n    res = [0]\n    def dfs(node):\n        if not node: return 0\n        l, r = dfs(node.left), dfs(node.right)\n        res[0] = max(res[0], l+r)\n        return 1 + max(l, r)\n    dfs(root); return res[0]"},
{id:124,t:"Max Path Sum",d:"H",tags:["tree-dp"],a:"Return max(L,R,0)+val. Update with L+R+val.",c:"def maxPathSum(root):\n    res = [float('-inf')]\n    def dfs(node):\n        if not node: return 0\n        l = max(dfs(node.left), 0)\n        r = max(dfs(node.right), 0)\n        res[0] = max(res[0], l+r+node.val)\n        return max(l, r) + node.val\n    dfs(root); return res[0]"},
{id:102,t:"Level Order Traversal",d:"M",tags:["bfs"],a:"BFS with queue. Collect each level.",c:"from collections import deque\ndef levelOrder(root):\n    if not root: return []\n    q = deque([root]); res = []\n    while q:\n        level = []\n        for _ in range(len(q)):\n            n = q.popleft(); level.append(n.val)\n            if n.left: q.append(n.left)\n            if n.right: q.append(n.right)\n        res.append(level)\n    return res"},
{id:98,t:"Validate BST",d:"M",tags:["bst"],a:"Pass (lo, hi). val must be in range.",c:"def isValidBST(root):\n    def dfs(node, lo, hi):\n        if not node: return True\n        if node.val <= lo or node.val >= hi: return False\n        return dfs(node.left, lo, node.val) and dfs(node.right, node.val, hi)\n    return dfs(root, float('-inf'), float('inf'))"},
{id:230,t:"Kth Smallest in BST",d:"M",tags:["bst","inorder"],a:"Inorder traversal, return kth.",c:"def kthSmallest(root, k):\n    stack = []; curr = root\n    while stack or curr:\n        while curr:\n            stack.append(curr); curr = curr.left\n        curr = stack.pop(); k -= 1\n        if k == 0: return curr.val\n        curr = curr.right"},
{id:236,t:"Lowest Common Ancestor",d:"M",tags:["lca"],a:"If root is p or q → return. Both sides non-null → root is LCA.",c:"def lowestCommonAncestor(root, p, q):\n    if not root or root==p or root==q: return root\n    l = lowestCommonAncestor(root.left, p, q)\n    r = lowestCommonAncestor(root.right, p, q)\n    if l and r: return root\n    return l or r"},
{id:105,t:"Construct from Preorder+Inorder",d:"M",tags:["construct"],a:"Preorder[0]=root. Split inorder at root.",c:"def buildTree(preorder, inorder):\n    if not inorder: return None\n    root = TreeNode(preorder.pop(0))\n    mid = inorder.index(root.val)\n    root.left = buildTree(preorder, inorder[:mid])\n    root.right = buildTree(preorder, inorder[mid+1:])\n    return root"},
{id:199,t:"Right Side View",d:"M",tags:["bfs"],a:"BFS. Last node of each level.",c:"from collections import deque\ndef rightSideView(root):\n    if not root: return []\n    q = deque([root]); res = []\n    while q:\n        for i in range(len(q)):\n            n = q.popleft()\n            if n.left: q.append(n.left)\n            if n.right: q.append(n.right)\n        res.append(n.val)\n    return res"},

{id:200,t:"Number of Islands",d:"M",tags:["dfs"],a:"DFS from each '1', mark visited. Count calls.",c:"def numIslands(grid):\n    def dfs(i,j):\n        if i<0 or i>=len(grid) or j<0 or j>=len(grid[0]) or grid[i][j]!='1': return\n        grid[i][j]='0'\n        for di,dj in [(0,1),(0,-1),(1,0),(-1,0)]: dfs(i+di,j+dj)\n    count = 0\n    for i in range(len(grid)):\n        for j in range(len(grid[0])):\n            if grid[i][j]=='1': dfs(i,j); count+=1\n    return count"},
{id:994,t:"Rotting Oranges",d:"M",tags:["bfs"],a:"Multi-source BFS from all rotten. Minutes = levels.",c:"from collections import deque\ndef orangesRotting(grid):\n    q = deque(); fresh = 0\n    for i in range(len(grid)):\n        for j in range(len(grid[0])):\n            if grid[i][j]==2: q.append((i,j,0))\n            elif grid[i][j]==1: fresh+=1\n    mins = 0\n    while q:\n        i,j,d = q.popleft(); mins = d\n        for di,dj in [(0,1),(0,-1),(1,0),(-1,0)]:\n            ni,nj = i+di,j+dj\n            if 0<=ni<len(grid) and 0<=nj<len(grid[0]) and grid[ni][nj]==1:\n                grid[ni][nj]=2; fresh-=1; q.append((ni,nj,d+1))\n    return mins if fresh==0 else -1"},
{id:207,t:"Course Schedule",d:"M",tags:["topo"],a:"Topo sort. If order length < numCourses → cycle.",c:"from collections import deque, defaultdict\ndef canFinish(n, prereqs):\n    g = defaultdict(list); ind = [0]*n\n    for a,b in prereqs: g[b].append(a); ind[a]+=1\n    q = deque([i for i in range(n) if ind[i]==0])\n    cnt = 0\n    while q:\n        node = q.popleft(); cnt+=1\n        for nb in g[node]:\n            ind[nb]-=1\n            if ind[nb]==0: q.append(nb)\n    return cnt==n"},
{id:133,t:"Clone Graph",d:"M",tags:["dfs"],a:"DFS + map {old: clone}.",c:"def cloneGraph(node):\n    if not node: return None\n    m = {}\n    def dfs(n):\n        if n in m: return m[n]\n        copy = Node(n.val); m[n] = copy\n        for nb in n.neighbors: copy.neighbors.append(dfs(nb))\n        return copy\n    return dfs(node)"},
{id:743,t:"Network Delay Time",d:"M",tags:["dijkstra"],a:"Dijkstra from k. Answer = max of all distances.",c:"import heapq\nfrom collections import defaultdict\ndef networkDelayTime(times, n, k):\n    g = defaultdict(list)\n    for u,v,w in times: g[u].append((v,w))\n    dist = {}; h = [(0,k)]\n    while h:\n        d,u = heapq.heappop(h)\n        if u in dist: continue\n        dist[u] = d\n        for v,w in g[u]:\n            if v not in dist: heapq.heappush(h,(d+w,v))\n    return max(dist.values()) if len(dist)==n else -1"},
{id:684,t:"Redundant Connection",d:"M",tags:["union-find"],a:"Union-Find. First edge where union fails = answer.",c:"def findRedundantConnection(edges):\n    par = list(range(len(edges)+1))\n    def find(x):\n        if par[x]!=x: par[x]=find(par[x])\n        return par[x]\n    for u,v in edges:\n        pu, pv = find(u), find(v)\n        if pu==pv: return [u,v]\n        par[pu] = pv"},
{id:127,t:"Word Ladder",d:"H",tags:["bfs"],a:"BFS. Neighbors = words differing by 1 char. Wildcard patterns.",c:"from collections import deque, defaultdict\ndef ladderLength(begin, end, wordList):\n    words = set(wordList)\n    if end not in words: return 0\n    q = deque([(begin,1)])\n    while q:\n        w, d = q.popleft()\n        for i in range(len(w)):\n            for c in 'abcdefghijklmnopqrstuvwxyz':\n                nw = w[:i]+c+w[i+1:]\n                if nw == end: return d+1\n                if nw in words:\n                    words.remove(nw); q.append((nw,d+1))\n    return 0"},
{id:417,t:"Pacific Atlantic Water Flow",d:"M",tags:["dfs"],a:"DFS from borders. Intersection of pacific + atlantic reachable.",c:"def pacificAtlantic(heights):\n    m,n = len(heights),len(heights[0])\n    pac, atl = set(), set()\n    def dfs(i,j,visit,prev):\n        if (i,j) in visit or i<0 or i>=m or j<0 or j>=n or heights[i][j]<prev: return\n        visit.add((i,j))\n        for di,dj in [(0,1),(0,-1),(1,0),(-1,0)]: dfs(i+di,j+dj,visit,heights[i][j])\n    for i in range(m): dfs(i,0,pac,0); dfs(i,n-1,atl,0)\n    for j in range(n): dfs(0,j,pac,0); dfs(m-1,j,atl,0)\n    return list(pac & atl)"},
]},

// ===== 10. BACKTRACKING =====
{topic:"Backtracking",patterns:[
{t:"Template",w:"ALL permutations, combinations, subsets, constraint satisfaction",b:["Choose → Explore (recurse) → Unchoose (backtrack)","Subsets/Combos: loop from 'start' (no looking back)","Permutations: loop from 0 with visited[] check","Always append path[:] (COPY), not path reference"],c:"def bt(path, start):\n    result.append(path[:])  # collect at every node for subsets\n    for i in range(start, len(nums)):\n        path.append(nums[i])   # choose\n        bt(path, i+1)          # explore (i+1 for combo, i for reuse)\n        path.pop()             # unchoose"},
{t:"Handle Duplicates",w:"Sort + skip nums[i]==nums[i-1] at same level",b:["Sort input first","if i > start and nums[i] == nums[i-1]: continue","Prevents duplicate branches at same recursion level"]},
],questions:[
{id:78,t:"Subsets",d:"M",tags:["subsets"],a:"Collect at every node. Loop from start, recurse i+1.",c:"def subsets(nums):\n    res = []\n    def bt(start, path):\n        res.append(path[:])\n        for i in range(start, len(nums)):\n            path.append(nums[i])\n            bt(i+1, path)\n            path.pop()\n    bt(0, []); return res"},
{id:46,t:"Permutations",d:"M",tags:["perms"],a:"Loop 0..n, skip visited. Full length = result.",c:"def permute(nums):\n    res = []\n    def bt(path, used):\n        if len(path)==len(nums): res.append(path[:]); return\n        for i in range(len(nums)):\n            if used[i]: continue\n            used[i]=True; path.append(nums[i])\n            bt(path, used)\n            path.pop(); used[i]=False\n    bt([], [False]*len(nums)); return res"},
{id:39,t:"Combination Sum",d:"M",tags:["combos"],a:"Reuse allowed: recurse with i (not i+1).",c:"def combinationSum(candidates, target):\n    res = []\n    def bt(start, path, remain):\n        if remain==0: res.append(path[:]); return\n        for i in range(start, len(candidates)):\n            if candidates[i] > remain: break\n            path.append(candidates[i])\n            bt(i, path, remain-candidates[i])  # i not i+1\n            path.pop()\n    candidates.sort(); bt(0,[],target); return res"},
{id:40,t:"Combination Sum II",d:"M",tags:["combos","dupes"],a:"Each once. Sort + skip dupes at same level.",c:"def combinationSum2(candidates, target):\n    res = []; candidates.sort()\n    def bt(start, path, remain):\n        if remain==0: res.append(path[:]); return\n        for i in range(start, len(candidates)):\n            if candidates[i]>remain: break\n            if i>start and candidates[i]==candidates[i-1]: continue\n            path.append(candidates[i])\n            bt(i+1, path, remain-candidates[i])\n            path.pop()\n    bt(0,[],target); return res"},
{id:51,t:"N-Queens",d:"H",tags:["constraint"],a:"Row by row. Track cols, diags (r-c), anti-diags (r+c) in sets.",c:"def solveNQueens(n):\n    res = []; cols=set(); d1=set(); d2=set()\n    def bt(r, board):\n        if r==n: res.append([''.join(row) for row in board]); return\n        for c in range(n):\n            if c in cols or r-c in d1 or r+c in d2: continue\n            cols.add(c); d1.add(r-c); d2.add(r+c)\n            board[r][c]='Q'; bt(r+1, board); board[r][c]='.'\n            cols.remove(c); d1.remove(r-c); d2.remove(r+c)\n    bt(0, [['.']*n for _ in range(n)]); return res"},
{id:79,t:"Word Search",d:"M",tags:["grid"],a:"DFS from each matching cell. Mark visited, backtrack.",c:"def exist(board, word):\n    m,n = len(board),len(board[0])\n    def dfs(i,j,k):\n        if k==len(word): return True\n        if i<0 or i>=m or j<0 or j>=n or board[i][j]!=word[k]: return False\n        tmp = board[i][j]; board[i][j]='#'\n        found = any(dfs(i+di,j+dj,k+1) for di,dj in [(0,1),(0,-1),(1,0),(-1,0)])\n        board[i][j] = tmp\n        return found\n    return any(dfs(i,j,0) for i in range(m) for j in range(n))"},
{id:131,t:"Palindrome Partitioning",d:"M",tags:["partition"],a:"Try every prefix. If palindrome → recurse on rest.",c:"def partition(s):\n    res = []\n    def bt(start, path):\n        if start==len(s): res.append(path[:]); return\n        for end in range(start+1, len(s)+1):\n            sub = s[start:end]\n            if sub==sub[::-1]:\n                path.append(sub); bt(end, path); path.pop()\n    bt(0,[]); return res"},
{id:17,t:"Letter Combos of Phone",d:"M",tags:["combos"],a:"Map digit→letters. Recurse per digit.",c:"def letterCombinations(digits):\n    if not digits: return []\n    m = {'2':'abc','3':'def','4':'ghi','5':'jkl','6':'mno','7':'pqrs','8':'tuv','9':'wxyz'}\n    res = []\n    def bt(i, path):\n        if i==len(digits): res.append(''.join(path)); return\n        for c in m[digits[i]]:\n            path.append(c); bt(i+1,path); path.pop()\n    bt(0,[]); return res"},
]},

{topic:"Dynamic Programming",patterns:[

{t:"Knapsack (0/1 vs Unbounded)",w:"Take/skip items. Capacity constraint",b:["0/1: each item once → iterate capacity RIGHT to LEFT","Unbounded: reuse items → iterate LEFT to RIGHT","This direction is THE key difference"],c:"# 0/1 knapsack (each item once)\nfor wt, val in items:\n    for w in range(cap, wt-1, -1):   # RIGHT to LEFT\n        dp[w] = max(dp[w], dp[w-wt]+val)\n\n# Unbounded (reuse ok)\nfor coin in coins:\n    for a in range(coin, amt+1):     # LEFT to RIGHT\n        dp[a] = min(dp[a], dp[a-coin]+1)"},
{t:"LIS (Longest Increasing Subseq)",w:"O(n²) dp or O(n log n) with bisect",b:["O(n log n): maintain tails array","bisect_left to find position. Extend or replace"],c:"import bisect\ntails = []\nfor num in nums:\n    pos = bisect.bisect_left(tails, num)\n    if pos == len(tails): tails.append(num)\n    else: tails[pos] = num\nreturn len(tails)"},
{t:"State Machine",w:"Stock buy/sell, hold/sold/rest states",b:["Define states per position. Transitions between states","Stock: hold=max(hold, rest-price), sold=hold+price, rest=max(rest,sold)"]},

{id:70,t:"Climbing Stairs",d:"E",tags:["1d"],a:"dp[i]=dp[i-1]+dp[i-2]. Fibonacci.",c:"def climbStairs(n):\n    a, b = 1, 1\n    for _ in range(n-1): a, b = b, a+b\n    return b"},
{id:198,t:"House Robber",d:"M",tags:["1d"],a:"dp[i]=max(dp[i-1], dp[i-2]+nums[i]).",c:"def rob(nums):\n    a = b = 0\n    for n in nums: a, b = b, max(b, a+n)\n    return b"},
{id:322,t:"Coin Change",d:"M",tags:["1d"],a:"dp[a]=min(dp[a-c]+1). Unbounded knapsack.",c:"def coinChange(coins, amount):\n    dp = [float('inf')]*(amount+1); dp[0]=0\n    for c in coins:\n        for a in range(c, amount+1):\n            dp[a] = min(dp[a], dp[a-c]+1)\n    return dp[amount] if dp[amount]!=float('inf') else -1"},
{id:300,t:"Longest Increasing Subsequence",d:"M",tags:["lis"],a:"O(n log n) tails + bisect.",c:"import bisect\ndef lengthOfLIS(nums):\n    tails = []\n    for n in nums:\n        p = bisect.bisect_left(tails, n)\n        if p==len(tails): tails.append(n)\n        else: tails[p] = n\n    return len(tails)"},
{id:62,t:"Unique Paths",d:"M",tags:["2d"],a:"dp[i][j]=dp[i-1][j]+dp[i][j-1].",c:"def uniquePaths(m, n):\n    dp = [1]*n\n    for _ in range(1, m):\n        for j in range(1, n): dp[j] += dp[j-1]\n    return dp[-1]"},
{id:72,t:"Edit Distance",d:"M",tags:["2d"],a:"Match: dp[i-1][j-1]. Else 1+min(ins,del,rep).",c:"def minDistance(w1, w2):\n    m,n = len(w1),len(w2)\n    dp = [[0]*(n+1) for _ in range(m+1)]\n    for i in range(m+1): dp[i][0]=i\n    for j in range(n+1): dp[0][j]=j\n    for i in range(1,m+1):\n        for j in range(1,n+1):\n            if w1[i-1]==w2[j-1]: dp[i][j]=dp[i-1][j-1]\n            else: dp[i][j]=1+min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1])\n    return dp[m][n]"},
{id:1143,t:"Longest Common Subsequence",d:"M",tags:["2d"],a:"Match→dp[i-1][j-1]+1. Else max(up, left).",c:"def longestCommonSubsequence(t1, t2):\n    m,n=len(t1),len(t2)\n    dp=[[0]*(n+1) for _ in range(m+1)]\n    for i in range(1,m+1):\n        for j in range(1,n+1):\n            if t1[i-1]==t2[j-1]: dp[i][j]=dp[i-1][j-1]+1\n            else: dp[i][j]=max(dp[i-1][j],dp[i][j-1])\n    return dp[m][n]"},
{id:416,t:"Partition Equal Subset Sum",d:"M",tags:["knapsack"],a:"Target=sum/2. 0/1 knapsack boolean. RIGHT to LEFT.",c:"def canPartition(nums):\n    s = sum(nums)\n    if s%2: return False\n    t = s//2; dp = [False]*(t+1); dp[0]=True\n    for n in nums:\n        for j in range(t, n-1, -1):\n            dp[j] = dp[j] or dp[j-n]\n    return dp[t]"},
{id:139,t:"Word Break",d:"M",tags:["1d"],a:"dp[i]=any(dp[j] and s[j:i] in dict).",c:"def wordBreak(s, wordDict):\n    ws = set(wordDict); dp = [False]*(len(s)+1); dp[0]=True\n    for i in range(1,len(s)+1):\n        for j in range(i):\n            if dp[j] and s[j:i] in ws: dp[i]=True; break\n    return dp[len(s)]"},
{id:53,t:"Maximum Subarray",d:"M",tags:["1d"],a:"Kadane's: cur=max(n, cur+n). Track max.",c:"def maxSubArray(nums):\n    cur = best = nums[0]\n    for n in nums[1:]:\n        cur = max(n, cur+n)\n        best = max(best, cur)\n    return best"},
{id:121,t:"Best Time Buy Sell Stock",d:"E",tags:["state"],a:"Track min price. Profit = price - min.",c:"def maxProfit(prices):\n    mn = float('inf'); res = 0\n    for p in prices:\n        mn = min(mn, p)\n        res = max(res, p-mn)\n    return res"},
{id:309,t:"Buy Sell with Cooldown",d:"M",tags:["state"],a:"Three states: hold, sold, rest.",c:"def maxProfit(prices):\n    hold, sold, rest = float('-inf'), 0, 0\n    for p in prices:\n        hold, sold, rest = max(hold,rest-p), hold+p, max(rest,sold)\n    return max(sold, rest)"},
{id:5,t:"Longest Palindromic Substring",d:"M",tags:["expand"],a:"Expand around center for each i.",c:"def longestPalindrome(s):\n    res = ''\n    def expand(l, r):\n        nonlocal res\n        while l>=0 and r<len(s) and s[l]==s[r]: l-=1; r+=1\n        if r-l-1 > len(res): res = s[l+1:r]\n    for i in range(len(s)):\n        expand(i,i); expand(i,i+1)\n    return res"},
{id:152,t:"Maximum Product Subarray",d:"M",tags:["1d"],a:"Track max AND min (neg*neg=pos).",c:"def maxProduct(nums):\n    res = mx = mn = nums[0]\n    for n in nums[1:]:\n        if n < 0: mx, mn = mn, mx\n        mx = max(n, mx*n)\n        mn = min(n, mn*n)\n        res = max(res, mx)\n    return res"},
{id:518,t:"Coin Change 2",d:"M",tags:["knapsack"],a:"Count combos. Unbounded: LEFT to RIGHT.",c:"def change(amount, coins):\n    dp = [0]*(amount+1); dp[0]=1\n    for c in coins:\n        for a in range(c, amount+1):\n            dp[a] += dp[a-c]\n    return dp[amount]"},
]},

{id:55,t:"Jump Game",d:"M",tags:["reach"],a:"Track farthest. If i > farthest → False.",c:"def canJump(nums):\n    far = 0\n    for i in range(len(nums)):\n        if i > far: return False\n        far = max(far, i+nums[i])\n    return True"},
{id:45,t:"Jump Game II",d:"M",tags:["reach"],a:"BFS-like levels. Track end and farthest.",c:"def jump(nums):\n    jumps = cur_end = far = 0\n    for i in range(len(nums)-1):\n        far = max(far, i+nums[i])\n        if i == cur_end:\n            jumps += 1; cur_end = far\n    return jumps"},
{id:134,t:"Gas Station",d:"M",tags:["circular"],a:"If total≥0, solution exists. Reset start when surplus<0.",c:"def canCompleteCircuit(gas, cost):\n    if sum(gas)<sum(cost): return -1\n    start = tank = 0\n    for i in range(len(gas)):\n        tank += gas[i]-cost[i]\n        if tank < 0: start=i+1; tank=0\n    return start"},
{id:763,t:"Partition Labels",d:"M",tags:["interval"],a:"Last occurrence map. Extend end. Cut when i==end.",c:"def partitionLabels(s):\n    last = {c:i for i,c in enumerate(s)}\n    res = []; start = end = 0\n    for i, c in enumerate(s):\n        end = max(end, last[c])\n        if i == end: res.append(end-start+1); start=i+1\n    return res"},
{id:435,t:"Non-overlapping Intervals",d:"M",tags:["interval"],a:"Sort by end. Count kept. Removed = total - kept.",c:"def eraseOverlapIntervals(intervals):\n    intervals.sort(key=lambda x:x[1])\n    end = float('-inf'); keep = 0\n    for s, e in intervals:\n        if s >= end: keep += 1; end = e\n    return len(intervals) - keep"},
{id:621,t:"Task Scheduler",d:"M",tags:["freq"],a:"(maxFreq-1)*(n+1)+countMax. Max with len(tasks).",c:"from collections import Counter\ndef leastInterval(tasks, n):\n    c = Counter(tasks)\n    mx = max(c.values())\n    cnt = sum(1 for v in c.values() if v==mx)\n    return max(len(tasks), (mx-1)*(n+1)+cnt)"},

{id:295,t:"Find Median from Data Stream",d:"H",tags:["two-heaps"],a:"Max-heap (lo, negate) + min-heap (hi). Balance.",c:"import heapq\nclass MedianFinder:\n    def __init__(self): self.lo=[]; self.hi=[]\n    def addNum(self, num):\n        heapq.heappush(self.lo, -num)\n        heapq.heappush(self.hi, -heapq.heappop(self.lo))\n        if len(self.hi)>len(self.lo):\n            heapq.heappush(self.lo, -heapq.heappop(self.hi))\n    def findMedian(self):\n        if len(self.lo)>len(self.hi): return -self.lo[0]\n        return (-self.lo[0]+self.hi[0])/2"},
{id:973,t:"K Closest Points",d:"M",tags:["top-k"],a:"Max-heap size K (negate dist).",c:"import heapq\ndef kClosest(points, k):\n    return heapq.nsmallest(k, points, key=lambda p: p[0]**2+p[1]**2)"},
{id:253,t:"Meeting Rooms II",d:"M",tags:["interval"],a:"Sort by start. Min-heap of end times.",c:"import heapq\ndef minMeetingRooms(intervals):\n    intervals.sort()\n    h = []\n    for s, e in intervals:\n        if h and h[0] <= s: heapq.heappop(h)\n        heapq.heappush(h, e)\n    return len(h)"},
{id:378,t:"Kth Smallest Sorted Matrix",d:"M",tags:["merge-k"],a:"Min-heap. Start first col. Pop, push right neighbor.",c:"import heapq\ndef kthSmallest(matrix, k):\n    h = [(matrix[i][0],i,0) for i in range(len(matrix))]\n    heapq.heapify(h)\n    for _ in range(k):\n        val, r, c = heapq.heappop(h)\n        if c+1<len(matrix): heapq.heappush(h,(matrix[r][c+1],r,c+1))\n    return val"},
]},

{id:56,t:"Merge Intervals",d:"M",tags:["merge"],a:"Sort by start. Extend end on overlap.",c:"def merge(intervals):\n    intervals.sort()\n    res = [intervals[0]]\n    for s, e in intervals[1:]:\n        if s <= res[-1][1]: res[-1][1] = max(res[-1][1], e)\n        else: res.append([s, e])\n    return res"},
{id:57,t:"Insert Interval",d:"M",tags:["insert"],a:"Add before, merge middle, add after.",c:"def insert(intervals, new):\n    res = []; i = 0; n = len(intervals)\n    while i<n and intervals[i][1]<new[0]: res.append(intervals[i]); i+=1\n    while i<n and intervals[i][0]<=new[1]:\n        new = [min(new[0],intervals[i][0]), max(new[1],intervals[i][1])]; i+=1\n    res.append(new)\n    while i<n: res.append(intervals[i]); i+=1\n    return res"},
{id:986,t:"Interval List Intersections",d:"M",tags:["two-ptr"],a:"Two pointers. Intersect = [max starts, min ends]. Advance smaller end.",c:"def intervalIntersection(A, B):\n    i=j=0; res=[]\n    while i<len(A) and j<len(B):\n        lo = max(A[i][0],B[j][0]); hi = min(A[i][1],B[j][1])\n        if lo<=hi: res.append([lo,hi])\n        if A[i][1]<B[j][1]: i+=1\n        else: j+=1\n    return res"},

// Interview phrases per pattern
const PHRASES = {
"Standard — Find Exact": "Say: 'Since the array is sorted, I can binary search in O(log n) instead of linear scan'",
"Left Boundary (bisect_left)": "Say: 'I need the first occurrence, so even when I find a match, I keep searching left'",
"Right Boundary (bisect_right)": "Say: 'I need the last occurrence, so even on a match, I push the search rightward'",
"Binary Search on Answer Space": "Say: 'Instead of searching the array, I'll binary search the answer range and check feasibility'",
"Rotated Sorted Array": "Say: 'At least one half is always sorted. I check which half, then decide where the target could be'",
"Opposite Ends": "Say: 'Since it's sorted, I use two pointers from both ends — move left for bigger, right for smaller'",
"Same Direction (Read/Write)": "Say: 'I'll use a slow pointer as write head and fast pointer as read head, modifying in-place'",
"Fast-Slow (Floyd's)": "Say: 'Fast gains one step per iteration, so if there's a cycle, they must meet — it's modular arithmetic'",
"K-Sum (3Sum, 4Sum)": "Say: 'Sort first, fix outer elements, then reduce to two-pointer problem on the remainder'",
"Fixed Size": "Say: 'Window size is fixed at K, so I just slide — add the new right element, remove the old left'",
"Variable — Find Minimum Length": "Say: 'I expand right to satisfy the condition, then aggressively shrink left to find the smallest valid window'",
"Variable — Find Maximum Length": "Say: 'I expand right always, and only shrink left when the window becomes invalid — tracking max size'",
"Window + HashMap": "Say: 'I maintain a frequency map of the window and check validity by comparing with the target frequency'",
"Basic Prefix Sum": "Say: 'I precompute prefix sums so any range query becomes a simple subtraction in O(1)'",
"Subarray Sum = K (HashMap)": "Say: 'If current prefix minus K was seen before, that means there's a subarray summing to K in between'",
"Difference Array": "Say: 'Instead of updating every element in a range, I mark the boundaries and reconstruct with prefix sum'",
"Monotonic Stack": "Say: 'I maintain a stack where elements decrease — when a bigger element comes, all smaller ones get their answer'",
"DFS Traversals": "Say: 'I need to decide: do I need children's results first (postorder) or can I process root first (preorder)?'",
"BFS Level Order": "Say: 'BFS gives me level-by-level access — I process one level per iteration of the outer loop'",
"Tree DP (Return vs Update)": "Say: 'At each node I return the single-path value to parent, but update the global answer with the through-path'",
"BFS — Shortest (Unweighted)": "Say: 'BFS guarantees shortest path in unweighted graphs because it explores level by level'",
"DFS — Explore All": "Say: 'DFS goes deep before wide — perfect for exploring all connected components or all paths'",
"Topological Sort (Kahn's)": "Say: 'I start with zero-dependency nodes, process them, reduce neighbors' dependencies, and repeat'",
"Union-Find": "Say: 'Union-Find lets me dynamically track connectivity with near O(1) per operation using path compression'",
"Dijkstra": "Say: 'Dijkstra greedily processes the nearest unvisited node — works only with non-negative weights'",
"Template": "Say: 'Backtracking is exhaustive search with pruning — I choose, explore, then undo the choice'",
"1D DP": "Say: 'Each state depends on 1-2 previous states. I build bottom-up from the base case'",
"2D DP": "Say: 'I need two dimensions because the answer depends on two parameters — like positions in two strings'",
"Knapsack (0/1 vs Unbounded)": "Say: '0/1 means right-to-left iteration so each item is used once. Unbounded means left-to-right for reuse'",
"LIS (Longest Increasing Subseq)": "Say: 'I maintain the smallest possible tail for each LIS length — binary search to find where each element fits'",
"State Machine": "Say: 'I define states per day (holding, sold, resting) and transitions between them'",
"When to Use": "Say: 'Greedy works here because the locally optimal choice never blocks a better future choice'",
"Top K / Kth Element": "Say: 'A min-heap of size K naturally gives me the Kth largest — the smallest in the heap is the answer'",
"Merge K Sorted": "Say: 'Min-heap of K elements — pop smallest, push next from same source. O(N log K)'",
"Two Heaps (Median)": "Say: 'I split the stream into two halves with a max-heap and min-heap — median is always at the tops'",
"Prefix Tree": "Say: 'A trie lets me search by prefix in O(word length) — much faster than checking every word'",
"Techniques": "Say: 'Sort by start time for merging, sort by end time for greedy selection of non-overlapping intervals'",
"Key Tricks": "Say: 'XOR cancels pairs — so XOR-ing everything reveals the unique element'",
"LRU Cache": "Say: 'HashMap for O(1) lookup + doubly linked list for O(1) recency tracking — that's the classic combo'",
"Two Sum Complement":"Say: 'For each number, I check if its complement (target - num) exists in the hashmap. One pass, O(n)'",
"Frequency / Grouping":"Say: 'Counter gives frequencies in O(n). Group by frequency using bucket sort for O(n) total'",
"Consecutive / Set tricks":"Say: 'Put all in set. Only start counting from sequence starts (where num-1 is NOT in set)'",
"Parentheses / Brackets":"Say: 'Stack of indices, not characters. Push -1 as base. On close: pop, length = current minus new stack top'",
"Calculator":"Say: 'Stack for operands. Track previous operator. Multiply and divide immediately, add and subtract just push'",
"Reverse":"Say: 'Three pointers: prev, curr, next. Save next, point curr to prev, advance. Classic linked list reversal'",
"Dummy Head":"Say: 'Dummy head avoids edge cases when result head is unknown. Build list, return dummy.next'",
"BST Tricks":"Say: 'BST inorder gives sorted order. Validate with min/max range. LCA uses value comparison not parent pointers'",
"Handle Duplicates":"Say: 'Sort input first. Skip same-level duplicates: if i > start and nums[i] == nums[i-1], continue'"};

,

"Variable \u2014 Find Minimum Length":"Min subarray with sum >= target: expand right (add). While sum >= target: update min length, shrink left (subtract). Shrink AGGRESSIVELY with while loop because we want minimum",
"Basic Prefix Sum":"2D prefix sum: prefix[i][j] = sum of rectangle (0,0)-(i,j). Query sum of any sub-rectangle in O(1) using inclusion-exclusion. Used in: range sum 2D, maximal square",

function renderContent(ti){
  const topic=D[ti];let html='<div class="pattern-section">';
  topic.patterns.forEach((p,pi)=>{
    html+=`<div class="pat-card" id="lc-pat-${pi}"><h3>${p.t}</h3>`;
    if(REQ[p.t])html+=`<div class="req">🎯 ${REQ[p.t]}</div>`;
    html+=`<div class="when">⚡ ${p.w}</div><ul>`;
    p.b.forEach(b=>html+=`<li>${b}</li>`);
    html+='</ul>';
    if(EXTRA&&EXTRA[p.t])html+=`<div class="extra-tips">💎 ${EXTRA[p.t]}</div>`;
    if(PHRASES[p.t])html+=`<div class="phrase-box">🗣️ ${PHRASES[p.t]}</div>`;
    if(p.c)html+=`<pre>${esc(p.c)}</pre>`;
    html+='</div>';
  });
  if(topic.table){html+='<table class="dtable"><tr>';topic.table.h.forEach(h=>html+=`<th>${h}</th>`);html+='</tr>';topic.table.r.forEach(r=>{html+='<tr>';r.forEach(c=>html+=`<td>${c}</td>`);html+='</tr>'});html+='</table>';}
  html+='</div>';
  if(topic.questions.length){
    html+=`<div class="problems-header">Problems (${topic.questions.length}) <button class="expand-all" onclick="toggleAll()">Expand All</button></div>`;
    topic.questions.forEach(q=>{
      const dc=q.d==='E'?'easy':q.d==='M'?'med':'hard';const dl=q.d==='E'?'Easy':q.d==='M'?'Med':'Hard';
      html+=`<div class="q"><button class="q-btn" onclick="this.parentElement.classList.toggle('open')"><span class="num">#${q.id}</span><span class="title">${q.t}</span><span class="d ${dc}">${dl}</span><span class="arrow">▶</span></button><div class="ans"><span class="approach">💡 ${q.a}</span>`;
      if(q.c)html+=`<pre>${esc(q.c)}</pre>`;
      if(q.tags&&q.tags.length){html+='<div>';q.tags.forEach(t=>html+=`<span class="tag">${t}</span>`);html+='</div>';}
      html+='</div></div>';
    });
  }
  contentArea.innerHTML=html;contentArea.scrollTop=0;
}

searchInput.addEventListener('input',function(){const v=this.value.toLowerCase().trim();if(!v){renderContent(activeTopicIdx);return}let h='',c=0;D.forEach(t=>{t.questions.forEach(q=>{const s=`${q.id} ${q.t} ${(q.tags||[]).join(' ')} ${q.a}`.toLowerCase();if(s.includes(v)){c++;const dc=q.d==='E'?'easy':q.d==='M'?'med':'hard';const dl=q.d==='E'?'Easy':q.d==='M'?'Med':'Hard';h+=`<div class="q open"><button class="q-btn" onclick="this.parentElement.classList.toggle('open')"><span class="num">#${q.id}</span><span class="title">${q.t} <span class="tag">${t.topic}</span></span><span class="d ${dc}">${dl}</span><span class="arrow">▶</span></button><div class="ans"><span class="approach">💡 ${q.a}</span>`;if(q.c)h+=`<pre>${esc(q.c)}</pre>`;h+='</div></div>'}})});contentArea.innerHTML=c?`<div class="problems-header">Found ${c} problems</div>`+h:'<div style="text-align:center;padding:30px;color:#484f58">No results</div>'});
renderContent(0);breadcrumb.innerHTML=`${D[0].topic} <span>→ ${D[0].patterns[0].t}</span>`;
