const HLD=[
{section:"The Framework",items:[
{t:"Interview Framework",req:"7-step structure for EVERY system design question",b:["<b>1. CLARIFY (2-3 min):</b> Users? DAU? Read vs write? Latency? Feature scope?","<b>2. ESTIMATE (2-3 min):</b> QPS, storage/year, bandwidth, cache memory","<b>3. API DESIGN (2 min):</b> 2-3 REST endpoints. POST /create, GET /get, PUT /update","<b>4. DATA MODEL (3 min):</b> Key tables + columns. SQL vs NoSQL with WHY","<b>5. HIGH-LEVEL DESIGN (5-8 min):</b> Client → DNS → CDN → LB → API → Services → Cache → DB","<b>6. DEEP DIVE (10-15 min):</b> 2-3 hardest parts. Tradeoffs, alternatives, failure modes","<b>7. WRAP UP (2 min):</b> Summarize, monitoring, scaling, future improvements"]},
{t:"Estimation Numbers",req:"Quick math for every interview. Memorize these",table:{h:["Metric","Value","Use For"],r:[["1 day","86,400 sec ≈ 100K","QPS calc"],["1M req/day","≈ 12 QPS","Small scale"],["100M req/day","≈ 1,200 QPS","Large"],["1B req/day","≈ 12,000 QPS","Massive"],["Peak","2-3× average","Capacity"],["1 image","200KB-1MB","Storage"],["1 video min","~50MB","Storage"],["RAM read","0.0001ms","Cache"],["SSD read","0.1ms","DB"],["Network same DC","0.5ms","Internal"],["Cross-continent","150ms","Multi-region"],["1 Redis","~100K QPS","Cache cap"],["1 MySQL","~5-10K read QPS","DB cap"],["1 Cassandra","~20-50K QPS","NoSQL cap"]]}},
]},
{section:"Networking",items:[
{t:"Load Balancer",req:"Distributes traffic so no single server gets overwhelmed + eliminates SPOF",b:["<b>L4 (Transport):</b> Routes by IP+port. Very fast. AWS NLB","<b>L7 (Application):</b> Routes by URL/headers/cookies. Smart routing. AWS ALB, Nginx","<b>Algorithms:</b> Round Robin | Weighted RR | Least Connections | IP Hash | Least Response Time","<b>Health Checks:</b> Pings /health every few sec. Unhealthy = removed","<b>Sticky Sessions:</b> Same user → same server (for session state)","<b>Active-Active:</b> Multiple LBs running simultaneously. DNS round-robin between LBs. If one LB dies, DNS removes it","<b>Active-Passive:</b> One LB active, one standby. Heartbeat between them. If active dies, passive takes over (VIP failover)","<b>Connection Draining:</b> When removing server, finish existing requests before stopping. Prevents dropped connections. Configure drain timeout (30-60s)","<b>SSL Termination:</b> LB decrypts HTTPS → sends plain HTTP internally. Offloads CPU from app servers. Certificates managed at LB level","<b>Global Server Load Balancing (GSLB):</b> DNS-based LB across data centers. Route users to nearest healthy DC. GeoDNS + health checks","<b>Rate limiting at LB:</b> Some LBs (Nginx, HAProxy) can rate-limit per IP/URL before requests reach app. First line of defense","<b>In HLD say:</b> We use L7 ALB for path-based routing to microservices, with health checks every 10s and connection draining enabled","<b>Active-Passive failover:</b> Two LBs running. Primary handles traffic. Secondary monitors via heartbeat. Primary dies \u2192 secondary takes over VIP (virtual IP). DNS unchanged. Failover in seconds. AWS: multi-AZ ALB does this automatically","<b>Pre-warming:</b> New server added to pool? LB gradually increases traffic to it (ramp-up). Prevents cold cache from getting hammered. Some LBs support warm-up period configuration","<b>WebSocket handling:</b> WebSocket = persistent connection. Must be sticky to one server. L7 LB can upgrade HTTP to WebSocket and maintain connection. L4 LB passes through transparently"],vs:["L4 vs L7 Load Balancer"]},
{t:"API Gateway",req:"Single entry point for all clients — handles auth, rate-limiting, routing before hitting services",b:["<b>Handles:</b> Auth, rate limiting, routing, SSL termination, logging, versioning","<b>Response aggregation:</b> Call multiple microservices, combine into one response","<b>BFF pattern:</b> Different gateways for web vs mobile clients","<b>Examples:</b> Kong, AWS API Gateway, Zuul (Netflix)","<b>Request/Response caching:</b> Cache GET responses at gateway. Reduce backend load for repeated identical queries. TTL-based invalidation","<b>Protocol translation:</b> Accept REST from clients, convert to gRPC for internal services. Best of both worlds: client simplicity + internal speed","<b>Request validation:</b> Validate request schema (required fields, types, ranges) BEFORE reaching backend. Reject bad requests early","<b>Circuit breaker at gateway:</b> If backend service failing, gateway returns cached/default response immediately. Prevents cascade failure","<b>Canary routing:</b> Route 5% of traffic to new version, 95% to stable. Monitor errors. Roll forward or back. Built-in to many gateways","<b>In HLD say:</b> API Gateway handles auth, rate limiting, and routes /v1/users to User Service and /v1/orders to Order Service","<b>Canary deployment via gateway:</b> Route 5% traffic to new version, 95% to stable. Monitor error rates. Clean? Increase to 25%, 50%, 100%. Rollback instantly by changing routing rules. Zero-downtime deploys","<b>Request throttling detail:</b> Per-user: 100 req/min. Per-IP: 1000 req/min. Per-endpoint: /upload=10/min, /read=500/min. Different limits for free vs paid tiers. All enforced at gateway before hitting backend","<b>API key management:</b> Gateway validates API keys, tracks usage per key, enforces plan limits. Revoke compromised keys instantly at gateway level without touching backend services"],vs:["API Gateway vs Load Balancer"]},
{t:"CDN",req:"Caches static content at edge servers worldwide — users get it from nearest location",b:["<b>Static:</b> Images, CSS, JS, videos, fonts","<b>Pull CDN:</b> First req = miss → fetch origin → cache. Auto-manages","<b>Push CDN:</b> You upload proactively (video launches, known content)","<b>Invalidation:</b> TTL (auto-expire) or Purge API (instant)","<b>Origin Shield:</b> Extra cache layer between edge and origin","<b>Examples:</b> CloudFront, Cloudflare, Akamai. Netflix: Open Connect (own CDN at ISPs)","<b>Dynamic content at edge:</b> CloudFlare Workers, Lambda@Edge — run code at edge PoPs. Personalization without hitting origin","<b>DDoS protection:</b> CDN absorbs attack traffic at edge. Your origin servers stay safe behind CDN. Massive bandwidth capacity","<b>HTTPS at edge:</b> Terminate TLS at nearest edge server. Saves 150ms+ roundtrip to origin for TLS handshake","<b>Cache-Control headers:</b> max-age=3600 (cache 1hr), no-cache (revalidate), s-maxage (CDN-specific TTL), stale-while-revalidate (serve stale while refreshing)","<b>Versioned URLs:</b> style.v2.css, app.abc123.js — content-hash in filename. Set max-age=1year. On deploy, new hash = new URL = instant cache bust. Never stale","<b>Cost:</b> Pay per GB transferred from edge. Cache hit ratio > 95% = massive savings. Monitor hit ratio in dashboard","<b>In HLD say:</b> Static assets on CloudFront CDN with 1-year TTL and versioned URLs. Origin Shield enabled to reduce origin load by 50x","<b>Edge compute (Lambda@Edge):</b> Run custom code at CDN edge. Use cases: A/B testing (assign variant without hitting origin), auth token validation (reject at edge), geo-based pricing, smart redirects. Reduces origin load dramatically","<b>Video streaming at edge:</b> Video chunks cached per quality level. /video/chunk001_720p.ts and /video/chunk001_1080p.ts both cached independently. Different users watching same video at different qualities all served from same PoP","<b>Anycast routing:</b> Alternative to GeoDNS. Single IP announced from ALL PoPs via BGP. Network routes user to nearest PoP automatically. Faster failover than DNS (BGP converges in seconds vs DNS TTL minutes)"],vs:["Pull CDN vs Push CDN"]},
{t:"DNS & Reverse Proxy",req:"DNS translates domain→IP. Reverse proxy sits in front of servers hiding them from clients",b:["<b>DNS resolution:</b> Browser → OS → ISP → Root → TLD → Authoritative","<b>GeoDNS:</b> Different IPs per user location → route to nearest DC","<b>Reverse proxy benefits:</b> SSL termination, compression, caching, security","<b>Nginx:</b> Reverse proxy + LB + web server — all in one","<b>DNS resolution time:</b> First request to new domain = 20-120ms for DNS. Subsequent = cached. Pre-resolve critical domains with dns-prefetch HTML hint","<b>DNS failover:</b> Health-check based. If primary IP unhealthy → return backup IP. Latency = TTL (may take minutes). Set low TTL for fast failover","<b>Record types deep dive:</b> A (domain→IPv4), AAAA (→IPv6), CNAME (alias→another domain name), MX (mail server), NS (nameserver authority), TXT (verification, SPF, DKIM)","<b>Reverse proxy caching:</b> Nginx can cache backend responses. Serve cached response for repeat requests. Huge performance boost for read-heavy APIs","<b>Request buffering:</b> Reverse proxy buffers slow client uploads. Backend gets request all at once (fast). Frees backend thread from waiting on slow network","<b>In HLD say:</b> GeoDNS routes users to nearest data center. Nginx reverse proxy handles SSL termination, compression, and caches GET responses for 60s"]},
{t:"Service Mesh (Istio/Linkerd)",req:"Infrastructure layer handling all service-to-service communication transparently via sidecar proxies",b:["<b>Sidecar pattern:</b> Every pod gets an Envoy proxy container. All traffic routed through sidecar — app code doesn't change at all","<b>Features handled:</b> mTLS (automatic encryption between services), load balancing, circuit breaking, retries, timeouts, observability — all at infrastructure level","<b>Traffic management:</b> Canary deployments (route 5% to v2), A/B testing, traffic mirroring (shadow traffic to new version), fault injection for testing","<b>Observability:</b> Auto-generates metrics (latency, error rate), distributed traces, and access logs for every service-to-service call. Zero instrumentation code","<b>mTLS everywhere:</b> All inter-service communication encrypted. Certificates auto-rotated. Services verified by identity, not just network position. Zero-trust networking","<b>When to use:</b> 20+ microservices, need uniform policies. Overkill for &lt;10 services. Adds latency (~1ms per hop) and operational complexity","<b>In HLD say:</b> Istio service mesh for mTLS between all services, automatic retries with circuit breaking, and canary deployments routing 5% traffic to new version"]},
{t:"gRPC Deep Dive",req:"Binary RPC framework using Protocol Buffers — 10x faster than REST for internal service communication",b:["<b>Protocol Buffers:</b> Define service in .proto file. Auto-generate client+server code in any language. Strict contract between services","<b>Binary serialization:</b> 10x smaller than JSON. Fields identified by number (not name string). Backwards-compatible: add new fields without breaking old clients","<b>HTTP/2 multiplexing:</b> Multiple requests on single TCP connection. No head-of-line blocking. Bi-directional streaming. Persistent connections reduce handshake overhead","<b>4 patterns:</b> Unary (1:1 like REST), Server streaming (1:N — stock prices), Client streaming (N:1 — file upload), Bidirectional (N:N — chat)","<b>Deadlines:</b> Every gRPC call has a deadline. Propagates through call chain: if API has 2s deadline and service A takes 1.5s, service B only gets 0.5s. Prevents cascading timeouts","<b>Load balancing:</b> L7 load balancing needed (not L4) because HTTP/2 multiplexes on one connection. Client-side LB (pick server per call) or proxy-based (Envoy/Nginx with gRPC support)","<b>When NOT to use:</b> Public APIs (browsers can't do gRPC natively — use gRPC-Web gateway), simple CRUD (REST is fine), small team (proto management overhead)","<b>In HLD say:</b> Internal services communicate via gRPC with Protocol Buffers — 10x throughput improvement over REST, strict schema contracts, deadline propagation prevents cascading timeouts"]},
]},
{section:"Storage",items:[
{t:"SQL / Relational DB",req:"Structured tables, strict schema, ACID transactions — for data that MUST be consistent",b:["<b>ACID:</b> Atomicity (all-or-nothing) | Consistency (valid states) | Isolation (no interference) | Durability (crash-safe)","<b>Strengths:</b> Complex joins, transactions, integrity, mature tooling","<b>Scaling:</b> Vertical → Read replicas → Sharding (last resort)","<b>Indexing:</b> B-tree on frequent query columns. Speeds reads, slight write overhead","<b>Use for:</b> Payments, user accounts, orders — anything needing ACID + joins","<b>Examples:</b> PostgreSQL (best all-round), MySQL, Oracle","<b>Connection pooling:</b> PgBouncer (PostgreSQL) / HikariCP (Java). Reuse DB connections instead of creating per request. Critical — without it, DB runs out of connections under load","<b>Query optimization:</b> Use EXPLAIN ANALYZE. Look for Seq Scan (bad) vs Index Scan (good). Add indexes on WHERE/JOIN/ORDER BY columns","<b>Composite index:</b> CREATE INDEX ON orders(user_id, created_at). Leftmost prefix rule: can use (user_id) or (user_id, created_at) but NOT (created_at) alone","<b>Materialized views:</b> Pre-computed query result stored as table. Refresh periodically. Great for expensive aggregations (dashboard stats, leaderboards)","<b>Partitioning (not sharding):</b> Split large table within SAME database. Range partition orders by month. PostgreSQL native partitioning. Simpler than cross-DB sharding","<b>WAL (Write-Ahead Log):</b> Every write goes to WAL first (sequential, fast), then to data files. Ensures durability. Also used for replication streaming","<b>In HLD say:</b> PostgreSQL with read replicas for scaling reads. PgBouncer for connection pooling. B-tree indexes on user_id and created_at. Partitioned by month for archival","<b>Connection pooling (critical):</b> PgBouncer for PostgreSQL, HikariCP for Java. WITHOUT it: each request creates new DB connection (expensive TCP+auth handshake). WITH it: reuse existing connections from pool. Can 10x your throughput","<b>Materialized views:</b> Pre-computed query result stored as table. Refresh periodically (every 5 min). Great for expensive aggregations: dashboard stats, leaderboard, daily reports. Read = instant. Refresh = async","<b>WAL (Write-Ahead Log):</b> Every write goes to WAL FIRST (sequential append, fast). Then to actual data files. Crash? Replay WAL on restart. Also used for: streaming replication to slaves, point-in-time recovery","<b>EXPLAIN ANALYZE:</b> Run before and after adding index. Shows: Seq Scan (bad, scans every row) vs Index Scan (good, uses B-tree). ALWAYS verify indexes actually help. Some queries ignore indexes"],vs:["SQL vs NoSQL","ACID vs BASE"]},
{t:"NoSQL Databases",req:"Non-relational DBs trading ACID/joins for horizontal scale + schema flexibility",b:["<b>Key-Value:</b> key→value. Fastest. Redis, DynamoDB → sessions, cache","<b>Document:</b> JSON docs. Flexible schema. MongoDB → profiles, catalogs","<b>Wide-Column:</b> Dynamic columns. Cassandra, HBase → time-series, IoT, analytics","<b>Graph:</b> Nodes+edges. Neo4j → social networks, recommendations","<b>BASE:</b> Basically Available, Soft state, Eventually consistent","<b>Choose when:</b> Massive scale, simple access patterns, availability > consistency","<b>DON'T when:</b> Need complex joins, strict transactions, multi-entity queries","<b>Denormalization is mandatory:</b> No joins → duplicate data intentionally. Store user name inside every post doc, not just user_id. Trade storage for read speed","<b>Time-Series DB:</b> Optimized for timestamp-indexed data. Auto-downsample old data. InfluxDB, TimescaleDB (PostgreSQL extension), Prometheus. Use for: metrics, IoT, stock prices","<b>Data modeling for NoSQL:</b> Model by ACCESS PATTERN, not by entity relationships. Ask: what queries will I run? Design tables to answer those queries in single read","<b>Secondary indexes:</b> Most NoSQL support sparse indexes on non-key fields. DynamoDB GSI (Global Secondary Index). But: adds write cost + eventual consistency","<b>Consistency tuning:</b> Cassandra: consistency level per query. ONE (fast, eventual), QUORUM (balanced), ALL (slow, strong). Choose per use case","<b>Data modeling for NoSQL:</b> Model by ACCESS PATTERN not by entity relationships. Ask: what queries will I run? Design tables to answer those queries in single read. May need to duplicate data across multiple tables for different query patterns","<b>Cassandra partitioning:</b> Partition key determines which node stores data. CRITICAL choice. Good: user_id (even, query scoped). Bad: country (skewed). Within partition: clustering key sorts data (timestamp for time-series)","<b>MongoDB aggregation pipeline:</b> Chain of stages: $match (filter) \u2192 $group (aggregate) \u2192 $sort \u2192 $project (shape output). Like SQL GROUP BY but more flexible. Can do complex analytics without separate analytics DB"],vs:["SQL vs NoSQL","Key-Value vs Document vs Wide-Column"]},
{t:"Blob / Object Storage",req:"For large unstructured data — images, videos, backups. NOT a DB, just store/retrieve by key",b:["<b>S3 durability:</b> 99.999999999% (11 nines)","<b>Cost tiers:</b> Hot → Warm → Cold → Archive (Glacier)","<b>Rule:</b> NEVER store media in your DB. Always S3 + CDN","<b>Features:</b> Versioning, lifecycle policies, cross-region replication","<b>Pre-signed URLs:</b> Generate temporary upload/download URL with expiry (15 min). Client uploads DIRECTLY to S3, bypassing your server. Critical for large files — saves bandwidth + CPU","<b>Multipart upload:</b> For files > 100MB. Split into parts, upload in parallel, S3 assembles. Resume failed uploads without restarting. 5TB max object size","<b>Cross-region replication:</b> Auto-copy objects to another region. Disaster recovery + compliance (data in EU stays in EU). Adds ~15 min lag","<b>Event notifications:</b> S3 triggers Lambda/SQS/SNS on upload. Use for: image resize pipeline, virus scan, metadata extraction. No polling needed","<b>In HLD say:</b> Images uploaded via pre-signed URL directly to S3. S3 event triggers Lambda for thumbnail generation. Served via CloudFront CDN","<b>Pre-signed URL flow:</b> Client asks API: I want to upload photo. API generates S3 pre-signed URL (valid 15 min). Client uploads DIRECTLY to S3 using that URL. API server never touches the file. Saves bandwidth + CPU. MUST USE for any file upload","<b>S3 event notifications:</b> Configure S3 to trigger Lambda/SQS on upload. Photo uploaded \u2192 Lambda auto-generates thumbnails. Video uploaded \u2192 SQS triggers transcoding pipeline. Zero polling needed","<b>Lifecycle policies:</b> Auto-manage storage costs. Rule: after 30 days \u2192 move to Infrequent Access (cheaper). After 90 days \u2192 Glacier (very cheap, hours to retrieve). After 365 days \u2192 delete. Set once, runs forever"]},
{t:"Time-Series Databases",req:"Optimized for timestamp-indexed data — auto-downsample old data, high write throughput",b:["<b>Write pattern:</b> Append-only, time-ordered. Never update old data. Optimized for INSERT, not UPDATE","<b>Auto-downsampling:</b> Last 24hrs: per-second granularity. Last 7 days: per-minute. Last year: per-hour. Configurable retention policies","<b>Compression:</b> Delta-of-delta encoding for timestamps (consecutive timestamps differ by small amount). Gorilla compression for values. 90%+ compression ratio","<b>Use cases:</b> Server metrics (CPU, memory), IoT sensor data, stock prices, application performance monitoring, real-time analytics","<b>Examples:</b> InfluxDB (most popular), TimescaleDB (PostgreSQL extension — get SQL + time-series), Prometheus (pull-based metrics), VictoriaMetrics (Prometheus-compatible, better scale)","<b>Query patterns:</b> Last 5 min of CPU for server X. Average response time per hour for last week. 95th percentile latency grouped by endpoint. All time-windowed aggregations","<b>TimescaleDB advantage:</b> It is PostgreSQL extension. Use full SQL. Join time-series with regular tables. No new database to learn/operate. Best for teams already using PostgreSQL","<b>In HLD say:</b> Server metrics stored in TimescaleDB with 90-day retention. Auto-downsampled: per-second for 24hrs, per-minute for 30 days, per-hour for 1 year"]},
{t:"Data Lake vs Data Warehouse",req:"Lake = raw unstructured data (cheap, schema-on-read). Warehouse = processed structured data (fast queries)",b:["<b>Data Lake:</b> Store EVERYTHING (logs, JSONs, images, CSVs) in S3/HDFS. Schema applied when reading. Cheap storage. Used by data engineers/ML teams","<b>Data Warehouse:</b> Store PROCESSED structured data in columnar format. Pre-defined schema. Fast analytical queries. Used by business analysts (Redshift, BigQuery, Snowflake)","<b>Lakehouse (modern):</b> Delta Lake, Iceberg, Hudi — combine both. Raw data in lake with warehouse-like query performance. ACID on data lake. Growing fast","<b>ETL vs ELT:</b> ETL: extract-transform-load (transform BEFORE storing). ELT: extract-load-transform (store raw first, transform later). Modern = ELT into lakehouse","<b>Columnar storage:</b> Store data by column not row. Analytical queries scan specific columns only. Compression excellent (same column = similar values). Parquet, ORC formats","<b>In HLD say:</b> Raw events stored in S3 data lake (Parquet format). Processed into Snowflake warehouse nightly for analytics dashboards. ML team reads directly from lake"]},
]},
{section:"Caching",items:[
{t:"Caching Strategies",req:"Store hot data in RAM — 1000× faster than DB disk reads",b:["<b>Cache-Aside:</b> App checks cache → miss → read DB → write cache. MOST COMMON","<b>Read-Through:</b> Cache reads DB on miss. App only talks to cache","<b>Write-Through:</b> Write cache + DB together. Consistent but slower","<b>Write-Back:</b> Write cache only, async to DB. Fast but risky (crash = data loss)","<b>Write-Around:</b> Write DB only, skip cache. Cache fills on next read","<b>Best combo:</b> Cache-Aside reads + Write-Around writes","<b>Cache warming:</b> On deploy/restart, pre-load cache with top-N hot items. Run script: read top 1000 products from DB → write to Redis. Avoids cold-start stampede","<b>Multi-level cache:</b> L1 = in-process (HashMap, 1ms) → L2 = Redis (0.5ms network) → L3 = DB (5ms). Each level catches misses from the level above","<b>Cache invalidation patterns:</b> 1) TTL (simplest, eventual staleness). 2) Event-driven (on DB write, publish invalidation event via Kafka). 3) Version keys (product:v3 → new key on update)","<b>Negative caching:</b> Cache null/empty results for non-existent keys with short TTL (30-60s). Prevents cache penetration attacks on non-existent IDs","<b>Multi-level cache:</b> L1 = in-process HashMap (0.001ms, per-server, small) \u2192 L2 = Redis (0.5ms, shared, large) \u2192 L3 = DB (5ms, source of truth). Each level catches misses from above. 99% requests served from L1+L2","<b>Cache key design:</b> Be specific: cache:user:123:profile (good) vs cache:user:123 (too broad, what about user posts?). Include version: cache:v2:user:123 (deploy new version? new key prefix, old cache ignored)","<b>Cache warming on deploy:</b> New server starts with empty cache. First 1000 requests = all cache misses = DB hammered. Fix: on startup, pre-load top-N hot items from DB into Redis. Script runs in 30 seconds. Prevents cold-start stampede"],vs:["Redis vs Memcached","Cache-Aside vs Read-Through vs Write-Through"]},
{t:"Eviction & Problems",req:"What to remove when full + common pitfalls that break production systems",b:["<b>LRU:</b> Remove least recently used. Best default. O(1) with HashMap + DLL","<b>LFU:</b> Remove least frequently used. Good when hot data stays hot","<b>TTL:</b> Auto-expire after X seconds","<b>Cache stampede:</b> Key expires → 1000s of requests hit DB at once. Fix: lock + single refresh","<b>Cache penetration:</b> Queries for non-existent keys bypass cache. Fix: cache null with short TTL","<b>Thundering herd:</b> Popular key expires → massive DB spike. Fix: staggered TTL + pre-warming","<b>Hot key problem:</b> Single key (celebrity profile, flash sale item) gets 100K QPS → single Redis node overwhelmed. Fixes: 1) Client-side cache with 5s TTL. 2) Replicate hot key to 5 Redis nodes, randomly pick one. 3) Key splitting: hot_key:shard1, hot_key:shard2","<b>Write-behind batching:</b> In Write-Back strategy, batch multiple writes into one DB write. 100 Redis updates → 1 bulk INSERT. Reduces DB write QPS dramatically","<b>Cache warming on failover:</b> Redis replica promoted to primary → already has data (warm). If Redis completely dies → need to warm from DB. Can be slow for large datasets. Plan for this","<b>Hot key mitigation detail:</b> Detect: monitor key access frequency. If key exceeds threshold (10K QPS): 1) Client-side cache (local HashMap, 5s TTL, no network). 2) Replicate key to 5 Redis nodes randomly. 3) Key splitting: popular:shard1, popular:shard2, randomly pick","<b>Cache-DB consistency patterns:</b> Delete on write (simple, eventual). Double-delete (delete before + after DB write, handles race). Subscribe to DB binlog via CDC \u2192 auto-invalidate cache. CDC is cleanest but most complex"],vs:["LRU vs LFU vs TTL"]},
]},
{section:"Messaging",items:[
{t:"Message Queue",req:"Async producer→queue→consumer. Decouples services + absorbs traffic spikes",b:["<b>Why:</b> Decouple services, buffer spikes, enable retry on failure","<b>At-most-once:</b> Fast, may lose messages","<b>At-least-once:</b> May duplicate, use with idempotency. MOST COMMON","<b>Exactly-once:</b> Hardest. Kafka supports via transactions","<b>Examples:</b> RabbitMQ (feature-rich), AWS SQS (managed)","<b>Use for:</b> Email sending, order processing, async tasks","<b>Dead Letter Queue (DLQ):</b> Messages that fail processing N times (e.g., 3 retries) get moved to DLQ for investigation. Essential for debugging production issues without losing data","<b>Message ordering:</b> SQS Standard = no ordering guarantee. SQS FIFO = strict ordering within message group. RabbitMQ = ordered within single queue","<b>Visibility timeout:</b> After consumer reads message, it becomes invisible to other consumers for X seconds. If not acknowledged in time, reappears for retry. Prevents duplicate processing","<b>Backpressure:</b> Queue fills up → producer slows down or gets rejected. Protects consumers from overload. Monitor queue depth as key metric","<b>In HLD say:</b> Order events published to SQS. Email service consumes asynchronously with 3 retries + DLQ. Decouples order flow from notification delivery","<b>Visibility timeout (SQS):</b> Consumer reads message \u2192 message becomes INVISIBLE to other consumers for 30 seconds. Consumer finishes + ACKs \u2192 message deleted. Consumer crashes? 30 sec timeout expires \u2192 message reappears \u2192 another consumer picks up. Automatic retry","<b>FIFO vs Standard queue:</b> Standard SQS: best-effort ordering, at-least-once (may duplicate). FIFO SQS: strict ordering within message group, exactly-once. FIFO = slower but guaranteed order. Use FIFO for: payment events, order status updates","<b>Fan-out pattern:</b> SNS topic + multiple SQS queues. Order placed \u2192 SNS \u2192 Email SQS + Inventory SQS + Analytics SQS. Each queue processes independently. SNS = pub/sub, SQS = queue. Combined = fan-out"],vs:["Kafka vs RabbitMQ (Message Queue)","Kafka vs SQS"]},
{t:"Event Streaming (Kafka)",req:"Distributed log — events are NOT deleted after read. Consumers can replay at their own pace",b:["<b>Key diff from queue:</b> Messages stay. Multiple consumers replay independently","<b>Topics + Partitions:</b> Topic split for parallelism. Each partition = ordered log","<b>Consumer Groups:</b> Each group gets all msgs. Within group: 1 partition → 1 consumer","<b>Retention:</b> Keep messages days/weeks. Consumers read at own pace","<b>Use for:</b> Event sourcing, real-time analytics, data pipelines, CDC","<b>Examples:</b> Kafka, AWS Kinesis, Pulsar","<b>Compaction:</b> Alternative to time-based retention. Keep only LATEST value per key. Like a snapshot table. Great for changelogs (latest state per user/entity)","<b>Exactly-once semantics:</b> Idempotent producer (dedup at broker) + transactional consumer (read-process-write atomically). enable.idempotence=true + transactions API","<b>Consumer lag:</b> Difference between latest offset and consumer offset. If lag growing → consumer too slow. Alert on this metric. Scale up consumers (up to partition count)","<b>Schema Registry:</b> Confluent Schema Registry enforces Avro/Protobuf schemas. Producers/consumers agree on format. Schema evolution (add fields) without breaking consumers","<b>Kafka Connect:</b> Pre-built connectors for DB→Kafka (CDC) and Kafka→DB/ES/S3 (sink). No custom code needed for common integrations","<b>Consumer lag monitoring:</b> Lag = latest offset - consumer offset. Growing lag = consumer too slow. Alert on this metric. Scale up consumers (max = partition count). If lag keeps growing \u2192 add partitions + consumers","<b>Schema Registry:</b> Confluent Schema Registry enforces Avro/Protobuf schemas. Producers and consumers agree on format. Schema evolution rules: can add optional fields, cannot remove required fields. Prevents breaking changes","<b>Exactly-once semantics:</b> Idempotent producer (enable.idempotence=true, dedup at broker). Transactional consumer (read-process-write atomically). Both needed for true exactly-once. Most systems accept at-least-once + idempotency instead (simpler)","<b>Change Data Capture (CDC):</b> Kafka Connect reads DB binlog (every INSERT/UPDATE/DELETE) \u2192 publishes to Kafka topic. Downstream consumers (Elasticsearch, cache, analytics) stay in sync with DB. THE cleanest way to sync data across systems"],vs:["Kafka vs RabbitMQ (Message Queue)"]},
{t:"Protocols",req:"How services talk — choose based on latency, direction, and who's calling",b:["<b>REST:</b> HTTP, stateless. Default for public APIs. GET /users/123","<b>gRPC:</b> Binary protobuf. 10× faster. Internal service-to-service","<b>GraphQL:</b> Client picks fields. Reduces over-fetching. Good for mobile","<b>WebSocket:</b> Persistent bidirectional. Chat, gaming, live collab","<b>SSE:</b> Server→client one-way push. Live scores, notifications","<b>Long Polling:</b> Client holds request, server responds when data ready. WebSocket fallback","<b>gRPC streaming:</b> 4 patterns: Unary (1 req, 1 resp), Server streaming (1 req, N resp), Client streaming (N req, 1 resp), Bidirectional (N req, N resp). Chat = bidirectional","<b>REST pagination:</b> Cursor-based for feeds, offset-based for admin pages. Always include: next_cursor, has_more, total_count in response","<b>GraphQL N+1 problem:</b> Naive implementation: 1 query for posts + N queries for each post author. Fix: DataLoader (batch + cache). Critical for performance","<b>Webhooks:</b> Server calls YOUR endpoint on events. Register callback URL. Include: HMAC signature for verification, retry with backoff on failure, idempotency key","<b>gRPC internals:</b> HTTP/2 multiplexing (multiple requests on single TCP connection). Protobuf binary serialization (10x smaller than JSON). Bidirectional streaming. Generated client/server code from .proto file. Strict schema contract","<b>GraphQL N+1 problem:</b> Naive: 1 query for posts + N queries for each post author = N+1 DB calls. Fix: DataLoader (batch + cache). Collects all author_ids \u2192 one batch query. CRITICAL for GraphQL performance","<b>Webhook patterns:</b> Register callback URL with service. Event happens \u2192 service POSTs to your URL. Include: HMAC signature (verify sender), retry with exponential backoff, idempotency key. You must return 200 within 5 seconds"],vs:["REST vs gRPC vs GraphQL","WebSocket vs SSE vs Long Polling"]},
]},
{section:"Data Management",items:[
{t:"Replication",req:"Keep copies on multiple servers for availability + read scaling",b:["<b>Master-Slave:</b> Master writes, slaves read. Promote slave if master dies","<b>Master-Master:</b> Both write. Need conflict resolution. Multi-region use","<b>Sync:</b> Slave confirms → consistent but slow (network roundtrip)","<b>Async:</b> Master doesn't wait → fast but may lose data. Most common","<b>Semi-sync:</b> At least 1 slave confirms. Balance of safety + speed","<b>Replication lag:</b> Delay between write and replica update → stale reads","<b>Split-brain:</b> Network partition → two masters accept writes → data diverges. DANGEROUS. Prevention: fencing (STONITH — shoot the other node in the head), quorum-based leader election","<b>Failover types:</b> Automatic (Sentinel/orchestrator detects + promotes in seconds) vs Manual (DBA promotes, safer but slower). Most production systems: automatic with human override","<b>Streaming replication:</b> PostgreSQL WAL (Write-Ahead Log) streamed to replicas in real-time. Sub-second lag typically. WAL = complete record of all changes","<b>Read-your-writes consistency:</b> After user writes, route their reads to primary (not replica) for a few seconds. Others can read from replicas. Avoids user seeing stale own data","<b>Streaming replication (PostgreSQL):</b> Master streams WAL records to replicas in real-time. Sub-second lag typically. Replica applies WAL records continuously. Can query replica while it is being updated. Hot standby","<b>Read-your-writes implementation:</b> After user writes \u2192 set cookie/header: read_from_primary=true, expires=5s. Next requests within 5s routed to master. After 5s \u2192 back to replicas. Simple, effective, minimal primary load","<b>Failover automation:</b> PostgreSQL: Patroni (automatic failover + HA). MySQL: Orchestrator, MHA. Redis: Sentinel. All use: health checks + leader election + automatic promotion. Manual intervention = minutes of downtime. Automated = seconds"],vs:["Sync vs Async Replication","Master-Slave vs Master-Master"]},
{t:"Sharding / Partitioning",req:"Split data across DBs when single instance can't handle load",b:["<b>Horizontal:</b> Different rows in different DBs","<b>Vertical:</b> Different tables in different DBs (users DB ≠ orders DB)","<b>Good shard keys:</b> user_id (even, query-efficient), order_id+time","<b>Bad keys:</b> Country (skewed), name first letter (uneven)","<b>Problems:</b> Cross-shard joins (expensive!), rebalancing, distributed txns","<b>Rule:</b> Try replicas + caching FIRST. Shard only as last resort","<b>Resharding nightmare:</b> Adding new shard with hash(key)%N → EVERY key moves (N changes). With consistent hashing → only K/N keys move. This is why consistent hashing exists","<b>Cross-shard aggregation:</b> COUNT(*), SUM(), AVG() across shards = query each shard + merge in application. Expensive. Pre-compute aggregates in separate analytics DB","<b>Shard-local transactions:</b> Design schema so transactions only touch one shard. User + user orders on same shard (shard by user_id). Never need cross-shard transaction","<b>Proxy-based sharding:</b> App talks to proxy (Vitess for MySQL, Citus for PostgreSQL). Proxy routes to correct shard. App code unchanged. Proxy handles splitting/merging shards","<b>Scaling order (try each before next):</b> 1) Query optimization + indexes → 2) Vertical scale (bigger machine) → 3) Read replicas → 4) Caching → 5) Vertical sharding (separate tables) → 6) Horizontal sharding (last resort)"],vs:["Horizontal vs Vertical Sharding","Range vs Hash Partitioning"]},
{t:"Consistent Hashing",req:"Distribute data so adding/removing a node only moves minimal data — not everything",b:["<b>Hash ring:</b> Servers on circle. Data → hash → next server clockwise","<b>Add node:</b> Only keys between prev and new node move. NOT all","<b>Virtual nodes:</b> 100-200 positions per server = even distribution","<b>Used in:</b> Cassandra, DynamoDB, distributed caches, CDNs","<b>Without virtual nodes problem:</b> 3 physical servers on ring → very uneven distribution (some servers get 10x more data). Large gaps between servers","<b>Virtual nodes fix:</b> Each physical server gets 100-200 virtual positions spread across ring. Distribution becomes nearly uniform. More vnodes = more even but more memory for ring metadata","<b>Weighted virtual nodes:</b> Powerful servers get more virtual positions → handle more data proportionally. Server with 2x RAM gets 2x virtual nodes","<b>Ring rebalancing:</b> New node joins → gets some virtual nodes from existing nodes → those key ranges migrate. Can be done online (live migration) with zero downtime","<b>In HLD say:</b> We use consistent hashing with 200 virtual nodes per server for even distribution. Adding a new cache node migrates only 1/N of the keys, not all"]},
]},
{section:"Reliability",items:[
{t:"Rate Limiter",req:"Max requests per user/IP/endpoint per time window — prevent abuse + protect servers",b:["<b>Token Bucket:</b> Fills at rate R. Each req costs 1 token. Empty=reject. ALLOWS BURSTS","<b>Leaky Bucket:</b> Fixed output rate. Smooths traffic. Overflow=drop","<b>Sliding Window:</b> Rolling count. Most accurate. Memory-heavy","<b>Fixed Window:</b> Count per interval. Simple but spike at boundary","<b>Implement:</b> API Gateway + Redis INCR + EXPIRE","<b>Response:</b> HTTP 429 + Retry-After header","<b>Sliding window counter (best balance):</b> current_window_count + (prev_window_count × overlap_percentage). Example: at 70% through current window, weight = 30% of previous + 100% of current. Smooth, low memory, accurate enough","<b>Rate limit headers:</b> X-RateLimit-Limit (max allowed), X-RateLimit-Remaining (left in window), X-RateLimit-Reset (when window resets, Unix timestamp), Retry-After (seconds to wait)","<b>Distributed rate limiting:</b> Race condition when 5 API gateways all check same user simultaneously. Solution: Redis Lua script for atomic read-check-increment. Or: accept slight over-limit (soft limiting)","<b>IP vs User rate limiting:</b> By IP: catches unauthenticated abuse. By user/API-key: per-account limits (free=100/hr, paid=10K/hr). Use BOTH: IP limit at edge, user limit at gateway","<b>Distributed rate limiting with Lua:</b> Redis Lua script: read current count + check limit + increment if allowed + set expiry. ALL in one atomic operation. No race condition. Multiple API gateways share same Redis \u2192 consistent rate limiting across cluster","<b>Rate limit by tier:</b> Free tier: 100 req/hour, 1MB upload. Pro: 10K req/hour, 100MB upload. Enterprise: 100K req/hour, 1GB upload. Tier stored in user profile. Gateway looks up tier on every request. Return 402 Payment Required if user needs to upgrade"],vs:["Token Bucket vs Leaky Bucket vs Sliding Window"]},
{t:"Circuit Breaker + Retry",req:"Stop calling a failing service to prevent cascading failure. Retry safely with backoff",b:["<b>States:</b> CLOSED (normal) → OPEN (fail fast) → HALF-OPEN (test few)","<b>Cascade:</b> Without breaker, 1 slow service makes ALL services slow","<b>Fallback:</b> Return cached data or default when circuit open","<b>Retry:</b> Exponential backoff (1s, 2s, 4s, 8s). Add jitter to prevent thundering herd","<b>Idempotency:</b> Same request 2× = same result. Client sends unique key. Server checks","<b>Exponential backoff formula:</b> delay = min(base_delay × 2^attempt + random_jitter, max_delay). Example: 1s, 2.3s, 4.7s, 8.1s, cap at 30s. Jitter prevents synchronized retries from all clients","<b>Retry budget:</b> At service level, only allow 10-20% of total calls to be retries. If 30% of calls are retries → something is seriously wrong → stop retrying and alert","<b>Circuit breaker metrics:</b> Track: failure rate (last 10 calls), slow call rate (>2s), number of open/closed/half-open transitions. Expose in Grafana dashboard","<b>Bulkhead pattern:</b> Isolate service clients into separate thread pools. Payment thread pool (10 threads) separate from Search thread pool (20 threads). One slow service cannot exhaust all threads","<b>Idempotency key storage:</b> Redis SET key result EX 86400 NX. NX=only if not exists. EX=expire 24hrs. If SET fails → already processed → return cached result. Simple and effective"]},
{t:"Unique ID Generation",req:"Globally unique IDs across distributed systems without coordination bottleneck",b:["<b>UUID:</b> 128-bit random. No coordination. Not sortable. 36 chars","<b>Snowflake:</b> 64-bit = timestamp(41)+DC(5)+machine(5)+seq(12). Sortable! Fits in long","<b>ULID:</b> Like UUID but lexicographically sortable. 26 chars","<b>Auto-increment:</b> Simple but single point of failure","<b>Rule:</b> Use Snowflake when you need unique + time-sortable","<b>Snowflake timestamp overflow:</b> 41 bits of timestamp = ~69 years from epoch. If epoch is 2010, works until 2079. Enough for most systems","<b>Snowflake sequence:</b> 12 bits = 4096 IDs per millisecond per machine. If you need more, use more machine ID bits (trade machine count for throughput)","<b>Clock skew danger:</b> Snowflake depends on synchronized clocks. If clock goes backward → duplicate IDs! Mitigation: refuse to generate IDs when clock goes back (throw error) or wait until clock catches up","<b>In HLD say:</b> Snowflake IDs: 64-bit, time-sortable, no coordination needed, fits in DB bigint. 4096 IDs/ms/machine is plenty for our scale"],vs:["UUID vs Snowflake vs Auto-increment"]},
{t:"Chaos Engineering",req:"Deliberately break things in production to find weaknesses before they find you",b:["<b>Netflix Chaos Monkey:</b> Randomly kills EC2 instances in production. If your system can't handle one server dying, fix it NOW not during an outage","<b>Principles:</b> Define steady state (normal behavior). Hypothesize it will continue during experiment. Inject failure. Measure if steady state holds. If broken → fix it","<b>Types of failure injection:</b> Kill instances, inject network latency (200ms extra), blackhole traffic to a service, fill disk, corrupt responses, cause CPU spikes","<b>Blast radius:</b> Start small (dev/staging). Increase gradually. Production chaos = most valuable but needs guardrails. Auto-abort if customer impact exceeds threshold","<b>GameDay:</b> Planned team exercise. 'What if Redis dies?' Run it. See what actually happens vs what docs say should happen. Document gaps. Fix. Repeat quarterly","<b>In HLD say:</b> We run Chaos experiments monthly: kill random pods, inject 500ms latency to DB calls, test failover time. Validates our circuit breakers and retry logic actually work"]},
{t:"Distributed Locking",req:"Ensure only one process executes critical section across multiple servers — prevent race conditions",b:["<b>The problem:</b> 3 servers process same payment simultaneously → triple charge. Need a way to ensure only ONE server processes it at a time","<b>Redis SETNX:</b> SET lock_key unique_value NX EX 30. NX=only if not exists. EX=expire 30s (prevents deadlock if holder crashes). Simple and fast","<b>Unlock safely:</b> Must check value matches before deleting (prevent deleting someone else's lock). Use Lua script: if GET == my_value then DEL. Atomic","<b>Redlock algorithm:</b> Lock across N Redis instances (e.g., 5). Must acquire majority (3/5) within time limit. Survives single Redis failure. More complex but more reliable","<b>Problems:</b> Lock holder pauses (GC, network), lock expires, another process acquires → both think they have lock. Fix: fencing tokens (monotonically increasing, reject stale tokens)","<b>Zookeeper alternative:</b> Ephemeral sequential nodes. Lowest number = lock holder. If holder dies, ephemeral node auto-deleted. Others watch and compete. Stronger guarantees than Redis","<b>In HLD say:</b> Redis distributed lock (SETNX + TTL) for payment dedup. If Redis lock fails, reject rather than double-process. Fencing token for additional safety"]},
{t:"Backpressure & Flow Control",req:"When producers overwhelm consumers — how to slow down gracefully instead of crashing",b:["<b>The problem:</b> Producer generates 10K events/sec. Consumer processes 5K/sec. Queue grows unbounded → OOM → crash. Need feedback mechanism","<b>Queue depth monitoring:</b> Alert when queue exceeds threshold. If Kafka consumer lag growing → scale consumers. If still growing → slow producers","<b>Rejection:</b> Queue full → reject new messages with 503/429. Producer retries later. Simple but lossy","<b>Load shedding:</b> Under overload, drop LOW-priority work first. Keep processing high-priority. Better than crashing everything","<b>Rate-limit producers:</b> Quota per producer. Each gets fair share. One abusive producer can't exhaust shared queue","<b>Adaptive throttling:</b> Consumer measures its throughput. Publishes capacity metric. Producer reads capacity → adjusts send rate dynamically. Self-regulating system","<b>In HLD say:</b> Kafka consumers monitor lag via Prometheus. If lag exceeds 5 min → auto-scale consumer group. If lag exceeds 15 min → drop low-priority events, alert team"]},
]},
{section:"Architecture",items:[
{t:"Microservices",req:"Small independent services — each with own DB, team, deployment. Communicate via API/events",b:["<b>Communication:</b> REST/gRPC (sync) + Kafka/MQ (async events)","<b>Service Discovery:</b> Consul, Eureka, K8s DNS — how services find each other","<b>Pros:</b> Independent scale, fault isolation, tech flexibility, team autonomy","<b>Cons:</b> Network latency, distributed txns, debugging complexity, operational cost","<b>Rule:</b> Start monolith. Extract services as team grows. Don't start micro","<b>Service mesh (Istio/Linkerd):</b> Infrastructure layer handling service-to-service communication. Sidecar proxy per pod handles: mTLS encryption, load balancing, circuit breaking, retries, observability. App code unchanged","<b>Event-driven communication:</b> Services publish events to Kafka (OrderCreated, PaymentProcessed). Other services subscribe. Loose coupling — publisher does not know or care about subscribers","<b>Database per service:</b> THE key rule. Never share databases between services. If Service A needs Service B data → call B API or listen to B events. Shared DB = coupled monolith in disguise","<b>Distributed tracing:</b> Single request crosses 5+ services. Jaeger/Zipkin propagates trace_id in headers. Visualize: which service is slow? where did the error happen? Essential for debugging","<b>Strangler fig pattern:</b> Migrate monolith to microservices gradually. Route specific URLs to new service, rest to monolith. Over time, more routes go to services until monolith is empty","<b>In HLD say:</b> Start monolith. When Feed Service hits 10x the traffic of User Service, extract it. Use Kafka for event-driven communication between services. Each owns its own DB","<b>Strangler Fig pattern:</b> Migrate monolith to microservices GRADUALLY. Route specific URLs to new service, rest to monolith. Over months, more routes go to new services. Eventually monolith is empty. Zero big-bang migration risk","<b>Event-driven architecture:</b> Services communicate via events (Kafka). OrderService publishes OrderCreated. PaymentService subscribes. InventoryService subscribes. LOOSE coupling \u2014 publisher does not know or care about subscribers. Add new consumer without changing producer","<b>Distributed tracing:</b> Single request crosses 5+ services. Jaeger/Zipkin propagates trace_id in HTTP headers. Visualize: which service is slow? Where did error happen? Trace shows full request journey with timing per service. ESSENTIAL for debugging microservices"],vs:["Monolith vs Microservices"]},
{t:"CQRS + Event Sourcing",req:"CQRS: separate read/write models. Event Sourcing: store changes as events, not just current state",b:["<b>CQRS Write:</b> Normalized SQL for consistency","<b>CQRS Read:</b> Denormalized NoSQL/cache for speed","<b>Sync:</b> Write events → queue → read model updated async","<b>Event Sourcing:</b> Store every change as event (deposit 200, withdraw 100) not just state (balance=100)","<b>Replay:</b> Rebuild any state by replaying events. Perfect audit trail","<b>Snapshots:</b> Save state periodically so you don't replay from start","<b>When NOT to use event sourcing:</b> Simple CRUD apps, when audit trail not required, when team is small. Adds significant complexity. Use only when replay/audit is genuinely needed","<b>Projection rebuilding:</b> Read model (projection) broke or needs new schema? Drop it, replay ALL events from beginning → rebuilt read model. This is the killer feature of event sourcing","<b>Eventual consistency gap:</b> Write happens → event published → read model updated async. Gap = milliseconds to seconds. User writes a comment, refreshes page → might not see it. Fix: read-your-writes from write DB after own writes"]},
{t:"Saga Pattern",req:"Distributed transactions across microservices — each step has a compensating undo",b:["<b>Choreography:</b> Each service listens for events. Simple but hard to trace","<b>Orchestration:</b> Central coordinator. Easier to manage + debug","<b>Example:</b> Order → Payment → Inventory. If inventory fails → refund → cancel","<b>Choreography detail:</b> OrderService emits OrderCreated → PaymentService listens → charges card → emits PaymentCompleted → InventoryService listens → reserves stock → emits InventoryReserved → OrderService listens → marks order confirmed","<b>Orchestration detail:</b> SagaOrchestrator: step1=createOrder() → step2=chargePayment() → step3=reserveInventory(). Each step has compensate: cancelOrder(), refundPayment(), releaseInventory(). On failure at step3, run compensate(step2), compensate(step1)","<b>Compensating transactions are NOT rollback:</b> They are NEW forward transactions that undo the effect. Refund is a new credit transaction, not deleting the original debit. Both entries exist in ledger","<b>Saga timeout:</b> If a step takes too long (payment gateway hangs), saga orchestrator has timeout → triggers compensation after timeout. Prevents orders stuck in limbo forever","<b>In HLD say:</b> Orchestrated saga for checkout: create order → reserve inventory → process payment. If payment fails → release inventory → cancel order. Each step is idempotent with compensation"]},
{t:"CAP Theorem + Consistency",req:"With network partitions (guaranteed), choose between Consistency (CP) or Availability (AP)",b:["<b>C:</b> Every read = latest write. <b>A:</b> Every request gets response. <b>P:</b> Survives network splits","<b>CP:</b> May reject during partition. HBase, MongoDB, Zookeeper","<b>AP:</b> May serve stale data. Cassandra, DynamoDB, CouchDB","<b>Strong consistency:</b> All reads = latest. Slow. Payments","<b>Eventual consistency:</b> Converges over time. Fast. Feeds, likes, views","<b>Read-your-writes:</b> User sees own writes immediately. Others may lag","<b>Quorum:</b> W+R > N = consistency. Tune W,R for speed vs accuracy","<b>PACELC extension:</b> During Partition → choose Availability or Consistency. ELSE (normal operation) → choose Latency or Consistency. DynamoDB: PA/EL (available + low latency). HBase: PC/EC (consistent always)","<b>Tunable consistency (Cassandra):</b> Per-query consistency level. READ ONE (fast, stale OK), READ QUORUM (balanced), READ ALL (slow, always fresh). Same for writes. Choose per use case, not globally","<b>Linearizability:</b> Strongest consistency. Every operation appears to happen at a single point in time. Like a single-server illusion. Very expensive. Used by: Zookeeper, etcd","<b>PACELC extension:</b> During Partition \u2192 choose A or C. ELSE (normal operation) \u2192 choose Latency or Consistency. DynamoDB = PA/EL (available + low latency). HBase = PC/EC (consistent always). More nuanced than basic CAP","<b>Linearizability:</b> Strongest consistency model. Every operation appears to happen at a single point in time. Like a single-server illusion. Very expensive (coordination overhead). Used by: Zookeeper, etcd for critical coordination"],vs:["CP vs AP","Strong vs Eventual Consistency"]},
{t:"Fan-out Strategies",req:"How to deliver posts to followers' feeds — the core of any social platform design",b:["<b>Fan-out on Write (Push):</b> Post → write to all followers' feeds instantly. Read = fast. Problem: celebrity = 100M writes","<b>Fan-out on Read (Pull):</b> Open feed → query all followed users. No wasted writes. Problem: read = slow (merge+sort)","<b>Hybrid (THE answer):</b> Push for regular users (< 10K followers). Pull for celebrities. Instagram/Twitter use this","<b>Feed ranking integration:</b> After fan-out populates feed cache, ML model re-ranks on read. Feed items scored by: affinity, recency, predicted engagement. Re-sort before serving","<b>Pre-computed feed storage:</b> Redis ZADD feed:user123 {timestamp} {post_id}. ZREVRANGEBYSCORE for latest N. Keep max 500-1000 items per feed. Older = fetch from DB archive","<b>Fan-out worker design:</b> Kafka consumer reads new post event → fetch follower list from cache → batch-write to Redis sorted sets (pipeline 1000 ZADD commands per batch for throughput)","<b>Unfollow handling:</b> When A unfollows B, remove B posts from A feed? Usually no — too expensive. Just stop future fan-out. Old posts age out naturally via feed size limit","<b>In HLD say:</b> Hybrid fan-out: post event → Kafka → fan-out workers write to followers Redis feeds (for users < 10K followers). Celebrity posts pulled on-demand at read time and merged","<b>Fan-out worker design:</b> Kafka consumer reads new-post event \u2192 fetch follower list from Redis (SMEMBERS followers:user_id) \u2192 pipeline batch ZADD commands (1000 per batch) \u2192 5000 followers = 5 batches = 5 Redis round-trips = ~50ms total. Fast even for popular users","<b>Unfollow handling:</b> User A unfollows B. Do NOT remove B old posts from A feed (too expensive to scan). Just stop future fan-out. Old posts age out naturally via feed size limit (500 cap). Simple, eventually correct","<b>New user cold start:</b> No follows yet = empty feed. Show: trending posts, popular in your region, recommended accounts to follow. As user follows people, feed populates naturally via fan-out. First follow = first posts appear"],vs:["Push vs Pull (Fan-out)"]},
{t:"Database Per Service",req:"Each microservice owns its database — THE fundamental rule of microservice architecture",b:["<b>The rule:</b> Service A NEVER directly reads Service B database. Period. Even if it's just one simple query. Call B API or consume B events","<b>Why:</b> Shared DB = coupled monolith in disguise. Can't deploy independently, can't scale independently, can't change schema without coordinating","<b>Data duplication:</b> Yes, data is duplicated across services. That is OK. OrderService stores customer_name (denormalized). Updates via Kafka events from UserService","<b>Cross-service queries:</b> Dashboard needs data from 5 services → API Gateway aggregates. Or: materialized view built from Kafka streams consuming all services' events","<b>Polyglot persistence:</b> Each service picks best DB. Users: PostgreSQL. Messages: Cassandra. Search: Elasticsearch. Recommendations: Neo4j. Sessions: Redis. No single DB for all","<b>In HLD say:</b> Each service owns its DB. UserService uses PostgreSQL. Feed uses Redis sorted sets. Messages use Cassandra. Search uses Elasticsearch. Synced via Kafka CDC"]},
{t:"Zero-Downtime Deployments",req:"Deploy new code without any user seeing errors or downtime — essential for production systems",b:["<b>Rolling update:</b> Replace instances one at a time. Old instance drains connections → new instance starts → health check passes → receives traffic. K8s default","<b>Blue-Green:</b> Two identical environments. Blue=current, Green=new. Deploy to Green. Test. Switch traffic (DNS/LB). Instant rollback: switch back to Blue","<b>Canary:</b> Route 5% traffic to new version. Monitor error rate + latency for 10 min. Good? Increase to 25%, 50%, 100%. Bad? Route 100% back to old. Minimal blast radius","<b>Database migrations:</b> Backward-compatible only! Add column → deploy new code that uses it → remove old column later. Never rename/remove in same deploy","<b>Feature flags:</b> Deploy code with feature OFF. Gradually enable for users. If broken → toggle OFF instantly (no redeploy needed). LaunchDarkly, Unleash, custom Redis flags","<b>In HLD say:</b> Canary deployment: 5% → 25% → 50% → 100% with automated rollback if P99 latency increases >20% or error rate exceeds 0.5%"]},
]},

{section:"Search & Processing",items:[
{t:"Elasticsearch Deep Dive",req:"Full-text search engine with inverted index — find documents containing specific words across millions of records in milliseconds",b:["<b>Inverted index:</b> word → [doc_id1, doc_id2, ...]. Like a book index page. Lookup = O(1) hash table","<b>BM25 ranking:</b> Improved TF-IDF. Considers: term frequency in doc, inverse doc frequency, doc length normalization. THE default algorithm","<b>Analyzers:</b> Tokenize + normalize text. 'Running quickly' → ['run', 'quick'] via stemming + stop-word removal","<b>Fuzzy search:</b> 'databse' matches 'database'. Edit distance ≤ 2. Levenshtein algorithm","<b>Autocomplete:</b> Edge n-gram tokenizer. 'database' → ['d','da','dat','data',...]. Instant prefix match","<b>Architecture:</b> Cluster of nodes. Index → shards → replicas. Query scatter-gathers across shards, merges results","<b>NOT a primary DB:</b> Sync data from main DB via: Kafka CDC (recommended), dual writes (risky), batch ETL","<b>In HLD:</b> 'Product search uses Elasticsearch with BM25 ranking, synced from PostgreSQL via Kafka CDC with ~1 sec lag'"]},
{t:"Stream vs Batch Processing",req:"Stream = process data as it arrives (real-time). Batch = process large datasets periodically (hourly/daily)",b:["<b>Stream processing:</b> Apache Flink, Kafka Streams, Spark Streaming. Process events in real-time (seconds latency)","<b>Use for:</b> Fraud detection, trending topics, live dashboards, real-time recommendations, alerting","<b>Windowing:</b> Tumbling (fixed non-overlapping), Sliding (overlapping), Session (gap-based). E.g., count clicks per 5-min window","<b>Batch processing:</b> Hadoop MapReduce, Apache Spark. Process TB/PB datasets. Hours latency but thorough","<b>Use for:</b> Daily reports, data warehouse ETL, ML model training, log analysis, reconciliation","<b>Lambda architecture:</b> Run BOTH batch (accurate but slow) + stream (fast but approximate). Merge results. Complex but common","<b>Kappa architecture:</b> Stream ONLY. Replay Kafka for reprocessing instead of separate batch. Simpler. Growing in adoption","<b>In HLD:</b> 'Trending topics use Kafka Streams with 5-min sliding windows. Daily analytics use Spark batch jobs'"],vs:["Stream vs Batch Processing"]},
{t:"Bloom Filter",req:"Probabilistic data structure — says definitely NOT in set or MAYBE in set. Never false negatives. Space-efficient",b:["<b>How:</b> Bit array (M bits) + K hash functions. Add: hash K times → set those bits. Check: hash K times → all bits set? maybe yes. Any bit 0? definitely no","<b>False positives:</b> May say yes when item NOT present (different items set same bits). Rate tunable: more bits + more hashes = lower FP rate","<b>False negatives:</b> NEVER happens. If Bloom says no, item is 100% not in set","<b>Size:</b> ~10 bits per element for 1% false positive rate. 1M elements = 1.25 MB. Tiny vs storing actual elements","<b>Use cases:</b> Cache penetration prevention (check before hitting DB), web crawler URL dedup, spam filter, CDN content check, weak password detection","<b>Cannot delete:</b> Setting bit to 0 would affect other items. Counting Bloom Filter uses counters instead of bits to support deletion","<b>In HLD:</b> 'Bloom filter in front of DB prevents cache penetration — if key definitely not in DB, we skip the query entirely'"]},
{t:"API Pagination Strategies",req:"Return large result sets in chunks — three approaches with different performance and UX tradeoffs",b:["<b>Offset:</b> GET /posts?offset=20&limit=10. Simple. But: slow for large offsets (DB scans+skips), inconsistent if new items added during pagination","<b>Cursor:</b> GET /posts?cursor=eyJpZCI6MTIz&limit=10. Cursor = encoded position (last seen ID). Fast (uses index), consistent. Can't jump to page N","<b>Keyset:</b> GET /posts?after_id=123&limit=10. WHERE id > 123 ORDER BY id LIMIT 10. Very fast, same as cursor but key is the actual value","<b>Choose:</b> Infinite scroll → cursor. Admin table with pages → offset. Large API → keyset. Most modern APIs use cursor","<b>In HLD:</b> 'Cursor-based pagination for feed API — handles real-time inserts consistently and performs well even deep in the feed'"]},
{t:"Consensus & Leader Election",req:"How distributed nodes agree on a value (who is leader, what order events happened) despite failures",b:["<b>Why:</b> DB primary election, distributed locks, transaction ordering, configuration agreement","<b>Raft:</b> Leader elected by majority vote. Leader appends to log, replicates to followers. If leader dies, new election in seconds. Used by: etcd, CockroachDB, Consul","<b>Paxos:</b> Theoretical foundation. Provably correct but hard to implement. Most use Raft instead","<b>Zookeeper:</b> Coordination service for leader election, distributed locks, config, service discovery. Uses ZAB consensus","<b>etcd:</b> Distributed KV store, Raft-based. Used by Kubernetes for ALL cluster state. Strong consistency","<b>In HLD:</b> 'Leader election via etcd with Raft. Exactly one processing node is leader at any time, failover in seconds'"]},
{t:"Monitoring & Observability",req:"You cannot fix what you cannot see — every production system needs metrics, logs, traces, and alerts",b:["<b>Three pillars:</b> Metrics (numbers: QPS, latency, errors), Logs (text: request details, errors), Traces (request journey across services)","<b>Metrics:</b> Prometheus + Grafana. Track: P50/P95/P99 latency, QPS, error rate, CPU/memory, queue depth, cache hit ratio","<b>Logging:</b> ELK (Elasticsearch + Logstash + Kibana). Structured JSON logs with: request_id, user_id, timestamp, action, duration, status","<b>Distributed tracing:</b> Track single request across 10+ microservices. See where time spent. Jaeger, Zipkin, AWS X-Ray","<b>Alerting:</b> PagerDuty/OpsGenie. Alert on: error rate > 1%, P99 > 500ms, queue growing, disk > 80%, health check fail","<b>SLI/SLO/SLA:</b> SLI = metric (P99 latency). SLO = target (P99 < 200ms). SLA = contract (99.9% uptime)","<b>Health checks:</b> /health endpoint returns 200. LB uses it. K8s liveness + readiness probes","<b>In HLD:</b> ALWAYS mention in wrap-up: 'Prometheus metrics, ELK logs, Jaeger traces, PagerDuty alerts on SLO breach'"]},
{t:"Gossip Protocol",req:"Decentralized node-to-node communication — each node tells random peers, info spreads like a virus in O(log N) rounds",b:["<b>How:</b> Every T seconds, each node picks random peer → exchange state (who is alive, membership, data versions)","<b>Failure detection:</b> No heartbeat from node B in X seconds → suspected. After Y more seconds → marked dead. Others confirm via their own gossip","<b>Advantages:</b> No single point of failure (vs central heartbeat monitor). Scales to thousands of nodes. Partition-tolerant","<b>Convergence:</b> Info reaches all N nodes in O(log N) rounds. 1000 nodes ≈ 10 rounds ≈ seconds","<b>Used in:</b> Cassandra (membership), DynamoDB (health), Consul (service mesh), Redis Cluster (node status)"]},
]},

{section:"Deep Dive Concepts",items:[
{t:"OSI Layers (L1-L7)",req:"7 network layers \u2014 you only need L4 and L7 for interviews, but knowing the full picture helps",b:[
"<b>L7 \u2014 Application:</b> HTTP, HTTPS, WebSocket, gRPC, DNS, SMTP. THIS is where your API lives. ALB operates here \u2014 sees full URL, headers, cookies, body",
"<b>L6 \u2014 Presentation:</b> Encryption (TLS/SSL), compression (gzip), data format conversion. SSL termination happens at this layer",
"<b>L5 \u2014 Session:</b> Manages connections/sessions. WebSocket sessions, TCP session tracking, login sessions",
"<b>L4 \u2014 Transport:</b> TCP (reliable, ordered) and UDP (fast, unreliable). Port numbers live here. NLB operates at this level \u2014 sees only IP+port, makes routing decisions very fast",
"<b>L3 \u2014 Network:</b> IP addresses and routing between networks. Routers work here. DNS resolution, IP packet forwarding",
"<b>L2 \u2014 Data Link:</b> MAC addresses, switches, ethernet frames. Not relevant in HLD interviews",
"<b>L1 \u2014 Physical:</b> Cables, fiber optics, radio waves, electrical signals. Not relevant in HLD",
"<b>Interview shortcut:</b> Only mention L4 and L7. Say: L4 LB is fast but dumb (IP+port only). L7 LB is smart but slower (reads HTTP content, does path-based routing)"
]},
{t:"Weighted Round Robin",req:"Give powerful servers more traffic \u2014 assign weights proportional to server capacity",b:[
"<b>Normal Round Robin:</b> Server A \u2192 B \u2192 C \u2192 A \u2192 B \u2192 C. Equal share regardless of server power",
"<b>Weighted RR:</b> Server A (8 CPU) weight=5, Server B (4 CPU) weight=2, Server C (2 CPU) weight=1. A gets 5 of every 8 requests, B gets 2, C gets 1",
"<b>When to use:</b> Mixed hardware fleet (old + new machines). One server running background jobs too (lower weight). During canary deploy (new version weight=1, old weight=9 = 10% traffic)",
"<b>When NOT to use:</b> Cloud environments with identical instances \u2014 plain Round Robin is fine. Also bad when request processing times vary wildly (use Least Connections instead)",
"<b>Dynamic weight adjustment:</b> Some LBs auto-adjust weights based on server response time or health. Nginx Plus, HAProxy adaptive",
"<b>In HLD say:</b> We use weighted round robin during canary deployments \u2014 new version gets 5% weight initially, gradually increased to 100%"
]},
{t:"Sticky Sessions (In Depth)",req:"Same user always routed to same server \u2014 needed when session state is stored locally on the server",b:[
"<b>The problem:</b> User logs in on Server A. Session stored in A memory. Next request round-robins to Server B. B has no session \u2192 user sees login page again. Terrible UX",
"<b>Cookie-based (most common):</b> First request \u2192 LB picks Server A \u2192 LB sets cookie SERVERID=A in response. All future requests carry cookie \u2192 LB reads it \u2192 routes to A",
"<b>IP Hash:</b> hash(client_IP) % num_servers \u2192 always same server. Problem: corporate NAT = thousands of users share one IP \u2192 all hit same server. User switches WiFi to mobile \u2192 different IP \u2192 different server",
"<b>LB session table:</b> LB maintains internal map {user_token: server_id}. Most flexible but LB needs memory/state, becomes SPOF",
"<b>Why sticky sessions are BAD:</b> Server dies \u2192 all its sticky users lose sessions. Cannot scale horizontally easily (new server gets no sticky users). Uneven load (some servers get heavier users)",
"<b>THE BETTER SOLUTION \u2014 externalize sessions:</b> Store sessions in Redis (shared across all servers). ANY server can handle ANY user. No stickiness needed. This is what production systems do",
"<b>When sticky IS ok:</b> Legacy apps that cannot be refactored. WebSocket connections (inherently sticky to one server). Quick MVP before Redis is set up",
"<b>In HLD say:</b> We avoid sticky sessions by storing session state in Redis. Any app server can serve any user. If a server dies, users are seamlessly handled by another server with zero impact"
]},
{t:"SSL/TLS Termination",req:"Load Balancer handles all encryption/decryption \u2014 app servers only deal with plain HTTP internally",b:[
"<b>The problem:</b> HTTPS means every request is encrypted. Decrypting is CPU-expensive. If every app server does this, you waste CPU on crypto instead of business logic",
"<b>How it works:</b> User \u2190\u2500HTTPS(encrypted)\u2500\u2192 Load Balancer \u2190\u2500HTTP(plain)\u2500\u2192 App Servers. LB decrypts incoming, encrypts outgoing. App servers freed from crypto overhead",
"<b>Benefits:</b> App servers handle 2-3\u00d7 more requests (no crypto CPU). Certificates managed in ONE place (LB, not 50 servers). Easier cert renewal. LB can inspect HTTP content for L7 routing",
"<b>Security concern:</b> LB \u2192 app server traffic is plain HTTP. Fine within same VPC/private network. If cross-datacenter, use SSL re-encryption (LB \u2192 HTTPS \u2192 app server). Rare but exists",
"<b>Where it happens:</b> At L7 LB (ALB, Nginx) or at CDN edge (CloudFront, Cloudflare). CDN edge is even better \u2014 TLS handshake at nearest PoP (5ms) instead of origin (200ms)",
"<b>In HLD say:</b> SSL terminated at the ALB. Internal traffic is plain HTTP within our VPC. Certificates managed via AWS ACM with auto-renewal"
]},
{t:"HTTPS at Edge",req:"Terminate TLS at the nearest CDN edge server \u2014 saves 150ms+ per request compared to going all the way to origin",b:[
"<b>Without edge TLS:</b> User (Mumbai) \u2192 TLS handshake with origin (US) = 3 round trips \u00d7 150ms = 450ms JUST for encryption setup. Then actual request adds more. Total: ~750ms",
"<b>With edge TLS:</b> User (Mumbai) \u2192 TLS with CDN edge (Mumbai, 5km) = 3 round trips \u00d7 2ms = 6ms. CDN has cache? Serve in 20ms total. Miss? CDN \u2192 origin over warm persistent connection",
"<b>Why TLS is slow over distance:</b> TLS 1.2 needs 2 round trips, TLS 1.3 needs 1 round trip for handshake. Each round trip = network latency. Close server = fast handshake",
"<b>CDN edge connection reuse:</b> Edge \u2192 origin connection is persistent (keep-alive). No handshake per request. Can even be plain HTTP internally",
"<b>In HLD say:</b> TLS terminated at CloudFront edge. Users get sub-10ms TLS handshake from nearest PoP. Edge-to-origin uses persistent HTTPS connections"
]},
{t:"ACID (Story Explanation)",req:"Four guarantees that make database transactions safe \u2014 understand via the ATM bank transfer story",b:[
"<b>The ATM story:</b> Transfer \u20b910,000 from savings to checking. Step 1: deduct from savings. Step 2: credit to checking. What if power cuts after step 1?",
"<b>A \u2014 Atomicity (all or nothing):</b> BOTH steps succeed or NEITHER happens. Power cut after step 1? Entire transaction rolls back. Savings gets money back. Your \u20b910,000 is safe",
"<b>C \u2014 Consistency (rules never break):</b> Bank rule: no negative balances. Transfer \u20b910K from account with \u20b95K? Rejected. DB NEVER enters invalid state. Constraints, foreign keys always enforced",
"<b>I \u2014 Isolation (transactions are invisible to each other):</b> You and wife both check balance during transfer. Neither sees half-done state (money left savings but not reached checking). Both see before-state or after-state, never the middle",
"<b>D \u2014 Durability (committed = permanent):</b> ATM says transfer complete \u2192 server crashes 1 second later \u2192 on restart, transfer still there. Written to WAL (write-ahead log) on disk before confirming",
"<b>Without ACID:</b> Money vanishes (no atomicity), negative balances appear (no consistency), ghost reads of partial data (no isolation), data lost on crash (no durability). Banks collapse",
"<b>Cost of ACID:</b> Slower writes (must coordinate, write WAL, confirm to replicas). Harder to scale horizontally. This is WHY NoSQL trades ACID for speed/scale \u2014 BASE model",
"<b>In HLD say:</b> PostgreSQL with ACID for payment and order data \u2014 a partial transaction (money deducted but not credited) would be catastrophic. Feed data uses Cassandra with BASE \u2014 slight staleness is fine"
]},
{t:"W+R>N Quorum Explained",req:"How many replicas to write to (W) and read from (R) to guarantee consistency. The math that controls your consistency vs speed tradeoff",b:[
"<b>N = total replicas</b> (typically 3). W = replicas that must confirm a WRITE. R = replicas that must respond to a READ",
"<b>The rule:</b> If W+R > N, at least one replica in any read set was in the write set \u2192 that replica has fresh data \u2192 you get the latest value",
"<b>W=2, R=2, N=3:</b> W+R=4 > 3. Write to 2 nodes. Read from 2 nodes. Overlap guaranteed. BALANCED \u2014 most common production config",
"<b>W=3, R=1, N=3:</b> Write to ALL 3 (slow writes). Read from ANY 1 (fast reads). Good for read-heavy systems like product catalog",
"<b>W=1, R=3, N=3:</b> Write to 1 (fast writes). Read from ALL 3 (slow reads). Good for write-heavy systems like IoT sensor data",
"<b>W=1, R=1, N=3:</b> W+R=2 \u2264 3. NO consistency guarantee! May read from the one node that was NOT written to \u2192 stale data. Use only when staleness OK (analytics, view counts)",
"<b>W=3, R=3, N=3:</b> Strongest but slowest. Every node must participate. One node down = system unavailable. Use for critical financial data only",
"<b>The story:</b> 3 friends (replicas). Tell secret to W of them. Later ask R of them. If W+R > 3, at least one friend you ask was told the secret. Guaranteed!",
"<b>Tuning in Cassandra:</b> Consistency level is set PER QUERY. Write payment with QUORUM (W=2). Read feed with ONE (R=1). Different consistency for different data in same system",
"<b>In HLD say:</b> N=3 replicas across AZs. For payment writes W=2, R=2 (strong). For feed reads W=1, R=1 (fast, eventual). Tunable per use case"
]},
]},

{section:"Story Explanations",items:[
{t:"Message Queue (Restaurant Kitchen)",req:"Producer puts message in queue, consumer processes later \u2014 like a waiter putting order slips on the kitchen rail",b:[
"<b>Without queue (blocking):</b> Waiter takes order \u2192 runs to kitchen \u2192 STANDS THERE waiting while chef cooks \u2192 brings food \u2192 ONLY THEN takes next order. One slow dish = entire restaurant blocked",
"<b>With queue (async):</b> Waiter takes order \u2192 puts slip on ORDER RAIL (queue) \u2192 immediately takes next order. Kitchen picks up slips at own pace. Waiter is NEVER blocked",
"<b>Waiter = Producer:</b> Creates messages (orders). Does not wait for processing. Moves on immediately",
"<b>Order rail = Queue:</b> Stores messages in order. Buffers the gap between production speed and consumption speed",
"<b>Kitchen = Consumer:</b> Processes messages at own pace. If slow today, slips pile up but nothing is lost. When caught up, rail is empty",
"<b>Real example:</b> User places order on Flipkart \u2192 Order Service writes to DB + puts send_email message in SQS \u2192 responds instantly to user. Email Service picks up message 2 sec later. User never waited for email",
"<b>If consumer dies:</b> Messages pile up in queue. When consumer recovers, processes backlog. Nothing lost (at-least-once delivery)",
"<b>Key insight:</b> Producer and consumer do NOT know each other exist. They only know the queue. That is DECOUPLING. Change email service? Order service unchanged"
]},
{t:"Kafka vs Queue (CCTV Camera)",req:"Queue = order rail (taken and discarded). Kafka = CCTV recording (permanent, anyone can rewatch from any point)",b:[
"<b>Message Queue = TODO list:</b> Task added \u2192 worker picks it up \u2192 completes it \u2192 task DELETED from list. Gone forever. One task, one worker",
"<b>Kafka = CCTV tape:</b> Camera records continuously. Security guard watches live. Manager rewatches yesterday. Police rewind to last Tuesday. NOBODY consumes the tape \u2014 it stays. Multiple viewers at different speeds",
"<b>Real example:</b> User clicks Add to Cart on Amazon \u2192 event written to Kafka topic. SAME event read by: Recommendation Service (update suggestions), Analytics (dashboard metrics), Fraud Detection (unusual pattern?), Data Lake (archive for ML). One event, four consumers, each at own pace",
"<b>Replay superpower:</b> Analytics service had a bug last week? Reset its offset to last Monday. Replay ALL events. Recompute correct metrics. Impossible with traditional queue (messages already deleted)",
"<b>When to use queue:</b> Simple async tasks (send email, resize image). One consumer per message. Message processed and done. RabbitMQ, SQS",
"<b>When to use Kafka:</b> Event log (audit trail). Multiple consumers need same data. Replay needed. High throughput (millions/sec). Stream processing",
"<b>One-liner:</b> Queue = task list (done = deleted). Kafka = event journal (permanent record, anyone can read from any point in time)"
]},
{t:"Docker (Shipping Container)",req:"Packages your app + ALL dependencies into one standardized box that runs IDENTICALLY everywhere",b:[
"<b>Before Docker (the problem):</b> App needs Python 3.11, specific libraries, certain Linux packages, env variables. Works on your laptop. Deploy to server? Different Python version, missing library. It works on my machine!",
"<b>The shipping container analogy:</b> Before standardized containers, loading ships was chaos \u2014 barrels, crates, bags, all different shapes. Then someone invented the standard 20-foot container. Ship/truck/crane all handle the same box. Contents irrelevant",
"<b>Docker Image:</b> Your App + Python 3.11 + all libraries + config files + OS dependencies = one sealed package. Build once, run anywhere",
"<b>docker build -t myapp . :</b> Package app into image. docker run myapp : Run anywhere (laptop, AWS, Azure, colleague machine) \u2014 works IDENTICALLY",
"<b>Dockerfile:</b> Recipe that defines the image. FROM python:3.11, COPY app code, RUN pip install, CMD start app. Reproducible builds every time",
"<b>Container vs VM:</b> VM = entire operating system (heavy, GB-sized, minutes to start). Container = shares host OS kernel (lightweight, MB-sized, starts in seconds)",
"<b>Real example:</b> Platina SegFormer needs PyTorch + CUDA + specific packages. Without Docker: 2 days server setup. With Docker: docker pull platina-segformer && docker run --gpus all \u2192 running in 30 seconds"
]},
{t:"Kubernetes (Ship Captain)",req:"Manages hundreds of Docker containers across dozens of servers \u2014 scheduling, scaling, healing, updating automatically",b:[
"<b>The problem Docker alone cannot solve:</b> 200 containers across 50 servers. Which container on which server? Crashed container \u2014 who restarts? Traffic spike \u2014 who adds more? New version \u2014 how to update without downtime?",
"<b>K8s = the captain managing your container fleet.</b> You DECLARE what you want. K8s makes it happen and KEEPS it that way",
"<b>You say:</b> I want 5 copies of API server, each with 2GB RAM. If any dies, replace it. If CPU > 80%, add more copies. K8s handles everything",
"<b>Scheduling:</b> K8s decides which server (node) has enough CPU/RAM \u2192 places container there. Bin-packing optimization",
"<b>Self-healing:</b> Container crashes \u2192 K8s detects via health check (/healthz endpoint) \u2192 kills + restarts in seconds. Automatically. No human needed",
"<b>Auto-scaling (HPA):</b> Traffic spike \u2192 CPU rising \u2192 K8s spins up more pods (containers). Traffic drops \u2192 scales back down. Saves money",
"<b>Rolling updates:</b> New version v2 \u2192 K8s replaces pods one-by-one (v1\u2192v2\u2192v1\u2192v2...). If v2 crashes \u2192 automatic rollback to v1. Zero downtime deploys",
"<b>Service discovery:</b> Containers find each other by NAME not IP. http://payment-service:8080 just works. K8s internal DNS resolves it",
"<b>Real example in HLD:</b> Our microservices run on K8s. Each service = Deployment with HPA auto-scaling. K8s handles health checks, restarts, rolling updates with zero downtime"
]},
{t:"Elasticsearch (Library Index Card)",req:"Full-text search engine using inverted index \u2014 find documents by words in milliseconds across billions of records",b:[
"<b>The library story:</b> 10 million books. Find all books mentioning distributed systems on any page. Without index: read every page of every book = years. With index card: look up word card, get book list, done in milliseconds",
"<b>Inverted index:</b> distributed \u2192 [Book#45 (pg12,87), Book#892 (pg3)]. systems \u2192 [Book#45 (pg12), Book#102 (pg7), Book#892 (pg3)]. Search both words \u2192 intersect lists \u2192 Book#45, Book#892",
"<b>Ranking (BM25):</b> Not just contains the word but HOW relevant. distributed appears 50 times in 100-page book \u2192 higher rank than once in 500 pages. Rare words score higher than common words (the, is)",
"<b>Analyzers:</b> Before indexing, clean text. Running quickly through DATABASES \u2192 [run, quick, databas]. Lowercase, stem words (running\u2192run), remove stop words (through, the). Now running matches run",
