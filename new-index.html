edge:"Network timeout ≠ failure (payment may have succeeded!) → check status before retrying | Double charge prevention → idempotency key (UUID per request) | Partial refund (refund ₹200 of ₹500 order) | Currency conversion for international | Daily/monthly limits per user | PCI compliance: never store full card numbers (tokenize) | Reconciliation: match bank statements with our records daily | Webhook notification on payment status change",
code:`const TxnStatus = { PENDING:'PENDING', SUCCESS:'SUCCESS', FAILED:'FAILED', REFUNDED:'REFUNDED' };

class Transaction {
  constructor(userId, amount, method, idempotencyKey) {
    this.id = 'TXN-' + Date.now();
    this.userId = userId; this.amount = amount;
    this.method = method; this.status = TxnStatus.PENDING;
    this.idempotencyKey = idempotencyKey;
    this.createdAt = Date.now();
  }
}

// Strategy: different payment methods
class CreditCardPayment {
  charge(amount, cardToken) {
    // Call payment gateway API (Stripe, Razorpay)
    return { success: true, gatewayRef: 'CC-' + Date.now() };
  }
  refund(gatewayRef, amount) {
    return { success: true };
  }
}

class UPIPayment {
  charge(amount, upiId) {
    return { success: true, gatewayRef: 'UPI-' + Date.now() };
  }
  refund(gatewayRef, amount) {
    return { success: true };
  }
}

class WalletPayment {
  constructor() { this.balances = new Map(); }
  charge(amount, userId) {
    const bal = this.balances.get(userId) || 0;
    if (bal < amount) return { success: false, error: 'Insufficient balance' };
    this.balances.set(userId, bal - amount);
    return { success: true, gatewayRef: 'WAL-' + Date.now() };
  }
  refund(gatewayRef, amount, userId) {
    this.balances.set(userId, (this.balances.get(userId)||0) + amount);
    return { success: true };
  }
}

class PaymentGateway {
  constructor() {
    this.transactions = new Map();
    this.idempotencyStore = new Map(); // key → transactionId
    this.methods = new Map([
      ['CREDIT_CARD', new CreditCardPayment()],
      ['UPI', new UPIPayment()],
      ['WALLET', new WalletPayment()]
    ]);
  }
  pay(userId, amount, methodType, idempotencyKey) {
    // Idempotency check
    if (this.idempotencyStore.has(idempotencyKey)) {
      return this.transactions.get(this.idempotencyStore.get(idempotencyKey));
    }
    const method = this.methods.get(methodType);
    const txn = new Transaction(userId, amount, methodType, idempotencyKey);
    this.transactions.set(txn.id, txn);
    this.idempotencyStore.set(idempotencyKey, txn.id);
    // Process
    const result = method.charge(amount, userId);
    txn.status = result.success ? TxnStatus.SUCCESS : TxnStatus.FAILED;
    txn.gatewayRef = result.gatewayRef;
    return txn;
  }
  refund(transactionId) {
    const original = this.transactions.get(transactionId);
    if (original.status !== TxnStatus.SUCCESS) throw new Error('Can only refund successful txn');
    const method = this.methods.get(original.method);
    const result = method.refund(original.gatewayRef, original.amount);
    if (result.success) original.status = TxnStatus.REFUNDED;
    return original;
  }
}`,
tip:"IDEMPOTENCY is the #1 concept. Same request sent twice → same result (no double-charge). Strategy pattern for payment methods. Timeout ≠ failure — always check status before retry. Never store raw card numbers (PCI). Double-entry ledger for accounting."},

{n:25,t:"Task Scheduler / Cron",
req:"Schedule tasks to run at specific times or intervals, priority-based execution, retry on failure",
classes:"<b>Entity:</b> Task (id, name, executeAt, interval, priority, status, retryCount, maxRetries, callback), ExecutionLog (taskId, startTime, endTime, status, error)<br><b>Service:</b> PriorityQueue (min-heap by executeAt), RetryService (exponential backoff), ExecutorService (run tasks with timeout)<br><b>Manager:</b> Scheduler (tasks[], add, cancel, run loop, processNextTask)",
flow:"<b>SCHEDULE:</b> Scheduler.schedule(task) → calculate first executeAt → insert into PriorityQueue (sorted by executeAt)<br><br><b>RUN LOOP:</b> Every second: check top of queue → if task.executeAt <= now: → dequeue → ExecutorService.run(task) → success? log + if recurring: reschedule (executeAt += interval) → failure? RetryService: retry count < max? exponential backoff → reschedule at now + 2^retryCount seconds. Else: mark FAILED + DLQ<br><br><b>CANCEL:</b> Scheduler.cancel(taskId) → mark as CANCELLED → remove from queue",
patterns:"<b>Strategy:</b> SchedulingStrategy — FixedRate (every N sec regardless), FixedDelay (N sec after completion), Cron expression parsing<br><b>Observer:</b> Notify on task completion/failure<br><b>Command:</b> Each Task is a Command object (encapsulates execution logic)<br><b>Priority Queue:</b> Min-heap for efficient next-task retrieval",
edge:"Task takes too long → timeout + kill + mark failed | System restart → persist scheduled tasks to recover | Clock skew in distributed system | Overlapping executions (previous run still going when next trigger fires) → skip or queue? | Resource exhaustion (100 tasks due at same time) → thread pool with bounded size | Task dependency (B runs only after A completes) | Timezone handling for cron expressions | Missed schedules (system was down) → run immediately or skip?",
code:`const TaskStatus = { SCHEDULED:'SCHEDULED', RUNNING:'RUNNING', COMPLETED:'COMPLETED', FAILED:'FAILED', CANCELLED:'CANCELLED' };

class Task {
  constructor(name, callback, executeAt, interval = null, priority = 5) {
    this.id = 'TASK-' + Date.now() + Math.random().toString(36).slice(2,5);
    this.name = name; this.callback = callback;
    this.executeAt = executeAt; this.interval = interval;
    this.priority = priority; this.status = TaskStatus.SCHEDULED;
    this.retryCount = 0; this.maxRetries = 3;
  }
  isRecurring() { return this.interval !== null; }
}

class MinHeap {
  constructor() { this.heap = []; }
  push(task) {
    this.heap.push(task);
    this._bubbleUp(this.heap.length - 1);
  }
  pop() {
    const top = this.heap[0];
    const last = this.heap.pop();
    if (this.heap.length > 0) { this.heap[0] = last; this._sinkDown(0); }
    return top;
  }
  peek() { return this.heap[0]; }
  size() { return this.heap.length; }
  _bubbleUp(i) {
    while (i > 0) {
      const parent = Math.floor((i-1)/2);
      if (this.heap[i].executeAt < this.heap[parent].executeAt) {
        [this.heap[i], this.heap[parent]] = [this.heap[parent], this.heap[i]];
        i = parent;
      } else break;
    }
  }
  _sinkDown(i) {
    while (true) {
      let smallest = i;
      const l = 2*i+1, r = 2*i+2;
      if (l < this.heap.length && this.heap[l].executeAt < this.heap[smallest].executeAt) smallest = l;
      if (r < this.heap.length && this.heap[r].executeAt < this.heap[smallest].executeAt) smallest = r;
      if (smallest !== i) {
        [this.heap[i], this.heap[smallest]] = [this.heap[smallest], this.heap[i]];
        i = smallest;
      } else break;
    }
  }
}

class Scheduler {
  constructor() {
    this.queue = new MinHeap();
    this.tasks = new Map();
    this.logs = [];
    this.running = false;
  }
  schedule(name, callback, delayMs, interval = null, priority = 5) {
    const task = new Task(name, callback, Date.now() + delayMs, interval, priority);
    this.queue.push(task);
    this.tasks.set(task.id, task);
    return task.id;
  }
  cancel(taskId) {
    const task = this.tasks.get(taskId);
    if (task) task.status = TaskStatus.CANCELLED;
  }
  start() {
    this.running = true;
    this._tick();
  }
  stop() { this.running = false; }
  _tick() {
    if (!this.running) return;
    const now = Date.now();
    while (this.queue.size() > 0 && this.queue.peek().executeAt <= now) {
      const task = this.queue.pop();
      if (task.status === TaskStatus.CANCELLED) continue;
      this._execute(task);
    }
    setTimeout(() => this._tick(), 100); // Check every 100ms
  }
  _execute(task) {
    task.status = TaskStatus.RUNNING;
    const start = Date.now();
    try {
      task.callback();
      task.status = TaskStatus.COMPLETED;
      this.logs.push({taskId: task.id, start, end: Date.now(), status: 'OK'});
      // Reschedule if recurring
      if (task.isRecurring()) {
        task.executeAt = Date.now() + task.interval;
        task.status = TaskStatus.SCHEDULED;
        this.queue.push(task);
      }
    } catch (e) {
      task.retryCount++;
      if (task.retryCount <= task.maxRetries) {
        // Exponential backoff
        task.executeAt = Date.now() + Math.pow(2, task.retryCount) * 1000;
        task.status = TaskStatus.SCHEDULED;
        this.queue.push(task);
      } else {
        task.status = TaskStatus.FAILED;
      }
      this.logs.push({taskId: task.id, start, end: Date.now(), status: 'FAIL', error: e.message});
    }
  }
}`,
tip:"Min-heap is THE data structure (O(log n) insert, O(1) peek next task). Recurring = reschedule after completion. Retry with exponential backoff. This combines data structures (heap) + design patterns (Command, Strategy) + real-world concerns (retry, timeout, persistence)."}
]}

// ==================== LLD RENDERING ====================
const lldSidebar=document.getElementById('lldSidebarList'),lldContent=document.getElementById('lldContentArea'),lldBreadcrumb=document.getElementById('lldBreadcrumb'),lldSearch=document.getElementById('lldSearch');
let activeLldIdx=0,activeLldItemIdx=0;

LLD.forEach((sec,si)=>{
  const el=document.createElement('div');el.className='s-topic'+(si===0?' active':'');
  const cnt=sec.isQuestions?sec.questions.length:sec.items.length;
  el.innerHTML=`${sec.section} <span class="cnt">${cnt}</span>`;
  el.onclick=()=>selLld(si);el.id='lst-'+si;lldSidebar.appendChild(el);
  const sub=document.createElement('div');sub.className='s-patterns';sub.id='lsp-'+si;
  const list=sec.isQuestions?sec.questions.map(q=>`Q${q.n}. ${q.t}`):sec.items.map(i=>i.t);
  list.forEach((name,ii)=>{const p=document.createElement('div');p.className='s-pat'+(si===0&&ii===0?' active':'');p.textContent=name;p.onclick=e=>{e.stopPropagation();selLldItem(si,ii)};p.id='lp-'+si+'-'+ii;sub.appendChild(p)});
  lldSidebar.appendChild(sub);
});

function selLld(si){document.querySelectorAll('#page-lld .s-topic').forEach(e=>e.classList.remove('active'));document.getElementById('lst-'+si).classList.add('active');selLldItem(si,0)}
function selLldItem(si,ii){activeLldIdx=si;activeLldItemIdx=ii;document.querySelectorAll('#page-lld .s-pat').forEach(e=>e.classList.remove('active'));const el=document.getElementById('lp-'+si+'-'+ii);if(el)el.classList.add('active');document.querySelectorAll('#page-lld .s-topic').forEach(e=>e.classList.remove('active'));document.getElementById('lst-'+si).classList.add('active');renderLld(si,ii);lldContent.scrollTop=0;const sec=LLD[si];const name=sec.isQuestions?sec.questions[ii]?.t:sec.items[ii]?.t;lldBreadcrumb.innerHTML=`${sec.section} <span>→ ${name||''}</span>`}

function renderLldQuestion(q,qi,totalQ){
  let html=`<div class="lld-walkthrough" id="lld-item-${qi}">`;
  html+=`<div class="lld-title-bar"><span class="lld-qnum">Q${q.n}</span>${q.t}</div>`;
  html+=`<div class="lld-walkthrough-body">`;

  // Mini-guide: collapsible 8-step template
  html+=`<div class="lld-mini-guide"><button class="lld-mini-guide-btn" onclick="this.parentElement.classList.toggle('open')"><span class="mg-arrow">▶</span> The 8-Step LLD Template — use this for every problem</button>`;
  html+=`<div class="lld-mini-guide-body">`;
  html+=`<div class="mg-step"><span class="mg-num">1.</span> What does user DO? <span class="mg-arrow-r">→</span> derive <span>METHODS</span></div>`;
  html+=`<div class="mg-step"><span class="mg-num">2.</span> What things EXIST? <span class="mg-arrow-r">→</span> derive <span>CLASSES</span></div>`;
  html+=`<div class="mg-step"><span class="mg-num">3.</span> Entity / Service / Manager <span class="mg-arrow-r">→</span> <span>classify</span> each class</div>`;
  html+=`<div class="mg-step"><span class="mg-num">4.</span> WHO owns WHAT method? <span class="mg-arrow-r">→</span> <span>THE key decision</span></div>`;
  html+=`<div class="mg-step"><span class="mg-num">5.</span> Write code <span class="mg-arrow-r">→</span> constructor + <span>methods</span></div>`;
  html+=`<div class="mg-step"><span class="mg-num">6.</span> What PATTERNS? <span class="mg-arrow-r">→</span> <span>Singleton, Strategy, Observer, Factory</span></div>`;
  html+=`<div class="mg-step"><span class="mg-num">7.</span> What can GO WRONG? <span class="mg-arrow-r">→</span> <span>edge cases</span></div>`;
  html+=`<div class="mg-step"><span class="mg-num">8.</span> How to EXTEND? <span class="mg-arrow-r">→</span> add feature <span>without changing</span> existing code</div>`;
  html+=`</div></div>`;

  // Step 1: THE PROBLEM
  html+=`<div class="lld-step-block"><div class="lld-step-header"><span class="step-num">1</span><span class="step-label">THE PROBLEM</span></div>`;
  html+=`<div class="step-desc">Read this once. Everything below is derived from this single statement.</div>`;
  html+=`<div class="lld-problem-box">${q.req}</div></div>`;

  // Step 2: What does user DO?
  html+=`<div class="lld-step-block"><div class="lld-step-header"><span class="step-num">2</span><span class="step-label">What does user DO?</span><span class="step-sub">→ derive methods from this</span></div>`;
  html+=`<div class="step-desc">Walk through the user journey step by step. Each user action becomes a method. Each step in the flow tells you WHO calls WHAT.</div>`;
  html+=`<div class="lld-flow">${q.flow}</div></div>`;

  // Step 3: What THINGS exist?
  html+=`<div class="lld-step-block"><div class="lld-step-header"><span class="step-num">3</span><span class="step-label">What THINGS exist?</span><span class="step-sub">→ Entity / Service / Manager</span></div>`;
  html+=`<div class="step-desc">Every noun from Step 1 is a potential class. Classify each: Entity = holds data + small self-methods. Service = business logic across multiple objects. Manager = orchestrates the full flow.</div>`;
  html+=`<div class="lld-classes">${q.classes}</div></div>`;

  // Step 4: The complete code
  html+=`<div class="lld-step-block"><div class="lld-step-header"><span class="step-num">4</span><span class="step-label">Complete Code</span><span class="step-sub">→ constructor + methods</span></div>`;
  html+=`<div class="step-desc">Rule: method needs only SELF data? → put it on that Entity. Needs BUSINESS rules or multiple objects? → Service. Coordinates a multi-step flow? → Manager.</div>`;
  html+=`<pre>${q.code}</pre></div>`;

  // Step 5: Design patterns & WHY
  html+=`<div class="lld-step-block"><div class="lld-step-header"><span class="step-num">5</span><span class="step-label">Design Patterns & WHY</span></div>`;
  html+=`<div class="step-desc">Don't just name the pattern — say WHY it fits. "Strategy because adding a new billing type tomorrow shouldn't change the ParkingLot class."</div>`;
  html+=`<div class="lld-patterns">${q.patterns}</div></div>`;

  // Step 6: Edge cases
  html+=`<div class="lld-step-block"><div class="lld-step-header"><span class="step-num">6</span><span class="step-label">What can GO WRONG?</span><span class="step-sub">→ edge cases</span></div>`;
  html+=`<div class="step-desc">Think: concurrent access (two users, same resource), resource exhaustion (full/empty), failures (payment fails, network down), invalid input, timeouts.</div>`;
  html+=`<div class="lld-edge">${q.edge}</div></div>`;

  // Step 7: What interviewer evaluates
  html+=`<div class="lld-step-block"><div class="lld-step-header"><span class="step-num">7</span><span class="step-label">What interviewer evaluates</span></div>`;
  html+=`<div class="step-desc">These are the signals that make the interviewer check "strong hire." Mention these points explicitly during your walkthrough.</div>`;
  html+=`<div class="lld-tip-box">${q.tip}</div></div>`;

  // Prev/Next navigation
  html+=`<div class="lld-nav">`;
  html+=`<button onclick="selLldItem(1,${qi-1})" ${qi===0?'disabled':''}>← ${qi>0?'Q'+(qi)+'. '+LLD[1].questions[qi-1].t:'Prev'}</button>`;
  html+=`<button onclick="selLldItem(1,${qi+1})" ${qi>=totalQ-1?'disabled':''}>Q${qi+2}. ${qi<totalQ-1?LLD[1].questions[qi+1].t:'Next'} →</button>`;
  html+=`</div>`;

  html+=`</div></div>`;
  return html;
}

function renderLld(si,ii){
  ii=ii||0;
  const sec=LLD[si];let html='';
  if(sec.isQuestions){
    const q=sec.questions[ii];
    if(!q){lldContent.innerHTML='';return}
    html=renderLldQuestion(q,ii,sec.questions.length);
  } else {
    html=`<div class="hld-section"><h2>${sec.section}</h2>`;
    sec.items.forEach((item,idx)=>{
      html+=`<div class="hld-card" id="lld-item-${idx}"><h3>${item.t}</h3>`;
      if(item.req)html+=`<div class="hld-req">🎯 ${item.req}</div>`;
      if(item.b){html+='<ul>';item.b.forEach(b=>html+=`<li>${b}</li>`);html+='</ul>';}
      html+='</div>';
    });
    html+='</div>';
  }
  lldContent.innerHTML=html;lldContent.scrollTop=0;
}

lldSearch.addEventListener('input',function(){
  const v=this.value.toLowerCase().trim();if(!v){renderLld(activeLldIdx,activeLldItemIdx);return}
  let html='';let f=0;
  LLD.forEach(sec=>{
    if(sec.isQuestions){sec.questions.forEach((q,qi)=>{
      const s=`${q.t} ${q.req} ${q.classes} ${q.flow} ${q.patterns} ${q.edge} ${q.code} ${q.tip}`.toLowerCase();
      if(s.includes(v)){f++;html+=renderLldQuestion(q,qi,sec.questions.length)}
    })}else{sec.items.forEach(item=>{
      const s=`${item.t} ${item.req||''} ${(item.b||[]).join(' ')}`.toLowerCase();
      if(s.includes(v)){f++;html+=`<div class="hld-card"><h3>${item.t}</h3>`;if(item.req)html+=`<div class="hld-req">🎯 ${item.req}</div>`;if(item.b){html+='<ul>';item.b.forEach(b=>html+=`<li>${b}</li>`);html+='</ul>';}html+='</div>'}
    })}
  });
  if(!f)html='<div style="text-align:center;padding:30px;color:#484f58">No results</div>';
  lldContent.innerHTML=html;
});

renderLld(0,0);lldBreadcrumb.innerHTML=`${LLD[0].section} <span>→ ${LLD[0].items[0].t}</span>`;


// ==================== AI & AGENTS ====================
const AI=[
{section:"Foundations",items:[
{t:"What is an AI Agent?",req:"LLM + Tools + Memory + Planning loop — autonomously completes multi-step tasks",b:["<b>Definition:</b> An AI agent is an LLM that can THINK (reason about task), ACT (call tools/APIs), OBSERVE (read results), and LOOP until task is complete. Not just Q&A — it takes actions","<b>Components:</b> 1) LLM brain (GPT-4, Claude, Gemini) 2) Tools (search, code execution, API calls, DB queries) 3) Memory (conversation history + long-term retrieval) 4) Planning (break task into steps)","<b>ReAct pattern:</b> Thought → Action → Observation → Thought → Action → ... until done. LLM decides WHICH tool to call and WITH WHAT parameters at each step. Most common agent pattern","<b>vs Simple LLM call:</b> ChatGPT answering a question = single LLM call. Agent booking a flight = 10+ LLM calls: search flights → compare → pick → fill form → confirm → send email. Multi-step autonomous","<b>Real examples:</b> Cursor/Claude Code (coding agent), Devin (software engineer agent), AutoGPT, customer support bots that actually resolve tickets by calling internal APIs","<b>Key insight for interviews:</b> Agent = LLM as the CONTROLLER/ORCHESTRATOR deciding what to do next. Tools = the actual capabilities. Memory = context persistence. Planning = task decomposition"]},
{t:"LLMs — How They Work (30-sec version)",req:"Know enough to sound intelligent, not enough to be an ML researcher",b:["<b>Transformer architecture:</b> Input text → tokenize → embeddings → self-attention layers (tokens relate to each other) → output probability of next token. That's it. Predicts ONE token at a time","<b>Training:</b> Phase 1: Pre-training on internet (learn language, facts, reasoning). Phase 2: RLHF/instruction tuning (learn to follow instructions, be helpful, be safe). Phase 3: Fine-tuning (optional, domain-specific)","<b>Context window:</b> How much text model can 'see' at once. GPT-4: 128K tokens (~300 pages). Claude: 200K tokens. Longer context = can read more docs but more expensive and slower","<b>Tokens:</b> Not words — subwords. 'unhappiness' = ['un', 'happiness']. ~4 chars per token in English. 1000 tokens ≈ 750 words. You're billed per token (input + output)","<b>Temperature:</b> Controls randomness. 0.0 = always pick most likely next token (deterministic). 1.0 = sample from distribution (creative, varied). For production extraction/classification: 0.0. For writing: 0.7","<b>Why they hallucinate:</b> Model predicts plausible-sounding text, NOT verified facts. If it hasn't seen specific info, it generates something that SOUNDS correct but isn't. RAG fixes this by grounding in real docs","<b>Emergent capabilities:</b> Chain-of-thought reasoning, in-context learning (learns from examples in prompt), instruction following — all emerge at scale. Small models can't do these reliably"]},
{t:"RAG (Retrieval Augmented Generation)",req:"Feed relevant documents to LLM at query time — eliminates hallucination, keeps knowledge current",b:["<b>The problem RAG solves:</b> LLM trained on data until 2024. Your company docs are private + updated daily. Can't retrain LLM every day. Solution: retrieve relevant docs at query time and include in prompt","<b>Pipeline:</b> User query → Embed query → Vector search (find similar docs) → Top-K results → Stuff into LLM prompt as context → LLM generates answer grounded in YOUR data","<b>Indexing (offline):</b> Documents → chunk into 500-token pieces → embed each chunk (OpenAI embeddings / sentence-transformers) → store vectors in vector DB (Pinecone, Weaviate, pgvector)","<b>Retrieval (online):</b> Query → embed → cosine similarity search in vector DB → top 5-10 most relevant chunks → add to prompt: 'Answer based on this context: {chunks}'","<b>Chunking strategies:</b> Fixed-size (500 tokens), sentence-based, paragraph-based, recursive (split by headers then paragraphs). Overlap 50-100 tokens between chunks to preserve context at boundaries","<b>Hybrid search:</b> Vector search (semantic: 'how to deploy' matches 'deployment steps') + keyword search (BM25: exact term matches). Combine scores with RRF (Reciprocal Rank Fusion). Better than either alone","<b>Reranking:</b> Vector search returns top-20 → reranker model (Cohere Rerank, cross-encoder) scores each for relevance to query → top-5 go to LLM. Dramatically improves precision","<b>Evaluation metrics:</b> Faithfulness (answer supported by retrieved docs?), Relevance (retrieved docs actually relevant?), Answer correctness. Use RAGAS framework. Test on golden dataset of 100+ Q&A pairs","<b>In interview say:</b> 'RAG pipeline: docs chunked → embedded → stored in Pinecone. At query time: embed query → top-20 vector search → rerank to top-5 → inject as context → LLM answers grounded in company data'"]},
{t:"Vector Databases & Embeddings",req:"Store and search high-dimensional embeddings — the backbone of semantic search and RAG",b:["<b>What embeddings are:</b> Text → fixed-size array of floats (768-1536 dimensions). Similar meaning = vectors close together in space. 'happy' and 'joyful' → nearly same vector. 'happy' and 'database' → far apart","<b>Embedding models:</b> OpenAI text-embedding-3-small (1536d, cheap, good), text-embedding-3-large (3072d, best quality), Cohere embed-v3 (multilingual), sentence-transformers/all-MiniLM (384d, free, self-hosted)","<b>Vector DB options:</b> Pinecone (managed, simple, start here), Weaviate (open-source, hybrid search), Qdrant (Rust, fast), Milvus (distributed, huge scale), pgvector (PostgreSQL extension — no new infra!), ChromaDB (local dev)","<b>ANN algorithms:</b> HNSW (graph-based, best for read-heavy, higher memory), IVF (partition-based, good balance), PQ (product quantization — compresses vectors 10x, slight accuracy loss). HNSW is default choice","<b>pgvector for startups:</b> ALTER TABLE ADD COLUMN embedding vector(1536). CREATE INDEX USING hnsw. Good for <5M vectors. No new infrastructure. Graduate to Pinecone/Qdrant at scale","<b>Similarity metrics:</b> Cosine similarity (angle between vectors — most common), Dot product (magnitude matters), Euclidean distance (absolute distance). For normalized embeddings: cosine = dot product","<b>Metadata filtering:</b> Not just 'find similar vectors' — also filter: WHERE category='technical' AND date > '2024-01'. Pre-filter (efficient) vs post-filter (more accurate). Most vector DBs support both","<b>In interview say:</b> 'Documents embedded via OpenAI → stored in Pinecone with HNSW index. Query: embed → ANN search with metadata filter → top-5 in <50ms across 10M vectors. Start with pgvector, migrate to Pinecone at scale'"]},
]},
{section:"Agent Patterns",items:[
{t:"Architecture Patterns",req:"How to structure LLM agents for production — from simple to complex",b:["<b>Pattern 1 — Single agent + tools:</b> One LLM with tool definitions. Each turn: LLM picks a tool (or responds directly). Execute tool → feed result back → LLM continues. 80% of use cases. Start here always","<b>Pattern 2 — Router/Classifier:</b> First LLM call classifies intent (fast, cheap model) → routes to specialized handler. 'Billing question' → BillingAgent (with billing tools). 'Bug report' → TechAgent (with code tools). Avoids one agent needing ALL tools","<b>Pattern 3 — Planning + Execution:</b> LLM first creates a PLAN (list of steps) → then executes step by step → checks progress → adjusts plan if needed. Better for complex multi-step tasks. More token-expensive but more reliable","<b>Pattern 4 — Multi-agent:</b> Specialized agents hand off to each other. Researcher (searches info) → Writer (drafts content) → Reviewer (checks quality) → Publisher. Each has own system prompt + tools. CrewAI, AutoGen","<b>Pattern 5 — Human-in-the-loop:</b> Agent proposes action → if confidence < threshold OR action is high-stakes (payment, email send) → ask human to approve → continue. Essential for production safety","<b>Pattern 6 — Reflection:</b> Generate answer → second LLM call: 'Is this correct? Any issues?' → if issues found → regenerate. Self-improving loop. 2x cost but significantly better quality","<b>When to use which:</b> Simple task (answer question) → Pattern 1. Many intents → Pattern 2. Complex task (build feature) → Pattern 3. Need quality at all costs → Pattern 6. High stakes → Pattern 5"]},
{t:"Tool Use / Function Calling",req:"How agents actually DO things — the mechanism for LLMs to interact with the real world",b:["<b>How it works:</b> You define available tools in API call: [{name:'search_docs', description:'Search knowledge base', parameters:{query: string}}]. LLM returns: {tool_call: 'search_docs', arguments: {query: 'refund policy'}}. YOU execute it. Send result back","<b>Tool design principles:</b> Clear names (search_docs not tool1). Good descriptions (LLM reads these to decide which tool). Minimal parameters. Return structured data. Handle errors gracefully (return error message, not crash)","<b>Common tools:</b> Web search, database query (read-only!), API calls (REST endpoints), file read/write, code execution (sandboxed), email send, calendar access, knowledge base search (RAG retrieval)","<b>Parallel tool calls:</b> Some models support calling multiple tools in one turn: 'search flights AND check calendar' simultaneously. Reduces latency for independent operations","<b>Tool result injection:</b> After execution: [{role:'tool', tool_call_id:'abc', content:'Results: ...'}]. Model sees the result and decides: call another tool? or generate final answer? The LOOP is the agent","<b>Safety:</b> Never give agents unrestricted DB access (SQL injection by LLM!). Read-only by default. Write operations need confirmation. Sandbox code execution. Rate-limit expensive tools","<b>MCP (Model Context Protocol):</b> Anthropic's standard for connecting tools to LLMs. Define tools as MCP servers. Any MCP-compatible client can use them. Standardizes tool integration across frameworks"]},
{t:"Memory Systems",req:"How agents remember context — short-term (conversation) and long-term (across sessions)",b:["<b>Short-term memory:</b> Conversation history. Just append messages: user → assistant → user → assistant. LLM sees entire conversation. Limited by context window (128K tokens). Simplest form","<b>Sliding window:</b> When conversation exceeds context limit → keep system prompt + last N messages. Lose early context. Simple but lossy. Good for customer support (each session is independent)","<b>Summary memory:</b> When conversation gets long → LLM summarizes old messages into a paragraph → keep summary + recent messages. Preserves key info. Loses details. Recursive summarization for very long conversations","<b>Long-term memory (vector store):</b> Important facts/preferences → embed → store in vector DB with user_id. On new conversation: retrieve relevant memories. 'User prefers Python' remembered across sessions","<b>Entity memory:</b> Extract entities from conversation: {user_name: 'Gopi', company: 'Nanonets', preference: 'dark mode'}. Structured storage. Quick lookup without semantic search","<b>Working memory (scratchpad):</b> Agent writes notes to itself during complex tasks. 'I've checked 3 of 5 services. Service A is healthy. Service B returned error...' Persists within one task execution","<b>What to remember:</b> User preferences, past decisions, key facts. What NOT to remember: sensitive data (PII), session-specific details, anything the user asks to forget (GDPR compliance)"]},
{t:"Guardrails & Safety",req:"Preventing agents from going rogue — input validation, output checking, action limits",b:["<b>Input guardrails:</b> Before sending to LLM: detect prompt injection ('ignore previous instructions...'), PII detection (mask credit card numbers, emails), content policy (block harmful requests), input length limits","<b>Output guardrails:</b> After LLM responds: check for hallucination (does answer match retrieved docs?), format validation (is JSON valid?), content safety (no harmful/biased content), PII leakage (model shouldn't reveal other users' data)","<b>Action guardrails:</b> Before executing tool: is this action allowed? Rate limits (max 10 API calls per agent run). Cost limits ($0.50 max per run). Irreversible action check (delete, send email → require confirmation)","<b>Prompt injection defense:</b> Separate system prompt clearly from user input. Use delimiters: 'USER INPUT START: {input} :USER INPUT END'. Instruction hierarchy: system > user. Some models trained to resist injection","<b>Hallucination detection:</b> Method 1: Check if answer is supported by retrieved context (NLI model). Method 2: Ask model 'Based ONLY on the provided context, answer...'. Method 3: Generate 3 answers, if they disagree → low confidence → human review","<b>Frameworks:</b> Guardrails AI (Python, define rails in YAML), NeMo Guardrails (NVIDIA), LangChain output parsers, custom middleware that wraps every LLM call","<b>In production:</b> Every agent call goes through: input validation → rate limit check → LLM call → output validation → action authorization → execute. Any check fails → fallback (human handoff or safe default response)"]},
]},
{section:"Production & Scale",items:[
{t:"LLM Application Architecture",req:"How to build production-ready LLM apps — not toy demos",b:["<b>Architecture layers:</b> Client → API Gateway → Orchestration Layer (agent logic) → LLM Provider (OpenAI/Anthropic) + Tool Layer (RAG, APIs, DB) + Memory Layer (Redis/Vector DB)","<b>Streaming:</b> LLM generates tokens one at a time. Stream to client via SSE (Server-Sent Events). User sees response appear word-by-word. Perceived latency drops from 10s to 0.5s. MUST have for chat UX","<b>Async processing:</b> Complex agent tasks (research, code generation) → put on job queue → process in background → notify user when done. Don't make user wait 30s staring at spinner","<b>Caching:</b> Hash(prompt) → check Redis → hit? return cached response (instant, free). Miss? call LLM → cache result. Works for: FAQ answers, repeated extractions, classification of common inputs. Save 60-80% of LLM calls","<b>Rate limiting:</b> OpenAI/Anthropic have TPM (tokens/min) limits. Your users share your quota. Implement per-user rate limits. Queue excess requests. Show 'busy, try in 30s' rather than failing","<b>Error handling:</b> LLM timeout (30s) → retry once. Rate limited (429) → exponential backoff. Malformed output → retry with stricter prompt. Provider down → fallback to different provider. NEVER show raw error to user","<b>Multi-model routing:</b> Simple queries → fast cheap model (Haiku/GPT-3.5). Complex queries → powerful model (Opus/GPT-4). Classify query complexity first (one cheap call) → route to appropriate model. Save 70% cost"]},
{t:"Cost & Latency Optimization",req:"LLM calls are expensive and slow — how to make them production-viable",b:["<b>Cost breakdown:</b> GPT-4o: $2.50/1M input, $10/1M output tokens. Claude Sonnet: $3/1M input, $15/1M output. At 100K queries/day with avg 2K tokens: $500-$1500/day. Need to optimize","<b>Prompt caching (biggest win):</b> System prompt (2000 tokens) identical for all users → Anthropic/OpenAI cache it → pay only once per cache window. 90% cost reduction on cached prefixes. Structure prompts with shared prefix first","<b>Shorter prompts:</b> Every token costs money. Remove filler words from system prompt. Use abbreviations in examples. Compress retrieved context. 'Be concise' in system prompt reduces output tokens","<b>Model tiering:</b> Route by complexity: FAQ/classification → GPT-3.5 ($0.50/1M) | Summarization → GPT-4o-mini ($0.15/1M) | Complex reasoning → GPT-4 ($30/1M). 80% of queries don't need the expensive model","<b>Batching:</b> Multiple independent requests → batch API (OpenAI Batch API: 50% cheaper, 24hr turnaround). Good for: nightly processing, bulk extraction, pre-computing responses","<b>Latency reduction:</b> Streaming (perceived), smaller models (actual), prompt caching (skip computation), parallel tool calls, pre-fetch likely needed context, reduce context window size","<b>Token budget:</b> Set max_tokens limit per call. If generation exceeds budget, it truncates. Prevents runaway costs from unexpected long outputs. Set reasonable limits per use case","<b>Monthly budget formula:</b> (queries_per_day × avg_input_tokens × input_price) + (queries_per_day × avg_output_tokens × output_price) × 30. Track daily. Alert at 80% budget. Hard-stop at 100%"]},
{t:"Evaluation & Testing",req:"LLMs are non-deterministic — how to measure quality and prevent regressions",b:["<b>The problem:</b> Same prompt, different outputs each time. Can't write assertEquals tests. How do you know if a prompt change improved or broke things?","<b>Golden dataset:</b> Create 100-500 test cases: {input, expected_output, context}. Run system against all → measure accuracy/similarity. This is your regression test. Run on EVERY prompt change","<b>Metrics:</b> Accuracy (for classification), BLEU/ROUGE (for text similarity), Faithfulness (answer grounded in context?), Relevance (retrieved docs useful?), Completeness (all parts of question answered?)","<b>LLM-as-judge:</b> Use GPT-4 to evaluate outputs: 'Rate this answer 1-5 on accuracy, helpfulness, safety'. Cheap, scalable, correlates ~80% with human judgment. Good for rapid iteration","<b>Human evaluation:</b> Gold standard but expensive. Use for: final validation, ambiguous cases, calibrating LLM-as-judge. 3 annotators per example, majority vote. Do monthly sampling","<b>A/B testing:</b> New prompt variant → route 10% traffic → compare metrics (user satisfaction, task completion rate, cost). If better → roll out 100%. Same as web A/B testing but for prompts","<b>Regression alerts:</b> Track eval scores daily. If faithfulness drops >5% → alert → investigate → probably a prompt change or data quality issue. Dashboard: Langfuse, LangSmith, custom Grafana","<b>RAGAS framework:</b> Open-source RAG evaluation. Measures: context relevancy, faithfulness, answer relevancy, answer correctness. Run automatically in CI/CD on prompt changes"]},
{t:"Fine-Tuning vs RAG vs Prompting",req:"Three ways to customize LLM behavior — clear decision tree",b:["<b>Prompting (always try first):</b> System prompt + few-shot examples. Zero infra. Change instantly. Deploy in minutes. Cost: more tokens per call. Limitation: can't add new knowledge, context window limit","<b>RAG (most common in production):</b> Retrieve company docs at runtime. Adds new knowledge. Answers cite sources. Always up-to-date. Cost: vector DB infra ($100-500/mo) + embedding costs + retrieval latency (200ms). Limitation: retrieval quality is ceiling","<b>Fine-tuning (when others fail):</b> Train model on your data (500+ examples). Model internalizes patterns, terminology, format. Cost: $100-$10K training, takes 1-4 hours. Can use SMALLER model after (save cost). Limitation: can't add new knowledge easily, stale over time","<b>Decision tree:</b> Need new/private knowledge? → RAG. Need consistent output format that prompting can't achieve? → Fine-tune. Need domain terminology/style? → Fine-tune. Need up-to-date info? → RAG. Works with just better instructions? → Prompting","<b>Combination (production best practice):</b> Fine-tuned model (consistent style + format) + RAG (fresh knowledge) + system prompt (guardrails + instructions). Example: fine-tuned GPT-3.5 with RAG can outperform raw GPT-4 on your domain","<b>Fine-tuning process:</b> Collect examples (500+) → format as {messages: [...]} → upload to OpenAI/Anthropic → train (1-4hrs) → evaluate on held-out test set → deploy. Monitor for drift over time","<b>When NOT to fine-tune:</b> Just need factual answers (use RAG). Only need specific format (use structured output/JSON mode). Small team without ML expertise. Data changes frequently"]},
]},
{section:"Real-World Systems",items:[
{t:"Document Processing Pipeline (Nanonets-style)",req:"Process millions of documents — extract structured data with AI at scale",b:["<b>Pipeline:</b> Ingest (email/API/SFTP) → S3 raw storage → Kafka event → Classify document type → OCR if scanned → LLM extraction → Validation → Confidence routing → Output","<b>Classification:</b> Fast model classifies doc type (invoice, receipt, contract, ID). Routes to type-specific extraction schema. One model per type = higher accuracy than one-size-fits-all","<b>OCR:</b> Scanned PDF/image → OCR engine (Tesseract open-source, or Google Document AI for accuracy). Outputs text + bounding boxes. Layout-aware: tables stay as tables","<b>LLM Extraction:</b> Prompt: 'Extract these fields from the document: {schema}. Return JSON.' Schema per doc type: invoice → {vendor, amount, date, line_items[]}. Include few-shot examples of that doc type","<b>Confidence scoring:</b> For each extracted field: how confident is the model? Methods: logprobs from API, consistency check (extract 3 times, check agreement), regex validation (dates, amounts, emails)","<b>Routing by confidence:</b> >95% confidence → auto-process (straight-through). 70-95% → human review queue (highlight uncertain fields). <70% → manual processing. Goal: 80% straight-through rate","<b>Human-in-the-loop:</b> Reviewer dashboard shows doc + extracted fields + confidence highlights. Reviewer corrects → corrections become training data → model improves. Active learning loop","<b>Scale:</b> Each step = separate Kafka consumer group. OCR slow? Scale OCR workers independently. LLM expensive? Cache identical doc extractions. DLQ per step. Idempotent workers. 10M docs/day achievable"]},
{t:"AI Customer Support Agent",req:"Resolve customer tickets autonomously — with RAG knowledge, tool use, and human handoff",b:["<b>Architecture:</b> User message → Intent classifier → Route to specialized agent → Agent: RAG + tools + memory → Response → Confidence check → If low: human handoff","<b>Intent classification:</b> Fast cheap model classifies: billing, technical, general, complaint, urgent. Route to specialized agent with relevant tools. 'Refund request' → BillingAgent (has refund_api tool)","<b>Knowledge retrieval:</b> RAG on help docs, past resolved tickets, product documentation. Hybrid search: vector (semantic) + keyword (product names, error codes). Rerank top results","<b>Tool use:</b> check_order_status(order_id), process_refund(order_id, amount), update_account(user_id, changes), create_ticket(details), escalate_to_human(reason). Each tool has authorization checks","<b>Conversation memory:</b> Full conversation history in context. Plus: user profile (past purchases, past tickets, loyalty tier). Personalized responses: 'I see you're a Premium member, let me prioritize this'","<b>Human handoff triggers:</b> Confidence < 70%, user says 'speak to human', sensitive topic (legal, discrimination), 3+ failed resolution attempts, angry sentiment detected, involves money > threshold","<b>Metrics:</b> Resolution rate (% tickets fully resolved without human), CSAT score, avg handling time, escalation rate, cost per ticket ($0.10 AI vs $5 human). Target: 60-70% auto-resolution","<b>Continuous improvement:</b> Human agents resolve escalated tickets → those become training examples → weekly evaluation run → update prompts/RAG docs → resolution rate improves over time"]},
{t:"Code Agent (Cursor/Devin-style)",req:"AI agent that reads, writes, and tests code — multi-step tool-heavy workflow",b:["<b>Tools available:</b> read_file(path), write_file(path, content), search_codebase(query), run_command(cmd), list_directory(path), git_diff(), run_tests(). Agent decides which to use at each step","<b>Workflow:</b> User describes task → Agent: 1) search codebase for relevant files, 2) read them to understand, 3) plan changes, 4) write code, 5) run tests, 6) if tests fail → read error → fix → rerun. Loop until green","<b>Context management:</b> Codebases are huge (millions of tokens). Can't put all in context. Agent must SEARCH intelligently: grep for function names, read only relevant files, build mental model incrementally","<b>Planning:</b> Complex tasks: agent writes a plan first ('1. Add new API endpoint, 2. Add DB migration, 3. Update frontend, 4. Add tests'). Execute step by step. Revise plan if something unexpected","<b>Sandboxing:</b> Code execution in isolated environment (Docker). Can't access production. Can't install arbitrary packages without approval. Timeout on long-running commands. Resource limits","<b>Error recovery:</b> Test fails → read error output → identify issue → fix → retry. Build fails → check error → fix imports/syntax. Max 5 retries then ask human. Most bugs fixed in 1-2 iterations","<b>Evaluation:</b> SWE-bench: real GitHub issues, measure % resolved. Current best: ~50% on SWE-bench Lite. Human engineers: ~90%. Agents are useful assistants, not full replacements (yet)"]},
{t:"Search & Recommendations with AI",req:"Semantic search, personalized recommendations, and hybrid retrieval with LLMs",b:["<b>Traditional search:</b> BM25 keyword matching. 'running shoes' only matches documents containing those exact words. Misses: 'jogging sneakers', 'athletic footwear'. Limited by vocabulary mismatch","<b>Semantic search:</b> Embed query + documents → vector similarity. 'running shoes' matches 'jogging sneakers' because similar meaning. Catches intent, synonyms, related concepts. But: misses exact keyword matches sometimes","<b>Hybrid (production standard):</b> BM25 keyword score + vector semantic score → combine with Reciprocal Rank Fusion (RRF). Best of both. Weaviate, Elasticsearch with vectors, Pinecone hybrid all support this","<b>LLM-powered reranking:</b> Retrieve top-50 candidates (fast, cheap) → LLM reranks: 'Which of these is most relevant to the query?' → top-10 shown to user. Expensive but dramatically better relevance. Cohere Rerank, cross-encoders","<b>Recommendations:</b> Collaborative filtering (users who bought X also bought Y) + content-based (similar items by embedding) + LLM personalization (user profile → generate personalized descriptions/rankings)","<b>Conversational search:</b> User: 'find me a laptop under 50k with good battery'. Traditional: keyword match fails. With LLM: parse intent → extract filters (price<50K, battery>8hr) → structured query → present results → user: 'something lighter' → agent refines search","<b>In interview say:</b> 'Hybrid search: BM25 keyword + vector semantic with RRF fusion. Top-50 retrieved cheaply, reranked by cross-encoder to top-10. For recommendations: embed items + user history, nearest neighbor in embedding space'"]},
]},
{section:"Practical Knowledge",items:[
{t:"Building with Claude/OpenAI APIs",req:"The actual API patterns every developer needs to know",b:["<b>Messages format:</b> [{role:'system', content:'You are...'}, {role:'user', content:'...'}, {role:'assistant', content:'...'}]. Conversation history = append messages. Stateless API — YOU manage conversation state","<b>Streaming:</b> stream:true → get tokens as Server-Sent Events as generated. Show to user word-by-word. Perceived latency drops from 10s to 0.5s even though total time is same. MUST have for any chat UI","<b>Tool/Function calling:</b> Define tools: [{name:'search', parameters:{query:string}}]. Model returns: tool_call with arguments. YOU execute. Send result back as tool message. Model sees result and continues. THIS is how agents work","<b>Structured output:</b> response_format: {type: 'json_object'} → model guaranteed to return valid JSON. Or: define JSON schema → model follows it. Critical for programmatic consumption of LLM output","<b>Token counting:</b> Input + output tokens = total billed. tiktoken library to count before sending. Set max_tokens to cap output cost. Monitor: avg tokens per call × calls per day × price = daily spend","<b>Rate limits & retries:</b> 429 Too Many Requests → exponential backoff (1s, 2s, 4s). Implement retry wrapper around ALL API calls. Use tenacity library (Python) or p-retry (JS). Retry on 429, 500, 503. Never retry on 400 (bad request)","<b>Multi-provider fallback:</b> Try primary (Claude) → timeout/error → try secondary (GPT-4) → try tertiary (Gemini). Abstract behind common interface. Like circuit breaker for LLM providers. Never let user see provider error","<b>Prompt caching setup:</b> Structure prompt: [long system prompt (cached)] + [user-specific context (not cached)] + [user message]. Cache on the static prefix. Anthropic: automatic. OpenAI: use cached_tokens in response to verify"]},
{t:"Prompt Engineering for Production",req:"Not tricks — engineering principles for reliable prompts at scale",b:["<b>System prompt structure:</b> 1) Role (You are a...) 2) Context (Given...) 3) Task (Your job is to...) 4) Format (Respond in JSON: {...}) 5) Constraints (NEVER do..., ALWAYS do...). Order matters — beginning gets most attention","<b>Few-shot examples (most powerful technique):</b> Show 3-5 input→output examples. Model mimics the pattern precisely. Better than paragraphs of instructions. Format examples identically to expected real inputs","<b>Chain of Thought:</b> 'Think step by step before answering' → model shows reasoning → answer quality improves 20-40% on complex tasks. For production: ask for reasoning in JSON field, extract only the answer for user","<b>Negative examples:</b> Show what NOT to do. 'BAD: {example}. GOOD: {example}.' Models learn from contrasts. Especially useful for tone/style calibration","<b>Structured output enforcement:</b> Define exact JSON schema in prompt. Use JSON mode in API. Post-validate with schema checker. If invalid → retry (max 2 retries). Pydantic models for Python, Zod for TypeScript","<b>Prompt versioning & testing:</b> Git-track every prompt change. Run eval suite (golden dataset) before deploying. A/B test in production. One-word changes CAN break 10% of outputs. Treat prompts like code, not like comments","<b>Token optimization:</b> Remove filler ('please', 'kindly'). Use abbreviations in system prompt (LLM understands). Compress examples to minimum viable. Every saved token = money saved × millions of calls","<b>Temperature for production:</b> Extraction/classification: 0.0 (deterministic). Structured output: 0.0. Creative writing: 0.7. Brainstorming: 1.0. When in doubt: 0.0 — consistency > creativity in production"]},
{t:"AI Interview Questions & Answers",req:"What interviewers actually ask about AI/LLM systems in 2024-2025",b:["<b>Q: Design a RAG system for company docs</b> — Chunking (500 tokens, recursive by headers) → Embedding (OpenAI) → Vector DB (Pinecone) → Hybrid retrieval (vector + BM25) → Rerank (top-5) → LLM with context → Cite sources. Evaluate: RAGAS metrics on 100 test QA pairs","<b>Q: How to reduce hallucination?</b> — 1) RAG grounds in real docs. 2) 'Answer ONLY from provided context, say I don't know otherwise'. 3) Self-consistency (3 generations, pick majority). 4) Citation requirement (must quote source). 5) Smaller focused model > large general model","<b>Q: Design AI customer support</b> — Intent classification → RAG knowledge → Tool use (refund, status check) → Confidence threshold → Human handoff. Metrics: 60%+ auto-resolution, CSAT > 4.2. Cost: $0.10/ticket AI vs $5/ticket human","<b>Q: How to handle prompt injection?</b> — Input sanitization, delimiters between system/user content, instruction hierarchy (system > user), output validation, action authorization before execution, rate limiting per user, monitor for anomalous patterns","<b>Q: Fine-tune or RAG?</b> — RAG for: new knowledge, up-to-date info, cited sources. Fine-tune for: consistent style/format, domain jargon, reduce token cost (smaller model after fine-tune). Both together for production systems","<b>Q: Scale AI to millions of users?</b> — Cache frequent queries (60-80% hit rate), model tiering (cheap model for simple, expensive for complex), async processing for heavy tasks, batch API for non-real-time, rate limit per user, pre-compute common responses nightly","<b>Q: How to evaluate LLM quality?</b> — Golden test set (100+ examples) + automated metrics (faithfulness, relevance) + LLM-as-judge (GPT-4 rates outputs) + human eval (monthly sampling). Run evals in CI/CD on every prompt change. Alert on regression","<b>Q: Cost estimation for LLM app</b> — Identify: calls/day × avg tokens × price. Example: 50K queries/day × 3K tokens avg × $3/1M = $450/day. Add: embedding costs, vector DB, compute. Optimize: caching (60% less), tiering (70% cheaper for simple queries)"]},
{t:"Agents vs Traditional Software",req:"When to use AI agents vs regular code — the honest tradeoff",b:["<b>Use traditional code when:</b> Logic is deterministic, rules are clear, inputs are structured, speed matters (microseconds), cost must be near-zero per operation. Don't use LLM for: if/else logic, CRUD operations, data validation, calculations","<b>Use AI agents when:</b> Input is unstructured (natural language, documents, images), task requires reasoning/judgment, rules are fuzzy or would require 1000s of if/else branches, you need to handle novel situations gracefully","<b>Hybrid (best approach):</b> Traditional code for: routing, validation, DB queries, formatting. LLM for: understanding intent, extracting info from text, generating responses, making judgment calls. Combine them — don't replace all code with LLM","<b>Cost reality:</b> LLM call: $0.01-$0.10 each, 1-10 seconds. Function call: $0.000001, 1 millisecond. Use LLM calls ONLY where they provide unique value. Everything else in regular code","<b>Reliability:</b> Traditional code: 100% deterministic, same input = same output always. LLM: non-deterministic, may hallucinate, may refuse, may go off-track. Build guardrails, fallbacks, and validation around every LLM call","<b>The litmus test:</b> 'Could a junior developer write rules for this in a week?' YES → traditional code. NO (too many edge cases, too nuanced, requires understanding context) → LLM. Most apps are 90% traditional + 10% LLM at key decision points","<b>In interview say:</b> 'I use LLMs where they provide unique value: understanding unstructured input, making nuanced judgments, generating natural language. Everything else — routing, validation, business logic — stays as deterministic code. AI is a tool, not a replacement for engineering'"]},
]},
];

const aiSidebar=document.getElementById('aiSidebarList'),aiContent=document.getElementById('aiContentArea'),aiBreadcrumb=document.getElementById('aiBreadcrumb'),aiSearch=document.getElementById('aiSearch');
let activeAiIdx=0;

AI.forEach((sec,si)=>{
  const el=document.createElement('div');el.className='s-topic'+(si===0?' active':'');
  el.innerHTML=`${sec.section} <span class="cnt">${sec.items.length}</span>`;
  el.onclick=()=>selAi(si);el.id='ast-'+si;aiSidebar.appendChild(el);
  const sub=document.createElement('div');sub.className='s-patterns';sub.id='asp-'+si;
  sec.items.forEach((item,ii)=>{
    const p=document.createElement('div');p.className='s-pat'+(si===0&&ii===0?' active':'');
    p.textContent=item.t;p.onclick=e=>{e.stopPropagation();selAiItem(si,ii)};p.id='ap-'+si+'-'+ii;sub.appendChild(p);
  });
  aiSidebar.appendChild(sub);
});

function selAi(si){document.querySelectorAll('#page-ai .s-topic').forEach(e=>e.classList.remove('active'));document.getElementById('ast-'+si).classList.add('active');selAiItem(si,0)}
function selAiItem(si,ii){activeAiIdx=si;document.querySelectorAll('#page-ai .s-pat').forEach(e=>e.classList.remove('active'));const el=document.getElementById('ap-'+si+'-'+ii);if(el)el.classList.add('active');document.querySelectorAll('#page-ai .s-topic').forEach(e=>e.classList.remove('active'));document.getElementById('ast-'+si).classList.add('active');renderAi(si);setTimeout(()=>{const target=document.getElementById('ai-item-'+ii);if(target)target.scrollIntoView({behavior:'smooth',block:'start'})},50);const sec=AI[si];aiBreadcrumb.innerHTML=`${sec.section} <span>→ ${sec.items[ii]?.t||''}</span>`}

function renderAi(si){
  const sec=AI[si];let html=`<div class="hld-section"><h2>${sec.section}</h2>`;
  sec.items.forEach((item,idx)=>{
    html+=`<div class="hld-card" id="ai-item-${idx}"><h3>${item.t}</h3>`;
    if(item.req)html+=`<div class="hld-req">🎯 ${item.req}</div>`;
    if(item.b){html+='<ul>';item.b.forEach(b=>html+=`<li>${b}</li>`);html+='</ul>';}
    html+='</div>';
  });
  html+='</div>';aiContent.innerHTML=html;aiContent.scrollTop=0;
}

aiSearch.addEventListener('input',function(){
  const v=this.value.toLowerCase().trim();if(!v){renderAi(activeAiIdx);return}
  let html=`<div class="hld-section"><h2>Search: "${this.value}"</h2>`;let f=0;
  AI.forEach(sec=>{sec.items.forEach(item=>{
    const s=`${item.t} ${item.req||''} ${(item.b||[]).join(' ')}`.toLowerCase();
    if(s.includes(v)){f++;html+=`<div class="hld-card"><h3>${item.t}</h3>`;if(item.req)html+=`<div class="hld-req">🎯 ${item.req}</div>`;if(item.b){html+='<ul>';item.b.forEach(b=>html+=`<li>${b}</li>`);html+='</ul>';}html+='</div>'}
  })});
  if(!f)html+='<div style="text-align:center;padding:30px;color:#484f58">No results</div>';
  html+='</div>';aiContent.innerHTML=html;
});

renderAi(0);aiBreadcrumb.innerHTML=`${AI[0].section} <span>→ ${AI[0].items[0].t}</span>`;
