deep:["Timeout ≠ failure. Check status before retry","Reconciliation: daily compare vs PSP","PCI DSS: never store cards. Use PSP tokenization","<b>Exactly-once implementation:</b> Client generates UUID as idempotency_key. Server: INSERT INTO payments (idempotency_key, ...) ON CONFLICT (idempotency_key) DO NOTHING. Then SELECT existing result. Even if client retries 10 times \u2192 charged exactly once","<b>Timeout handling (critical):</b> API call to Stripe times out after 30s. Does NOT mean payment failed! Could be: success (Stripe processed but network dropped response), actual failure, or still processing. MUST check payment status via Stripe API before retrying charge. Retrying without checking = potential double charge","<b>Reconciliation:</b> Daily batch job: compare our payment records vs PSP settlement report vs bank statement. Three-way match. Any mismatch flagged for manual review. Catches: bugs, fraud, PSP errors, timing differences","<b>Multi-currency:</b> Store: original_amount (1000), original_currency (INR), exchange_rate (0.012), settled_amount (12), settled_currency (USD). Convert at transaction time using live exchange rate. Display original currency to user, settle in merchant currency","<b>Fraud detection:</b> ML model scores every transaction: amount, frequency, location, device fingerprint, merchant category, velocity (5 transactions in 1 minute = suspicious). High risk \u2192 trigger 3D Secure (OTP verification) or manual review queue","<b>PCI DSS compliance:</b> NEVER store raw card numbers. Flow: user enters card \u2192 goes directly to PSP (Stripe.js) \u2192 PSP returns token (tok_xxx). You store ONLY the token. Token is useless without PSP encryption keys. You are out of PCI scope","<b>Refund processing:</b> Refund request \u2192 validate (original payment exists, amount <= original, within refund window). Call PSP refund API with original payment reference. PSP processes in 5-10 business days. Track refund status via webhook. Partial refunds supported (return 1 of 3 items). Double-entry: debit merchant_account, credit user_wallet","<b>Ledger and accounting:</b> Every money movement = two ledger entries (double-entry). Daily closing: sum all debits must equal sum all credits. If mismatch \u2192 critical alert, freeze affected accounts, manual investigation. Monthly: generate P&L statements from ledger. Tax reporting from ledger entries. Ledger is append-only, never update or delete","<b>Dispute and chargeback handling:</b> Customer disputes charge with bank \u2192 bank notifies PSP \u2192 PSP sends dispute webhook. You have 7-14 days to submit evidence (receipt, delivery proof, user agreement). If you lose: money deducted + $15 chargeback fee. Track dispute rate: if >1% of transactions \u2192 PSP may terminate your account"],tip:"CORRECTNESS > speed. Never lose money."},
{n:24,t:"Distributed Cache",s:"Millions QPS, <1ms",req:"GET/SET/DELETE with TTL, data structures, HA",
ctx:"Design Redis Cluster. 16384 hash slots across N nodes. CRC16(key) % 16384 = slot = node. Primary dies = replica promoted via voting. Tests: hash slots, replication, failover, persistence (RDB vs AOF)",
design:["<b>Hash slots:</b> 16384 via CRC16(key)%16384→node","<b>Replication:</b> 1-2 replicas per primary","<b>In-memory + persist:</b> RDB(snapshot) or AOF(append log)","<b>Eviction:</b> LRU/LFU when full","<b>Hash slot routing:</b> 16384 slots. CRC16(key) % 16384 = slot number. Slot \u2192 node mapping stored on every node AND every smart client. Client sends request directly to correct node. No proxy needed","<b>Replication topology:</b> Each primary has 1-2 replicas in different availability zones. Primary handles reads + writes. Replicas handle reads (optionally) + serve as failover candidates","<b>Persistence options:</b> RDB: fork process, snapshot entire dataset to disk. Fast to load on restart. May lose last N minutes. AOF: append every write command to log file. Slow to load but minimal data loss. Best: use BOTH","<b>Eviction policies:</b> allkeys-lru (evict any key, least recent), volatile-lru (evict only keys with TTL), allkeys-lfu (evict least frequent), noeviction (return error when full). Choose based on use case","<b>Data structures:</b> Not just key-value. Strings (cache), Hashes (user profile fields), Lists (message queues, recent items), Sets (unique tags, followers), Sorted Sets (leaderboards, rate limiting windows), Streams (event log, Kafka-like). Each structure has O(1) or O(log N) operations. This is why Redis beats Memcached","<b>Client-side architecture:</b> Smart client: knows full slot map, routes requests directly to correct node. No proxy overhead. On MOVED response \u2192 update local slot map. On ASK response \u2192 one-time redirect during migration. Connection pooling: maintain persistent connections to all nodes (avoid TCP handshake per request)","<b>TTL and memory management:</b> Set TTL on every cache key (EXPIRE key 3600). Without TTL = memory leak over time. Active expiry: Redis samples 20 random keys with TTL every 100ms, deletes expired ones. Lazy expiry: check TTL on access, delete if expired. Combined approach ensures timely cleanup without CPU spike"],
deep:["Hot key: replicate to multiple nodes","Failover: gossip+voting promotes replica","RDB: fast load, may lose recent. AOF: slower, less loss","<b>Hot key problem detail:</b> Single key (celebrity profile, flash sale item) gets 100K QPS \u2192 single node overwhelmed. Fix 1: client-side cache (local HashMap with 5s TTL). Fix 2: replicate hot key to 5 nodes, client randomly picks one. Fix 3: split key (hot:shard1, hot:shard2) and aggregate","<b>Cluster failover detail:</b> Primary P1 stops responding. Replicas R1a, R1b detect via gossip (missed heartbeats). After timeout (e.g., 15s), replicas initiate vote. Majority of cluster primaries must agree. Winner becomes new primary. Clients get MOVED response \u2192 update slot map. Total failover: ~15-30 seconds","<b>Online resharding:</b> Add new node N4 to cluster. Assign some slots from N1,N2,N3 to N4. Migration: for each migrating slot, keys move one by one. During migration: if client asks N1 for a key that already moved to N4 \u2192 N1 replies ASK N4 \u2192 client redirects. Zero downtime","<b>Memory optimization:</b> Small hashes stored as ziplist (contiguous memory array, very compact). Threshold: hash-max-ziplist-entries=128, hash-max-ziplist-value=64. Beyond threshold \u2192 converts to real hashtable. Can save 10x memory for millions of small objects","<b>Thundering herd on failover:</b> Primary dies \u2192 replica promoted \u2192 but replica was behind (replication lag) \u2192 some recent writes lost. Clients retrying failed writes + new writes all hit new primary simultaneously. Mitigation: client-side backoff on CLUSTERDOWN error","<b>Cache stampede prevention:</b> Popular key expires \u2192 100 concurrent requests all see cache miss \u2192 all hit DB simultaneously. Fix 1: mutex lock (SETNX lock:key, first requester fetches, others wait). Fix 2: early recompute (refresh at 80% of TTL). Fix 3: never expire (background job refreshes). Fix 4: probabilistic early expiration (each request has small chance of refreshing before TTL)","<b>Pub/Sub for real-time features:</b> Redis Pub/Sub: PUBLISH channel message, SUBSCRIBE channel. Use cases: real-time notifications, chat messages, live scores. Caveat: fire-and-forget (no persistence, offline subscribers miss messages). For durable messaging use Redis Streams instead (consumer groups, acknowledgment, replay)","<b>Monitoring and alerting:</b> Key metrics: memory usage (alert at 80% maxmemory), connected clients, ops/sec, keyspace hits vs misses (hit ratio), replication lag (replica behind primary by N bytes), slow log (commands taking >10ms). Redis INFO command provides all metrics. Export to Prometheus + Grafana dashboard"],tip:"How does Redis Cluster work?"},
{n:25,t:"News Feed",s:"2B users, ranked",req:"Personalized ML-ranked feed with posts + ads",
ctx:"2B users. ML-RANKED feed, not chronological. Model scores posts by affinity, content type, predicted engagement, recency, diversity. Multi-stage pipeline: 1000 candidates to 50 ranked items with ad insertion. Interviewer wants to discuss the ranking system, not just show posts from friends",
design:["<b>Hybrid fan-out</b>","<b>Ranking:</b> ML scores per post (affinity, recency, engagement)","<b>Flow:</b> Open→fetch precomputed→re-rank→insert ads","<b>Ads:</b> Position 3, 7, 12 after ranking organic","<b>Candidate generation:</b> Sources: posts from friends (last 7 days), followed pages, groups, suggested content (explore). Pull 1000-5000 candidates per feed request from multiple sources in parallel","<b>Feature store:</b> Pre-computed features in Redis: user_poster_affinity (interaction frequency), post_engagement_rate (likes/impressions), content_type_preference (you prefer photos over text), social_proof (3 friends liked this)","<b>Ranking pipeline:</b> Stage 1: candidate retrieval (1000s) \u2192 Stage 2: light model scores (hundreds) \u2192 Stage 3: heavy neural net ranks (50) \u2192 Stage 4: diversity filter \u2192 Stage 5: policy filter \u2192 Stage 6: ad insertion \u2192 serve 20 items","<b>Ad insertion:</b> After organic ranking: ad server provides ranked ads. Interleave at fixed positions (every 5th item). Ad ranking = bid_amount \u00d7 predicted_CTR \u00d7 relevance_score. Revenue optimization while maintaining user experience","<b>Content safety pipeline:</b> Every post passes through: 1) automated ML classifier (nudity, violence, hate speech, misinformation) 2) if flagged \u2192 human review queue 3) if confirmed violation \u2192 remove post + notify user. Classifier runs in <100ms so it does not delay feed. False positive rate target: <1%","<b>Engagement tracking:</b> For every feed item shown: track impression (appeared on screen for >1 second), click, like, comment, share, time_spent (scroll dwell time), hide, report. All events streamed to Kafka \u2192 real-time feature store update + batch analytics. This data feeds back into ranking model training","<b>Feed pagination:</b> Cursor-based, not offset-based. Client sends: GET /feed?cursor=eyJ0cyI6MTY4...&limit=20. Cursor encodes last item timestamp + score. Server fetches next 20 items after cursor position. Avoids issues with offset pagination when new posts are inserted (duplicate or missing items)"],
deep:["Multi-stage: 1000 candidates→100 scored→50 ranked→diversity filter","A/B testing different ranking models per segment","<b>Ranking features detail:</b> User-poster affinity: how often you like/comment/click poster content in last 30 days. Content-type preference: ratio of photo/video/text/link engagement. Predicted engagement: ML model predicts P(like), P(comment), P(share), P(click). Combined into engagement score","<b>Diversity rules:</b> After ranking: max 2 posts from same author in top 20. No more than 3 political posts consecutively. Mix content types (photo, video, text, link). If 5 food posts in a row \u2192 inject something different. Prevents filter bubble","<b>Real-time feed updates:</b> User scrolling feed \u2192 friend posts new content \u2192 evaluate: high engagement predicted + close friend? \u2192 push via WebSocket \u2192 New posts available banner at top. Don not reorder existing feed (jarring UX)","<b>Cold start problem:</b> New user with no history. No affinity scores, no preferences. Solution: show popular content in their demographic + location. Ask onboarding questions (interests, people to follow). Bootstrap model with demographic features until enough personal data","<b>Negative feedback signals:</b> User hides post \u2192 strong negative signal for that poster + content type. User clicks see less like this \u2192 demote content category. Unfollow = strongest signal. These REDUCE score for similar future content","<b>A/B testing infrastructure:</b> Each user assigned to experiment bucket (hash(user_id) % 100). Bucket 0-4 = experiment A (new ranking model). Bucket 5-99 = control (current model). Measure: time spent, engagement rate, DAU retention, user survey happiness. Run for 2-4 weeks before deciding","<b>Feed is NOT periodic:</b> Feed updated incrementally on every post via fan-out workers (ZADD per follower). NOT rebuilt every hour. No wasted work. If nobody posts, your feed has zero writes. On app open, pre-computed feed served instantly from Redis. Inactive user (6 months)? Redis feed may be evicted \u2192 cold rebuild from DB on first open","<b>Model training pipeline:</b> Daily batch: collect all impressions + engagement labels from past 7 days. Features: user_poster_affinity, post_age, content_type, num_likes, social_proof_count, user_activity_level. Train gradient boosted tree (XGBoost) or neural net. Evaluate: AUC, precision@K. Shadow deploy new model on 1% traffic before full rollout","<b>Content type ranking signals:</b> Video: watch_time_ratio (watched 80% = strong signal). Photo: zoom_in (high interest). Link: click_through + time_on_page (bounced back quickly = weak signal). Text post: expand_to_read (long post expanded). Poll: voted (strong engagement). Each type has specialized engagement signals beyond just like/comment","<b>Feed freshness vs relevance tradeoff:</b> Pure ML ranking might show a 3-day-old viral post above friend 5-minute-ago post. Users feel feed is stale. Fix: time decay multiplier: score = ml_score x time_decay(age). Decay function: exponential decay with half-life of 6 hours. Guarantees recent posts get a boost while still showing high-quality older content"],tip:"Interviewer cares about ranking, not just showing posts."},
]},

{section:"Your Questions",items:[
{t:"What is a DAG?",req:"Directed Acyclic Graph \u2014 a task dependency chart where tasks run in parallel but respect dependencies. No backward cycles",b:[
"<b>Directed:</b> Arrows go one way (A \u2192 B means A must finish before B starts)",
"<b>Acyclic:</b> No loops. Can never go backward. Task flow only moves forward",
"<b>Parallel execution:</b> Tasks without dependencies run simultaneously. Only wait when there is a dependency",
"<b>YouTube example:</b> Upload video \u2192 [Transcode 720p + Transcode 1080p + Generate Thumbnail + Content Moderation] all run in PARALLEL \u2192 all must finish \u2192 Push to CDN \u2192 Mark as Ready",
"<b>Why DAG not just a list?</b> A list = sequential (A then B then C). DAG = parallel where possible. Transcode 720p and 1080p can run at the same time. 10 tasks that take 1 min each = 10 min sequential vs 2 min as DAG (if parallelizable)",
"<b>Used in:</b> YouTube video processing, Apache Airflow (data pipelines), CI/CD (build \u2192 test \u2192 deploy), Spark job execution, Terraform infrastructure provisioning, ML training pipelines",
"<b>In HLD say:</b> The video processing pipeline is a DAG \u2014 transcode, thumbnail, moderation run in parallel, and CDN push waits for all to complete"
]},
{t:"Elasticsearch \u2014 Why and When",req:"Your DB is a dictionary (find by exact key). Elasticsearch is the INDEX AT THE BACK OF A BOOK (find all pages CONTAINING a word)",b:[
"<b>The problem:</b> SELECT * FROM products WHERE description LIKE %wireless headphone% \u2192 scans EVERY row. 500M products = dead slow. Minutes, not milliseconds",
"<b>How ES solves it:</b> Builds inverted index on insert. Word \u2192 [doc_ids]. Search wireless headphone \u2192 look up two index cards \u2192 intersect \u2192 50ms across 500M products",
"<b>Inverted index:</b> wireless \u2192 [product#45, #892, #1204]. headphone \u2192 [product#45, #102, #892]. Search both \u2192 intersection = #45, #892. Instant",
"<b>Ranking (BM25):</b> Not just contains word but HOW relevant. Word appears 50 times in short doc \u2192 higher rank than once in long doc. Rare words score higher than common words",
"<b>Analyzers:</b> Before indexing: Running quickly \u2192 [run, quick]. Lowercase, stem words, remove stop words. Now searching run matches running, runs, ran",
"<b>Fuzzy search:</b> User types databse (typo) \u2192 matches database. Edit distance \u2264 2",
"<b>Autocomplete:</b> Edge n-grams: database \u2192 [d, da, dat, data, datab...]. Type da \u2192 instant suggestions",
"<b>When to use:</b> Product search, log analysis (ELK stack), autocomplete, faceted filtering (Amazon brand+price+rating filter)",
"<b>When NOT to use:</b> Primary database, simple key lookups, transactional data. ES is a SEARCH ENGINE not a DB. Always pair with a real DB and sync via Kafka CDC",
"<b>In HLD say:</b> Product search uses Elasticsearch synced from PostgreSQL via Kafka. BM25 ranking with fuzzy matching and autocomplete via edge n-grams"
]},
{t:"Redis \u2014 Why It Is Everywhere",req:"In-memory data structure server with 6+ structures each solving different problems \u2014 all at microsecond speed. One tool, ten use cases",b:[
"<b>String (key\u2192value):</b> Cache (cache:user:123 \u2192 JSON), session store (session:abc \u2192 user data), counters (INCR page_views). The simplest structure",
"<b>List (linked list):</b> LPUSH/RPOP = job queue. Process image resize tasks, send emails. Also: recent items list (latest 10 notifications)",
"<b>Set (unique values):</b> Tags, unique visitors today (SADD visitors:today user123), intersection of two sets (mutual friends = SINTER friends:A friends:B)",
"<b>Sorted Set (set with scores):</b> THE most powerful structure. Score = any number. Auto-sorted. Use for: feeds (score=timestamp), leaderboards (score=points), rate limiting (score=request_time), scheduling (score=execution_time)",
"<b>Hash (key\u2192{field:value}):</b> User profiles (HSET user:123 name Rohith city Hyderabad), shopping carts (HSET cart:123 iphone 2 case 1). Like a mini-table per key",
"<b>Geo (lat/lng indexed):</b> GEOADD drivers:active lng lat driver_id. GEORADIUS to find nearby. Uber drivers, nearby friends, nearby restaurants",
"<b>Pub/Sub (broadcast):</b> PUBLISH channel msg \u2192 all subscribers get it. Real-time notifications, cache invalidation broadcast, chat rooms",
"<b>Stream (append-only log):</b> Lightweight Kafka alternative within Redis. Ordered events with consumer groups. Good for small-scale event streaming",
"<b>Why everywhere:</b> One tool covers caching + queues + leaderboards + sessions + geo + pub/sub + counters. All in RAM = 100K QPS. Every company already runs Redis, so adding another use case = zero new infrastructure",
"<b>In HLD say:</b> Redis sorted sets for feed timelines, Redis hash for shopping cart, Redis geo for nearby drivers, Redis strings for caching. One Redis cluster handles five different use cases"
]},
{t:"Feed \u2014 When Is It Created?",req:"Feed is updated INCREMENTALLY on every post (push) \u2014 NOT rebuilt periodically. When you open app, pre-computed feed is already waiting",b:[
"<b>The exact flow:</b> User A posts at 2:00 PM \u2192 write to Posts DB \u2192 Kafka event \u2192 fan-out workers get A follower list \u2192 ZADD feed:{follower_id} {timestamp} {post_id} for each follower \u2192 all 5000 feeds updated by 2:00:03 PM",
"<b>When user opens app:</b> GET feed:userB \u2192 ZREVRANGE 0 49 \u2192 top 50 posts by timestamp \u2192 feed loads in 50ms. Already pre-computed!",
"<b>NOT periodic:</b> Feed is NOT rebuilt every hour. It is updated on every post. If nobody you follow posts for 3 days, your feed has zero new writes. No wasted work",
"<b>Inactive users:</b> User hasn't opened app in 6 months? Their Redis feed still exists with old posts. On open: fetch from Redis + merge recent celebrity posts (pull). If Redis feed evicted (memory pressure) \u2192 rebuild from DB (cold start, slower first load)",
"<b>Celebrity pull model:</b> Celebrities NOT pre-written to followers (100M writes per post = too expensive). Instead on feed open: your pre-computed feed (45 posts from normal friends) + live query latest posts from celebrities you follow (5 posts) \u2192 merge by timestamp \u2192 top 50",
"<b>Feed size limit:</b> Keep max 500-800 posts per user in Redis sorted set. Older posts trimmed automatically (ZREMRANGEBYRANK). Need older? Query from DB archive",
"<b>When fan-out workers are slow:</b> If fan-out takes 30 seconds for a viral post (millions of followers), some users see the post with delay. This is acceptable \u2014 eventual consistency for feeds is fine",
"<b>In HLD say:</b> Feeds are incrementally updated via fan-out workers on every post. Not periodic. On app open, the pre-computed feed is already in Redis ready to serve in under 100ms"
]},
{t:"Redis Queue vs Real Message Queue",req:"Redis List acts as a BASIC queue but lacks delivery guarantees. Real MQ (SQS/RabbitMQ) has retries, DLQ, and guaranteed delivery",b:[
"<b>Redis List as queue:</b> LPUSH to add, RPOP to consume. Simple FIFO. But: if consumer crashes after RPOP, message is GONE. Lost forever. No retry",
"<b>BRPOP (blocking pop):</b> Consumer waits until message available. Better than polling. But still no delivery guarantee",
"<b>Real MQ (SQS/RabbitMQ):</b> Message becomes invisible after read (not deleted). Consumer must ACK after processing. No ACK within timeout? Message reappears for retry. 3 failures \u2192 Dead Letter Queue",
"<b>Delivery guarantees:</b> Redis queue = at-most-once (may lose). Real MQ = at-least-once (may duplicate, use with idempotency). Kafka with transactions = exactly-once",
"<b>Monitoring:</b> Redis queue = just LLEN (queue depth). Real MQ = dashboards showing: messages in flight, age of oldest message, DLQ count, consumer lag, throughput",
"<b>When Redis queue is fine:</b> Low-stakes background tasks where losing a message is OK. Image resize (user can re-upload), cache warming, log processing",
"<b>When you NEED real MQ:</b> Payment processing, order fulfillment, notifications, anything where lost message = bad. Need retries, DLQ, guaranteed delivery",
"<b>In HLD say:</b> For payment events we use SQS with DLQ for guaranteed delivery. For image resize tasks, Redis list as a lightweight queue is sufficient"
]},
{t:"Kafka Retention \u2014 Permanent or Not?",req:"Default 7 days, but configurable from hours to FOREVER. Key difference: messages NOT deleted after consumption within retention",b:[
"<b>Default:</b> retention.ms = 7 days. After 7 days, old messages auto-deleted from disk",
"<b>Infinite retention:</b> retention.ms = -1 \u2192 data stays FOREVER. Used for audit trails, event sourcing, compliance logs",
"<b>Size-based:</b> retention.bytes = 1GB \u2192 when partition exceeds 1GB, oldest messages deleted. Cap storage cost",
"<b>Log Compaction (alternative):</b> Instead of deleting by age, keep only LATEST value per key. Key user:123 updated 50 times \u2192 only latest value kept. Old values garbage collected. Like a snapshot table that auto-updates",
"<b>Compaction use case:</b> User profile changes topic. Only care about current state, not history. Compaction keeps latest profile per user_id. New consumer reads latest state of ALL users without replaying entire history",
"<b>The KEY difference from queue:</b> Within retention period, messages are NOT deleted after consumption. Consumer A reads message #500, Consumer B reads same message #500. Both can read same data. Queue deletes after read. Kafka does not",
"<b>Offset tracking:</b> Each consumer group tracks its own offset (how far it has read). Reset offset to 3 days ago \u2192 replay all messages from 3 days ago. Impossible with traditional queue",
"<b>In HLD say:</b> Kafka retention set to 14 days for event data, with log compaction on the user-profiles topic to maintain latest state per user"
]},
{t:"Add to Cart \u2014 NOT a Queue!",req:"Cart is a direct write to Redis Hash for instant user feedback. Queues are for background tasks where user does NOT wait",b:[
"<b>Cart write flow:</b> User clicks Add to Cart \u2192 API: POST /cart/add \u2192 Redis HSET cart:user123 iphone15 1 \u2192 200 OK instantly. User sees Added! in under 50ms",
"<b>Why NOT a queue:</b> User needs INSTANT feedback. Queue = async = user would see spinning loader for seconds. Terrible UX for add-to-cart",
"<b>Cart data structure:</b> Redis Hash. Key = cart:user123. Fields = {iphone15: 2, case: 1, charger: 1}. HINCRBY cart:user123 iphone15 1 to increment quantity. HDEL to remove item",
"<b>Cart TTL:</b> Set expiry 30 days. Abandoned cart auto-deleted. No cleanup job needed",
"<b>Cart merge on login:</b> Anonymous user (cookie-based cart) logs in. Merge anonymous cart into user cart. Keep higher quantity per item on conflict",
"<b>WHERE queues ARE used in e-commerce:</b> After checkout: order_placed \u2192 SQS \u2192 email service (send confirmation). After payment: payment_success \u2192 SQS \u2192 inventory service (reduce stock). These are async \u2014 user does NOT wait for email to be sent",
"<b>Rule of thumb:</b> User waiting for response? \u2192 Direct call (Redis/DB). User does not need to wait? \u2192 Queue it",
"<b>In HLD say:</b> Shopping cart stored in Redis Hash for instant reads/writes. Post-checkout tasks (email, inventory update) are queued via SQS for async processing"
]},
{t:"Kafka = Queue + Pub/Sub + Log",req:"Kafka is a distributed LOG that acts as queue WITHIN a consumer group and pub/sub ACROSS groups. Not purely either one",b:[
"<b>Within one consumer group = QUEUE behavior:</b> 6 partitions, 3 consumers in group. Each consumer handles 2 partitions. Each message processed by exactly ONE consumer. Competing consumers pattern = queue",
"<b>Across multiple consumer groups = PUB/SUB behavior:</b> Same order-events topic read by: email-service group AND analytics group AND inventory group. Each group gets ALL messages independently. One event, three consumers",
"<b>Example:</b> User places order \u2192 event to Kafka. Email group: sends confirmation (reads all orders). Analytics group: updates dashboard (reads all orders). Inventory group: reduces stock (reads all orders). Within email group (3 instances): each order handled by exactly one instance",
"<b>Traditional Queue (RabbitMQ):</b> 1 message \u2192 1 consumer. Message deleted after ACK. No replay. Simple routing",
"<b>Traditional Pub/Sub (Redis Pub/Sub):</b> 1 message \u2192 ALL subscribers. Fire-and-forget. NOT persisted. If subscriber is offline, message lost forever",
"<b>Kafka combines both:</b> Messages persisted (days/weeks). Multiple consumer groups (pub/sub). Within group, partitioned consumption (queue). Replayable (reset offset). This is why Kafka replaced BOTH queue and pub/sub at many companies",
"<b>When to just use RabbitMQ/SQS:</b> Simple async task processing. One consumer per message. No need for replay. Lower complexity. Email sending, image resize, one-off background jobs",
"<b>When to use Kafka:</b> Multiple services need same events. Need replay capability. High throughput (millions/sec). Event sourcing. Data pipelines. Audit logs. Stream processing",
"<b>In HLD say:</b> We use Kafka because multiple downstream services need the same events independently \u2014 email, analytics, and inventory all consume from the order-events topic at their own pace with replay capability"
]},
]},
{section:"🔥 What-If Follow-Ups",items:[
{t:"What if Redis goes down?",req:"Interviewer tests: do you have a fallback? Is your system resilient?",b:["<b>Answer:</b> Cache is NOT the source of truth — DB is. If Redis dies, requests fall through to DB directly. Higher latency but system stays ALIVE","<b>Immediate impact:</b> Cache miss rate goes to 100%. DB load spikes 10-20x. P99 latency jumps from 50ms to 500ms","<b>Mitigation 1 — Redis Sentinel:</b> Automatic failover. Slave promoted to master in 5-10 seconds. Brief blip, not full outage","<b>Mitigation 2 — Redis Cluster:</b> Data sharded across 6+ nodes. One node dies = only 1/6th of keys affected. Others still serving","<b>Mitigation 3 — Local cache (L1):</b> In-process HashMap with 30s TTL as first layer. Even if Redis dies, hot data served from local memory for 30 seconds","<b>Mitigation 4 — Circuit breaker:</b> After 5 Redis timeouts, stop calling Redis for 30 sec (circuit open). All traffic goes directly to DB. Prevents thundering herd of timeout retries","<b>What NOT to say:</b> 'We can't function without Redis' — this means you designed a single point of failure. NEVER acceptable","<b>In interview say:</b> 'Redis is a cache, not source of truth. On failure: Sentinel auto-promotes slave in seconds. Meanwhile, requests fall through to DB. We pre-provision DB capacity for this scenario. Local L1 cache absorbs some load during transition'"]},
{t:"What if traffic spikes 10x suddenly?",req:"Interviewer tests: can your system handle viral moments / flash sales?",b:["<b>Answer structure:</b> Layer by layer — which component breaks first? That's where you focus","<b>Layer 1 — CDN absorbs static:</b> 80% of traffic is reads of static content. CDN handles 10x without any change. Your origin barely notices","<b>Layer 2 — Auto-scaling:</b> API servers behind ALB with auto-scaling group. CPU > 70% → add instances. Takes 2-3 min to spin up. Handles sustained spikes","<b>Layer 3 — Rate limiting:</b> Non-critical endpoints rate-limited aggressively during spike. Protect core flows (checkout, payments)","<b>Layer 4 — Queue buffering:</b> Async operations (notifications, analytics, emails) absorbed by Kafka/SQS. Consumers process at their own pace. No data loss, just delay","<b>Layer 5 — DB read replicas:</b> Read traffic to replicas. Write traffic is usually small portion. If writes spike → queue writes too","<b>Layer 6 — Graceful degradation:</b> Disable non-essential features: recommendations OFF, search results cached longer, analytics delayed. Keep core flow alive","<b>The killer answer:</b> 'We handle 10x reads via CDN + cache + read replicas. 10x writes via Kafka buffering + async processing. If still not enough, we shed load on low-priority features first. We never take down payments/checkout'","<b>Pre-warming:</b> For KNOWN spikes (flash sale, product launch) — pre-scale 2 hours before. Don't rely on auto-scaling for predictable load"]},
{t:"Why not use MongoDB here? / Why SQL?",req:"Interviewer tests: do you understand data model tradeoffs or just defaulting?",b:["<b>When SQL wins (say this):</b> 'We need ACID transactions (payments, inventory deduction), complex joins across entities (orders + users + products), strong consistency, and the data is relational in nature'","<b>When MongoDB wins:</b> 'Schema changes frequently (MVP, evolving product), documents are self-contained (user profiles, product catalogs), no complex joins needed, and we value developer velocity over strict consistency'","<b>The trap:</b> Saying 'MongoDB is faster' — it's not universally true. PostgreSQL with proper indexes handles 50K+ QPS. MongoDB wins on flexible schema and horizontal scaling, NOT raw speed","<b>Red flag answer:</b> 'I always use MongoDB because NoSQL scales better' — shows no understanding of tradeoffs. Interviewer will probe further","<b>Best answer pattern:</b> 'For THIS specific service, I choose PostgreSQL because [specific reason]. But for [other service] in same system, I'd use MongoDB because [different reason]'. Shows polyglot persistence thinking","<b>Follow-up trap:</b> 'What about Cassandra?' — Answer: 'Cassandra when we need massive write throughput (100K+ writes/sec) AND can tolerate eventual consistency AND have simple access patterns (no joins). Time-series data, message history, activity logs'"]},
{t:"What if the database becomes a bottleneck?",req:"Interviewer tests: do you know the scaling ladder?",b:["<b>Step 1 — Indexes (free):</b> Add B-tree indexes on WHERE/JOIN/ORDER BY columns. 100x read speedup. Check with EXPLAIN ANALYZE. Most overlooked fix","<b>Step 2 — Connection pooling:</b> PgBouncer / HikariCP. Reuse connections instead of creating per request. Can 10x throughput instantly","<b>Step 3 — Read replicas:</b> 80% of queries are reads. Route reads to replicas. Master handles writes only. Handles most scaling needs","<b>Step 4 — Caching:</b> Redis cache for hot data. 95% hit rate = DB load drops 20x. Cache-aside pattern","<b>Step 5 — Query optimization:</b> N+1 queries, missing indexes, full table scans. Fix the queries before scaling hardware","<b>Step 6 — Vertical scale:</b> Bigger machine (more RAM, faster SSD). Surprisingly effective. Goes further than people think","<b>Step 7 — Table partitioning:</b> Split large table by date range within same DB. Queries scan less data. Built-in PostgreSQL feature","<b>Step 8 — Vertical sharding:</b> Move different tables to different databases. Users DB separate from Orders DB. Moderate complexity","<b>Step 9 — Horizontal sharding (LAST RESORT):</b> Split rows across databases. Consistent hashing. Cross-shard joins = nightmare. Only when everything else fails","<b>In interview say:</b> 'I'd try solutions in order of complexity. Most systems never need sharding — PostgreSQL + replicas + Redis handles 50K+ QPS'"]},
{t:"How do you handle duplicate requests / idempotency?",req:"Interviewer tests: do you understand distributed systems failure modes?",b:["<b>The problem:</b> User clicks 'Pay' → network timeout → user clicks again → charged TWICE. Or: Kafka delivers message twice → order processed twice","<b>Solution — Idempotency key:</b> Client generates UUID per action. Server: INSERT INTO processed_keys (key) → if duplicate key error → return cached previous result. Same input always = same output","<b>Implementation:</b> Redis SETNX idempotency:{key} {result} EX 86400. NX = only if not exists. If SET succeeds → process request → store result. If SET fails → return stored result","<b>Where to apply:</b> Payment processing (always), order creation (always), any state-changing POST/PUT endpoint. GET requests are naturally idempotent","<b>Kafka consumer idempotency:</b> Message has unique event_id. Consumer checks: have I processed this event_id before? Yes → skip. No → process + record event_id. At-least-once delivery made safe","<b>Database approach:</b> UNIQUE constraint on (user_id, action, entity_id, date). Database rejects duplicate. Simpler than Redis for some cases","<b>In interview say:</b> 'Every payment request carries a client-generated idempotency key (UUID). Server checks Redis: if key exists, return cached result. If not, process and store. Network retries are completely safe'"]},
{t:"What if one microservice is slow/down?",req:"Interviewer tests: cascading failure prevention",b:["<b>Without protection:</b> Service A calls B (slow) → A threads exhausted waiting → A becomes slow → C calls A → C becomes slow → entire system cascading failure. One slow service kills everything","<b>Circuit Breaker:</b> After 5 failures in 10s → OPEN circuit → immediately return fallback/error for 30s → try one request (HALF-OPEN) → success? close circuit. Failure? stay open","<b>Timeouts:</b> ALWAYS set timeouts. Default 3 seconds max. If service doesn't respond in 3s, fail fast. Don't wait forever. Propagate deadline through call chain","<b>Bulkhead:</b> Separate thread pools per downstream service. Payment service pool (10 threads) separate from Recommendation pool (5 threads). Slow recommendations can't exhaust payment threads","<b>Retry with backoff:</b> Retry 3x with exponential delay (1s, 2s, 4s) + jitter. If all retries fail → circuit opens. Jitter prevents thundering herd (all clients retrying at same instant)","<b>Fallback responses:</b> Service down? Return cached data, default values, or degraded experience. Recommendations service down → show popular items instead. Better than error page","<b>Async decoupling:</b> If operation isn't user-facing, put it on Kafka. Email service down? Messages queue up. When it recovers, processes backlog. User never notices","<b>In interview say:</b> 'Circuit breaker (Hystrix/Resilience4j) with 3s timeout on all downstream calls. If service B fails, we return cached/default response. Critical paths (payment) get dedicated bulkhead thread pools'"]},
{t:"How do you ensure data consistency across services?",req:"Interviewer tests: distributed transaction understanding",b:["<b>The problem:</b> Order service creates order. Payment service charges card. Inventory service deducts stock. What if payment succeeds but inventory fails? Data inconsistent across services","<b>Option 1 — Saga (Orchestration):</b> Central orchestrator: createOrder() → chargePayment() → deductInventory(). If step 3 fails → compensate: refundPayment() → cancelOrder(). Each step has an undo","<b>Option 2 — Saga (Choreography):</b> Event-driven: OrderCreated event → Payment listens → charges → PaymentCompleted event → Inventory listens → deducts. If fails → publishes InventoryFailed → Payment listens → refunds","<b>Option 3 — Outbox Pattern:</b> Write to DB + outbox table in SAME transaction (atomic). Background worker reads outbox → publishes to Kafka. Guarantees: if DB write succeeds, event WILL be published. No dual-write problem","<b>Option 4 — Eventual consistency + reconciliation:</b> Accept that services may be temporarily inconsistent. Run daily reconciliation job: compare order DB vs payment DB vs inventory DB. Flag mismatches. Alert. Fix manually or auto-correct","<b>NOT an option — Distributed 2PC:</b> Two-phase commit across services is too slow, fragile, and doesn't scale. Never use in microservices. Only within single DB","<b>In interview say:</b> 'Orchestrated saga for checkout flow. Each step is idempotent with compensating action. Outbox pattern ensures events always published. Daily reconciliation catches any drift'"]},
{t:"How would you handle a hot partition / hot key?",req:"Interviewer tests: real-world scaling problem awareness",b:["<b>The problem:</b> Celebrity posts → millions hit same cache key. Flash sale → all requests for same product_id. One DB shard gets 100x traffic while others idle","<b>Cache hot key solutions:</b> 1) Replicate hot key to N Redis nodes, client randomly picks one. 2) Local in-process cache (30s TTL) — no network call. 3) Key splitting: popular:shard1, popular:shard2, ..., client picks random shard","<b>DB hot partition solutions:</b> 1) Add random suffix to shard key for writes (product_123_rand4), aggregate on read. 2) Queue writes to hot partition, batch process. 3) Pre-split known hot keys across multiple partitions","<b>Detection:</b> Monitor key access frequency. Redis: MONITOR command (dev only) or track via application metrics. DB: query stats, pg_stat_statements. Alert when single key > 10K QPS","<b>Kafka hot partition:</b> All messages for same key go to same partition (by design for ordering). Celebrity user_id = hot partition. Fix: use random partitioning for non-ordered events, or sub-partition within same key","<b>In interview say:</b> 'Detect via metrics. For cache: replicate hot key to 5 nodes + local L1 cache. For DB: write-behind with batching to hot shard. For Kafka: random partitioning where ordering not required'"]},
{t:"Why not just put everything in one service?",req:"Interviewer tests: when to use microservices vs monolith",b:["<b>The honest answer:</b> 'For a small team (< 10 engineers), I WOULD put it in one service. Monolith is perfectly fine and faster to develop'","<b>When to split:</b> 1) Team > 20 engineers stepping on each other. 2) One component needs 10x more scale than others. 3) Different deployment cadences (auth changes weekly, billing changes monthly). 4) Fault isolation needed (search crashing shouldn't take down payments)","<b>The cost of microservices:</b> Network latency, distributed tracing complexity, eventual consistency headaches, Kubernetes operational overhead, service mesh, more infra engineers needed","<b>Middle ground — Modular monolith:</b> Single deployable but with clean module boundaries internally. Can extract to service later if needed. Best of both worlds for most teams","<b>How to answer in interview:</b> 'I start monolith. As team grows and specific pain points emerge — like Feed Service needing 50x more scale than Profile Service — I extract that one service. I don't pre-split everything day one'","<b>What impresses:</b> Showing you understand the COST of microservices, not just the benefits. Most candidates only talk about benefits"]},
{t:"How do you handle schema migrations without downtime?",req:"Interviewer tests: production engineering maturity",b:["<b>The rule:</b> NEVER make backward-incompatible changes in one deploy. Always 2-step (or 3-step) process","<b>Adding a column:</b> Easy. ALTER TABLE ADD COLUMN with DEFAULT. Old code ignores new column. New code uses it. One deploy","<b>Removing a column:</b> Step 1: deploy code that stops reading/writing the column. Step 2 (days later): ALTER TABLE DROP COLUMN. Never remove column while code still references it","<b>Renaming a column:</b> Step 1: ADD new column. Step 2: deploy code writing to BOTH old+new, reading from new. Step 3: backfill old→new. Step 4: deploy code using only new. Step 5: drop old column. 5 deploys!","<b>Large table migration:</b> ALTER TABLE on 500M rows = locks table for hours = downtime. Fix: pg_repack, gh-ost (GitHub tool), or create new table + dual-write + backfill + switch","<b>NoSQL schema:</b> Easier — documents are flexible. Just start writing new fields. Old docs without field → handle with default in code. No ALTER TABLE needed","<b>In interview say:</b> 'We use expand-contract pattern: add new → migrate data → switch code → remove old. Tools like gh-ost for MySQL or pg_repack for PostgreSQL handle large tables without locking'"]},
{t:"What if you need strong consistency AND high availability?",req:"Interviewer tests: CAP theorem depth — is the candidate just memorizing or truly understanding?",b:["<b>The truth:</b> You CAN'T have both during a network partition. But partitions are RARE (minutes per year). Most of the time you get both. Design for the common case, plan for the rare case","<b>PACELC framework (better than CAP):</b> During Partition → choose A or C. ELSE (99.9% of time) → choose Latency or Consistency. DynamoDB: PA/EL (available + low latency). Spanner: PC/EC (consistent always)","<b>Per-operation consistency:</b> Same system, different guarantees per operation. Payments: strong consistency (read from primary). Feed: eventual consistency (read from replica). Don't pick one globally","<b>Google Spanner approach:</b> TrueTime API + GPS atomic clocks = strong consistency at global scale. But: requires specialized hardware, 10ms+ write latency, very expensive. Only Google/CockroachDB do this","<b>Practical answer:</b> 'Strong consistency for writes that matter (payments, inventory). Eventual consistency for reads that can tolerate staleness (feeds, analytics). Read-your-writes consistency for user's own actions'","<b>In interview say:</b> 'CAP is about network partitions which are rare. Day-to-day, I use PACELC thinking: payments get strong consistency (write to primary, read from primary). Feeds get eventual consistency for lower latency. Per-operation, not per-system'"]},
{t:"How do you debug a production issue across microservices?",req:"Interviewer tests: operational maturity and observability thinking",b:["<b>Step 1 — Metrics dashboard:</b> Grafana shows: which service has elevated error rate? Which has high P99? Narrow from 20 services to 2-3 suspects in 30 seconds","<b>Step 2 — Distributed tracing:</b> Take a failing request_id → look up in Jaeger/Zipkin → see the full call chain across services with timing. See exactly WHERE it failed and how long each hop took","<b>Step 3 — Logs:</b> Structured logs with correlation_id. Filter in Kibana: correlation_id=abc123. See every log line from every service for that one request. Chronological story of what happened","<b>Step 4 — Reproduce:</b> Shadow traffic or replay the exact request in staging with same parameters. Confirm the bug. Fix. Test. Deploy canary","<b>The three pillars:</b> Metrics (what's broken), Traces (where it broke), Logs (why it broke). You need ALL three. Metrics without logs = 'something is wrong somewhere'. Logs without metrics = drowning in text","<b>In interview say:</b> 'Prometheus metrics to detect (alert on P99 > 500ms), Jaeger traces to locate (which service in the chain), ELK logs to diagnose (exact error message with stack trace). Every request carries a correlation_id through all services'"]},
{t:"What if your message queue loses messages?",req:"Interviewer tests: reliability guarantees understanding",b:["<b>At-most-once (may lose):</b> Fire and forget. Producer sends, no ACK. Fast but lossy. OK for: metrics, analytics, non-critical logs","<b>At-least-once (may duplicate):</b> Producer waits for broker ACK. If timeout → retry. May send twice. Consumer must be IDEMPOTENT. This is the sweet spot for 90% of cases","<b>Exactly-once (hard):</b> Kafka supports via idempotent producer + transactional consumer. Both sides coordinate. Complex. Use only when business requires (financial transactions)","<b>Producer durability:</b> Kafka: acks=all means ALL replicas confirmed write. acks=1 means only leader confirmed (faster but can lose if leader dies before replication). For critical data: acks=all + min.insync.replicas=2","<b>Consumer durability:</b> Don't ACK before processing! Process first → then commit offset. If crash after process but before commit → reprocess (idempotent handles this). If ACK before process → message lost on crash","<b>DLQ (Dead Letter Queue):</b> Message fails processing 3 times → move to DLQ instead of blocking the queue. Investigate DLQ messages manually or with alerting. Never lose them, never block the pipeline","<b>In interview say:</b> 'At-least-once delivery with idempotent consumers. Producer: acks=all for critical events. Consumer: process-then-commit pattern. Failed messages go to DLQ after 3 retries for investigation'"]},
{t:"Why not just scale vertically? Why distribute?",req:"Interviewer tests: when vertical is fine vs when you truly need horizontal",b:["<b>Vertical IS fine for most:</b> A single PostgreSQL on a 64-core, 256GB RAM machine handles 50K+ QPS reads. Most startups NEVER outgrow this. Don't distribute prematurely","<b>When vertical hits limits:</b> 1) Single machine maxes out (you can't buy a bigger one). 2) Single point of failure (machine dies = total outage). 3) Geographic latency (users in India, server in US = 200ms minimum)","<b>When to distribute:</b> Need >100K QPS sustained. Need 99.99%+ availability (can't have single point of failure). Need multi-region (latency requirements). Need to process more data than fits on one machine","<b>Cost comparison:</b> One large machine (vertical): simple, easy to manage, no network issues, ACID easy. Distributed: complex, eventual consistency headaches, network partitions, debugging hell, more engineers needed","<b>The right answer:</b> 'Start vertical. Scale up until you can't or until you need fault tolerance. Then: read replicas first (still mostly vertical). Sharding last (truly horizontal)'","<b>In interview say:</b> 'Vertical scaling is underrated. I only distribute when I have a specific need: fault tolerance, geographic proximity, or capacity beyond what one machine provides. Most of our services run fine on single powerful instances with read replicas'"]},
{t:"How do you handle data that needs to be in multiple services?",req:"Interviewer tests: data ownership and eventual consistency",b:["<b>The problem:</b> OrderService needs customer name. UserService owns customer data. OrderService can't directly read UserService DB (breaks microservice rules). What do you do?","<b>Option 1 — API call at runtime:</b> OrderService calls UserService.getUser(id) when needed. Simple. But: adds latency + coupling (if UserService down, OrderService affected)","<b>Option 2 — Event-driven denormalization:</b> UserService publishes UserUpdated events to Kafka. OrderService consumes and stores a LOCAL copy of customer_name. Fast reads, no runtime dependency. Eventual consistency (seconds stale)","<b>Option 3 — API Gateway aggregation:</b> Neither service has both. Gateway calls both and merges response for the client. Good for read APIs, not for internal processing","<b>When to use which:</b> Rarely-needed data → API call. Frequently-needed data → event-driven local copy. Client-facing combined view → gateway aggregation","<b>The trade-off:</b> Local copies = fast + independent but stale (user changes name, OrderService shows old name for a few seconds). API calls = always fresh but slow + coupled. Pick based on freshness requirement","<b>In interview say:</b> 'UserService publishes UserUpdated events. OrderService stores denormalized copy of customer_name locally. 99.9% reads are instant. Stale by max 5 seconds after update — acceptable for order display'"]},
{t:"What about security? How do you handle auth at scale?",req:"Interviewer tests: security awareness in system design",b:["<b>API Gateway auth:</b> ALL requests hit gateway first. Gateway validates JWT token (stateless — no DB call needed). Invalid token → 401 immediately. Valid → forward to service with user_id in header","<b>JWT vs Session:</b> JWT: stateless, scalable, no central store needed. But: can't revoke easily (token valid until expiry). Session: revocable instantly, but needs Redis/DB for session store. Hybrid: short-lived JWT (15 min) + refresh token in Redis","<b>Service-to-service auth:</b> Internal services communicate via mTLS (mutual TLS). Each service has certificate. Verified at connection level. Or: API keys for internal services with IP allowlisting","<b>Rate limiting per user:</b> Prevent abuse even from authenticated users. Token bucket per user_id in Redis. Different limits per tier (free vs paid). Applied at API gateway","<b>Secrets management:</b> NEVER hardcode API keys/passwords. Use Vault (HashiCorp) or AWS Secrets Manager. Rotate automatically. Services fetch secrets at startup, refresh periodically","<b>Common attack prevention:</b> SQL injection (parameterized queries). XSS (escape output). CSRF (SameSite cookies + tokens). DDoS (CDN + rate limiting + WAF)","<b>In interview say:</b> 'JWT validation at API Gateway (stateless, fast). Short-lived tokens (15 min) with refresh flow. mTLS for service-to-service. Rate limiting per user at gateway. Secrets in Vault with auto-rotation'"]},
]},
{section:"Interview Playbook",items:[
{t:"Minute-by-Minute (45min)",req:"Exactly how to spend your time",b:["<b>0:00-0:02</b> Listen. Don't interrupt","<b>0:02-0:05</b> CLARIFY. 3-5 questions","<b>0:05-0:08</b> ESTIMATE. QPS, storage, bandwidth","<b>0:08-0:10</b> API DESIGN. 2-3 endpoints","<b>0:10-0:13</b> DATA MODEL. Tables, SQL vs NoSQL","<b>0:13-0:25</b> HIGH-LEVEL DESIGN. Draw + explain flow","<b>0:25-0:40</b> DEEP DIVE. The real test","<b>0:40-0:45</b> WRAP UP. Monitoring, improvements"]},
{t:"Phrases That Impress",req:"Things to say that show senior-level thinking",b:["'Let me clarify requirements and constraints first...'","'Given ~X QPS, a single DB should handle this...'","'I choose NoSQL because access pattern is simple key lookups at scale...'","'Tradeoff: consistency vs availability. For this I prioritize...'","'We replicate across 3 AZs for fault tolerance...'","'Potential bottleneck: X. We mitigate with...'","'We add monitoring for P99 latency, error rates, QPS per service...'","'For idempotency, client sends unique key, server checks before processing...'","'We use eventual consistency here because stale data is acceptable for feeds...'","'Kafka gives us replay capability and decouples the write path from downstream consumers...'"]},
{t:"Common Mistakes",req:"Each one can tank your interview",b:["<b>Jumping to solution</b> without clarifying","<b>Overengineering</b> (sharding a 100 QPS DB)","<b>Silent thinking</b> — interviewer can't evaluate silence","<b>Name-dropping</b> ('use Kafka') without explaining WHY","<b>Ignoring scale</b> in problem that says 100M users","<b>No failure handling</b> — what if this dies?","<b>Memorized answer</b> — interviewer can tell instantly","<b>No estimation</b> — skipping back-of-envelope math","<b>Single DB for everything</b> — not considering polyglot persistence"]},
{t:"'What Would You Improve?'",req:"Ready answers for the final question every interviewer asks",b:["Monitoring + alerting (Prometheus, Grafana, PagerDuty)","Auto-scaling based on traffic patterns","Multi-region deployment for disaster recovery","A/B testing framework for feature rollouts","Rate limiting and DDoS protection","Data analytics pipeline for business insights","Chaos engineering (kill services randomly to test resilience)","CI/CD pipeline with canary deployments","Read replicas + cache warming for new regions"]},
]},
];

// ==================== HLD RENDER ====================
const hldSidebar=document.getElementById('hldSidebarList'),hldContent=document.getElementById('hldContentArea'),hldBreadcrumb=document.getElementById('hldBreadcrumb'),hldSearch=document.getElementById('hldSearch');
let activeHldIdx=0;

// Navigate to VS comparison
function goToVs(name){
  // Find the Comparisons section
  for(let i=0;i<HLD.length;i++){
    if(HLD[i].section.includes('Comparisons')){
      selHld(i);
      // Scroll to matching card
      setTimeout(()=>{
        const cards=hldContent.querySelectorAll('.hld-card h3');
        cards.forEach(h=>{if(h.textContent===name)h.scrollIntoView({behavior:'smooth',block:'start'})});
      },100);
      return;
    }
  }
}

HLD.forEach((sec,si)=>{
  const el=document.createElement('div');el.className='s-topic'+(si===0?' active':'');
  const cnt=sec.isQuestions?sec.questions.length:sec.items.length;
  el.innerHTML=`${sec.section} <span class="cnt">${cnt}</span>`;
  el.onclick=()=>selHld(si);el.id='hst-'+si;hldSidebar.appendChild(el);
  const sub=document.createElement('div');sub.className='s-patterns';sub.id='hsp-'+si;
  const list=sec.isQuestions?sec.questions.map(q=>`Q${q.n}. ${q.t}`):sec.items.map(i=>i.t);

const LLD=[
{section:"LLD Framework & Theory",items:[
{t:"The 9-Step LLD Framework",req:"Use this structure for EVERY LLD interview question",b:["<b>Step 1: CLARIFY Requirements (2 min)</b> — What features? What edge cases? Single user or multi? Real-time?","<b>Step 2: List NOUNS → Classes (2 min)</b> — Every noun = potential class. ATM → Card, Account, Transaction, CashDispenser","<b>Step 3: List VERBS → Methods (2 min)</b> — Every verb = potential method. park(), withdraw(), book(), calculate()","<b>Step 4: WHO owns each method? (3 min) — THE KEY SKILL</b> — findSlot() → ParkingLot (manages slots). calculateBill() → BillingService (knows rates). isAvailable() → Slot (knows about itself)","<b>Step 5: Relationships (2 min)</b> — HAS-A (composition): ParkingLot HAS Floors. IS-A (inheritance): Car IS-A Vehicle. USES (dependency): ATM USES BankService","<b>Step 6: Write Flows (5 min)</b> — Step-by-step: User does X → System calls A.method() → validates → calls B.method() → returns result","<b>Step 7: State Machine (2 min)</b> — What states exist? What transitions are valid? What's invalid? ATM: IDLE → CARD_IN → AUTHED → DISPENSING → IDLE","<b>Step 8: Design Patterns (1 min)</b> — Name 2-3 patterns used. Strategy (swappable algorithms), State (state-dependent behavior), Observer (notifications)","<b>Step 9: Edge Cases (2 min)</b> — Concurrent access, timeouts, failures, invalid inputs, resource exhaustion"]},
{t:"3 Types of Classes",req:"Every class falls into one of these categories",b:["<b>1. ENTITY (the things):</b> Vehicle, Slot, Ticket, User, Seat, Card, Account — Hold DATA + small methods about themselves only (slot.isAvailable(), card.isBlocked())","<b>2. SERVICE (the workers):</b> BillingService, PaymentService, NotificationService, BankService — Hold LOGIC + business rules. Need data from MULTIPLE objects","<b>3. MANAGER / CONTROLLER (the orchestrator):</b> ParkingLot, BookingSystem, ATM, ElevatorController — Coordinate entities + services. Own the main flow","<b>Rule of thumb:</b> If method needs data from ONE object → put it on that object. If needs MULTIPLE objects → create a Service. If coordinates a multi-step flow → Manager"]},
{t:"SOLID Principles",req:"Interview buzzword — but S alone is 90% of what matters",b:["<b>S — Single Responsibility:</b> Each class does ONE thing. ❌ ParkingLot.park() + .calculateBill() + .pay() = GOD CLASS. ✅ ParkingLot.park() + BillingService.calculate() + PaymentService.pay()","<b>O — Open/Closed:</b> Add new features without modifying existing code. New vehicle type? Add TruckSlot class. Don't modify CarSlot. Use interfaces/abstract classes","<b>L — Liskov Substitution:</b> Child works wherever parent expected. Any PaymentMethod (Card, UPI, Cash) works in processPayment(PaymentMethod pm)","<b>I — Interface Segregation:</b> Don't force classes to implement unused methods. Separate Movable and Attackable interfaces for chess pieces","<b>D — Dependency Inversion:</b> Depend on abstractions, not concrete classes. BillingService depends on BillingStrategy interface, not HourlyRate class directly"]},
{t:"Design Patterns (Know These 6)",req:"Name the pattern + explain WHY it fits. Don't just use the name",b:["<b>1. Strategy:</b> Swap algorithms at runtime without changing the class. Billing: HourlyRate, FlatRate, WeekendRate. Elevator: FCFS, ShortestSeekFirst, LOOK. Cash dispenser: GreedyStrategy, MinNotesStrategy","<b>2. Factory:</b> Hide creation logic. VehicleFactory.create('CAR') returns Car. Avoids if/else chains. Use when: multiple subtypes, creation is complex","<b>3. Singleton:</b> Only ONE instance exists. ParkingLot.getInstance(), Database.getInstance(). Use for: shared resources, config. Caution: makes testing harder","<b>4. Observer:</b> When X happens, notify all interested parties. Seat available → notify waitlisted users. Order placed → notify kitchen + delivery + billing. Like pub/sub within the app","<b>5. State:</b> Object behavior changes based on internal state. Vending machine: IDLE → COIN_INSERTED → PRODUCT_SELECTED → DISPENSING. Each state = separate class with allowed actions","<b>6. Builder:</b> Construct complex objects step-by-step. Pizza.builder().size(LARGE).crust(THIN).topping(CHEESE).build(). Use when: many optional parameters, construction is multi-step"]},
{t:"Concurrency & State Machines",req:"How to handle simultaneous access + valid transitions",b:["<b>Double-booking problem:</b> Two users book same seat simultaneously. Classic LLD concurrency issue","<b>Fix 1 — Mutex/Lock:</b> slot.tryLock() → if locked, reject. Process. unlock(). Simple but blocks others","<b>Fix 2 — Optimistic Locking:</b> UPDATE seats SET status='BOOKED' WHERE id=5 AND version=3. If 0 rows updated → someone else got it. Retry or fail","<b>Fix 3 — Temporary Hold:</b> HOLD seat 5 min. Must pay within 5 min. Timeout = auto-release. Best for ticket booking","<b>State Machine rules:</b> 1) Define ALL valid states. 2) Define ALL valid transitions. 3) REJECT invalid transitions with error. 4) State determines what actions are allowed","<b>Example:</b> Order: PLACED → CONFIRMED → PREPARING → READY → DELIVERED → COMPLETED. Invalid: DELIVERED → PLACED (can't go back!). Each state = different allowed methods"]},
{t:"JavaScript Class Syntax Quick Ref",req:"Write clean JS classes in interview — no frameworks, no imports",b:["<b>Class:</b> class Vehicle { constructor(plate, type) { this.plate = plate; this.type = type; } getType() { return this.type; } }","<b>Inheritance:</b> class Car extends Vehicle { constructor(plate) { super(plate, 'CAR'); this.doors = 4; } }","<b>Enum (const object):</b> const Status = { AVAILABLE: 'AVAILABLE', BOOKED: 'BOOKED', HELD: 'HELD' };","<b>Private (convention):</b> this._balance (underscore prefix). True private: #balance (class fields)","<b>Static:</b> static getInstance() { if (!ParkingLot._instance) ParkingLot._instance = new ParkingLot(); return ParkingLot._instance; }","<b>Map:</b> const m = new Map(); m.set(key, val); m.get(key); m.has(key); m.delete(key);","<b>Error handling:</b> if (!slot) throw new Error('No available slot');","<b>Date math:</b> const hours = Math.ceil((end - start) / (1000 * 60 * 60));"]},
]},
{section:"LLD Questions (1-25)",isQuestions:true,questions:[
{n:1,t:"Parking Lot",
req:"Multi-floor parking with different vehicle sizes, hourly billing, entry/exit gates",
classes:"<b>Entity:</b> Vehicle (plate, type), Slot (id, type, floor, vehicle), Ticket (id, vehicle, slot, entryTime, exitTime)<br><b>Service:</b> BillingService (rates per type, calculate hours×rate)<br><b>Manager:</b> ParkingLot (floors[], slots[], tickets Map, park/unpark flow)",
flow:"<b>PARK:</b> Vehicle arrives → ParkingLot.park(vehicle) → find available slot matching size (BIKE→SMALL, CAR→MEDIUM, TRUCK→LARGE) → slot.occupy(vehicle) → create Ticket → return ticket<br><br><b>UNPARK:</b> User shows ticket → ParkingLot.unpark(plate) → ticket.exitTime = now → slot.free() → BillingService.calculate(ticket) → return amount<br><br><b>Key:</b> Slot manages own state (isAvailable, occupy, free). BillingService separate from ParkingLot. Ticket is just data.",
patterns:"<b>Strategy:</b> BillingStrategy interface — HourlyRate, FlatRate, WeekendRate (swappable without changing ParkingLot)<br><b>Factory:</b> VehicleFactory.create(type) returns Car/Bike/Truck<br><b>Singleton:</b> ParkingLot.getInstance() — only one lot exists",
edge:"Lot full (no slot of needed type) → reject with error | Multiple entry/exit gates → each gate is a terminal, talks to same ParkingLot | Lost ticket → charge max daily rate | VIP/reserved spots → separate slot pool | Disabled spots near elevator | Electric vehicle charging slots",
code:`const VehicleType = { CAR: 'CAR', BIKE: 'BIKE', TRUCK: 'TRUCK' };
const SlotSize = { SMALL: 'SMALL', MEDIUM: 'MEDIUM', LARGE: 'LARGE' };
const VEHICLE_SLOT = { CAR: 'MEDIUM', BIKE: 'SMALL', TRUCK: 'LARGE' };

class Slot {
  constructor(id, size, floor) {
    this.id = id; this.size = size; this.floor = floor;
    this.vehicle = null;
  }
  isAvailable() { return this.vehicle === null; }
  occupy(vehicle) {
    if (!this.isAvailable()) throw new Error('Slot occupied');
    this.vehicle = vehicle;
  }
  free() { this.vehicle = null; }
}

class Ticket {
  constructor(vehicle, slot) {
    this.id = 'TKT-' + Date.now();
    this.vehicle = vehicle; this.slot = slot;
    this.entryTime = Date.now(); this.exitTime = null;
  }
}

class BillingService {
  constructor() {
    this.rates = new Map([['CAR',20],['BIKE',10],['TRUCK',50]]);
  }
  calculate(ticket) {
    const hours = Math.ceil((ticket.exitTime - ticket.entryTime) / (1000*60*60));
    return hours * this.rates.get(ticket.vehicle.type);
  }
}

class ParkingLot {
  constructor() {
    this.slots = []; this.tickets = new Map();
    this.billing = new BillingService();
  }
  park(vehicle) {
    const needed = VEHICLE_SLOT[vehicle.type];
    const slot = this.slots.find(s => s.isAvailable() && s.size === needed);
    if (!slot) throw new Error('No available slot');
    slot.occupy(vehicle);
    const ticket = new Ticket(vehicle, slot);
    this.tickets.set(vehicle.plate, ticket);
    return ticket;
  }
  unpark(plate) {
    const ticket = this.tickets.get(plate);
    if (!ticket) throw new Error('Ticket not found');
    ticket.exitTime = Date.now();
    ticket.slot.free();
    const amount = this.billing.calculate(ticket);
    this.tickets.delete(plate);
    return { ticket, amount };
  }
}`,
tip:"Interviewer evaluates: Slot owns its own state. BillingService is separate (not inside ParkingLot). Ticket is pure data. ParkingLot orchestrates. Strategy pattern for billing variants."},

{n:2,t:"ATM Machine",
req:"Insert card, authenticate PIN, check balance, withdraw (with denominations), deposit, transfer",
classes:"<b>Entity:</b> Card (cardNum, pin, accountId, isBlocked), Account (id, balance, type), Transaction (id, type, amount, timestamp, status)<br><b>Service:</b> BankService (verifyPIN, getBalance, debit, credit), CashDispenser (notes map, dispense, hasCash)<br><b>Hardware:</b> CardReader (read, eject, swallow), Screen (showMenu, showMessage), ReceiptPrinter (print)<br><b>Manager:</b> ATM (state, coordinates all above)",
flow:"<b>WITHDRAW:</b> User inserts card → CardReader.read() → Screen.showPIN() → ATM.verifyPIN(pin) → BankService.verify() → [wrong 3x → block+swallow] → Screen.showMenu() → User selects Withdraw → Screen.askAmount() → Validate: BankService.getBalance() >= amount AND CashDispenser.hasCash(amount) → BankService.debit(account, amount) → CashDispenser.dispense(amount) → create Transaction → ReceiptPrinter.print() → CardReader.eject()<br><br><b>STATE MACHINE:</b> IDLE → CARD_INSERTED → PIN_ENTERED → MENU → WITHDRAWAL_IN_PROGRESS → CASH_DISPENSED → IDLE",
patterns:"<b>State:</b> ATM states (IDLE, CARD_IN, AUTHED, DISPENSING) — each state defines valid actions<br><b>Strategy:</b> CashDispenser can use GreedyStrategy or MinNotesStrategy for dispensing<br><b>Singleton:</b> One ATM instance per physical machine<br><b>Observer:</b> ATM notifies bank when cash running low",
edge:"Wrong PIN 3 times → block card + swallow | ATM out of cash → reject + alert bank | Network down → 'Service unavailable' | User walks away mid-transaction → timeout → reverse + eject | Power failure during dispense → transaction log reconciliation | Cash dispensed but not taken → retract after 30s → credit back | Daily withdrawal limit per card | Amount not dispensable in available denominations → reject",
code:`const ATMState = { IDLE:'IDLE', CARD_IN:'CARD_IN', AUTHED:'AUTHED' };

class Card {
  constructor(cardNum, pin, accountId) {
    this.cardNum = cardNum; this.pin = pin;
    this.accountId = accountId; this.isBlocked = false;
    this.failedAttempts = 0;
  }
}

class Account {
  constructor(id, balance) { this.id = id; this.balance = balance; }
  withdraw(amt) {
    if (amt > this.balance) throw new Error('Insufficient balance');
    this.balance -= amt;
  }
  deposit(amt) { this.balance += amt; }
}

class CashDispenser {
  constructor() {
    this.notes = new Map([[2000,10],[500,20],[200,20],[100,50]]);
  }
  hasCash(amount) {
    let rem = amount;
    for (const [denom, count] of this.notes) {
      rem -= Math.min(Math.floor(rem/denom), count) * denom;
    }
    return rem === 0;
  }
  dispense(amount) {
    let rem = amount; const result = {};
    for (const d of [2000, 500, 200, 100]) {
      const count = Math.min(Math.floor(rem/d), this.notes.get(d)||0);
      if (count > 0) {
        result[d] = count;
        this.notes.set(d, this.notes.get(d) - count);
        rem -= count * d;
      }
    }
    if (rem > 0) throw new Error('Cannot dispense exact amount');
    return result;
  }
}

class ATM {
  constructor() {
    this.state = ATMState.IDLE;
    this.card = null; this.account = null;
    this.dispenser = new CashDispenser();
  }
  insertCard(card) {
    if (this.state !== ATMState.IDLE) throw new Error('ATM busy');
    if (card.isBlocked) throw new Error('Card blocked');
    this.card = card; this.state = ATMState.CARD_IN;
  }
  enterPin(pin) {
    if (this.state !== ATMState.CARD_IN) throw new Error('Insert card first');
    if (pin !== this.card.pin) {
      this.card.failedAttempts++;
      if (this.card.failedAttempts >= 3) {
        this.card.isBlocked = true;
        this.eject();
        throw new Error('Card blocked after 3 attempts');
      }
      throw new Error('Wrong PIN');
    }
    this.card.failedAttempts = 0;
    this.state = ATMState.AUTHED;
  }
  withdraw(amount) {
    if (this.state !== ATMState.AUTHED) throw new Error('Not authenticated');
    this.account.withdraw(amount);
    return this.dispenser.dispense(amount);
  }
  checkBalance() {
    if (this.state !== ATMState.AUTHED) throw new Error('Not authenticated');
    return this.account.balance;
  }
  eject() {
    this.card = null; this.account = null;
    this.state = ATMState.IDLE;
  }
}`,
tip:"Key insight: CashDispenser is a GREEDY/COIN CHANGE problem from LeetCode! ATM has State Machine. BankService is external (network). ATM orchestrates but doesn't hold logic. Denominations detail impresses interviewers."},

{n:3,t:"BookMyShow (Movie Ticket Booking)",
req:"Browse movies/shows, select seats, hold seats temporarily, pay within timeout, confirm booking",
classes:"<b>Entity:</b> Movie (id, title, duration), Show (id, movie, theater, time, seats[]), Seat (id, row, num, type, status, heldBy, holdExpiry), Booking (id, user, show, seats[], status, total)<br><b>Service:</b> PricingService (rates per seat type), PaymentService (process payment)<br><b>Manager:</b> BookingSystem (shows Map, holdSeats, confirmBooking, cleanupExpired)",
flow:"<b>BOOKING FLOW:</b> User browses shows → selects seats → BookingSystem.holdSeats(userId, showId, seatIds) → each seat.hold(userId) [throws if not AVAILABLE] → sets status=HELD, holdExpiry=now+5min → returns bookingId + total<br><br>User pays → PaymentService.process(amount) → BookingSystem.confirmBooking(bookingId) → each seat.book() [status=BOOKED]<br><br><b>TIMEOUT:</b> Background job every 30s → finds seats where status=HELD AND holdExpiry < now → seat.release() → status back to AVAILABLE<br><br><b>STATE:</b> AVAILABLE → HELD (5min TTL) → BOOKED. Or HELD → AVAILABLE (timeout/cancel)",
patterns:"<b>State:</b> Seat states (AVAILABLE → HELD → BOOKED) with timeout mechanism<br><b>Strategy:</b> PricingStrategy — RegularPricing, WeekendPricing, PremierePricing<br><b>Observer:</b> Notify waitlisted users when held seats get released",
edge:"Two users select same seat simultaneously → first hold() wins, second throws error | User doesn't pay in 5 min → auto-release seats | Payment fails after hold → release + show error | Partial booking (3 of 4 seats available) → hold all or none (atomic) | Show time passed → can't book | Refund/cancellation policy by time remaining",
code:`const SeatStatus = { AVAILABLE:'AVAILABLE', HELD:'HELD', BOOKED:'BOOKED' };

class Seat {
  constructor(id, row, num, type) {
    this.id = id; this.row = row; this.num = num;
    this.type = type; // REGULAR, PREMIUM, VIP
    this.status = SeatStatus.AVAILABLE;
    this.heldBy = null; this.holdExpiry = null;
  }
  isAvailable() { return this.status === SeatStatus.AVAILABLE; }
  hold(userId) {
    if (!this.isAvailable()) throw new Error('Seat not available');
    this.status = SeatStatus.HELD;
    this.heldBy = userId;
    this.holdExpiry = Date.now() + 5 * 60 * 1000; // 5 min
  }
  book() {
    if (this.status !== SeatStatus.HELD) throw new Error('Must hold first');
    this.status = SeatStatus.BOOKED;
    this.heldBy = null; this.holdExpiry = null;
  }
  release() {
    this.status = SeatStatus.AVAILABLE;
    this.heldBy = null; this.holdExpiry = null;
  }
  isHoldExpired() {
    return this.status === SeatStatus.HELD && Date.now() > this.holdExpiry;
  }
}

class PricingService {
  constructor() {
    this.rates = new Map([['REGULAR',200],['PREMIUM',350],['VIP',500]]);
  }
  calculate(seats) {
    return seats.reduce((sum, s) => sum + this.rates.get(s.type), 0);
  }
}

class BookingSystem {
  constructor() {
    this.shows = new Map(); // showId → Show
    this.bookings = new Map();
    this.pricing = new PricingService();
  }
  holdSeats(userId, showId, seatIds) {
    const show = this.shows.get(showId);
    const seats = seatIds.map(id => show.seats.find(s => s.id === id));
    // Atomic: hold all or none
    seats.forEach(s => { if (!s.isAvailable()) throw new Error('Seat ' + s.id + ' taken'); });
    seats.forEach(s => s.hold(userId));
    const booking = {
      id: 'BK-' + Date.now(), userId, seats,
      total: this.pricing.calculate(seats), status: 'HELD'
    };
    this.bookings.set(booking.id, booking);
    return booking;
  }
  confirmBooking(bookingId) {
    const booking = this.bookings.get(bookingId);
    booking.seats.forEach(s => s.book());
    booking.status = 'CONFIRMED';
    return booking;
  }
  cleanupExpiredHolds() {
    for (const [, show] of this.shows) {
      show.seats.filter(s => s.isHoldExpired()).forEach(s => s.release());
    }
  }
}`,
tip:"The HOLD mechanism is THE key insight. Without it: two users pay for same seat = nightmare. With hold: first-come-first-serve at seat level, then 5-min payment window. Background cleanup prevents permanently held seats."},

{n:4,t:"Elevator System",
req:"Multiple elevators in a building, optimize pickup/dropoff, handle concurrent requests",
classes:"<b>Entity:</b> Request (floor, direction, timestamp), Elevator (id, currentFloor, direction, state, destinationQueue)<br><b>Service:</b> SchedulingStrategy (assigns requests to elevators — FCFS, ShortestSeek, LOOK)<br><b>Manager:</b> ElevatorController (elevators[], pendingRequests[], assignRequest, step)",
flow:"<b>REQUEST:</b> User presses UP on floor 5 → ElevatorController.request(floor=5, dir=UP) → SchedulingStrategy picks best elevator (nearest going same direction) → add to that elevator's queue<br><br><b>MOVEMENT:</b> Elevator moves one floor per tick → at each floor: check if anyone needs pickup/dropoff → open doors → remove completed requests → decide next direction<br><br><b>STATES:</b> IDLE → MOVING_UP → MOVING_DOWN → DOOR_OPEN → IDLE. If no requests, return to IDLE (optionally park at lobby)",
patterns:"<b>Strategy:</b> SchedulingStrategy interface — FCFSStrategy (first-come), NearestStrategy (closest elevator), LOOKStrategy (elevator scan — serve all in current direction, then reverse)<br><b>Observer:</b> Elevator notifies controller on arrival at floor<br><b>State:</b> Elevator states determine behavior (can't take requests while DOOR_OPEN in maintenance mode)",
edge:"All elevators busy → queue request, assign when one frees up | Elevator at capacity (weight limit) → skip, next elevator | Emergency stop → all elevators to nearest floor + open doors | Fire mode → all to ground floor | VIP elevator → reserved for certain floors | Maintenance mode → take one offline without disrupting others | Power outage → battery backup to nearest floor",
code:`const Direction = { UP:'UP', DOWN:'DOWN', IDLE:'IDLE' };
const ElevatorState = { IDLE:'IDLE', MOVING:'MOVING', DOOR_OPEN:'DOOR_OPEN' };

class Request {
  constructor(floor, direction) {
    this.floor = floor; this.direction = direction;
    this.timestamp = Date.now();
  }
}

class Elevator {
  constructor(id, totalFloors) {
    this.id = id; this.currentFloor = 0;
    this.direction = Direction.IDLE;
    this.state = ElevatorState.IDLE;
    this.destinations = new Set();
  }
  addDestination(floor) { this.destinations.add(floor); }
  move() {
    if (this.destinations.size === 0) {
      this.direction = Direction.IDLE;
      this.state = ElevatorState.IDLE;
      return;
    }
    this.state = ElevatorState.MOVING;
    if (this.direction === Direction.UP) this.currentFloor++;
    else if (this.direction === Direction.DOWN) this.currentFloor--;
    if (this.destinations.has(this.currentFloor)) {
      this.destinations.delete(this.currentFloor);
      this.state = ElevatorState.DOOR_OPEN;
    }
  }
  isIdle() { return this.state === ElevatorState.IDLE; }
}

// Strategy Pattern
class NearestStrategy {
  assign(request, elevators) {
    let best = null, minDist = Infinity;
    for (const e of elevators) {
      const dist = Math.abs(e.currentFloor - request.floor);
      const sameDir = e.direction === request.direction || e.isIdle();
      if (sameDir && dist < minDist) {
        best = e; minDist = dist;
      }
    }
    // Fallback: any idle elevator
    if (!best) best = elevators.find(e => e.isIdle());
    return best;
  }
}

class ElevatorController {
  constructor(numElevators, numFloors) {
    this.elevators = Array.from({length: numElevators},
      (_, i) => new Elevator(i, numFloors));
    this.strategy = new NearestStrategy();
    this.pendingRequests = [];
  }
  request(floor, direction) {
    const req = new Request(floor, direction);
    const elevator = this.strategy.assign(req, this.elevators);
    if (elevator) {
      elevator.addDestination(floor);
      if (elevator.isIdle()) {
        elevator.direction = floor > elevator.currentFloor
          ? Direction.UP : Direction.DOWN;
      }
    } else {
      this.pendingRequests.push(req);
    }
  }
  step() { // Called each tick
    this.elevators.forEach(e => e.move());
  }
}`,
tip:"Strategy pattern is the STAR here. Interviewer may ask: 'What if we want to change scheduling algorithm?' Answer: swap strategy without touching elevator/controller code. LOOK algorithm (like disk scheduling) is the real-world answer."},

{n:5,t:"Library Management System",
req:"Add/search books, issue/return books, fine calculation, member management, reservations",
classes:"<b>Entity:</b> Book (isbn, title, author, copies), BookCopy (id, book, status, issuedTo, dueDate), Member (id, name, booksIssued[], maxBooks=5), Fine (memberId, amount, reason)<br><b>Service:</b> SearchService (by title, author, isbn), FineService (calculate overdue fines)<br><b>Manager:</b> Library (books[], members[], issue, return, search, reserve)",
flow:"<b>ISSUE:</b> Member requests book → Library.issueBook(memberId, bookId) → check member.booksIssued.length < maxBooks → find available BookCopy (status=AVAILABLE) → copy.status = ISSUED, copy.issuedTo = member, copy.dueDate = now+14days → member.booksIssued.push(copy)<br><br><b>RETURN:</b> Library.returnBook(memberId, copyId) → copy.status = AVAILABLE → if overdue: FineService.calculate(copy.dueDate, today) → create Fine → check reservations: if someone waiting → notify them<br><br><b>RESERVE:</b> All copies issued → Library.reserve(memberId, bookId) → add to waitlist → when returned: notify first in waitlist",
patterns:"<b>Observer:</b> Notify waitlisted members when book becomes available<br><b>Strategy:</b> FineCalculation — FlatFine (₹5/day), GraduatedFine (₹2 first week, ₹5 after)<br><b>Singleton:</b> Library.getInstance()",
edge:"All copies issued → allow reservation (waitlist, FIFO) | Member has outstanding fines → block new issues until paid | Book lost → charge replacement cost + fine | Max renewal count (2 renewals max) | Different member types (Student=3 books, Faculty=10 books) | Book damaged → member pays percentage",
code:`const BookStatus = { AVAILABLE:'AVAILABLE', ISSUED:'ISSUED', RESERVED:'RESERVED', LOST:'LOST' };

class Book {
  constructor(isbn, title, author) {
    this.isbn = isbn; this.title = title; this.author = author;
    this.copies = [];
  }
  getAvailableCopy() {
    return this.copies.find(c => c.status === BookStatus.AVAILABLE);
  }
}

class BookCopy {
  constructor(id, book) {
    this.id = id; this.book = book;
    this.status = BookStatus.AVAILABLE;
    this.issuedTo = null; this.dueDate = null;
  }
  issue(member) {
    this.status = BookStatus.ISSUED;
    this.issuedTo = member;
    this.dueDate = Date.now() + 14 * 24 * 60 * 60 * 1000; // 14 days
  }
  returnCopy() {
    this.status = BookStatus.AVAILABLE;
    this.issuedTo = null; this.dueDate = null;
  }
  isOverdue() { return this.status === BookStatus.ISSUED && Date.now() > this.dueDate; }
}

class Member {
  constructor(id, name, maxBooks = 5) {
    this.id = id; this.name = name;
    this.booksIssued = []; this.maxBooks = maxBooks;
    this.fines = 0;
  }
  canIssue() { return this.booksIssued.length < this.maxBooks && this.fines === 0; }
}

class FineService {
  calculate(dueDate) {
    const overdueDays = Math.ceil((Date.now() - dueDate) / (1000*60*60*24));
    return overdueDays > 0 ? overdueDays * 5 : 0; // ₹5/day
  }
}

class Library {
  constructor() {
    this.books = new Map(); this.members = new Map();
    this.fineService = new FineService();
    this.waitlist = new Map(); // bookIsbn → [memberIds]
  }
  issueBook(memberId, isbn) {
    const member = this.members.get(memberId);
    if (!member.canIssue()) throw new Error('Cannot issue: limit or fines');
    const book = this.books.get(isbn);
    const copy = book.getAvailableCopy();
    if (!copy) throw new Error('No copies available');
    copy.issue(member);
    member.booksIssued.push(copy);
    return copy;
  }
