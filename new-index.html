"<b>Fuzzy search:</b> User types databse (typo) \u2192 matches database. Levenshtein edit distance \u2264 2. Autocomplete: edge n-grams. database \u2192 [d, da, dat, data...]. Type da \u2192 instant suggestions",
"<b>Real example:</b> Amazon search: 500M products. blue wireless headphones \u2192 find products with ALL three words in title/description \u2192 rank by BM25 + sales + rating \u2192 top 20 in 50ms"
]},
]},

{section:"Real-World Examples",items:[
{t:"Which Product Uses What",req:"Map every building block to real companies and products \u2014 helps you give concrete examples in interviews",b:[
"<b>L7 Load Balancer:</b> Netflix Zuul routes /browse\u2192Browse Service, /play\u2192Playback Service. Uber edge gateway for 2000+ microservices",
"<b>CDN:</b> Netflix Open Connect \u2014 custom boxes at ISPs serve 95% of video traffic locally. Cloudflare serves 20%+ of all web traffic",
"<b>Redis Cache:</b> Twitter \u2014 300M users timelines in Redis sorted sets. Instagram \u2014 feeds as ZADD score=timestamp member=post_id",
"<b>Redis Sorted Set:</b> Instagram feed (score=timestamp), gaming leaderboard (score=points), Uber nearby drivers (score=distance). NOT for task queues \u2014 use Redis List for that",
"<b>Kafka:</b> LinkedIn 7 trillion msgs/day (feeds, tracking, ETL). Uber (trip events, driver locations, surge calc). Netflix (viewing events, recommendations pipeline)",
"<b>Message Queue (SQS/RabbitMQ):</b> Amazon/Flipkart order\u2192email+SMS+inventory (async). Uber ride completion\u2192payment+receipt+rating (decoupled steps)",
"<b>Elasticsearch:</b> Amazon product search (500M products, faceted filters). GitHub code search (200M+ repos). Uber trip search. Netflix title search",
"<b>Cassandra:</b> Instagram (stories, DMs, activity feeds \u2014 write-heavy). Discord (messages per channel \u2014 billions of rows). Netflix (viewing history)",
"<b>PostgreSQL:</b> Uber (trip data, accounts, payments \u2014 ACID needed). Instagram (user accounts, relationships). Stripe (transaction ledger)",
"<b>DynamoDB:</b> Amazon shopping cart (key=user, value=cart JSON). Lyft ride matching. Duolingo user progress",
"<b>Consistent Hashing:</b> Discord (voice chat sessions across servers). Cassandra (partition token ring). Memcached (client-side key distribution)",
"<b>Snowflake ID:</b> Twitter (tweet IDs, time-sortable). Discord (message IDs). Instagram (media IDs)",
"<b>Circuit Breaker:</b> Netflix Hystrix \u2014 recommendation service down? Show generic popular list instead of crashing entire UI",
"<b>Docker:</b> Spotify (1500+ microservices containerized). Every major tech company. Same image in dev/staging/production",
"<b>Kubernetes:</b> Spotify, Airbnb, Pinterest \u2014 manages thousands of services with auto-scaling and self-healing",
"<b>Bloom Filter:</b> Chrome Safe Browsing (check URL against malware list locally). Cassandra (skip SSTables that definitely do not have the key)"
]},
{t:"API Pagination \u2014 Who Uses What",req:"Three pagination strategies used by real products \u2014 each optimized for different access patterns",b:[
"<b>Cursor \u2014 Twitter/Instagram feed:</b> Infinite scroll. cursor=last_seen_tweet_id. New tweets appearing between page loads do NOT break pagination. Fast with index. Cannot jump to page N",
"<b>Cursor \u2014 Slack messages:</b> Scrolling up in channel history. Cursor = oldest visible message_id. Consistent even as new messages arrive at bottom",
"<b>Cursor \u2014 Stripe/GitHub API:</b> Large datasets. has_more + next_cursor in response. Client passes cursor to get next page. Simple, performant, consistent",
"<b>Offset \u2014 Amazon product pages:</b> Page 1, 2, 3... User wants to jump to page 5 directly. Offset=40, limit=10. Allows page-jumping but slow for deep pages (DB must skip 40 rows)",
"<b>Offset \u2014 Admin dashboards:</b> Internal tools showing tables of data. Page numbers in UI. Acceptable performance since admins rarely go past page 20",
"<b>Keyset \u2014 Analytics/logs:</b> WHERE timestamp > last_timestamp ORDER BY timestamp LIMIT 100. Uses index directly. Blazing fast even at page 10,000. Used for log viewers, data exports",
"<b>Decision rule:</b> Infinite scroll / real-time feed \u2192 cursor. Admin table with page numbers \u2192 offset. Large dataset export / API \u2192 keyset"
]},
{t:"Redis Sorted Set vs Redis List (Queue)",req:"They solve COMPLETELY different problems \u2014 sorted set for ranked/timed data, list for task processing",b:[
"<b>Redis List (Queue):</b> LPUSH tasks send_email_123 (add). RPOP tasks (consume). FIFO. Message consumed = GONE from list. Like a TODO list \u2014 do it, cross it off",
"<b>Redis Sorted Set:</b> ZADD feed:user123 1698765432 post:456 (add with score). ZREVRANGE feed:user123 0 49 (top 50 by score). Data STAYS. Read 1000 times, still there",
"<b>Queue use cases:</b> Background jobs (resize image, send email, process payment). One worker picks up one task. Done = gone. Instagram: process this image resize. Uber: assign this ride to a driver",
"<b>Sorted Set use cases:</b> Timelines (score=timestamp \u2192 latest posts). Leaderboards (score=points \u2192 top players). Scheduling (score=execution_time \u2192 next job to run). Rate limiting (score=request_timestamp \u2192 count in window)",
"<b>Key difference:</b> Queue = consume and forget. Sorted Set = read, rank, query, range-scan \u2014 data persists",
"<b>Instagram example:</b> QUEUE: process this image resize task. SORTED SET: user123 feed with latest 500 posts ranked by time",
"<b>Gaming example:</b> QUEUE: matchmaking request waiting for a partner. SORTED SET: global leaderboard top 1000 players by score",
"<b>In HLD say:</b> Feed timelines stored in Redis sorted sets (ZADD with timestamp score, ZREVRANGE for latest). Background tasks like email/resize use Redis lists as queues"
]},
]},
{section:"Top 25 Questions",isQuestions:true,questions:[
{n:1,t:"URL Shortener",s:"100M reads/day, 1M writes",req:"Short URL → redirect to long URL. Like bit.ly",
ctx:"You know bit.ly? Paste long URL, get short one. Click short one, get redirected. Interviewer tests: clean simple design, unique code generation, handling 100M clicks/day. Usually the WARM-UP question",
design:["<b>API:</b> POST /shorten(longURL)→shortURL | GET /{code}→301","<b>Short code:</b> Base62(Snowflake ID). 7 chars=3.5T combos","<b>DB:</b> NoSQL key=code, value=longURL","<b>Cache:</b> Redis for hot URLs (80/20 rule)","<b>Flow:</b> Client→LB→App→Redis→DB→301 redirect","<b>DB Schema:</b> Table: url_mappings (short_code VARCHAR(7) PK, long_url TEXT, user_id INT, created_at TIMESTAMP, expires_at TIMESTAMP, click_count INT DEFAULT 0)","<b>Read path:</b> GET /abc123 \u2192 Redis lookup \u2192 hit? 301 redirect. Miss? DB lookup \u2192 write to Redis \u2192 301 redirect. 99% cache hit rate","<b>Write path:</b> POST /shorten \u2192 generate Snowflake ID \u2192 Base62 encode \u2192 store in DB + Redis \u2192 return short URL"],
deep:["301 (permanent, cached) vs 302 (track clicks)","Analytics: Kafka→clickstream pipeline","Custom alias: check uniqueness, rate limit creation","Expiry: TTL field + background cleanup job","<b>Base62 encoding:</b> Characters [a-zA-Z0-9]. 7 chars = 62^7 = 3.5 trillion unique codes. At 1M/day, lasts 9,500 years","<b>Hash vs Counter:</b> MD5/SHA hash of URL can collide. Counter-based (Snowflake) = zero collisions. Counter wins","<b>Geo-distributed:</b> For global users, replicate Redis + DB across regions. GeoDNS routes to nearest","<b>Abuse prevention:</b> Rate limit URL creation per user/IP. Blocklist malicious domains. Scan destination URLs for phishing"],tip:"Simple question. Keep it clean. Don't over-engineer."},
{n:2,t:"Instagram",s:"500M DAU, 100:1 read:write",req:"Upload photos, follow users, news feed, likes",
ctx:"500M daily users scrolling feeds, uploading photos, liking posts. Hard part: when user A posts, how do 10K followers see it instantly? That is the fan-out problem. Plus images must load FAST = CDN + image pipeline",
design:["<b>Upload:</b> Client→Upload Svc→thumbnails→S3→metadata DB","<b>Feed:</b> Hybrid fan-out (push normal, pull celebrity)","<b>DB:</b> PostgreSQL (metadata) + Redis sorted sets (feed)","<b>Media:</b> S3 + multiple sizes + CDN serving","<b>Image sizes:</b> On upload, generate: thumbnail (150px), medium (600px), full (1080px), original. Store all in S3. CDN serves appropriate size per device","<b>Pre-signed upload:</b> Client requests upload URL from API \u2192 API generates S3 pre-signed URL \u2192 client uploads DIRECTLY to S3 (bypasses app server). Saves bandwidth + CPU","<b>Notification Service:</b> On new post \u2192 Kafka event \u2192 Notification Service sends push to close friends who have notifications enabled"],
deep:["Celebrity problem: don't fan-out 100M writes → pull at read","Image pipeline: async via Kafka→resize workers→S3","Stories: TTL=24hrs, separate storage","Sharding: by user_id","<b>Fan-out math:</b> 2M posts/day. Average user has 500 followers. Push fan-out = 1 billion Redis writes/day. Manageable with Redis cluster","<b>Feed ranking:</b> Not pure chronological. ML model ranks by: affinity (how often you interact with poster), content type preference, predicted engagement, recency","<b>Explore page:</b> Collaborative filtering: users similar to you liked these posts. Content-based: you like travel photos, here are more. Precomputed batch + real-time adjustments","<b>Direct Messages:</b> Separate service. WebSocket for real-time. Cassandra storage (write-heavy, partitioned by conversation_id). E2E encryption optional","<b>Story anti-patterns:</b> Stories are ephemeral (24hr TTL). Do NOT store in same DB as permanent posts. Use separate fast storage. Delete via background TTL cleanup, not user-triggered"],tip:"CDN for images. NEVER serve media from app servers."},
{n:3,t:"Twitter / X",s:"300M DAU, 500M tweets/day",req:"Post tweets, timeline, search, trending",
ctx:"500M tweets/day. Unique challenge: TRENDING TOPICS. How to figure out what is trending RIGHT NOW? Stream processing counting hashtags in sliding windows, ranked by VELOCITY (speed of increase, not just total count)",
design:["<b>Tweet→DB→fan-out to followers' Redis timelines</b>","<b>Timeline:</b> Redis sorted set per user (score=timestamp)","<b>Celebrity:</b> Merge at read time (hybrid)","<b>Search:</b> Elasticsearch inverted index via Kafka","<b>Trending:</b> Kafka streams→sliding window→rank by velocity","<b>Tweet storage:</b> PostgreSQL: tweets(tweet_id BIGINT PK, user_id INT, text VARCHAR(280), media_urls JSONB, created_at TIMESTAMP). Index on (user_id, created_at)","<b>Follow graph:</b> Table: follows(follower_id, followee_id, created_at). Adjacency list. Query: SELECT followee_id FROM follows WHERE follower_id=X","<b>Engagement counters:</b> Redis INCR for real-time like/retweet display. Batch sync to PostgreSQL every 30 seconds for persistence"],
deep:["Fan-out: 500M×200 followers = 100B ops/day","Like counters: Redis INCR + batch sync to DB","Trending: velocity of increase, not just raw count","Timeline: keep last 800 tweets in Redis","<b>Trending algorithm detail:</b> velocity = (count_in_last_5min - count_in_prev_5min) / 5min. High velocity = trending even if total count is low. World Cup (1M tweets, growing slowly) < Earthquake (50K tweets, exploding)","<b>Tweet fanout detail:</b> User posts \u2192 write to Tweets DB \u2192 publish to Kafka \u2192 Fan-out workers consume \u2192 for each follower: ZADD feed:{follower_id} {timestamp} {tweet_id} in Redis","<b>Hashtag indexing:</b> Extract hashtags on write \u2192 store in Elasticsearch. Hashtag search = simple term query on ES. Hashtag trending = Kafka Streams windowed count","<b>Media handling:</b> Tweet with image: upload to S3 first \u2192 get media_id \u2192 include media_id in tweet POST. Async: generate thumbnails, blur detection, alt-text via ML","<b>Delete/Edit propagation:</b> Delete tweet \u2192 remove from Tweets DB \u2192 async remove from all followers Redis feeds (best effort, eventually consistent). Edit: update DB + re-index in ES"],tip:"Explain fan-out clearly — that's the core."},
{n:4,t:"WhatsApp",s:"2B users, 100B msgs/day",req:"1:1 chat, groups, receipts, real-time delivery",
design:["<b>WebSocket</b> per client to Chat Server","<b>Connection Manager:</b> Redis tracks user→server","<b>1:1:</b> A→A's server→lookup B's server→B","<b>Offline:</b> Kafka queue→deliver when online","<b>Storage:</b> Cassandra (write-heavy, time-series)","<b>Message schema:</b> Cassandra: messages(chat_id, message_timestamp, message_id, sender_id, encrypted_content, media_url, status). Partition key = chat_id. Clustering = timestamp","<b>Connection lifecycle:</b> App open \u2192 WebSocket connect \u2192 authenticate \u2192 register in Connection Manager (Redis) \u2192 receive queued offline messages \u2192 ongoing bidirectional communication","<b>Group message flow:</b> A sends to group \u2192 A server \u2192 lookup all member servers from Redis \u2192 fan-out to each member server \u2192 each delivers via WebSocket or queues for offline"],
deep:["E2E encryption: Signal Protocol","Media: S3 upload, share URL in message","Receipts: sent/delivered/read via WebSocket","Group: store once, pointer per member","<b>Message ordering:</b> Per-chat ordering via Cassandra clustering key (timestamp). Cross-chat: no global ordering needed. Each chat is independent","<b>Typing indicator:</b> Lightweight WebSocket event. NOT persisted. Fire-and-forget to recipient server. If recipient offline, silently dropped","<b>Voice/Video calls:</b> Signaling via WebSocket (exchange ICE candidates, SDP offer/answer). Actual media via WebRTC peer-to-peer. TURN server as fallback when P2P fails","<b>Backup/Restore:</b> End-to-end encrypted backup to Google Drive/iCloud. Encryption key derived from user PIN (not stored on server). Restore on new device with same PIN","<b>Multi-device sync:</b> Each device has own WebSocket. Messages delivered to ALL connected devices. Linked devices share encryption keys via QR code pairing"],tip:"Don't forget offline delivery."},
{n:5,t:"Netflix",s:"200M subs, 10K+ titles",req:"Browse, search, stream with adaptive quality, recommendations",
ctx:"200M subscribers streaming simultaneously. A movie = 4GB. Cannot send from US to Mumbai every time. Core: get video CLOSE to users (CDN) + adjust quality based on internet speed (adaptive bitrate). Upload side: one movie = 100+ transcoded versions",
design:["<b>Upload→transcode multiple resolutions+codecs</b>","<b>Storage:</b> S3→CDN (Open Connect at ISPs)","<b>Streaming:</b> Adaptive bitrate HLS/DASH in chunks","<b>CDN:</b> Pre-position popular content at ISP boxes","<b>Recommendations:</b> ML on watch history, precomputed","<b>Transcoding pipeline:</b> Master file \u2192 split into chunks \u2192 parallel transcode each chunk in multiple qualities (360p, 480p, 720p, 1080p, 4K) \u00d7 codecs (H.264, VP9, AV1) \u00d7 audio tracks. One movie = 100+ output files","<b>Content metadata:</b> PostgreSQL: titles(title_id, name, description, genres, cast, release_date, rating). Elasticsearch for search. Redis for homepage carousels","<b>User profiles:</b> Cassandra: viewing_history(user_id, title_id, progress_pct, last_watched). Supports continue watching feature. High write volume"],
deep:["Adaptive: client measures bandwidth→matching quality","Open Connect: boxes AT ISPs, 95% traffic local","Transcoding: distributed, multi-codec (H.264, VP9, AV1)","DRM: Widevine/FairPlay","<b>Adaptive bitrate detail:</b> Video split into 2-10 sec chunks. Each chunk available in multiple qualities. Client player monitors download speed. If bandwidth drops: next chunk requested at lower quality. Seamless mid-stream quality switch","<b>Pre-positioning strategy:</b> Before big release (Stranger Things S5): push content to ALL CDN locations 48 hours early. First-minute traffic = millions of concurrent streams. Cannot afford cache misses","<b>A/B testing at scale:</b> Netflix runs 1000+ A/B tests simultaneously. Different thumbnails for same movie per user segment. Different recommendation algorithms. Even different UI layouts. All data-driven","<b>Personalized thumbnails:</b> ML model picks which thumbnail to show YOU. Action fan? See the explosion scene. Romance fan? See the couple. Same movie, different thumbnail per user","<b>Microservice architecture:</b> 1000+ microservices. API Gateway (Zuul), Service discovery (Eureka), Circuit breaker (Hystrix), Load balancing (Ribbon). Netflix literally wrote the book on microservices"],tip:"How video gets from storage to screen."},
{n:6,t:"YouTube",s:"2B users, 500hrs uploaded/min",req:"Upload, watch, search, subscribe, live stream",
ctx:"Like Netflix but USER-GENERATED. 500 hrs uploaded/min. Netflix problems PLUS: copyright detection, content moderation, processing at insane scale. Upload pipeline is a DAG of tasks",
design:["<b>Upload→chunk→Kafka→Transcode Workers</b>","<b>DAG:</b> transcode→thumbnail→moderation→CDN","<b>Search:</b> Elasticsearch on title+captions","<b>View count:</b> Kafka→batch aggregate→DB","<b>Upload flow detail:</b> Resumable chunked upload \u2192 Upload Service validates \u2192 stores raw in S3 \u2192 publishes ProcessVideo event to Kafka \u2192 Processing DAG workers pick up","<b>Processing DAG:</b> Parallel tasks: [Transcode 360p, Transcode 720p, Transcode 1080p] + [Generate thumbnails] + [Extract captions via speech-to-text] + [Content moderation ML] + [Copyright fingerprint]. All run in parallel where possible","<b>Comment system:</b> Separate microservice. Sharded by video_id. Schema: comments(comment_id, video_id, user_id, text, parent_comment_id, likes, created_at). parent_comment_id enables reply threading"],
deep:["Copyright: Content ID fingerprinting","Live: RTMP→realtime transcode→HLS→CDN","Comments: separate svc, shard by video_id","<b>Content ID system:</b> Every uploaded video fingerprinted (audio + video). Compared against database of copyrighted content. Match found \u2192 options: block upload, mute audio, show ads and share revenue with copyright holder","<b>Live streaming architecture:</b> Broadcaster sends RTMP stream \u2192 ingest server \u2192 real-time transcode to multiple qualities \u2192 package into HLS/DASH chunks (2-6 sec) \u2192 push to CDN. Viewer latency: 5-30 sec (normal) or sub-3 sec (ultra-low latency mode)","<b>Recommendation engine:</b> Deep learning on: watch history, search history, click-through rate, watch duration (50% watched vs 100% = very different signals), likes, subscriptions, demographics, time of day. Watch Next drives 70% of total watch time","<b>View count consistency:</b> Real-time view count is APPROXIMATE (Kafka \u2192 batch aggregate). Exact count reconciled every few hours. Users see approximate count but exact one used for monetization calculations","<b>Monetization:</b> Pre-roll, mid-roll, post-roll ads. Ad selection via real-time auction (bid \u00d7 predicted CTR \u00d7 relevance). Mid-roll inserted at natural break points detected by ML (scene changes, pauses)"],tip:"User content = moderation + copyright. Key diff from Netflix."},
{n:7,t:"Google Maps",s:"1B users, real-time traffic",req:"Map display, search places, navigation with ETA, live traffic",
ctx:"1B users. Two challenges. MAP: cannot send image of entire world = split into tiles at zoom levels. ROUTING: road network is a graph, Dijkstra finds shortest path with weights updated by real-time traffic from millions of phones",
design:["<b>Tiles:</b> Pre-rendered at zoom 0-21, served from CDN","<b>Routing:</b> Road graph + Dijkstra/A*","<b>Traffic:</b> GPS→Kafka→stream processing→edge weights","<b>Search:</b> Elasticsearch + geolocation","<b>Tile system detail:</b> Zoom 0 = 1 tile (whole world). Zoom 1 = 4 tiles. Zoom N = 4^N tiles. Zoom 21 = individual buildings. Vector tiles (client renders) replacing raster tiles (pre-rendered images). Smaller download, smoother zoom","<b>Road graph:</b> Nodes = intersections. Edges = road segments. Each edge has: distance, speed_limit, road_type, num_lanes, one_way flag, real_time_speed. Billions of edges globally","<b>Place search:</b> Elasticsearch with geospatial filtering. User searches coffee near me \u2192 geo_distance query within 2km \u2192 rank by rating + distance + relevance"],
deep:["Geohashing: lat/lng→string. Same prefix=nearby","Graph partitioning by region + hierarchy","Offline: download tiles+graph, route locally","<b>Contraction hierarchies:</b> Preprocess road graph by adding shortcut edges (A\u2192B\u2192C becomes A\u2192C). Long-distance queries use shortcuts, skip intermediate nodes. Cross-country route in milliseconds instead of seconds","<b>Traffic data pipeline:</b> Millions of phones send anonymized (lat, lng, speed, heading) every few seconds \u2192 Kafka \u2192 map-match GPS to road segments \u2192 compute average speed per segment in 5-min sliding window \u2192 update edge weights","<b>Incident detection:</b> Sudden speed drop on road segment (normal 60km/h \u2192 5km/h) \u2192 ML classifier: accident? construction? congestion? \u2192 alert other users, reroute navigation","<b>Offline navigation:</b> Download region: tile data + road graph + place database. Full routing works locally on device. No internet needed. Sync back when online for traffic updates","<b>ETA prediction:</b> Not just sum of edge weights. ML model considers: historical patterns (rush hour on this road), day of week, weather, events (stadium nearby), road closures. Google claims 97% ETA accuracy"],tip:"Focus on tiles + routing + traffic."},
{n:8,t:"Uber",s:"Millions rides/day",req:"Request ride, match driver, live tracking, surge pricing",
ctx:"User requests ride. Find NEAREST AVAILABLE DRIVER in seconds. Geospatial indexing: drivers send GPS every 3-5s into Redis. On request: GEORADIUS query, rank by ETA, offer to best. Surge = demand/supply ratio per zone",
design:["<b>Drivers:</b> GPS every 3-5s → Redis geospatial","<b>Matching:</b> Geohash/Quadtree→nearby→rank by ETA","<b>Trip:</b> State machine REQUESTED→MATCHED→IN_PROGRESS→DONE","<b>Surge:</b> Demand/supply ratio per hexagonal zone","<b>Geospatial storage:</b> Redis GEOADD drivers:active {lng} {lat} {driver_id}. Updated every 3-5 sec. GEORADIUS for nearby queries. Separate sets per city for performance","<b>Matching algorithm:</b> Request comes in \u2192 GEORADIUS 5km \u2192 get candidate drivers \u2192 compute ETA for each (routing service) \u2192 score = f(ETA, rating, acceptance_rate, heading_direction, vehicle_match) \u2192 offer to top driver","<b>Trip state machine:</b> REQUESTED \u2192 MATCHING \u2192 DRIVER_ACCEPTED \u2192 DRIVER_EN_ROUTE \u2192 DRIVER_ARRIVED \u2192 TRIP_IN_PROGRESS \u2192 TRIP_COMPLETED \u2192 PAYMENT_PROCESSING \u2192 COMPLETED. Each transition logged with timestamp","<b>Fare calculation:</b> base_fare + (per_km_rate \u00d7 distance) + (per_min_rate \u00d7 duration) + surge_multiplier + tolls + booking_fee. Estimated upfront, adjusted to actual on completion"],
deep:["Quadtree: divide space into 4 recursively","Dispatch: ETA + rating + acceptance rate + direction","Supply prediction: ML per zone per hour","<b>Quadtree detail:</b> Recursively divide map into 4 quadrants. Dense area (downtown) \u2192 subdivide further. Sparse area (rural) \u2192 stop subdividing. Lookup: traverse from root to leaf containing query point. O(log n)","<b>Surge pricing calculation:</b> Divide city into H3 hexagonal zones. Every 2-5 min: count ride_requests (demand) and available_drivers (supply) per zone. Multiplier = f(demand/supply ratio). Ratio > 2 \u2192 surge starts. Cap at 5-8x","<b>Supply repositioning:</b> ML predicts demand per zone per hour using: historical patterns, weather, events calendar (concerts, sports), day of week. If zone predicted high demand + low supply \u2192 incentivize drivers to go there (surge preview, bonus)","<b>Real-time tracking:</b> During trip: driver app sends GPS every 2 sec \u2192 Kafka \u2192 Trip Service updates location \u2192 pushes to rider app via WebSocket. Rider sees car moving on map in near real-time","<b>Payment flow:</b> Trip starts \u2192 pre-authorize estimated fare on rider card. Trip ends \u2192 calculate actual fare \u2192 capture actual amount (may differ from pre-auth). If actual > estimate by large margin \u2192 flag for review"],tip:"Core = matching + location."},
{n:9,t:"Dropbox",s:"500M users, file sync",req:"Upload/download, sync across devices, sharing, versions, offline",
ctx:"Save file on laptop, appears on phone 3 seconds later. KILLER INSIGHT: chunking. Split into 4MB chunks, hash each. Changed 1 paragraph in 1GB file? Upload 4MB not 1GB. Plus dedup: 100 users upload same PDF = stored once",
design:["<b>Chunking:</b> 4MB chunks. Upload only CHANGED chunks","<b>Dedup:</b> SHA256 hash. Same hash = skip upload","<b>Block Server→S3</b>","<b>Metadata DB:</b> File tree + chunk mappings (PostgreSQL)","<b>Notifications:</b> WebSocket to other devices","<b>Client-side sync agent:</b> Watches local file system for changes (inotify on Linux, FSEvents on Mac). On change: compute diff \u2192 hash changed chunks \u2192 check with server which chunks are new \u2192 upload only new chunks","<b>Chunk metadata:</b> DB table: chunks(chunk_hash SHA256 PK, s3_path, size, ref_count). ref_count tracks how many files reference this chunk. When ref_count=0 \u2192 garbage collect from S3","<b>File versioning:</b> Table: file_versions(file_id, version_num, chunk_list JSONB, created_at, created_by). Each version = ordered list of chunk hashes. Reconstruct any version by assembling its chunks"],
deep:["1GB file, 1 byte change → upload 1 chunk (4MB) not whole file","100 users same PDF → store 1 copy","Conflict: keep both versions, user merges","Encrypt AES-256 at rest, TLS in transit","<b>Bandwidth savings math:</b> 1GB file, change 100 bytes. 1GB / 4MB per chunk = 256 chunks. Recompute hashes: only 1 chunk hash changed. Upload 4MB not 1GB. Savings = 99.6%. This is why Dropbox exists","<b>Cross-user dedup:</b> User A uploads 500MB installer.exe. Hash chunks. All chunk hashes already exist (user B uploaded same file yesterday). Upload = 0 bytes! Server just creates new metadata pointing to existing chunks","<b>Conflict resolution detail:</b> User A edits file offline on laptop. User B edits same file offline on desktop. Both come online. Server detects: both modified same base_version. Action: keep BOTH versions as file.txt and file (conflicted copy - B).txt. User manually resolves","<b>Sharing implementation:</b> ACL table: sharing(file_id, user_id, permission ENUM(view,edit,admin), shared_by, shared_at). Share link: generate unique token \u2192 link_shares(token, file_id, permission, password_hash, expires_at). Public link = no user_id required","<b>Compression + encryption:</b> Before upload: LZ4 compress each chunk (fast compression, ~50% size reduction for text). Then AES-256 encrypt. Upload encrypted chunk. Server never sees plaintext. Optional: client-side key management (zero-knowledge mode)"],tip:"CHUNKING is the key insight."},
{n:10,t:"Rate Limiter",s:"Billions req/day, distributed",req:"Limit per user/IP/endpoint. Return 429 when exceeded",
ctx:"Stripe: 100 API calls/sec per merchant. 101st = HTTP 429 Try again in 0.8s. Token Bucket + Redis. Often asked as SUB-COMPONENT inside bigger designs. Know it cold",
design:["<b>At API Gateway</b>","<b>Token Bucket:</b> N tokens, refill at R","<b>Redis:</b> key=user:endpoint, atomic INCR+EXPIRE","<b>Response:</b> 429 + Retry-After","<b>Architecture:</b> Client \u2192 API Gateway \u2192 Rate Limiter middleware checks Redis \u2192 allowed? \u2192 forward to service. Denied? \u2192 return 429","<b>Redis data model:</b> Key: rate_limit:{user_id}:{endpoint}:{window}. Example: rate_limit:user123:/api/post:min. Value: counter. TTL = window duration","<b>Token bucket implementation:</b> Redis hash: {tokens: 10, last_refill: 1698765432}. On request: compute elapsed time since last_refill \u2192 add tokens (rate \u00d7 elapsed) \u2192 cap at max \u2192 if tokens > 0 \u2192 decrement \u2192 allow","<b>Multi-tier limits:</b> IP level: 1000/min (catches bots). User level: 100/min (per account). Endpoint level: /upload = 10/min, /read = 500/min. Plan level: free=100/hr, paid=10K/hr"],
deep:["Distributed: Redis Lua for atomic check","Tiers: free=100/hr, paid=10K/hr","Fail open vs closed when Redis down","<b>Distributed race condition:</b> 5 API gateways check same user simultaneously. All read tokens=1. All allow. User got 5 requests when limit was 1. Fix: Redis Lua script for atomic read-compute-update in single command","<b>Sliding window counter detail:</b> At 70% through current minute window: effective_count = current_count + (previous_count \u00d7 0.30). Smooths the fixed-window boundary spike. Low memory (2 counters), accurate enough for production","<b>Rate limit headers:</b> X-RateLimit-Limit: 100 (max). X-RateLimit-Remaining: 42 (left). X-RateLimit-Reset: 1698766000 (window reset Unix time). Retry-After: 18 (seconds to wait). Clients use these to self-throttle","<b>Fail-open vs fail-closed:</b> Redis down \u2192 allow all requests (fail-open: protect UX but risk abuse) or deny all (fail-closed: protect system but bad UX). Most choose fail-open + alert \u2192 fix Redis fast","<b>IP spoofing prevention:</b> Do not trust X-Forwarded-For blindly (can be spoofed). Use the LAST proxy IP in the chain or the actual TCP source IP from the connection"],tip:"Know Token Bucket cold."},
{n:11,t:"Twitter Search",s:"500M tweets/day, <500ms",req:"Keyword/hashtag search with ranking",
ctx:"Search earthquake India across 500M tweets in 200ms. Core: inverted index. Ranking: BM25 relevance x recency x engagement x author authority. Built real-time via Kafka indexing pipeline",
design:["<b>Elasticsearch inverted index via Kafka</b>","<b>Ranking:</b> TF-IDF + recency + engagement + authority","<b>Typeahead:</b> Trie with precomputed top-K","<b>Indexing pipeline detail:</b> Tweet created \u2192 Kafka topic tweets-created \u2192 Search Indexer consumer: tokenize text, extract hashtags/mentions, build document \u2192 Elasticsearch bulk index API","<b>Index schema:</b> ES document: {tweet_id, text, hashtags[], mentions[], user_id, user_followers_count, is_verified, created_at, like_count, retweet_count, media_type}. All fields searchable and filterable","<b>Query flow:</b> User searches \u2192 API \u2192 Elasticsearch: multi_match query on text + hashtags \u2192 filter by date range \u2192 boost by engagement + recency + authority \u2192 return top 20","<b>Typeahead service:</b> Separate from main search. Trie with precomputed top-10 suggestions per prefix. Updated hourly from query logs. Personal recent searches (Redis per user) shown first"],
deep:["Real-time: searchable in 5-10s","Time-based shards, newest first","Spell correction: Levenshtein distance","<b>Ranking formula:</b> score = BM25(query, text) \u00d7 recency_decay(age) \u00d7 log(1 + likes + 2\u00d7retweets) \u00d7 authority(followers, verified) \u00d7 personalization(user_interests). Tuned via ML","<b>Time-based sharding:</b> 1 ES index per day (or per week). Newest indices searched first. Early termination: if enough good results from last 3 days, skip older indices. Old indices = read-only, compacted, cheaper storage","<b>Near-real-time indexing:</b> New tweet searchable in 5-10 seconds. ES refresh_interval=1s for realtime index. New docs go to in-memory buffer, flushed to searchable segment every 1 sec","<b>Multi-language search:</b> Language detection on tweet text. Route to language-specific analyzer (English stemmer vs Japanese tokenizer vs Arabic right-to-left). Cross-language search requires query translation"],tip:"Know inverted index well."},
{n:12,t:"Notification System",s:"Billions/day, multi-channel",req:"Push/SMS/email/in-app with preferences, dedup, priority",
ctx:"Swiggy sends you order update as push + SMS + email. Central service checks preferences, picks template, routes to channel. Hard parts: dedup (do not send twice) and priority (OTP instant, marketing can wait)",
design:["<b>Event→Notification Svc→preferences→channel router</b>","<b>Priority queues:</b> Urgent(OTP) > High(order) > Low(marketing)","<b>Dedup:</b> notification_id in Redis with TTL","<b>Event schema:</b> {event_type: order_shipped, user_id: 123, payload: {order_id: 456, tracking_url: ...}, priority: high, timestamp: ...}. Published to Kafka topic notifications-events","<b>Preference service:</b> DB table: user_preferences(user_id, channel, category, enabled, quiet_start, quiet_end, timezone). Check before EVERY send. Respect opt-outs strictly","<b>Template engine:</b> Templates stored in DB with versioning. Hi {{name}}, your order #{{order_id}} shipped! Variables resolved at send time. A/B test different templates","<b>Channel routers:</b> Push: APNs (iOS) / FCM (Android) \u2014 need device tokens stored per user. SMS: Twilio API. Email: SendGrid/SES. In-app: WebSocket push to connected clients"],
deep:["Rate limit per user for marketing","User prefs: channels, quiet hours, per-topic opt-out","Retry: 3x backoff→try next channel","<b>Dedup implementation:</b> On event: compute hash(user_id + event_type + entity_id) \u2192 SETNX in Redis with 60min TTL. If already exists \u2192 skip (duplicate). Prevents send email twice on retry","<b>Priority queue architecture:</b> 3 Kafka topics: notifications-critical (OTP, security alerts), notifications-high (order updates), notifications-low (marketing, recommendations). Separate consumer groups per priority, different processing rates","<b>Cross-channel coordination:</b> User opened push notification? Set flag in Redis. When email job runs 2 hours later, check flag. If push already opened \u2192 skip email. Prevents bombarding user across channels","<b>Delivery analytics:</b> Track funnel: sent \u2192 delivered \u2192 opened \u2192 clicked. Push: delivery receipt from APNs/FCM. Email: pixel tracking for opens, link wrapping for clicks. Store in Kafka \u2192 analytics pipeline","<b>Batching for digests:</b> Low-priority events collected over 24 hours. Daily digest job: aggregate all events per user \u2192 render one combined email. 10 separate notifications \u2192 1 daily digest. Much better UX"],tip:"Don't forget dedup."},
{n:13,t:"Web Crawler",s:"1B pages",req:"Crawl pages, extract links, dedup, respect robots.txt",
ctx:"Google downloads every webpage, extracts text, builds search index. Core: URL Frontier = smart queue deciding WHICH page to crawl next (important first) with POLITENESS (max 1 req/sec per domain)",
design:["<b>Seeds→URL Frontier→Fetcher→Parser→Store→extract URLs</b>","<b>Frontier:</b> Priority queue + politeness (per-domain delay)","<b>Dedup:</b> URL hash + Content SimHash","<b>URL Frontier architecture:</b> Two sub-queues. Front queue: priority-based (important URLs first \u2014 news sites, popular domains). Back queue: politeness-based (one queue per domain, enforces max 1 req/sec per domain)","<b>Fetcher details:</b> HTTP client with: timeout (10s), max redirects (5), User-Agent identification, robots.txt cache per domain (refresh every 24hrs), conditional GET (If-Modified-Since header to avoid re-downloading unchanged pages)","<b>Content processing:</b> Parse HTML (extract text + links). Language detection. Encoding detection. Strip boilerplate (nav, footer, ads) using readability algorithm. Store clean text + metadata","<b>DNS resolver cache:</b> Crawling 1B pages means millions of DNS lookups. Local DNS cache with TTL. Batch DNS pre-resolution for queued URLs. Without this, DNS becomes the bottleneck at ~50ms per lookup vs ~0ms cached","<b>Storage layer:</b> Raw HTML stored in S3 (cheap, durable). Metadata in Cassandra: url_table(url_hash PK, url TEXT, last_crawled TIMESTAMP, http_status INT, content_hash BIGINT, content_s3_path TEXT). Link graph in separate table for PageRank computation","<b>Robots.txt compliance:</b> Before crawling any domain, fetch and parse robots.txt. Cache per domain in Redis with 24hr TTL. Respect Crawl-delay directive. Skip disallowed paths. Identify as Googlebot or custom User-Agent. Violating robots.txt = legal risk + IP ban","<b>Monitoring dashboard:</b> Track pages/sec (target: 1000+), error rate by HTTP status (4xx, 5xx), queue depth per priority tier, domain coverage, duplicate rate. Alert if crawl rate drops below threshold or error rate spikes above 5%"],
deep:["Politeness: 1 req/domain/sec","Traps: infinite URLs. Max depth+max per domain","Recrawl: news=hourly, static=weekly","<b>URL normalization:</b> Lowercase scheme+host. Remove default port (:80, :443). Remove fragment (#section). Resolve relative URLs to absolute. Remove tracking params (utm_*). Sort query params alphabetically. This avoids crawling same page via different URL forms","<b>Content dedup (SimHash):</b> Two pages with slightly different boilerplate but same article = near-duplicates. SimHash: hash page content \u2192 64-bit fingerprint. If hamming distance < 3 between two fingerprints \u2192 near-duplicate \u2192 skip","<b>Distributed crawling:</b> Partition URL space by domain hash. Each worker handles assigned domains. Ensures politeness (one worker per domain) and dedup (same domain always same worker). Scale: add more workers for more domains","<b>Recrawl scheduling:</b> Track change frequency per page. News articles change hourly \u2192 recrawl every hour. Corporate about page changes yearly \u2192 recrawl monthly. Adaptive scheduling maximizes freshness within crawl budget","<b>JavaScript rendering:</b> Many modern sites need JS execution to show content (React/Angular SPAs). Headless Chrome (Puppeteer) pool for JS rendering. Expensive \u2014 only render pages where static HTML extraction fails","<b>Crawler traps detection:</b> Infinite calendar pages (/calendar?date=2025-01-01, 2025-01-02...). Session ID in URL generating infinite unique URLs. Detection: max depth per domain (e.g., 15 levels), max pages per domain (e.g., 500K), URL pattern recognition (regex detects repeating param patterns)","<b>Checkpointing and fault tolerance:</b> Frontier state checkpointed to disk every 5 minutes. If crawler process crashes, resume from last checkpoint instead of re-crawling. Each fetcher writes progress to Kafka so other fetchers can pick up failed batches","<b>Bandwidth and cost estimation:</b> 1B pages x avg 500KB = 500TB raw HTML. At $0.09/GB S3 = ~$45K storage. Bandwidth: 1B pages in 7 days = ~1650 pages/sec. At 500KB each = 825 MB/sec sustained download. Need 100+ fetcher machines with 100Mbps each"],tip:"URL frontier is the core."},
{n:14,t:"E-Commerce (Amazon)",s:"Millions products, flash sales",req:"Catalog, search, cart, checkout, payment, tracking",
ctx:"Flash sale: 100K users buying last 100 iPhones at 12:00 PM. How to prevent selling 101? Optimistic locking on inventory. Also: payment idempotency = never charge twice even with network retries",
design:["<b>Product:</b> PostgreSQL + Elasticsearch + CDN","<b>Cart:</b> Redis (fast)","<b>Order:</b> PostgreSQL ACID","<b>Inventory:</b> Optimistic locking (version column)","<b>Payment:</b> Idempotent + Saga pattern","<b>Search with facets:</b> Elasticsearch: user searches laptop \u2192 filter by brand=Dell, price \u20b950K-1L, rating>=4, in_stock=true. Each facet shows count (Dell: 42, HP: 38). Real-time facet counts update as filters change","<b>Cart implementation:</b> Redis hash: cart:{user_id} \u2192 {sku1: qty, sku2: qty}. TTL = 30 days. Anonymous cart (cookie-based) merged into user cart on login. Keep higher quantity on conflict","<b>Order state machine:</b> PLACED \u2192 PAYMENT_PENDING \u2192 CONFIRMED \u2192 PROCESSING \u2192 SHIPPED \u2192 OUT_FOR_DELIVERY \u2192 DELIVERED \u2192 COMPLETED. Side paths: CANCELLED, RETURNED, REFUNDED. Each transition logged immutably","<b>Catalog service:</b> Product schema: products(product_id, title, description, category_id, brand, price_cents, images JSONB, attributes JSONB, seller_id, status ENUM(active,inactive,out_of_stock), created_at). Attributes vary by category: laptops have RAM/CPU, shoes have size/color. JSONB handles this flexibility","<b>Warehouse and fulfillment:</b> Multiple warehouses across regions. On order: select nearest warehouse with stock (minimize shipping time). inventory_warehouse(sku, warehouse_id, qty, reserved_qty). Split orders across warehouses if single warehouse lacks full quantity","<b>Price engine:</b> Base price + seller discount + coupon code + loyalty points + dynamic pricing adjustment. Price locked at cart-checkout time (not at browse time). Display MRP, selling price, your savings, estimated delivery date all computed server-side","<b>Recommendation engine:</b> Collaborative filtering: users who bought X also bought Y. Content-based: similar products by attributes. Shown on product page (similar items), cart page (frequently bought together), homepage (personalized picks). Pre-computed hourly, stored in Redis"],
deep:["Flash: queue requests, first N get lock","Double-booking: version check, 0 rows=taken","Payment: unique idempotency_key","<b>Flash sale implementation:</b> 100K users, 100 items. Virtual queue: user joins \u2192 gets queue token + position. Process 500 users at a time. When your turn: you have 10 minutes to select + pay. Timeout = back to queue. Fair, prevents server crash","<b>Inventory locking detail:</b> UPDATE inventory SET qty=qty-1, version=version+1 WHERE sku=X AND qty > 0 AND version=current_version. If 0 rows affected \u2192 someone else got it \u2192 return sold out. No explicit locks needed","<b>Payment saga detail:</b> Orchestrator: 1) reserve_inventory(sku, qty) \u2192 success 2) process_payment(user_id, amount, idempotency_key) \u2192 success 3) confirm_order(order_id). If step 2 fails: compensate step 1 (release_inventory). If step 3 fails: compensate step 2 (refund) then step 1","<b>Dynamic pricing:</b> ML model adjusts prices based on: demand (how many people viewing this product), inventory levels (low stock = higher price), competitor prices (scraped), time of day, user segment (new user discount). Controversial but widely used","<b>Order tracking pipeline:</b> Order placed \u2192 warehouse notified via Kafka \u2192 picked + packed \u2192 shipping label generated (carrier API) \u2192 tracking_id stored. Carrier webhook updates: in_transit, out_for_delivery, delivered. Each status change \u2192 push notification to user. Real-time map tracking via carrier GPS API","<b>Return and refund flow:</b> User initiates return within 7 days \u2192 return_request(order_id, reason, status). Approved \u2192 schedule pickup or drop-off. Item received at warehouse \u2192 quality check \u2192 refund initiated (original payment method or store credit). Entire flow takes 5-7 days. Track each step","<b>Seller platform:</b> Multi-tenant: thousands of sellers listing products. Seller dashboard: inventory management, order fulfillment SLA (ship within 24hrs), performance metrics (cancellation rate, delivery speed). Poor performance \u2192 lower search ranking or suspension","<b>Review system:</b> Separate service. Schema: reviews(review_id, product_id, user_id, rating 1-5, text, verified_purchase BOOLEAN, helpful_votes, created_at). Verified purchase badge = user actually bought this item. Spam detection ML model"],tip:"Focus: inventory locking + payment."},
{n:15,t:"Google Docs",s:"Millions concurrent docs",req:"Real-time collaborative editing, conflict resolution",
ctx:"You and colleague type simultaneously in same document. You insert at position 5, they delete at position 3. OT (Operational Transformation) transforms your edit against theirs so both converge to same result",
design:["<b>WebSocket per user</b>","<b>OT (Operational Transformation)</b> for conflicts","<b>Storage:</b> Op log + periodic snapshots","<b>Presence:</b> Cursors via WebSocket","<b>Document storage:</b> Metadata (title, owner, permissions) in PostgreSQL. Content stored as operation log in Cassandra (append-heavy workload). Periodic snapshots in S3 for fast loading","<b>WebSocket session:</b> Each user editing a doc has persistent WebSocket to Collaboration Server. On connect: load latest snapshot + replay ops since snapshot \u2192 user sees current state. Then receive real-time ops from other users","<b>Presence system:</b> Each user cursor position + selection range broadcast every 50ms to other users via WebSocket. User list sidebar shows who is online with colored cursors","<b>Comment and suggestion mode:</b> Comments anchored to text ranges stored as: comments(comment_id, doc_id, user_id, text, anchor_start, anchor_end, resolved BOOLEAN, created_at). Suggestion mode: proposed edits shown as tracked changes (green insert, red strikethrough). Accept/reject by editor","<b>Rich text data model:</b> Document represented as ordered list of operations or blocks. Each block: {type: paragraph|heading|list|image|table, content: [{text: hello, bold: true, font_size: 14}]}. Formatting = attributes on text runs, not separate elements","<b>Scaling strategy:</b> Each document assigned to one collaboration server (sticky session by doc_id hash). Max ~50 concurrent editors per server. Documents with 100+ editors require sharded collaboration server with operation relay. Most docs have 1-5 editors so single server suffices"],
deep:["OT: A inserts@5, B deletes@3 → positions shift","CRDT alternative: no central server, P2P friendly","OT(Google Docs) vs CRDT(Figma)","<b>OT detailed example:</b> User A inserts X at position 5. User B inserts Y at position 3. A op arrives first at server. When B op arrives: server transforms it. A inserted at 5 (after B position 3) \u2192 B position unchanged at 3. If A had inserted at position 2 (before B) \u2192 B position shifts from 3 to 4","<b>OT vs CRDT tradeoff:</b> OT: simpler algorithm, needs central server for ordering, proven at Google scale. CRDT: no central server needed (works P2P), better for offline-first apps, more complex implementation. Google Docs = OT. Figma = CRDT. Apple Notes = CRDT","<b>Version history implementation:</b> Every 100 operations, save a snapshot. To view Tuesday 3PM state: find latest snapshot before Tuesday 3PM \u2192 replay operations from snapshot to target time. To restore: load that state as current + truncate newer ops","<b>Access control levels:</b> Owner (full control, manage sharing, delete). Editor (edit content, add comments). Commenter (read + add comments only). Viewer (read only). Share by: email invite, link with role, organizational access (everyone at company.com)","<b>Offline editing:</b> Queue operations locally in IndexedDB while offline. On reconnect: send queued ops to server. Server transforms against all concurrent ops from other users that happened during offline period. Result: seamless merge. If conflict impossible to auto-resolve \u2192 show merge dialog","<b>Operation log compaction:</b> Op log grows unbounded. Every 500 ops or 10 minutes: snapshot current document state to S3. Ops before snapshot can be archived/deleted. On doc open: load snapshot + replay recent ops. Keeps load time under 2 seconds even for year-old documents","<b>Undo/redo in collaborative context:</b> Local undo must only undo YOUR operations, not collaborators. Maintain per-user operation stack. Undo = generate inverse operation (insert X at 5 \u2192 delete at 5). Inverse op goes through OT like any other op. Much harder than single-user undo","<b>Export and import:</b> Export to: PDF (server-side rendering via headless Chrome), DOCX (Apache POI or custom XML builder), HTML, plain text. Import from: DOCX (parse XML structure to doc model), paste from web (sanitize HTML, map to doc blocks). Maintain formatting fidelity"],tip:"Know OT with simple example."},
{n:16,t:"Distributed KV Store",s:"Millions QPS, tunable consistency",req:"put/get/delete with high availability + partition tolerance",
ctx:"Design Redis/DynamoDB from scratch. THE HARDEST question. Combines: consistent hashing, replication, quorum, vector clocks, gossip protocol, hinted handoff, LSM trees. Tests true distributed systems understanding",
design:["<b>Consistent hashing + virtual nodes</b>","<b>Replicate:</b> N=3 consecutive ring nodes","<b>Quorum:</b> W+R>N for consistency","<b>Vector clocks</b> for conflict detection","<b>Write path detail:</b> Client sends PUT(key, value) to any node \u2192 that node = coordinator. Coordinator hashes key \u2192 finds N replica nodes on ring \u2192 sends write to all N \u2192 waits for W acknowledgments \u2192 responds success to client","<b>Read path detail:</b> Client sends GET(key) to coordinator. Coordinator sends read to N replicas \u2192 waits for R responses \u2192 returns value with highest version (vector clock comparison). If conflict detected \u2192 return all versions for client to resolve","<b>Storage engine (LSM Tree):</b> Write \u2192 append to WAL (durability) \u2192 insert into in-memory sorted structure (memtable). When memtable full \u2192 flush to immutable sorted file on disk (SSTable). Background compaction merges SSTables","<b>Consistent hashing with virtual nodes:</b> Each physical node maps to 100-200 virtual nodes on the ring. Benefits: even data distribution (prevents hot spots), when node joins/leaves only 1/N of keys migrate. Without virtual nodes: uneven distribution because nodes land at random ring positions","<b>Tunable consistency:</b> N=3 replicas. W=1,R=1: fastest but eventual consistency (like Cassandra default). W=2,R=2: strong consistency (W+R>N). W=3,R=1: write-heavy penalty, fast reads, strong. Application chooses per request based on use case. Shopping cart = W=1 (fast). Bank balance = W=2,R=2 (correct)","<b>Bloom filters for reads:</b> Before checking each SSTable file on disk: check Bloom filter (probabilistic, in-memory). If filter says key NOT present \u2192 guaranteed not there, skip disk read. If filter says MAYBE present \u2192 check SSTable. Reduces disk reads by 90%+ for missing keys"],
deep:["Gossip protocol for failure detection","Hinted handoff: neighbor stores temp writes","Anti-entropy: Merkle trees for repair","LSM tree: memtable→SSTable→compaction","<b>Vector clock detail:</b> Each node maintains logical clock [A:3, B:5, C:2]. On write at node A: increment A clock. Compare two clocks: if one dominates (every component >=) \u2192 causal order. If neither dominates \u2192 concurrent \u2192 conflict! Client resolves (e.g., merge shopping carts)","<b>Hinted handoff detail:</b> Write targets node X but X is temporarily down. Coordinator writes to next available node Y with hint: this belongs to X. Y stores it in a separate hinted_handoff table. When X recovers \u2192 Y detects via gossip \u2192 sends hinted writes to X \u2192 deletes hints","<b>Merkle tree anti-entropy:</b> Each node builds Merkle tree (hash tree) of its data. Root hash = fingerprint of ALL data. Compare root hashes between replicas: same = in sync. Different \u2192 drill down tree to find exact keys that differ \u2192 sync only those. Efficient reconciliation","<b>Tombstones for deletes:</b> DELETE does not physically remove data immediately. Writes a tombstone marker (key, deleted_at). Prevents deleted data from being resurrected by anti-entropy from a replica that has not seen the delete yet. Compaction removes tombstones after grace period (e.g., 10 days)","<b>Read repair:</b> During quorum read, coordinator notices one replica has stale data (older vector clock). After returning result to client, coordinator asynchronously sends latest value to stale replica. Passive consistency repair on every read","<b>Gossip protocol detail:</b> Every node picks random peer every 1 second and exchanges membership list (node ID, heartbeat counter, timestamp). If node X heartbeat not incremented for 30 seconds \u2192 marked suspicious. After 60 seconds without heartbeat \u2192 marked down. Decentralized failure detection, no single point of failure","<b>SSTable compaction strategies:</b> Size-tiered: merge SSTables of similar size. Good for write-heavy workloads. Leveled: organize SSTables into levels (L0, L1, L2...), each level 10x larger. Better read performance (fewer files to check) but more write amplification. Cassandra supports both","<b>Capacity planning:</b> 1M QPS, 1KB avg value, N=3 replicas. Storage: 1M writes/sec x 1KB x 86400 sec/day = 86TB/day raw. With 3 replicas = 258TB/day. Need fast SSDs. Read latency target: p99 < 10ms. Requires sufficient memory for memtables + Bloom filters + OS page cache"],tip:"Hardest question. Practice hash ring."},
{n:17,t:"Pastebin",s:"5M pastes/day",req:"Create text paste, get by short URL, optional expiry",
ctx:"Simplest question. Paste text, get short URL, anyone can read. Basically URL Shortener + S3 content storage. Use as 15-minute warm-up to practice the framework",
design:["<b>Content→S3, Metadata→SQL</b>","<b>Base62(Snowflake ID)</b> for key","<b>Redis</b> for hot pastes","<b>Full stack:</b> Client \u2192 LB \u2192 API Server \u2192 Generate Base62 key \u2192 Store content in S3 \u2192 Store metadata in SQL \u2192 Cache in Redis \u2192 Return short URL","<b>Read path:</b> GET /{key} \u2192 Redis lookup \u2192 hit? return content. Miss? \u2192 SQL lookup for S3 path \u2192 fetch from S3 \u2192 cache in Redis \u2192 return","<b>Metadata schema:</b> pastes(paste_id VARCHAR(8) PK, s3_key TEXT, user_id NULL, title NULL, language VARCHAR(20), visibility ENUM(public,unlisted,private), expires_at TIMESTAMP NULL, created_at TIMESTAMP, view_count INT DEFAULT 0). Size limit: 10MB per paste. Index on expires_at for cleanup","<b>Storage estimation:</b> 5M pastes/day x avg 10KB = 50GB/day = 18TB/year in S3 ($0.023/GB = ~$415/month). Metadata in SQL: 5M rows/day x 200 bytes = 1GB/day = 365GB/year. Redis cache: top 20% hot pastes x 10KB = ~10GB memory. Very affordable system","<b>Access control:</b> Public: anyone with URL. Unlisted: only people with URL (not indexed, not searchable). Private: only creator (requires auth). Password-protected: anyone with URL + password (bcrypt hash stored in metadata). Burn after read: auto-delete after first view"],
deep:["Similar to URL shortener + content storage","Expiry: cron cleanup","<b>Syntax highlighting:</b> Client-side using highlight.js or Prism.js. Language auto-detection from content, or user-specified via ?lang=python parameter. Zero server cost for highlighting","<b>Abuse prevention:</b> Rate limit creation per IP (10 pastes/hour anonymous). Content scanning for: malware links, phishing, illegal content. CAPTCHA for anonymous high-volume creation","<b>Raw view:</b> Serve plain text via /raw/{key} endpoint. Content-Type: text/plain. Useful for programmatic access (curl, wget, scripts)","<b>Expiry cleanup:</b> Cron job every hour: SELECT paste_id, s3_key FROM pastes WHERE expires_at < NOW() LIMIT 1000. Delete from S3 in batch. Delete metadata rows. Process in batches to avoid long-running transactions. Soft-delete first (mark deleted), hard-delete after 24hr grace period","<b>Analytics:</b> Track view_count (atomic increment in Redis, flush to SQL hourly), unique visitors (HyperLogLog in Redis per paste_id), referrer sources. Show creator a dashboard: views over time, top referrers. Popular pastes surfaced on trending page","<b>API and CLI support:</b> REST API: POST /api/pastes (create), GET /api/pastes/{key} (read), DELETE /api/pastes/{key} (delete). CLI tool: cat file.py | pastecli \u2192 returns URL. API key auth for registered users. Rate limit: 60 requests/minute per API key"],tip:"Simplest question. Good warm-up."},
{n:18,t:"Ticket Booking",s:"Millions during events",req:"Select seats, book+pay, no double-booking",
ctx:"BTS concert: 5M fans, 50K seats. NO DOUBLE BOOKING. Two users click seat A7 at same millisecond = only ONE gets it. Optimistic locking + temporary 5-min hold + virtual queue for flash sales",
design:["<b>Seats:</b> SQL (event_id, seat_id, status, version)","<b>Flow:</b> Select→hold 5min→pay→confirm","<b>Locking:</b> Optimistic: UPDATE WHERE version=v","<b>Queue:</b> Virtual queue for flash sales","<b>Seat map rendering:</b> Venue seat layout stored as JSON schema. Client renders interactive SVG seat map. Color-coded: green=available, yellow=held, red=booked. Real-time updates via WebSocket","<b>Booking flow detail:</b> 1) User clicks seat A7 \u2192 2) API: UPDATE seats SET status=HELD, held_until=NOW()+5min WHERE seat_id=A7 AND status=AVAILABLE AND version=v \u2192 3) 0 rows? Someone else got it. 1 row? Proceed to payment \u2192 4) Payment success \u2192 UPDATE status=BOOKED \u2192 5) Send e-ticket via email","<b>E-ticket generation:</b> On booking confirm: generate unique QR code (contains booking_id + hash for verification). Send PDF ticket via email + in-app. QR scanned at venue entrance for validation","<b>Seat pricing tiers:</b> seats(seat_id, event_id, section ENUM(VIP,platinum,gold,silver), row, number, price_cents, status, version). Different sections have different prices. Dynamic pricing: as section fills up (>80% sold), increase price 20%. Early bird discounts for first 48 hours","<b>Waitlist system:</b> All seats sold out? User joins waitlist. Schema: waitlist(event_id, user_id, section_preference, joined_at, status). When cancellation happens or new seats released \u2192 notify top N waitlisted users via push notification. They get 15 min to purchase. Timeout \u2192 next in line","<b>Multi-event calendar:</b> Venues host multiple events. events(event_id, venue_id, artist_id, event_date, sale_start_date, total_seats, status ENUM(upcoming,on_sale,sold_out,completed,cancelled)). Venue seat map reused across events with per-event pricing"],
deep:["0 rows affected = someone else got it","Redis TTL for seat hold timeout","CQRS: cached seat map (read) vs booking (write)","<b>Virtual queue implementation:</b> User requests to join \u2192 assigned position token (Redis INCR). Display: You are #4523 in queue. Background: process 500 tokens at a time. When your range reached \u2192 WebSocket push: Its your turn! 10 min to browse and book","<b>Seat hold cleanup:</b> Two mechanisms: 1) Redis key seat_hold:{seat_id} with TTL=5min (automatic expiry). 2) Background job every 30 sec: UPDATE seats SET status=AVAILABLE WHERE status=HELD AND held_until < NOW(). Belt and suspenders","<b>Scalability by event:</b> Events are completely independent. Shard DB by event_id. Each event seats on one shard. No cross-event transactions ever needed. Popular event \u2192 its shard gets more traffic but others unaffected","<b>Partial booking:</b> User selects 4 seats, payment fails. Must release ALL 4 seats atomically. Wrap in DB transaction: BEGIN \u2192 update all 4 seats \u2192 COMMIT/ROLLBACK. Never leave partial state","<b>Fraud detection for ticket scalping:</b> Detect bots: CAPTCHA on checkout, device fingerprinting, unusual speed (selects seat + pays in under 3 seconds = bot). Rate limit: max 6 tickets per user per event. Block known scalper IPs. Verify phone number via OTP before purchase","<b>Load testing for flash sales:</b> Simulate 500K concurrent users hitting sale start. Test: queue assignment latency, seat selection response time, payment gateway throughput. Pre-warm all caches, pre-establish DB connection pools. Use CDN for static seat map assets. Target: p99 < 2 seconds for seat hold","<b>Cancellation and refund policy:</b> Cancel within 24hrs of booking \u2192 full refund. Cancel 24hr-7days before event \u2192 50% refund. Cancel <24hrs before event \u2192 no refund. Refund \u2192 release seat back to AVAILABLE status atomically. Refund processed to original payment method within 5-7 business days"],tip:"10K users clicking same last seat."},
{n:19,t:"Messenger / Slack",s:"Like WhatsApp + channels",req:"1:1, channels, threads, files, search, workspace isolation",
design:["<b>Core:</b> Same as WhatsApp","<b>Channels:</b> Fan-out to members","<b>Threads:</b> parent_message_id","<b>Search:</b> Elasticsearch per workspace","<b>Channel message fan-out:</b> Small channel (<100 members): push to all connected members via WebSocket immediately. Large channel (#general with 10K members): push only for @mentions and @channel. Others see messages on next channel open (lazy load)","<b>Thread data model:</b> Schema: messages(message_id, channel_id, parent_message_id NULL, user_id, text, attachments JSONB, reactions JSONB, created_at). parent_message_id = NULL means top-level. Non-null = thread reply. Thread count + last reply stored on parent for preview","<b>Search architecture:</b> Elasticsearch index per workspace. Fields: message_text, sender_name, channel_name, file_names, timestamp. Access-controlled: user can only search channels they are a member of","<b>Channel types:</b> Public: anyone in workspace can join and see history. Private: invite-only, hidden from non-members. Direct Message: 1:1 or group DM (up to 8 people). Shared channel: spans two different workspaces (enterprise feature). Schema: channels(channel_id, workspace_id, name, type ENUM(public,private,dm), topic, created_by, member_count, created_at)","<b>Message delivery guarantees:</b> Client sends message via WebSocket \u2192 server persists to DB \u2192 returns ACK with message_id + server_timestamp \u2192 client shows as delivered. If no ACK in 5s \u2192 client retries with same client_generated_id (dedup). Server fans out to online channel members via WebSocket. Offline members see on next load","<b>Pinned items and bookmarks:</b> Pin important messages to channel (max 100 pins). Bookmarks: links pinned at top of channel (docs, dashboards, wikis). Schema: pins(channel_id, message_id, pinned_by, pinned_at). Quick access to important information without scrolling"],
deep:["Workspace isolation: scope all data by workspace_id","Reactions: counter per emoji (not per user)","Bot: webhook + special user","<b>Workspace isolation detail:</b> ALL data keyed by workspace_id. Database: separate schema or strict row-level security per workspace. Cache: Redis key prefix workspace:{id}:. Search: separate ES index per workspace. Zero data leakage between workspaces","<b>File sharing pipeline:</b> User drops file \u2192 upload to S3 via pre-signed URL \u2192 Lambda generates preview/thumbnail (PDF \u2192 first page image, image \u2192 resize, video \u2192 first frame) \u2192 message posted with file metadata + preview URL","<b>Bot and integration framework:</b> Incoming webhook: external service POST JSON to Slack URL \u2192 message posted in channel. Outgoing webhook: user types /deploy \u2192 Slack POSTs to your server \u2192 your server responds with message. Bot = persistent connection via WebSocket API","<b>Message edit/delete:</b> Edit: update in DB + broadcast edit event via WebSocket to all connected channel members. Clients update in-place. Delete: mark as deleted (soft delete for compliance/legal hold). Show [This message was deleted] placeholder","<b>Notification complexity:</b> Per-channel settings: all messages, @mentions only, nothing. Per-user keywords (alert when someone says deployment). Do Not Disturb schedule. @here (online members) vs @channel (everyone) vs @username (one person). Snooze functionality","<b>Message retention and compliance:</b> Enterprise plans: configurable retention policy (delete messages older than 90 days, or keep forever). Legal hold: preserve all messages for specific users during litigation (override retention). Export: admins can export all workspace data as JSON for compliance. eDiscovery integration","<b>Typing indicators:</b> User starts typing \u2192 send typing_start event via WebSocket. Server broadcasts to channel members. Client shows Alice is typing... If no keystroke for 5s \u2192 typing_stop event. Multiple typists: Alice and Bob are typing... Throttle: max 1 typing event per 3 seconds per user","<b>User presence system:</b> States: active (using app), idle (no input for 10 min), DND (do not disturb), offline. Client sends heartbeat every 30s. No heartbeat for 60s \u2192 mark offline. Presence stored in Redis: user:{id}:presence. Presence changes broadcast only to users who are viewing a channel with this user"],tip:"Diff from WhatsApp: workspace + channels + search."},
{n:20,t:"CDN Design",s:"Global, >95% cache hit",req:"Cache static content at edge with instant invalidation",
ctx:"Design CloudFront itself. Edge servers in 50+ cities. GeoDNS routes to nearest. Cache hierarchy. Interesting: instant invalidation across all PoPs, consistent hashing within PoP, hot content auto-replication",
design:["<b>PoPs</b> in 50+ cities","<b>GeoDNS→nearest PoP</b>","<b>Cache:</b> L1(edge)→L2(regional)→Origin","<b>Invalidation:</b> TTL + Purge API","<b>PoP architecture:</b> Each Point of Presence = cluster of edge servers + local load balancer. Edge servers run: cache (Varnish/Nginx), TLS termination, compression (brotli/gzip), DDoS filtering","<b>Full request flow:</b> User \u2192 DNS query \u2192 GeoDNS returns nearest PoP IP \u2192 TLS handshake with PoP \u2192 PoP checks local cache \u2192 HIT? serve. MISS? \u2192 check Origin Shield (regional cache) \u2192 HIT? serve. MISS? \u2192 fetch from origin server \u2192 cache at all levels \u2192 serve","<b>Cache key design:</b> Default: URL + query params + Vary header. Custom: add geo, device type, cookie value. Be careful: too many variants = low hit ratio. Too few = wrong content served","<b>SSL/TLS at edge:</b> TLS termination at PoP (not origin). Pre-distribute SSL certificates to all PoPs. OCSP stapling to avoid certificate validation round-trips. TLS 1.3 reduces handshake from 2 RTT to 1 RTT. Session resumption eliminates handshake on repeat visits. Result: sub-100ms TTFB globally","<b>Origin protection:</b> Origin server IP hidden behind CDN. All traffic goes through CDN PoPs. Rate limiting at edge prevents DDoS from reaching origin. Origin only accepts connections from CDN PoP IP ranges (whitelist). If CDN has 95% cache hit rate, origin sees only 5% of total traffic","<b>Content optimization at edge:</b> Image optimization: serve WebP to Chrome, AVIF to Firefox, JPEG fallback. Auto-resize based on Client-Hints (device width). Minify CSS/JS. Lazy loading hints. All done at edge without origin involvement. Reduces payload 40-60%"],
deep:["Origin Shield between edges and origin","Consistent hashing within PoP","TLS termination at edge","Brotli > gzip by 20%","<b>Anycast routing:</b> Alternative to GeoDNS. Single IP announced from all PoPs via BGP. Network routes user to nearest PoP based on BGP topology. Faster failover than DNS (BGP converges in seconds vs DNS TTL in minutes)","<b>Hot content handling:</b> Real-time monitoring of per-URL request rate. If URL exceeds threshold \u2192 auto-replicate to more servers within PoP. Cold content = 1 copy. Hot content = spread across many servers. Dynamic adjustment","<b>Purge propagation:</b> Customer calls purge API for /logo.png \u2192 purge command broadcast to ALL PoPs worldwide (via internal message bus) \u2192 each PoP deletes from local cache \u2192 next request = cache miss = fresh from origin. Sub-second global purge","<b>Edge compute:</b> Run custom code at edge: CloudFlare Workers, AWS Lambda@Edge. Use cases: A/B testing (assign variant at edge), auth token validation (reject at edge, never reach origin), personalized content (geo-based pricing), redirect logic","<b>Video streaming at edge:</b> Video chunks cached at edge. Adaptive bitrate: client requests quality-specific chunk URL (/video/chunk001_720p.ts). Edge serves from cache. Different users watching same video at different qualities all served from same PoP cache","<b>Cache warming strategy:</b> New content (product launch page, viral video) will have 0% cache hit initially. Pre-warm: push content to all PoPs BEFORE launch. API: POST /warm {urls: [...], regions: [us-east, eu-west, ap-south]}. Content cached at all PoPs before first user request. Eliminates cold-start latency spike","<b>Multi-tier cache architecture:</b> L1: edge server local memory (fastest, smallest, 64GB). L2: edge server SSD (fast, medium, 2TB). L3: regional origin shield (shared across PoPs in region). L4: origin server. Promotion: L4 hit \u2192 cache at L3+L2. Popular content automatically promoted to L1 based on request frequency","<b>Monitoring and analytics:</b> Per-PoP dashboards: cache hit ratio (target >95%), bandwidth served, p50/p99 latency, error rates (5xx from origin). Per-URL analytics: request count, cache status (HIT/MISS/EXPIRED), origin fetch time. Alert: cache hit ratio drops below 90% for any PoP \u2192 investigate (cache eviction, misconfigured TTL, cache-busting query params)"],tip:"CDN = distributed cache closest to users."},
{n:21,t:"Typeahead",s:"<100ms per keystroke",req:"Top 5 suggestions as user types, popularity + personalization",
ctx:"Type ne in Google = see netflix, new york, news. Trie where each node stores precomputed top-5 suggestions. Lookup = traverse 2 nodes = instant. Rebuilt offline from query logs. Trending queries get time-decay boost",
design:["<b>Trie:</b> Each node stores precomputed top-K","<b>Client:</b> Debounce 100ms after last key","<b>Update:</b> Offline job rebuilds trie from query logs","<b>Trie data structure:</b> Root \u2192 n \u2192 e \u2192 w (stores: [new york, news, netflix, new delhi, new balance]). Each node has: children map, top_k_suggestions list (precomputed). Lookup ne: traverse 2 nodes, return stored top-5. O(prefix_length)","<b>Service architecture:</b> Client types \u2192 debounce 200ms \u2192 send prefix to Typeahead API \u2192 lookup in Trie (in-memory on search server) \u2192 return top 5 \u2192 client displays dropdown","<b>Trie building pipeline:</b> Search query logs (Kafka) \u2192 daily/weekly aggregation job (Spark) \u2192 count frequency per query \u2192 build trie with top-K per node \u2192 serialize \u2192 deploy to search servers \u2192 load into memory","<b>Trie memory optimization:</b> Full English trie for 5B queries: ~50GB. Optimize: prune nodes with frequency < 100 (rare queries not worth suggesting). Compress single-child chains (n-e-t-f-l-i-x becomes one node netflix). Result: ~5GB fits in memory on a single server. Replicate to 3+ servers for availability","<b>Client-side caching:</b> Cache prefix \u2192 suggestions in browser localStorage. User types ne \u2192 fetches from server \u2192 caches. Next time user types ne \u2192 instant from cache (0ms). Cache TTL: 1 hour. Reduces server load by 60%+ since users repeat searches. LRU eviction at 5MB local cache size","<b>Fallback to Elasticsearch:</b> If trie returns < 5 suggestions for a prefix (rare prefix): fall back to Elasticsearch fuzzy query. ES handles typos, partial matches, and long-tail queries that the trie pruned. Trie = fast path (95% of requests), ES = slow path (5% of requests, ~50ms)"],
deep:["Trending: time-decayed frequency","Personal: user's recent searches from Redis","Multi-language: separate trie per locale","<b>Personalization layer:</b> Before global suggestions: check Redis for user recent searches (LPUSH user:{id}:searches, LRANGE 0 4). Show personal results first, then global. Separate data, merged at query time","<b>Trending injection:</b> Time-decayed scoring: effective_count = recent_count \u00d7 decay_factor + historical_count. If earthquake query spikes in last hour \u2192 immediately appears in suggestions even if historical count is low. Recency-weighted","<b>Multi-language handling:</b> Separate trie per language/locale. Route by user language setting. Transliteration: user types namaste in English keyboard \u2192 suggest Hindi results. Requires phonetic mapping layer","<b>Offensive filtering:</b> Maintain blocklist of offensive terms. Filter suggestions before returning to client. Real-time blocklist update via admin API. Never suggest slurs, hate speech, or NSFW terms","<b>Shard strategy:</b> If trie too large for one server: shard by first 2 characters. aa-az \u2192 shard 1, ba-bz \u2192 shard 2. Max 676 shards. API server routes to correct shard based on prefix","<b>Query analytics pipeline:</b> Every completed search logged to Kafka: {query, user_id, timestamp, clicked_suggestion_index, final_search_term}. Aggregation job: count queries per day/week. Track click-through rate per suggestion position. Measure: what % of users click a suggestion vs type full query. Optimize top-K ranking based on CTR, not just raw frequency","<b>Zero-prefix suggestions:</b> User opens search bar but has not typed anything yet. Show: trending searches (last 1 hour), personalized recent searches, popular in your region. Pre-computed lists stored in Redis, updated every 5 minutes. High traffic moment (zero prefix = every search session starts here)","<b>Latency budget breakdown:</b> Total target: <100ms end-to-end. Network RTT: ~30ms (CDN edge). Server trie lookup: ~1ms. Personalization merge: ~2ms. Response serialization: ~1ms. Client rendering: ~10ms. Budget leaves 56ms margin. If any component exceeds budget \u2192 skip it (e.g., skip personalization under load, serve global-only)"],tip:"Draw the trie for the interviewer."},
{n:22,t:"Nearby Friends",s:"Real-time within X km",req:"See friends on map who are nearby, with privacy",
ctx:"Open People Nearby, see friend Rahul 2km away. Both phones send GPS to Redis GEOADD every 30s. GEORADIUS on friend list within 5km. Battery: stationary = reduce GPS frequency",
design:["<b>GPS every 30s→WebSocket→Redis GEOADD</b>","<b>GEORADIUS</b> on friends list","<b>Pub/Sub</b> for nearby friend updates","<b>Location update flow:</b> Client GPS every 30 sec \u2192 WebSocket \u2192 Location Service \u2192 Redis GEOADD users:active {lng} {lat} {user_id} with TTL 5 min. If no update in 5 min \u2192 auto-expired (user went offline)","<b>Nearby query flow:</b> User opens feature \u2192 get friend list from Social Graph service \u2192 for each active friend: Redis GEODIST or batch GEORADIUS within 5km \u2192 return nearby friends with locations","<b>Privacy settings:</b> Table: location_sharing(user_id, target_user_id, enabled). Options: share with everyone, share with close friends list, share with specific people, off. Checked BEFORE returning location. Server-enforced","<b>Geohash-based indexing:</b> Alternative to Redis GEORADIUS: convert lat/lng to geohash string (e.g., tdr1w for Mumbai). Same prefix = nearby. Query: find all users with geohash prefix tdr1 (covers ~5km area). Store in Redis sorted set: ZADD geohash:tdr1 timestamp user_id. Range query is O(log N + M) where M = results","<b>Distance calculation:</b> Haversine formula for accurate distance between two GPS coordinates on Earth surface. For nearby (< 10km), simplified Euclidean approximation works: dx = (lng2-lng1) x cos(lat), dy = lat2-lat1, distance = sqrt(dx^2+dy^2) x 111km. Show rounded: 2.3 km away, not 2.347km","<b>Map rendering:</b> Client-side map using Mapbox GL or Google Maps SDK. Friend locations shown as avatar markers with name labels. Tap marker \u2192 show profile card with distance + last updated time. Location smoothly animated between updates (interpolation) to avoid jumpy marker movement"],
deep:["Privacy: per-friend sharing toggle","Battery: adaptive freq (moving=often, still=rarely)","<b>Battery optimization detail:</b> Accelerometer detects motion state. Stationary \u2192 GPS every 60s. Walking \u2192 every 15s. Driving \u2192 every 5s. Significant movement detection \u2192 wake up and send. iOS/Android background location APIs handle this natively","<b>Pub/Sub for live updates:</b> When user A moves > 200m: publish to Redis Pub/Sub channel location:{user_a_id}. Nearby friends who have the map open are subscribed \u2192 receive real-time location update via WebSocket \u2192 marker moves on map smoothly","<b>Scaling by region:</b> Partition Redis by geographic region (geohash prefix). Mumbai users on Mumbai Redis, Delhi users on Delhi Redis. Cross-region friend queries fan out to both Redis instances. Most friends are in same city \u2192 most queries are single-region","<b>Location history:</b> Optional feature: store location trail in time-series DB (TimescaleDB). user_id + timestamp + lat + lng. Display your day as a path on map. Auto-delete after 24 hours unless user saves it","<b>Proximity alerts:</b> User configures: alert me when any close friend is within 1km. Background process: on each location update, check if any friends crossed the threshold distance. If yes \u2192 push notification: Rahul is nearby (800m away)! Debounce: max 1 alert per friend per hour to avoid spam","<b>Scaling estimation:</b> 10M active users sending location every 30s = 333K writes/sec to Redis. Each GEOADD is O(log N). Redis handles 100K ops/sec per instance \u2192 need 4 Redis shards (by geohash region). Each GEORADIUS query on avg 500 users in 5km radius = ~1ms. Very efficient at scale","<b>Safety features:</b> Ghost mode: appear offline to everyone (no location shared). Freeze location: share a fixed location instead of real-time (useful for safety). Emergency sharing: temporarily share real-time location with selected contacts for X hours (like Google Maps location sharing). All privacy changes take effect immediately server-side"],tip:"Only match users BOTH sharing AND friends."},
{n:23,t:"Payment System",s:"Millions txns/day, zero loss",req:"Process payments, refunds, exactly-once, audit trail",
ctx:"ZERO tolerance for errors. Charged exactly once. Not zero (lost payment), not twice (overcharged). Idempotency key per request. Double-entry ledger: every txn = debit + credit, sum must always balance",
design:["<b>Flow:</b> Checkout→PENDING→call PSP→webhook confirms","<b>Idempotency key</b> with DB unique constraint","<b>Double-entry ledger:</b> every txn = debit+credit","<b>PSP:</b> Stripe/PayPal behind adapter pattern","<b>Payment record schema:</b> payments(payment_id UUID PK, order_id, user_id, amount_cents INT, currency, status ENUM(initiated,processing,success,failed,refunded), idempotency_key UNIQUE, psp_reference, created_at, updated_at)","<b>Double-entry ledger:</b> Every transaction = TWO entries. Charge user: debit user_wallet, credit merchant_account. Refund: debit merchant_account, credit user_wallet. SUM(debits) MUST EQUAL SUM(credits) always. If not \u2192 something is broken \u2192 alert","<b>PSP integration:</b> Adapter pattern: PaymentGateway interface with methods: charge(), capture(), refund(), get_status(). Implementations: StripeAdapter, PayPalAdapter, RazorpayAdapter. Switch providers without changing business logic","<b>Payment flow state machine:</b> INITIATED \u2192 PSP_CALLED \u2192 PENDING_WEBHOOK \u2192 SUCCESS/FAILED \u2192 (optional) REFUND_INITIATED \u2192 REFUNDED. Every state transition logged with timestamp in payment_events(payment_id, from_status, to_status, timestamp, metadata JSONB). Immutable audit trail. Never delete payment records","<b>Webhook handling:</b> PSP sends POST to /webhooks/stripe with event (payment_intent.succeeded). Verify signature (HMAC with webhook secret). Process idempotently (store webhook_id, skip if already processed). Return 200 immediately, process async. If you return 5xx, PSP retries with exponential backoff for up to 72 hours","<b>Multi-PSP failover:</b> Primary: Stripe. If Stripe returns 5xx or times out 3x in 5 minutes \u2192 circuit breaker opens \u2192 route to backup PSP (Razorpay/Adyen). Dashboard shows PSP health in real-time. Auto-switch back when primary recovers. Prevents payment downtime during PSP outages"],
