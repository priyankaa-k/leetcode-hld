const NOTES = [
{section:"Flow: Request Journey",notes:[
{t:"Complete Request Flow",content:`<b>User types URL in browser:</b>
<br><br>1. <b>DNS Resolution</b> — Browser cache → OS cache → Resolver cache → (miss?) → Root → .com TLD → Authoritative (Route53) → returns IP. Cached with TTL at every level
<br><br>2. <b>CDN Check</b> — If static content (image, JS, CSS, video): CDN edge serves it. Cache hit = done in 20ms. Miss = fetch from origin, cache at edge, serve
<br><br>3. <b>Load Balancer</b> — Distributes to healthy servers. L4 (fast, IP+port only) or L7 (smart, reads URL/headers). Algorithms: Round Robin, Least Connections, IP Hash, Weighted RR, Least Response Time. Also does: SSL termination, health checks, connection draining
<br><br>4. <b>API Gateway</b> — Auth (validate JWT/API key), rate limiting (token bucket, 429 if exceeded), request validation (schema check), API versioning (/v1 vs /v2), protocol conversion (REST→gRPC internally), response aggregation (call 3 services, merge), logging
<br><br>5. <b>Service</b> — Business logic. Check cache first (Redis). Miss? Query DB. Process. Return response
<br><br>6. <b>Cache (Redis)</b> — Cache-aside: check cache → miss → read DB → write cache. On write: update DB → DELETE cache key (not update). Eviction: LRU (default). Problems: stampede (mutex lock), penetration (cache null), avalanche (jitter TTL)
<br><br>7. <b>Database</b> — SQL (PostgreSQL) for ACID/joins/transactions. NoSQL (MongoDB/Cassandra/Redis) for scale/flexibility. Replication: master writes, slaves read. Sharding: last resort
<br><br>8. <b>Response</b> — Travels back: Service → API Gateway → LB → CDN (cached for next user) → User browser`},
]},
{section:"Building Blocks Cheat Sheet",notes:[
{t:"DNS",content:`Domain → IP mapping. Browser cache → OS cache → Resolver (ISP/Cloudflare/Google 8.8.8.8) → Root → TLD (.com) → Authoritative (Route53)
<br><br><b>Resolver</b> = detective who finds the IP. <b>Authoritative</b> = person who knows the IP
<br><br><b>Records:</b> A (domain→IPv4), CNAME (alias→domain), MX (mail), NS (nameserver)
<br><br><b>TTL:</b> How long cached. Low TTL = fast failover, more queries. High TTL = fewer queries, slow failover
<br><br><b>GeoDNS:</b> Different IP per user location → route to nearest data center
<br><br><b>Interview line:</b> "DNS resolves domain to IP, cached at multiple levels with TTL. GeoDNS routes to nearest DC"`},

{t:"Load Balancer",content:`Distributes traffic. Hides internal IPs. Health checks remove dead servers. SSL termination.
<br><br><b>L4 (Transport):</b> Sees IP+port only. Fast, dumb. AWS NLB
<br><b>L7 (Application):</b> Reads URL, headers, cookies. Smart routing. AWS ALB, Nginx
<br><br><b>Algorithms:</b>
<br>• Round Robin — equal share, A→B→C→A
<br>• Weighted RR — powerful server gets more (weight=5 gets 5x)
<br>• Least Connections — send to least busy server
<br>• Least Response Time — send to fastest responding
<br>• IP Hash — hash(IP) → same server always (sticky)
<br><br><b>L4 when:</b> Monolith, extreme throughput, non-HTTP (gaming, DB connections)
<br><b>L7 when:</b> Microservices path-based routing, SSL termination, content inspection
<br><br><b>Sticky Sessions:</b> Same user → same server. Cookie-based or IP hash. BAD practice — use Redis sessions instead
<br><br><b>SSL Termination:</b> LB handles HTTPS decryption → plain HTTP internally. Saves CPU on app servers. Certs managed in one place
<br><br><b>Interview line:</b> "L7 ALB for path-based routing to microservices, health checks every 10s, SSL terminated at LB"`},

{t:"API Gateway",content:`Single entry point between clients and microservices. NOT the same as LB.
<br><br><b>LB = parking guard</b> (directs cars to buildings). <b>Gateway = reception desk</b> (checks your badge, translates language, combines info)
<br><br><b>Does:</b>
<br>• Authentication — validate JWT/API key before hitting backend
<br>• Rate limiting — 100 req/min per user, 429 if exceeded
<br>• Request validation — reject malformed requests early
<br>• API versioning — /v1/users → old service, /v2/users → new
<br>• Protocol conversion — accept REST from client, convert to gRPC internally
<br>• Response aggregation — call 3 services, merge into one response
<br>• Caching — cache GET responses
<br>• Logging — central place to log all requests
<br><br><b>BFF pattern:</b> Different gateway for web vs mobile (mobile gets smaller payloads)
<br><br><b>Examples:</b> Kong, AWS API Gateway, Zuul (Netflix)
<br><br><b>Interview line:</b> "API Gateway handles auth, rate limiting, routes to microservices, converts REST to gRPC internally"`},

{t:"SQL vs NoSQL",content:`<b>SQL (PostgreSQL, MySQL):</b>
<br>• ACID: Atomicity (all or nothing), Consistency (rules never break), Isolation (transactions invisible to each other), Durability (committed = permanent, WAL on disk)
<br>• Schema enforced, normalized, complex joins, mature tooling
<br>• Scaling: vertical → read replicas → partitioning → sharding (last resort)
<br>• Indexing: B-tree on WHERE/JOIN/ORDER columns. Speeds reads, slight write overhead
<br>• Use for: payments, orders, user accounts — anything needing ACID + joins
<br><br><b>NoSQL types:</b>
<br>• Key-Value (Redis, DynamoDB) — sessions, cache, counters. Hash table O(1)
<br>• Document (MongoDB) — flexible JSON docs, user profiles, catalogs. B-tree
<br>• Wide-Column (Cassandra) — write-heavy, time-series, IoT, analytics. LSM tree
<br>• Graph (Neo4j) — relationships, social networks, recommendations. Adjacency list
<br>• Time-Series (InfluxDB) — metrics, monitoring, stock prices
<br><br><b>BASE:</b> Basically Available, Soft state, Eventually consistent
<br><br><b>Choose SQL when:</b> need joins, ACID, complex queries, structured data
<br><b>Choose NoSQL when:</b> massive scale, simple lookups, flexible schema, availability > consistency
<br><br><b>Interview line:</b> "PostgreSQL for payments (ACID). Cassandra for message history (write-heavy). Redis for cache. MongoDB if schema evolves rapidly"`},

{t:"Caching",content:`RAM read = 1000x faster than DB. THE #1 scaling lever.
<br><br><b>Cache layers:</b> Browser → CDN → API Gateway → Redis → DB query cache
<br><br><b>Strategies:</b>
<br>• <b>Cache-Aside:</b> Read: cache miss → DB → write cache. Write: update DB → DELETE cache key. MOST COMMON
<br>• <b>Write-Through:</b> Write cache + DB together. Consistent but slow
<br>• <b>Write-Back:</b> Write cache only → async DB. Fast but risky (crash = data loss)
<br>• <b>Write-Around:</b> Write DB only → cache fills on next read
<br><br><b>Eviction:</b>
<br>• LRU (least recently used) — DEFAULT choice 90% of time
<br>• LFU (least frequently used) — when hot data stays hot
<br>• TTL (time to live) — auto-expire. Sessions=30min, API=60s
<br><br><b>Problems:</b>
<br>• Stampede: hot key expires → 1000 requests hit DB. Fix: mutex lock, only 1 refreshes
<br>• Penetration: non-existent keys bypass cache. Fix: cache null with short TTL
<br>• Avalanche: many keys expire together. Fix: add random jitter to TTL
<br>• Hot Key: single key 100K QPS. Fix: replicate to multiple nodes
<br><br><b>Redis vs Memcached:</b> Redis wins 90% — has data structures, persistence, pub/sub. Memcached = simple string cache only
<br><br><b>Interview line:</b> "Cache-aside with Redis. On writes, update DB and invalidate cache. LRU eviction. Mutex lock for stampede prevention"`},

{t:"Message Queue + Kafka",content:`<b>Message Queue (RabbitMQ, SQS):</b>
<br>• Producer → Queue → Consumer → ACK → message DELETED
<br>• WHY: decouple services, buffer traffic spikes, retry on failure
<br>• Delivery: at-most-once (may lose), at-least-once (may duplicate, MOST COMMON), exactly-once (hardest)
<br>• Use for: email, image resize, order processing — async tasks
<br><br><b>Kafka (event streaming):</b>
<br>• Producer → Topic (partitions) → Consumer Groups → message STAYS (not deleted)
<br>• Topics split into partitions for parallelism. Each partition = ordered log
<br>• Within consumer group = queue behavior (1 msg → 1 consumer). Across groups = pub/sub (all get same msgs)
<br>• Retention: 7 days default, configurable to infinite. Can replay from any offset
<br>• Log compaction: keep only latest value per key (changelog pattern)
<br>• Use for: event sourcing, analytics, CDC, multi-consumer streaming, audit trails
<br><br><b>Queue vs Kafka:</b> Queue = task list (done = deleted). Kafka = event journal (permanent, anyone can read)
<br><br><b>Redis List as queue:</b> LPUSH/RPOP. Basic, no delivery guarantee. Fine for low-stakes tasks. Not a real MQ
<br><br><b>Interview line:</b> "Kafka for event streaming with replay and multi-consumer. SQS for simple async tasks with DLQ"`},

{t:"CAP Theorem",content:`<b>C</b> = Consistency (every read = latest write)
<br><b>A</b> = Availability (every request gets response, even if stale)
<br><b>P</b> = Partition Tolerance (system works despite network splits)
<br><br>P is mandatory (networks fail). Choose CP or AP:
<br><br><b>CP:</b> During partition → reject writes. Consistent but unavailable. HBase, MongoDB, Zookeeper. Use for: payments, banking, inventory
<br><b>AP:</b> During partition → accept writes, serve stale. Available but inconsistent. Cassandra, DynamoDB. Use for: feeds, likes, views
<br><br><b>Single server:</b> no CAP tradeoff — get both C and A for free. CAP only matters when distributed
<br><br><b>Quorum (W+R>N):</b> N=replicas, W=write acks, R=read acks. W+R>N guarantees at least 1 fresh replica in read set
<br>• W=2,R=2,N=3: balanced, most common
<br>• W=3,R=1: fast reads, slow writes (product catalog)
<br>• W=1,R=1: fastest but no consistency (analytics)
<br><br><b>Interview line:</b> "AP for feeds (eventual consistency fine). CP for payments (consistency critical). Quorum W=2,R=2 for main data store"`},

{t:"Replication",content:`<b>Master-Slave:</b> Master writes, slaves read. Master dies → promote slave. Most common
<br><b>Master-Master:</b> Both write. Conflict resolution needed (last-write-wins). Multi-region
<br><br><b>Async:</b> Master doesn't wait. Fast but may lose data on crash. DEFAULT for most systems
<br><b>Semi-sync:</b> At least 1 slave ACKs. Balance of speed + safety. Best for production
<br><b>Full sync:</b> All slaves ACK. Safest but one slow slave blocks everything. Rarely used
<br><br><b>Replication lag:</b> Delay between master write and slave update. Fix: read-your-writes consistency (after own write, route reads to master temporarily)
<br><br><b>Split-brain:</b> Network partition → two masters accept writes → data diverges. DANGEROUS. Fix: fencing (STONITH), quorum-based leader election
<br><br><b>Interview line:</b> "Async replicas across 3 AZs. Semi-sync for payment DB. Read-your-writes for user-facing data"`},

{t:"Consistent Hashing",content:`<b>Problem:</b> hash(key) % N servers. Add 1 server → EVERY key moves (N changes). Disaster.
<br><br><b>Solution:</b> Hash ring. Servers placed at hash(server_id) positions. Keys placed at hash(key) → walk clockwise → first server = home
<br><br><b>Add node:</b> only keys between previous node and new node move. K/N keys, not all
<br><b>Remove node:</b> its keys go to next clockwise neighbor. Others untouched
<br><br><b>Virtual nodes:</b> Each physical server gets 100-200 positions on ring. Ensures even distribution. More vnodes = more even. Hash-determined positions (deterministic, not random)
<br><br><b>Used in:</b> Cassandra, DynamoDB, distributed caches, CDN, Discord
<br><br><b>Interview line:</b> "Consistent hashing with 200 virtual nodes per server. Adding a new node migrates only 1/Nth of keys"`},

{t:"Rate Limiter",content:`<b>Token Bucket:</b> N tokens, refill at rate R. Each request = 1 token. Empty = reject. ALLOWS BURSTS. Most popular (AWS, Stripe)
<br><b>Leaky Bucket:</b> Fixed output rate always. No bursts. Overflow dropped. For traffic shaping
<br><b>Fixed Window:</b> Count per interval. Simple but boundary spike problem
<br><b>Sliding Window Log:</b> Store every timestamp. Most accurate, high memory
<br><b>Sliding Window Counter:</b> Weighted count from current + previous window. Best balance
<br><br><b>Token vs Leaky:</b> Token = allows bursts then throttles. Leaky = constant rate always, no bursts ever
<br><br><b>Implementation:</b> API Gateway + Redis (INCR + EXPIRE). Lua script for atomic distributed counting
<br><b>Response:</b> HTTP 429 + X-RateLimit-Remaining + Retry-After headers
<br><br><b>Interview line:</b> "Token bucket at API Gateway, Redis for distributed counting, different limits per user tier"`},

{t:"Unique ID (Snowflake)",content:`<b>Auto-increment:</b> 1,2,3... Simple but single point of failure, predictable, doesn't work distributed
<br><b>UUID:</b> 128-bit random. No coordination. But: not sortable, 36 chars, bad for DB indexes (random inserts fragment B-tree)
<br><b>Snowflake (64-bit):</b> 1 sign + 41 timestamp + 5 datacenter + 5 machine + 12 sequence = 64 bits
<br><br><b>Why Snowflake wins:</b>
<br>• Time-sortable (sort by ID = sort by time)
<br>• No coordination (machine bits ensure uniqueness)
<br>• DB-friendly (sequential inserts, B-tree loves it)
<br>• 4096 IDs per millisecond per machine
<br>• Fits in 64-bit long/bigint
<br><br><b>Interview line:</b> "Snowflake IDs — 64-bit, time-sortable, no coordination, fits in bigint"`},

{t:"WebSocket vs SSE vs Long Polling",content:`<b>WebSocket:</b> Full duplex, both ways. Persistent TCP connection. Use: chat, gaming, collab editing
<br><b>SSE:</b> Server → client only. Plain HTTP. Auto-reconnect. Use: live scores, notifications, progress bars
<br><b>Long Polling:</b> Client asks, server holds until data ready, responds, client asks again. Fallback for WebSocket
<br><br><b>Why not always WebSocket:</b> Stateful connections = harder to scale. SSE is simpler for server-push only. Long Polling works everywhere
<br><br><b>Interview line:</b> "WebSocket for bidirectional (chat). SSE for server-push (notifications). Long Polling as fallback"`},

{t:"Circuit Breaker",content:`<b>Without it:</b> Service B slow → A waits → A's threads exhausted → A slow → C calls A → C slow → ENTIRE SYSTEM DIES. Cascade failure
<br><br><b>Three states:</b>
<br>• CLOSED (normal) — all calls pass through, counting failures
<br>• OPEN (protecting) — all calls fail FAST, return fallback immediately
<br>• HALF-OPEN (testing) — allow few test calls, recovered? → CLOSED. Still failing? → OPEN
<br><br><b>Fallback:</b> cached data, default response, friendly error, backup service
<br><br><b>Interview line:</b> "Circuit breaker between every service pair. Payment service down? Order service returns friendly error instead of hanging"`},

{t:"Microservices + Saga",content:`<b>Monolith:</b> One codebase, one DB, one deployment. Simple but: can't scale independently, one change can break everything, huge repo
<br><br><b>Microservices:</b> Independent services, own DB each, own deployment. Communication: REST/gRPC (sync) + Kafka (async)
<br><br><b>Key rule:</b> EACH SERVICE OWNS ITS OWN DB. Shared DB = monolith in disguise
<br><br><b>Saga pattern:</b> Distributed transactions across services. Each step has compensating (undo) action
<br>• Order → Payment → Inventory. Inventory fails? → Refund payment → Cancel order
<br>• Compensation ≠ rollback. It's a NEW forward transaction that undoes the effect
<br>• Choreography: each service listens for events. Simple but hard to debug
<br>• Orchestration: central coordinator. Easier to manage. PREFERRED
<br><br><b>Service Discovery:</b> Consul, Eureka, K8s DNS — services find each other dynamically
<br><br><b>Interview line:</b> "Start monolith. Extract high-traffic services. Kafka for async events. Orchestrated saga for distributed transactions"`},

{t:"CDN",content:`Static content cached at edge servers worldwide. Users get content from nearest location.
<br><br><b>Pull CDN:</b> First request = miss → fetch origin → cache at edge. Automatic. DEFAULT 95%
<br><b>Push CDN:</b> Upload to CDN proactively. For known launches (Netflix new show)
<br><br><b>Invalidation:</b> TTL (auto-expire) + Purge API (instant). Versioned URLs (style.v2.css) = never stale
<br><b>Origin Shield:</b> Extra cache between edge and origin. 50 edge misses → 1 origin request
<br><b>HTTPS at edge:</b> TLS handshake at nearest PoP (5ms) vs origin (200ms). Huge latency savings
<br><br><b>Interview line:</b> "Static assets on CDN with versioned URLs and 1-year TTL. Origin Shield to reduce origin load"`},

{t:"Elasticsearch",content:`<b>DB = find by exact key.</b> ES = find by WORDS INSIDE content. Inverted index.
<br><br><b>How:</b> Each word → list of document IDs. Search "wireless headphone" → lookup both words → intersect → results in 50ms across 500M products
<br><br><b>Ranking (BM25):</b> Not just "contains word" but how relevant. Frequent in short doc > rare in long doc. Rare words score higher
<br><b>Analyzers:</b> "Running quickly" → ["run", "quick"]. Lowercase, stem, remove stop words
<br><b>Fuzzy:</b> "databse" matches "database" (edit distance ≤ 2)
<br><b>Autocomplete:</b> Edge n-grams: "database" → ["d","da","dat"...]
<br><br><b>NOT a primary DB.</b> Always pair with real DB. Sync via Kafka CDC
<br><br><b>Interview line:</b> "Elasticsearch for full-text search, synced from PostgreSQL via Kafka CDC. BM25 ranking with fuzzy matching"`},

{t:"Bloom Filter",content:`Fast pre-check: "definitely NOT in set" or "MAYBE in set." Never false negatives.
<br><br>Bit array + K hash functions. Insert: hash K times → set those bits to 1. Check: all K bits are 1? maybe yes. Any bit is 0? definitely no.
<br><br><b>False positive:</b> possible (different keys set same bits by coincidence)
<br><b>False negative:</b> IMPOSSIBLE (if key was added, its bits ARE set)
<br><br><b>Size:</b> 10 bits per element for 1% false positive. 1M items = 1.25 MB. Tiny
<br><b>Cannot delete.</b> Use Counting Bloom Filter (counters instead of bits) if deletion needed
<br><br><b>Use for:</b> Skip unnecessary DB lookups, URL dedup in web crawler, cache penetration prevention
<br><br><b>Interview line:</b> "Bloom filter in front of DB. 99% of checks return definitely not exists without touching DB"`},

{t:"DAG",content:`Directed Acyclic Graph = task dependency chart. Tasks run in parallel but respect dependencies. No backward loops.
<br><br><b>YouTube example:</b> Upload → [Transcode 720p + 1080p + Thumbnail + Moderation] all PARALLEL → all finish → Push to CDN → Ready
<br><br>10 tasks × 1 min each = 10 min sequential vs 2 min as DAG (parallelized)
<br><br><b>Used in:</b> YouTube processing, Airflow (data pipelines), CI/CD, Spark jobs, ML training pipelines, Terraform`},

{t:"Redis Deep Dive",content:`In-memory data structure server. 100K QPS per instance. THE Swiss Army knife.
<br><br><b>String:</b> key→value. Cache, sessions, counters (INCR)
<br><b>List:</b> LPUSH/RPOP. Lightweight job queue. Recent items
<br><b>Set:</b> Unique values. Tags, unique visitors, mutual friends (SINTER)
<br><b>Sorted Set:</b> Score-ordered. Feeds (score=timestamp), leaderboards (score=points), rate limiting (score=request_time)
<br><b>Hash:</b> key→{field:value}. User profiles, shopping carts (HSET cart:123 iphone 2)
<br><b>Geo:</b> GEOADD/GEORADIUS. Uber drivers, nearby friends
<br><b>Pub/Sub:</b> Broadcast. Notifications, cache invalidation
<br><b>Stream:</b> Lightweight Kafka alternative within Redis
<br><br><b>Sorted Set vs List:</b> List = queue (consumed and gone). Sorted Set = ranked data (stays, queryable by score range)
<br><br><b>Interview line:</b> "Redis sorted sets for timelines, hash for cart, geo for drivers, strings for cache. One cluster, five use cases"`},

{t:"Feed System",content:`<b>Write flow:</b> User posts → Posts DB → Kafka event → Fan-out workers → ZADD to each follower's Redis sorted set
<br><br><b>Read flow:</b> User opens app → ZREVRANGE feed:{user_id} 0 49 → get 50 post IDs → batch fetch post content → serve
<br><br><b>Fan-out PUSH (< 10K followers):</b> Pre-compute feed on post time. Reading = instant from Redis
<br><b>Fan-out PULL (celebrities > 10K):</b> Don't pre-write. On feed open: query celebrity posts live → merge with pre-computed feed
<br><b>HYBRID = THE answer</b>
<br><br><b>Feed is NOT periodic:</b> Updated incrementally on every post. No wasted work. If nobody posts, zero writes to your feed
<br><br><b>Inactive user:</b> Redis feed may be evicted → cold rebuild from DB on first open
<br><br><b>Ranking:</b> Reverse chronological (simple) or ML-ranked (affinity, recency, engagement, content type preference)
<br><br><b>Likes/comments:</b> Redis INCR for real-time display. Kafka → batch sync to DB every 30s. Always eventual consistency
<br><br><b>Interview line:</b> "Hybrid fan-out: push for normal users into Redis sorted sets, pull for celebrities at read time. ML ranking optional"`},
]},
{section:"Quick Formulas",notes:[
{t:"Estimation Cheat Sheet",content:`<b>QPS:</b> DAU × actions/user / 86,400
<br><b>Peak QPS:</b> average × 3
<br><b>Storage:</b> records/day × record_size × 365 × years
<br><b>Bandwidth:</b> QPS × response_size
<br><b>Cache memory:</b> daily_data × 20% (Pareto rule)
<br><b>Servers needed:</b> peak_QPS / QPS_per_server
<br><br><b>Quick numbers:</b>
<br>• 1M req/day ≈ 12 QPS
<br>• 100M req/day ≈ 1,200 QPS
<br>• 1B req/day ≈ 12,000 QPS
<br>• 1 Redis ≈ 100K QPS
<br>• 1 MySQL ≈ 5-10K read QPS
<br>• 1 Cassandra node ≈ 20-50K QPS
<br>• RAM read = 0.0001ms, SSD = 0.1ms, network same DC = 0.5ms, cross-continent = 150ms
<br>• Average URL = 200-500 bytes (NOT 100KB)
<br>• Average tweet/post = 250 bytes - 1KB
<br>• Average image = 200KB - 1MB
<br>• Average video minute = 50MB compressed`},

{t:"Interview Framework (7 Steps)",content:`<b>1. CLARIFY (2-3 min):</b> Who? How many DAU? Read vs write? Latency? Features?
<br><b>2. ESTIMATE (2-3 min):</b> QPS, storage, bandwidth, cache sizing — PROPOSE numbers, don't ask
<br><b>3. API DESIGN (2 min):</b> 2-3 REST endpoints with params
<br><b>4. DATA MODEL (3 min):</b> Key tables + columns. SQL vs NoSQL with WHY
<br><b>5. HIGH-LEVEL DESIGN (5-8 min):</b> Draw: Client → CDN → LB → Gateway → Service → Cache → DB
<br><b>6. DEEP DIVE (10-15 min):</b> 2-3 hard parts. Tradeoffs. Failures. Alternatives
<br><b>7. WRAP UP (2 min):</b> Summarize. Monitoring. Future improvements
<br><br><b>Remember:</b> Estimates JUSTIFY your architecture choices. 100 QPS = simple single server. 100K QPS = Redis + sharding + CDN. The numbers decide the design`},

{t:"When to Use What",content:`<b>Storage:</b>
<br>• Payments, orders, accounts → PostgreSQL (ACID)
<br>• User profiles, catalogs → MongoDB (flexible schema)
<br>• Message history, IoT, analytics → Cassandra (write-heavy)
<br>• Social connections → Neo4j (graph)
<br>• Sessions, cache, counters → Redis (in-memory)
<br>• Images, videos, files → S3 + CDN (NEVER in DB)
<br><br><b>Communication:</b>
<br>• Public API → REST
<br>• Internal microservices → gRPC (10x faster)
<br>• Mobile complex data → GraphQL
<br>• Real-time bidirectional → WebSocket
<br>• Server push only → SSE
<br><br><b>Queue vs Kafka:</b>
<br>• Simple async task (email, resize) → SQS/RabbitMQ
<br>• Multi-consumer, replay, streaming → Kafka
<br><br><b>Consistency:</b>
<br>• Feeds, likes → AP (eventual consistency)
<br>• Payments, inventory → CP (strong consistency)
<br><br><b>Scaling order:</b> Indexes → Read replicas → Redis cache → Partitioning → Vertical scale → Sharding`},
]},


,{section:"System Design Patterns",notes:[
{t:"Database Selection Flowchart",content:"<b>Start: What kind of data?</b><br><br><b>Structured + Transactions?</b> \u2192 PostgreSQL. Start here always.<br><b>Massive writes (50K+/sec)?</b> \u2192 Cassandra. LSM tree = write-optimized.<br><b>Flexible JSON docs?</b> \u2192 MongoDB. Evolving schema, MVPs.<br><b>Microsecond key-value?</b> \u2192 Redis. Cache, sessions, counters.<br><b>Full-text search?</b> \u2192 Elasticsearch. NOT a primary DB.<br><b>Graph relationships?</b> \u2192 Neo4j. Social networks, recommendations.<br><b>Time-series?</b> \u2192 InfluxDB / TimescaleDB. Metrics, IoT.<br><b>Files/images/videos?</b> \u2192 S3 + CDN. NEVER in any database."},
{t:"Scaling Playbook",content:"<b>Try IN ORDER:</b><br><br>1. <b>Add indexes</b> \u2014 Free, 100x read speedup<br>2. <b>Read replicas</b> \u2014 Handles 80% of scaling needs<br>3. <b>Redis cache</b> \u2014 95% hit rate = DB load reduced 20x<br>4. <b>CDN</b> \u2014 Static content from edge, origin load drops 90%<br>5. <b>Connection pooling</b> \u2014 PgBouncer, 10x throughput, zero code changes<br>6. <b>Vertical scale</b> \u2014 Bigger machine. Goes surprisingly far<br>7. <b>Table partitioning</b> \u2014 Split within same DB. Faster queries<br>8. <b>Vertical sharding</b> \u2014 Different tables to different DBs<br>9. <b>Horizontal sharding</b> \u2014 LAST RESORT. Consistent hashing. Cross-shard joins = nightmare<br><br><b>Most systems NEVER need step 9.</b> PostgreSQL + replicas + Redis handles 50K+ QPS."},
{t:"Architecture Patterns",content:"<b>CQRS:</b> Separate read (ES/Redis) from write (PostgreSQL). Sync via Kafka CDC. Use when read/write patterns differ dramatically<br><br><b>Event Sourcing:</b> Store every change as event, not just current state. Replay to rebuild. Perfect for audit trails (finance, healthcare)<br><br><b>Saga:</b> Distributed transactions. Each step has undo. Orchestration preferred. Compensation \u2260 rollback<br><br><b>Circuit Breaker:</b> Stop calling failing service. Closed \u2192 Open \u2192 Half-Open. Prevents cascade failure<br><br><b>Strangler Fig:</b> Migrate monolith gradually. Route URLs one-by-one to new services<br><br><b>BFF:</b> Different gateway for web vs mobile. Mobile gets smaller payloads<br><br><b>Sidecar:</b> Helper container alongside main. Handles logging, monitoring, service mesh proxy. App code unchanged"},
{t:"Real-World Tech Stacks",content:"<b>Netflix:</b> Java, Zuul, Eureka, Cassandra, EVCache, Kafka, Open Connect CDN, AWS<br><br><b>Uber:</b> Go+Java, Redis, Kafka, Flink, H3 geo, gRPC, Kubernetes<br><br><b>Instagram:</b> Python/Django, PostgreSQL (sharded), Cassandra, Redis, RabbitMQ, Kubernetes<br><br><b>Twitter:</b> Java+Scala, Manhattan KV, Redis timelines, Kafka, Elasticsearch, Snowflake IDs<br><br><b>Stripe:</b> Ruby+Java, PostgreSQL (ACID), Redis, Kafka, idempotency everywhere<br><br><b>Common:</b> PostgreSQL core, Redis cache, Kafka events, ES search, S3 media, CDN delivery, K8s orchestration"},
{t:"Interview Day Checklist",content:"<b>Before:</b> Open HTML in another tab. Pen + paper ready. Review pitch once. Review 2 stories. Have 2-3 questions for them<br><br><b>During HLD:</b> CLARIFY first. PROPOSE estimates. THINK OUT LOUD. DRAW architecture. MENTION tradeoffs. Say WHY for each component<br><br><b>DO NOT:</b> Name-drop without explaining WHY. Over-engineer 100 QPS. Stay silent. Skip estimation. Forget monitoring<br><br><b>Wrap-up template:</b> Key decisions [list 3]. Monitoring: Prometheus + ELK + Jaeger + PagerDuty. Future: multi-region, A/B testing, ML ranking"},
]},
{section:"LeetCode Quick Reference",notes:[
{t:"Binary Search Patterns",content:"<b>Standard:</b> left=0, right=len-1. While left<=right: mid=left+(right-left)//2. Found? return. Target>mid? left=mid+1. Else right=mid-1.<br><br><b>Left boundary (bisect_left):</b> Same but on MATCH: right=mid (keep searching left). Returns first occurrence.<br><br><b>Right boundary (bisect_right):</b> On MATCH: left=mid+1 (keep searching right).<br><br><b>Search answer space:</b> When problem says minimize the maximum or maximize the minimum. Binary search the ANSWER range [lo, hi]. Check feasibility at each mid.<br><br><b>Rotated array:</b> One half is always sorted. Check which half. Target in sorted range? go there. Else go other side."},
{t:"Two Pointer + Sliding Window",content:"<b>Opposite ends:</b> left=0, right=end. Move based on condition. Container: move shorter side. 3Sum: fix one, two-pointer for rest.<br><br><b>Same direction:</b> Slow writes valid elements, fast reads all. Remove duplicates: if nums[fast]!=nums[slow], advance slow and copy.<br><br><b>Fixed window K:</b> Init with first K. Slide: add right, subtract left. O(n).<br><br><b>Variable min length:</b> Expand right until valid. Shrink left AGGRESSIVELY with while. Track min. Init ans=infinity.<br><br><b>Variable max length:</b> Expand right always. Shrink left only when invalid. Track max. Init ans=0."},
{t:"Stack + Linked List",content:"<b>Monotonic stack:</b> Maintain decreasing stack. Pop when violated = popped element gets answer from current. O(n) total. Next Greater Element.<br><br><b>Parentheses:</b> Push opens. On close: check top matches. Stack of INDICES for longest valid.<br><br><b>Reverse LL:</b> prev=None, curr=head. While curr: save next, point curr to prev, advance both. 3 pointers.<br><br><b>Fast-Slow:</b> Find middle (slow at mid when fast hits end). Detect cycle (they meet). Cycle start (reset one to head, both move 1).<br><br><b>Dummy Head:</b> When result head unknown. Build list, return dummy.next. Avoids all edge cases."},
{t:"Tree + Graph",content:"<b>DFS:</b> Preorder=serialize. Inorder=BST sorted. Postorder=heights. Recursive or stack-based.<br><br><b>BFS:</b> Queue. len(queue) per level = level-by-level. Min depth, right side view, zigzag.<br><br><b>Tree DP:</b> Return single-path to parent. Update global with through-path. Clamp negatives to 0.<br><br><b>BST:</b> Validate with range. Search O(h). Inorder=sorted. LCA via value comparison.<br><br><b>Graph BFS:</b> Shortest unweighted. Multi-source: all sources in initial queue.<br><br><b>Topological:</b> Kahn: in-degree 0 first. Result < total = cycle.<br><br><b>Union-Find:</b> Path compression + union by rank = near O(1). Components, MST, redundant edges.<br><br><b>Dijkstra:</b> Min-heap. Non-negative weights only. O((V+E)logV)."},
{t:"DP + Backtracking",content:"<b>1D DP:</b> dp[i] from dp[i-1], dp[i-2]. Stairs, robber, coins. Space optimize with 2 vars.<br><br><b>2D DP:</b> dp[i][j] two parameters. Grid, edit distance, LCS. Space optimize with 1 row.<br><br><b>Knapsack 0/1:</b> Right-to-left (each item once). Unbounded: left-to-right (reuse). Coin Change = unbounded.<br><br><b>LIS:</b> Tails array + bisect_left. O(n log n).<br><br><b>State Machine:</b> Stock problems. Multiple states per day. Draw transitions.<br><br><b>Backtracking:</b> Choose, explore, undo. path[:] NOT path (copy!). Sort + skip duplicates for dedup."},
{t:"Heap + Trie + Intervals + Bits",content:"<b>Top K:</b> Min-heap size K. Top = Kth largest. O(n log K).<br><br><b>Merge K sorted:</b> Heap of K elements. Pop min, push successor. O(n log K).<br><br><b>Two heaps median:</b> Max-heap (left) + min-heap (right). Balance sizes. Median at tops.<br><br><b>Trie:</b> Children dict + is_end. O(word_length) insert/search. Autocomplete, word search.<br><br><b>Merge intervals:</b> Sort by start. Overlap? extend end. Else new interval.<br><br><b>Meeting Rooms II:</b> Sort starts+ends separately. Sweep with two pointers. Track max rooms.<br><br><b>XOR:</b> x^x=0, x^0=x. Single number. x&(x-1) removes lowest bit. Power of 2: x&(x-1)==0.<br><br><b>LRU:</b> OrderedDict. get=move_to_end. put=add+evict oldest if over capacity."},
]},
{section:"HLD Question Summaries",notes:[
{t:"Q1-5 Quick Recall",content:"<b>Q1 URL Shortener:</b> Base62(Snowflake ID). Redis cache hot URLs. 301 browser cache (302 if analytics). Simple, keep clean.<br><br><b>Q2 Instagram:</b> Hybrid fan-out: push <10K, pull celebrities. Redis sorted sets. S3+CDN for media. Pre-signed uploads.<br><br><b>Q3 Twitter:</b> Same feed + Trending: Kafka Streams sliding window, rank by VELOCITY. ES for search. Redis INCR counters.<br><br><b>Q4 WhatsApp:</b> WebSocket persistent. Redis maps user to server. Offline queue in Cassandra. E2E encryption. Group = fan-out to members.<br><br><b>Q5 Netflix:</b> Transcode DAG: master to 100+ versions. Adaptive bitrate HLS/DASH. CDN (Open Connect at ISPs). Personalized thumbnails."},
{t:"Q6-10 Quick Recall",content:"<b>Q6 YouTube:</b> Netflix + user-generated: Content ID (copyright), moderation ML, processing DAG, live streaming RTMP to HLS.<br><br><b>Q7 Google Maps:</b> Tiles (zoom 0-21). Road graph + Dijkstra/A*. Real-time traffic: phone GPS to Kafka to edge weights. Contraction hierarchies.<br><br><b>Q8 Uber:</b> Redis GEOADD drivers. GEORADIUS matching. Score = f(ETA, rating). Surge = demand/supply per H3 hex zone.<br><br><b>Q9 Dropbox:</b> CHUNKING key insight. 4MB chunks, SHA256 hash. Upload only changed chunks. Cross-user dedup. Conflict = keep both.<br><br><b>Q10 Rate Limiter:</b> Token Bucket + Redis. Different limits per tier. Lua script atomic. 429 + Retry-After. Fail-open if Redis down."},
{t:"Q11-15 Quick Recall",content:"<b>Q11 Twitter Search:</b> ES inverted index. Kafka real-time indexing. BM25 x recency x engagement. Time-based shards.<br><br><b>Q12 Notifications:</b> Kafka events to check preferences to dedup to template to per-channel queue. Priority: OTP > orders > marketing.<br><br><b>Q13 Web Crawler:</b> URL Frontier (priority + politeness). Fetch/Parse/Extract/Dedup(Bloom+SimHash)/Store/Loop. Respect robots.txt.<br><br><b>Q14 E-Commerce:</b> Flash sale: virtual queue. Inventory: optimistic locking. Payment: idempotency + saga. ES for product search.<br><br><b>Q15 Google Docs:</b> OT transforms concurrent edits. WebSocket per user. Op log + snapshots. CRDT alternative (Figma)."},
{t:"Q16-20 Quick Recall",content:"<b>Q16 Distributed KV:</b> HARDEST. Hash ring + vnodes. Quorum W+R>N. Vector clocks. Gossip. Hinted handoff. LSM tree. Merkle tree. Tombstones.<br><br><b>Q17 Pastebin:</b> SIMPLEST. URL Shortener + S3. Base62(ID). Rate limit creation.<br><br><b>Q18 Ticket Booking:</b> Optimistic locking (WHERE version=v AND status=AVAILABLE). 5-min seat hold. Virtual queue for flash sales. Shard by event_id.<br><br><b>Q19 Slack:</b> WhatsApp + workspace isolation + channels + threads + ES search. Large channels: push only @mentions.<br><br><b>Q20 CDN Design:</b> PoPs in 50+ cities. GeoDNS/Anycast. Cache hierarchy: edge to shield to origin. Purge API. Edge compute."},
{t:"Q21-25 Quick Recall",content:"<b>Q21 Typeahead:</b> Trie with precomputed top-K per node. O(prefix_length). Built from query logs. Personal recent searches first. Trending boost.<br><br><b>Q22 Nearby Friends:</b> GPS every 30s to Redis GEOADD. GEORADIUS on friend list. Privacy settings. Battery: adaptive GPS frequency.<br><br><b>Q23 Payment:</b> ZERO tolerance. Idempotency key (UUID UNIQUE). Double-entry ledger. Timeout != failure. Reconciliation daily. PCI: tokenize, never store cards.<br><br><b>Q24 Distributed Cache:</b> Redis Cluster. 16384 hash slots. CRC16(key)%16384. Primary + replica. Failover via gossip + vote. RDB + AOF both.<br><br><b>Q25 News Feed:</b> Hybrid fan-out. ML ranking: candidates(1000s) to light(200) to heavy(50) to diversity to ads. Feed NOT periodic, incremental per post."},
]},

{section:"LLD Fundamentals",notes:[
{t:"LLD Framework (5 Steps)",content:"<b>Step 1: CLARIFY requirements (2 min)</b><br>What features? What scale? What edge cases?<br><br><b>Step 2: List NOUNS \u2192 Classes (2 min)</b><br>Every noun = potential class. Parking lot \u2192 ParkingLot, Floor, Slot, Vehicle, Ticket, Payment<br><br><b>Step 3: List VERBS \u2192 Methods (2 min)</b><br>Every verb = potential method. park, unpark, findSlot, calculateBill, pay<br><br><b>Step 4: WHO owns each method? (3 min) \u2014 THE KEY SKILL</b><br>findSlot() \u2192 ParkingLot (manages slots)<br>calculateBill() \u2192 BillingService (knows rates)<br>is_available() \u2192 Slot (knows about itself)<br>\u274c NEVER: Ticket.calculateBill() \u2014 ticket is just data<br><br><b>Step 5: Write classes + relationships (15 min)</b><br>Draw: ParkingLot HAS-MANY Floors HAS-MANY Slots. Write code."},
{t:"3 Types of Classes",content:"<b>1. ENTITY (the things):</b> Vehicle, Slot, Ticket, User, Seat<br>\u2192 Hold DATA + small methods about themselves only<br>\u2192 Slot.isAvailable(), Vehicle.getType()<br><br><b>2. SERVICE (the workers):</b> BillingService, PaymentService, NotificationService<br>\u2192 Hold LOGIC + business rules<br>\u2192 BillingService.calculate(ticket), PaymentService.pay(amount)<br><br><b>3. MANAGER (the orchestrator):</b> ParkingLot, BookingSystem, ATMController<br>\u2192 Coordinate entities + services<br>\u2192 ParkingLot.park() calls findSlot() + createTicket()<br><br><b>Rule:</b> Needs data from MULTIPLE objects? \u2192 Service. Only from ONE? \u2192 That object. Coordinates steps? \u2192 Manager."},
{t:"SOLID (Just S is 90%)",content:"<b>S \u2014 Single Responsibility:</b> Each class does ONE thing.<br>\u274c ParkingLot.park() + ParkingLot.calculateBill() + ParkingLot.pay() = GOD CLASS<br>\u2705 ParkingLot.park() + BillingService.calculate() + PaymentService.pay() = CLEAN<br><br><b>O \u2014 Open/Closed:</b> Add features without changing existing code. New payment type? Add UPIPayment class. Don't modify CardPayment.<br><br><b>L \u2014 Liskov:</b> Child works wherever parent expected. Car/Bike/Truck all work as Vehicle.<br><br><b>I \u2014 Interface Segregation:</b> Don't force unused methods.<br><br><b>D \u2014 Dependency Inversion:</b> Depend on abstractions (PaymentProcessor interface) not concrete classes (CashPayment)."},
{t:"Design Patterns (Know 4)",content:"<b>1. Strategy:</b> Swap algorithms at runtime. BillingService has BillingStrategy: HourlyRate, FlatRate, WeekendRate. Change without touching BillingService code.<br><br><b>2. Factory:</b> VehicleFactory.create(CAR) returns Car. Hides creation logic. Avoids if/else chains.<br><br><b>3. Singleton:</b> Only ONE instance. ParkingLot.getInstance() always returns same object. Use for: DB connections, config managers.<br><br><b>4. Observer:</b> When X happens, notify all interested parties. Slot available \u2192 notify waiting customers. Like pub/sub within the app."},
{t:"Concurrency + State Machines",content:"<b>Double-booking problem:</b> Two users book same seat simultaneously.<br><br><b>Fix 1 \u2014 Lock:</b> slot.tryLock() \u2192 if locked, reject. Process. unlock().<br><b>Fix 2 \u2014 Optimistic Locking:</b> UPDATE WHERE version=expected. 0 rows = someone else got it.<br><b>Fix 3 \u2014 Temporary Hold:</b> HOLD seat 5 min. Must pay within 5 min. Timeout = auto-release.<br><br><b>State Machine:</b> Define valid transitions. Booking: PENDING \u2192 CONFIRMED \u2192 COMPLETED. Or PENDING \u2192 CANCELLED. \u274c COMPLETED \u2192 PENDING (invalid!). Reject invalid transitions with errors."},
{t:"JS Syntax Cheat Sheet",content:"<pre>// Class\nclass Vehicle {\n  constructor(licensePlate, type) {\n    this.licensePlate = licensePlate;\n    this.type = type;\n  }\n  getType() { return this.type; }\n}\n\n// Inheritance\nclass Car extends Vehicle {\n  constructor(licensePlate) {\n    super(licensePlate, 'CAR');\n  }\n}\n\n// Enum\nconst VehicleType = { CAR: 'CAR', BIKE: 'BIKE', TRUCK: 'TRUCK' };\n\n// Array\nslots.find(s => s.isAvailable());\nslots.filter(s => s.type === 'SMALL');\nslots.forEach(s => console.log(s));\n\n// Map\nconst rates = new Map();\nrates.set('CAR', 20);\nrates.get('CAR');\n\n// Date\nconst hours = (end - start) / (1000 * 60 * 60);\n\n// Error\nif (!slot) throw new Error('No slot');\n\n// No imports. No exports. No async. Just classes.</pre>"},
]},

{t:"ATM Machine (Nanonets asked this!)",content:"<pre>const ATMState = { IDLE: 'IDLE', CARD_IN: 'CARD_IN', AUTHED: 'AUTHED' };\n\nclass Card {\n  constructor(cardNum, pin, accountId) {\n    this.cardNum = cardNum;\n    this.pin = pin;\n    this.accountId = accountId;\n  }\n}\n\nclass Account {\n  constructor(id, balance) { this.id = id; this.balance = balance; }\n  withdraw(amt) {\n    if (amt > this.balance) throw new Error('Insufficient');\n    this.balance -= amt;\n  }\n  deposit(amt) { this.balance += amt; }\n}\n\nclass CashDispenser {\n  constructor() {\n    this.cash = new Map([[2000,10],[500,20],[200,20],[100,50]]);\n  }\n  dispense(amount) {\n    let rem = amount;\n    const result = {};\n    for (const d of [2000,500,200,100]) {\n      const count = Math.min(Math.floor(rem/d), this.cash.get(d)||0);\n      if (count > 0) { result[d] = count; this.cash.set(d, this.cash.get(d)-count); rem -= count*d; }\n    }\n    if (rem > 0) throw new Error('Cannot dispense');\n    return result;\n  }\n}\n\nclass ATM {\n  constructor() {\n    this.state = ATMState.IDLE;\n    this.card = null;\n    this.account = null;\n    this.dispenser = new CashDispenser();\n  }\n  insertCard(card) {\n    if (this.state !== ATMState.IDLE) throw new Error('ATM busy');\n    this.card = card; this.state = ATMState.CARD_IN;\n  }\n  enterPin(pin) {\n    if (this.state !== ATMState.CARD_IN) throw new Error('Insert card first');\n    if (pin !== this.card.pin) { this.eject(); throw new Error('Wrong PIN'); }\n    this.account = getAccount(this.card.accountId);\n    this.state = ATMState.AUTHED;\n  }\n  withdraw(amt) {\n    if (this.state !== ATMState.AUTHED) throw new Error('Auth first');\n    this.account.withdraw(amt);\n    return this.dispenser.dispense(amt);\n  }\n  checkBalance() { return this.account.balance; }\n  eject() { this.card = null; this.account = null; this.state = ATMState.IDLE; }\n}</pre><br><b>Key:</b> ATM has STATE MACHINE. CashDispenser is separate SERVICE. Account manages own balance. Card is just DATA."},
{t:"BookMyShow (Ticket Booking)",content:"<pre>const SeatStatus = { AVAILABLE: 'AVAILABLE', HELD: 'HELD', BOOKED: 'BOOKED' };\n\nclass Seat {\n  constructor(id, row, num, type) {\n    this.id = id; this.row = row; this.num = num;\n    this.type = type; this.status = SeatStatus.AVAILABLE;\n    this.heldBy = null; this.holdExpiry = null;\n  }\n  isAvailable() { return this.status === SeatStatus.AVAILABLE; }\n  hold(userId) {\n    if (!this.isAvailable()) throw new Error('Not available');\n    this.status = SeatStatus.HELD;\n    this.heldBy = userId;\n    this.holdExpiry = Date.now() + 5*60*1000;\n  }\n  book() {\n    if (this.status !== SeatStatus.HELD) throw new Error('Must hold first');\n    this.status = SeatStatus.BOOKED; this.heldBy = null;\n  }\n  release() { this.status = SeatStatus.AVAILABLE; this.heldBy = null; }\n  isHoldExpired() { return this.status === SeatStatus.HELD && Date.now() > this.holdExpiry; }\n}\n\nclass PricingService {\n  constructor() { this.prices = new Map([['REGULAR',200],['PREMIUM',350],['VIP',500]]); }\n  calculate(seats) { return seats.reduce((sum,s) => sum + this.prices.get(s.type), 0); }\n}\n\nclass BookingSystem {\n  constructor() { this.shows = new Map(); this.pricing = new PricingService(); }\n  holdSeats(userId, showId, seatIds) {\n    const show = this.shows.get(showId);\n    const seats = seatIds.map(id => show.seats.find(s => s.id === id));\n    seats.forEach(s => s.hold(userId));\n    return { bookingId: 'BK-'+Date.now(), seats, total: this.pricing.calculate(seats) };\n  }\n  confirmBooking(bookingId, seats) {\n    seats.forEach(s => s.book());\n  }\n  // Background job runs every 30s:\n  cleanupExpiredHolds(show) {\n    show.seats.filter(s => s.isHoldExpired()).forEach(s => s.release());\n  }\n}</pre><br><b>Key:</b> Seat has HOLD mechanism (5 min TTL). PricingService separate. Background cleanup for expired holds. No double booking because hold() throws if not AVAILABLE."},
{t:"Parking Lot",content:"<pre>const VehicleType = { CAR: 'CAR', BIKE: 'BIKE', TRUCK: 'TRUCK' };\nconst SlotType = { SMALL: 'SMALL', MEDIUM: 'MEDIUM', LARGE: 'LARGE' };\nconst VEHICLE_SLOT = { CAR: 'MEDIUM', BIKE: 'SMALL', TRUCK: 'LARGE' };\n\nclass Slot {\n  constructor(id, type) {\n    this.id = id; this.type = type; this.vehicle = null;\n  }\n  isAvailable() { return this.vehicle === null; }\n  occupy(v) { if (!this.isAvailable()) throw new Error('Taken'); this.vehicle = v; }\n  free() { this.vehicle = null; }\n}\n\nclass Ticket {\n  constructor(vehicle, slot) {\n    this.id = 'TKT-'+Date.now(); this.vehicle = vehicle;\n    this.slot = slot; this.entryTime = Date.now(); this.exitTime = null;\n  }\n}\n\nclass BillingService {\n  constructor() { this.rates = new Map([['CAR',20],['BIKE',10],['TRUCK',50]]); }\n  calculate(ticket) {\n    const hrs = Math.ceil((ticket.exitTime - ticket.entryTime)/(1000*60*60));\n    return hrs * this.rates.get(ticket.vehicle.type);\n  }\n}\n\nclass ParkingLot {\n  constructor() { this.slots = []; this.tickets = new Map(); this.billing = new BillingService(); }\n  park(vehicle) {\n    const needed = VEHICLE_SLOT[vehicle.type];\n    const slot = this.slots.find(s => s.isAvailable() && s.type === needed);\n    if (!slot) throw new Error('Full');\n    slot.occupy(vehicle);\n    const ticket = new Ticket(vehicle, slot);\n    this.tickets.set(vehicle.licensePlate, ticket);\n    return ticket;\n  }\n  unpark(licensePlate) {\n    const ticket = this.tickets.get(licensePlate);\n    ticket.exitTime = Date.now();\n    ticket.slot.free();\n    const amount = this.billing.calculate(ticket);\n    this.tickets.delete(licensePlate);\n    return { ticket, amount };\n  }\n}</pre><br><b>Key:</b> Ticket is DATA only. BillingService is separate. Slot manages own state. ParkingLot orchestrates."},
]},
{section:"Nanonets HLD Prep",notes:[
{t:"Actual Nanonets HLD Question (from real interview)",content:"<b>Question:</b> App service depends on two downstream services with different rate limits. Design for paid/unpaid tiers, sync vs async priority, fairness.<br><br><b>1. Request Classification (API Gateway):</b><br>Tag every request: user_tier (paid/free) + type (sync/async)<br>Priority: P1=Paid+Async, P2=Paid+Sync, P3=Free+Async, P4=Free+Sync<br><br><b>2. Priority Queue Layer:</b><br>4 queues by priority OR weighted priority queue (Redis sorted set, score=priority+timestamp)<br>Workers pull P1 first. Fairness: P4 gets minimum 10% guaranteed throughput. Starvation prevention: boost priority if waiting > X seconds<br><br><b>3. Rate Limiter per Tier:</b><br>Paid: 1000 req/min. Free: 100 req/min. Token bucket per user in Redis<br><br><b>4. Downstream Protection:</b><br>Service A: 500 req/sec, Service B: 200 req/sec<br>Circuit breaker per downstream. Rate limiter per downstream (never exceed their limit). Bulkhead: separate thread pools per downstream<br><br><b>5. Backpressure:</b><br>Queues growing? Reject P4 first (429), then P3. Protect P1/P2. Graceful degradation."},
{t:"AI Agent Pipeline (Nanonets Core Product)",content:"<b>What Nanonets builds:</b> AI agents automating healthcare doc processing<br><br><b>Pipeline:</b><br>Ingest (email/fax/API/SFTP) \u2192 S3 \u2192 Kafka event<br>\u2192 Classify document type (ML model)<br>\u2192 OCR if scanned image<br>\u2192 AI Extraction (LLM: document + schema \u2192 structured JSON with confidence scores)<br>\u2192 Validation (ICD-10 codes valid? amounts in range?)<br>\u2192 High confidence (>0.95): auto-process<br>\u2192 Low confidence: human review dashboard<br>\u2192 Route to workflow (billing/claims/prior auth)<br><br><b>Tech:</b> S3 + Lambda triggers, Kafka events per step, LLM API for extraction, PostgreSQL for results, Redis for medical code lookups, React reviewer dashboard<br><br><b>Key:</b> Each step = separate Kafka topic = independently scalable. DLQ per step. Idempotent workers. Human-in-the-loop for uncertainty."},
{t:"Document Processing at Scale",content:"<b>Nanonets processes millions of docs daily. Design the pipeline:</b><br><br><pre>Upload API \u2192 S3 (raw) \u2192 Kafka (doc-uploaded)\n  \u2192 Classification Worker (what type?)\n  \u2192 Kafka (doc-classified)\n  \u2192 OCR Worker (if scanned)\n  \u2192 Kafka (text-extracted)\n  \u2192 Extraction Worker (LLM call \u2192 JSON)\n  \u2192 Kafka (data-extracted)\n  \u2192 Validation Worker (check rules)\n  \u2192 Kafka (doc-validated)\n  \u2192 Storage Worker \u2192 PostgreSQL + ES\n  \u2192 Webhook to client</pre><br><br><b>Why Kafka between each step:</b> one slow step (OCR) doesn't block others. Scale OCR workers 10x independently. If extraction fails, message goes to DLQ, other docs unaffected.<br><br><b>Status tracking:</b> Redis hash per doc_id: {step: 'extraction', started: timestamp, progress: '3/5 pages'}. Dashboard polls Redis for real-time status.<br><br><b>Monitoring:</b> Kafka consumer lag per topic. Growing lag on extraction? Scale extraction workers. Alert if lag > 5 min."},
]}

// Render notes
const notesSidebar=document.getElementById('notesSidebarList'),notesContent=document.getElementById('notesContentArea'),notesBreadcrumb=document.getElementById('notesBreadcrumb'),notesSearch=document.getElementById('notesSearch');
let activeNoteIdx=0;

NOTES.forEach((sec,si)=>{
  const el=document.createElement('div');el.className='s-topic'+(si===0?' active':'');
  el.innerHTML=`${sec.section} <span class="cnt">${sec.notes.length}</span>`;
  el.onclick=()=>selNote(si);el.id='nst-'+si;notesSidebar.appendChild(el);
  const sub=document.createElement('div');sub.className='s-patterns';sub.id='nsp-'+si;
  sec.notes.forEach((n,ni)=>{
    const p=document.createElement('div');p.className='s-pat'+(si===0&&ni===0?' active':'');
    p.textContent=n.t;p.onclick=e=>{e.stopPropagation();selNoteItem(si,ni)};p.id='np-'+si+'-'+ni;sub.appendChild(p);
  });
  notesSidebar.appendChild(sub);
});

function selNote(si){document.querySelectorAll('#page-notes .s-topic').forEach(e=>e.classList.remove('active'));document.getElementById('nst-'+si).classList.add('active');selNoteItem(si,0)}
function selNoteItem(si,ni){activeNoteIdx=si;document.querySelectorAll('#page-notes .s-pat').forEach(e=>e.classList.remove('active'));const el=document.getElementById('np-'+si+'-'+ni);if(el)el.classList.add('active');document.querySelectorAll('#page-notes .s-topic').forEach(e=>e.classList.remove('active'));document.getElementById('nst-'+si).classList.add('active');renderNotes(si);setTimeout(()=>{const target=document.getElementById('note-item-'+ni);if(target)target.scrollIntoView({behavior:'smooth',block:'start'})},50);const sec=NOTES[si];notesBreadcrumb.innerHTML=`${sec.section} <span>\u2192 ${sec.notes[ni]?.t||''}</span>`}

function renderNotes(si){
  const sec=NOTES[si];let html=`<div class="hld-section"><h2>${sec.section}</h2>`;
  sec.notes.forEach((n,ni)=>{
    html+=`<div class="hld-card" id="note-item-${ni}"><h3>${n.t}</h3><div style="font-size:14px;line-height:1.8;padding:8px 0">${n.content}</div></div>`;
  });
  html+='</div>';notesContent.innerHTML=html;notesContent.scrollTop=0;
}

notesSearch.addEventListener('input',function(){
  const v=this.value.toLowerCase().trim();if(!v){renderNotes(activeNoteIdx);return}
  let html=`<div class="hld-section"><h2>Search: "${this.value}"</h2>`;let f=0;
  NOTES.forEach(sec=>{sec.notes.forEach(n=>{
    if((n.t+n.content).toLowerCase().includes(v)){f++;
      html+=`<div class="hld-card"><h3>${n.t}</h3><div style="font-size:14px;line-height:1.8;padding:8px 0">${n.content}</div></div>`;
    }
  })});
  if(!f)html+='<div style="text-align:center;padding:30px;color:#484f58">No results</div>';
  html+='</div>';notesContent.innerHTML=html;
});

renderNotes(0);notesBreadcrumb.innerHTML=`${NOTES[0].section} <span>\u2192 ${NOTES[0].notes[0].t}</span>`;
</script>
